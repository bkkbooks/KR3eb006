膝巴戟枸杞杜仲白苓棗皮遠志五味楮實小茴蓯蓉石菖蒲加楂肉蜜丸人參養榮湯人參黃耆白朮白苓熟地當歸白芍肉桂五味遠志陳皮甘草姜棗引或去陳皮白芍加肉蓯蓉淮藥或添淮藥熟附倍用五味黃耆白朮脾虛除熟地遺泄加龍骨五積散麻黃湯半夏越婢湯麻黃半夏石膏甘草姜棗引小柴胡湯人參半夏柴胡黃芩甘草姜棗引加桂枝粉葛敗毒散桔梗白苓川芎枳殼羌活獨活柴胡前胡薄葉姜引大承氣湯大黃芒硝川朴枳實黃耆建中湯白芍肉桂黃耆甘草姜棗引左歸丸左歸飲倍當歸熟地枸杞杜仲菟絲加黃耆諸血指要夫人之血生於心藏於肝統於脾宣布於肺施泄於腎灌溉一身則知血既統於脾脾實生化之本而治失血之症宜以調理脾胃為主雖云血來多因火迫而火宜導以歸源期血乃歸經苟妄用寒涼則反激浮火逆上且傷胃氣而脾愈不能統血也矣夫血有因於外感者經曰歲火太過炎暑流行肺金受刑民病血溢血泄是火氣能使人失血也太陰司天寒淫所勝民病嘔血血泄鼽衄善悲是寒氣能使人失血也太陰在泉濕淫所勝民病血見是濕氣能使人失血也少陰司天水火寒熱持於氣交熱病生於上冷病生於下寒熱凌犯而爭於中民病血溢血泄是寒熱凌犯能使人失血也太陰司天初之氣風濕相搏民病血溢是風濕相搏能使人失血也歲金太過燥氣流行民病咳逆血溢是燥氣能使人失血也此六氣俱能使人失血者也若其由於內傷者憂悶傷心則面赤而心中躁擾血來鮮紅左寸脈必澀而芤也怒氣傷肝則脅疼而血來多紫入水必沉左關脈必急而芤也勞碌思慮傷脾則面目萎黃四肢困倦血來必多入水半浮半沉右關脈必弱而芤也憂思抑鬱傷肺則胸前膨脹面無光澤血來少而或淡紅入水必浮右寸脈必浮澀而芤也如火盛爍金則乾咳無痰痰中時帶血星或如膿臭或如肉屑或如紅絲右寸脈必浮數而芤也淫欲傷腎虧損真陰真陽血逆上行入水亦沉兩尺脈必微弱而芤也此五志七情皆能使人失血者也又有飲食傷胃倉猝血來或夾咳夾痰右關脈必浮緩而芤也要之血行清道則出於鼻血行濁道則出於口咳血衄血出於肺嘔血出於肝吐血出於胃痰涎血出於脾咯血出於心唾血出於腎耳血曰衈鼻血曰衄齒血牙縫出血舌血舌上無故出血如線不止或如簪孔者宜香薷汁日三服外以槐花炒末乾摻之亦曰衄肌膚出血曰血汗鼻口俱出曰腦衄九竅俱出曰大衄胸前有一孔常出血水名曰心漏用鹿茸去毛酥炙附子炮去皮臍鹽花共末棗肉為丸每服三十丸空心酒下此治腎虛腰痛亦神便血清者屬營虛有熱濁者屬熱與濕色鮮者屬火色黑者火極血與泄物並下屬有積或絡脈傷也尿血因房勞過度陰虛火動營血妄行血色黑黯面色枯白尺脈沉遲者此下元虛冷所謂陽虛陰必走也有嘔吐紫血者原病式云此由熱甚銷爍以為稠濁熱甚則水化制之故赤兼黑而紫也汗血者由太喜傷心喜則氣散血隨氣行也凡下血先見血後見便為近血自大腸來先有便後見血為遠血自肺胃來腸胃本無血由氣虛腸薄故滲入而下出也善治者於外感則順時氣而調之於內傷則雖因各經之火而消息之要必以脾胃為主也嘗觀先哲之言血上行為逆其治難下行為順其治易究之實火之血調氣為先虛火之血養正為急要莫不以脾胃藥收功也按歸脾一方乃心肝脾三經之主劑遠志棗仁補肝以生心火茯神龍眼補心以生脾土參耆朮草補脾以壯陽氣木香者香先入脾總欲使血歸於脾故以歸脾湯名是健脾之陽有三善焉蓋脾中之陽氣旺則如天清日朗而龍雷潛伏脾中之陽氣旺則胸中窒塞之陰氣如太空不留纖翳脾中之陽氣旺則飲食運化精微復能生其陰血況地氣必先蒸為濕然後上升為云若土無蒸而不濕則地氣於中隔絶矣天氣有不清明乎且萬物以土為根元氣以土為宅可不重歟至其土旺生金金以生水猶其理之顯然者也彼徒泥知柏地黃為滋陰降火將以寒涼純陽之氣味吸引陰邪上逆必致胸膈滯礙飲食日減滑泄以作且陰氣久居於上勢必龍雷之火應之於下燔熾莫遏矣仲景云陽旺能生陰血蓋言人之真陽盛旺自能化生陰血此八味地黃之所由立也張璐曰人生以胃為本凡久虛不愈諸藥不效者惟有益胃補腎兩途然當先培中土使藥氣四達則周身之機運流通水穀之精微敷布何患其藥不效哉喻嘉言曰虛勞病至於亡血失精精血枯槁難為力矣急宜建其中藏使飲食增而陰血旺故但用稼穡作甘之味生其精血而酸辛鹹苦在所不用舍是無良法也故參苓朮草所以為四君子也外此而張景嶽有溫甘純靜之用馮楚膽有脾胃為主之論皆得其要也即或血為火逼而暴吐暴衄不得不與為暫止亦當思時珍之用童便必乘熱而飲勿以冷進也俗傳回輪湯一法於理難通蓋人惟飲食之精華存為氣血之資而其渣滓化為穢濁降於二陰此固臟府所不容之物何至使反諸中而生精血乎彼無知者不足怪往往以明理之人亦奉為金丹此不可解也豫診治血症獲濟甚衆故特闡明於此傷寒脈要夫傷寒之脈表裡虛實宜急辨也初持輕手候之脈見皮膚之間便得曰浮是太陽經脈也有力者主寒邪在裡無汗為寒傷營血表實宜汗之無力者主風邪在表有汗為風傷衛氣表虛宜實之重手候之脈附於肌肉之下筋骨之間而得曰沉是三陰經脈也三陰經俱是沉脈要在指下有力無力細分之有力者主熱邪在裡為裡實宜下之無力者主寒邪中里為裡虛宜溫之不輕不重取之脈應於血肉之分陰陽相半曰中中者半表半裡是也若見微洪是陽明經脈也主邪在表多里少宜解肌若見弦數是少陽經脈也主邪在半表半裡宜和解蓋陰陽表裡虛實寒熱俱在浮中沉三按中分有力者為陽為實為熱無力者為陰為虛為寒若浮中沉之不見則委曲求之若隱若見乃陰陽伏匿之脈也然三脈中有進退焉脈大者邪氣勝為病進脈緩者胃氣和為邪退又有伏脈焉一手無脈曰單伏兩手無脈曰雙伏如病初起頭痛發熱惡寒而脈伏者緣陰邪陷於陽中不得越發此欲汗而當攻之使邪氣退而正氣復脈自至而病自除也若七八日以來別無刑剋症候或昏冒不知人事或脈全無者此欲汗而勿攻之回陽之吉兆也又有可解不可解焉脈浮緊在表者以汗解之脈沉實在裡者以下解之脈沉遲而無力者以溫解之然又有浮而宜下者則因大便難也沉而宜汗者則因表有熱也又有歇至焉如陰寒直中陰經溫之而斷續者是也又有躁亂焉因汗下後脈當靜今反盛者是也夫傷寒之脈浮大動數滑為陽沉澀弱弦微為陰而其弦緊浮滑沉澀六者為殘賊之脈傷寒先入皮膚肌肉次入筋骨腸胃專以浮中沉遲數辨其陰陽寒熱及表裡虛實而斷之諸浮為在表屬陽諸沉為在裡屬陰諸遲為在臟屬寒諸數為在府屬熱雜病以弦為陽傷寒以弦為陰雜病以緩為弱傷寒以緩為和傷寒以大為進病以緩為邪退以緩為胃氣寸口陽脈中或見沉細無力者為陽中伏陰尺部陰脈中或見沉數有力者為陰中伏陽寸口數大有力為重陽尺部微而無力為重陰寸口細微如絲為脫陽尺部細微無力為脫陰寸脈弱而無力切忌發汗尺脈弱而無力切忌輕下初按來疾去遲名曰內虛外實去疾來遲名曰內實外虛尺寸俱同名曰緩緩者和而生也汗下後脈靜者生躁亂身熱者死乃邪氣勝也溫之後脈來歇止者正氣脫而不復生也純弦之脈名曰負負者死按之解索者名曰陰陽離離者死陰病見陽脈者生陽病見陰脈者死寸脈下不至關為陽絶尺脈上不至關為陰絶此皆不治脈來藹藹如車蓋者名曰陽結脈來纍纍如循長竿者名曰陰結脈瞥瞥如羹上珠者為陽氣微脈縈縈如蜘蛛絲者為陰氣衰脈綿綿如瀉漆之絶者亡其血脈來緩時一止復來者曰結脈來數時一止復來者曰促陽盛則促陰盛則結此皆病脈至於兩手洪急緊盛為夾食右手脈空虛左手脈緊盛為勞力左手脈緊盛右手脈洪滑或寸沉伏身熱惡寒隱隱頭痛喘咳煩悶胸脅腹痛為夾痰左手脈緊澀右手脈沉數心胸脅下少腹有痛處為血鬱此皆脈症相因不可不察也按陰脈本沉而亦有緊有數仲景惟以微細言之蓋沉脈必重按始得緊數亦在沉細中見不似陽症浮大而緊數也陳氏曰人知數為熱不知沉細中見數為寒甚真陰寒症脈常有七八至者但按之無力而數耳故曰脈數為熱浮數為表熱沉數為裡熱數而有力為實熱數而無力為虛熱況沉細乎若初病便譫語發熱六部無脈而大指之下寸口之上有脈動者此鬼脈也不得混為反關脈也此診傷寒之大要也傷寒陰陽表裡脈症指要夫傷寒有汗下溫之法必按脈驗症而用之不容謬也太陽者陽症之表陽明者陽症之裡少陽者三陽三陰之間而太陰少陰厥陰又居於里總謂之陰症也發於外則太陽為之首發於內則少陰為之先太陽惡寒少陰亦惡寒但太陽之脈多浮少陰之脈沉細自異也凡發熱惡寒身體疼痛或自汗或無汗是為表症可汗不惡寒反惡熱口燥咽乾壯熱腹滿小便如常大便祕結是為里症可下厥冷囊縮自利煩躁而無身熱頭痛是為陰症可溫浮洪緊數此表病之脈沉實滑數此里病之脈微細緩弱此陰病之脈在表者邪傳於營衛之間在裡者邪入於胃府之內胃府之下少陽居焉若傳之陰則為邪氣入藏矣夫營與衛固為表也胃府亦可以為表然以藏府而分之則在府為表在藏為里若合營衛藏府而分之則表者營衛之所行里者胃府之所主而藏則又深於里矣審脈問症隨經用藥豈可忽哉經曰傷寒六七日目中不了了無表症脈雖浮亦有可下者以六七日不大便故也假使大便不難其敢輕下乎少陰病亦有發汗者以少陰本無熱今反發熱而表猶未解故用溫藥微取其汗也假使身不發熱其敢輕汗乎陰症四逆法當用溫但四逆湯用姜附四逆散用枳柴一寒一熱並主四逆固不侔矣然傳經之邪與陰經受邪初病便厥者不同四逆散用藥寒主先陽後陰也四逆湯用藥熱主陽不足而陰有餘也至於陽極發厥陰極發厥陰症似陽陽症似陰差之毫釐謬以千里學者尤當深思之耳要之風寒初入或先太陽寒水之經此經本寒標熱便有惡風惡寒頭痛脊強發熱之症若在他經則無此症矣若無頭痛惡寒脈又不浮此為表症罷而在中中者何即半表半裡之間乃陽明少陽之分也蓋二經不從標本從乎中也過此則邪入里為熱實脈不浮而沉按至筋骨之間方得如脈來沉實有力外症則不惡風寒而反惡熱譫語大渴或潮熱自汗或揚手擲足揭去衣被五六日不大便是邪熱傳入胃府屬裡而有燥糞也宜大柴胡湯下之而愈矣若脈來沉遲無力此為直中陰經真寒症之陰脈其症無頭痛無身熱初起怕寒手足厥冷或戰栗蜷臥不渴或腹疼嘔吐泄瀉或口出涎沫面如刀刮乃陰經自中之寒不從陽經傳入故不在傳經熱症治例更當看其外症如何若腹滿咽乾屬太陰舌乾口燥屬少陰煩滿囊縮屬厥陰此三者俱是陽經傳入陰經之熱症脈沉實有力急當攻裡下之如下後利不止身疼痛脈反沉細無力又當救里溫之此權變之法也三陰傳經熱症與三陰直中寒症脈雖沉而有力無力要當分別證異而治各不同矣惟以浮中沉三脈分察其症則緣症以明治庶可以得其要矣浮中沉脈形主病指要浮者下指於皮膚之上輕按便得而邪初入足太陽經病在表之標可發而去之然惟浮緊有力無汗惡寒頭項痛腰脊強發熱此為寒傷營表實宜發表冬用麻黃湯春夏秋用羌活沖和湯去地黃加紫蘇藿香渴加石膏知母無渴不宜加若浮緩無力有汗惡風頭項痛腰脊強發熱為風傷衛表虛宜實表冬用桂枝湯春夏秋用加減沖和湯腹痛小建中湯甚者桂枝大黃湯止汗退邪必加涼藥於中庶免斑出黃生之患也中者下指不輕不重略按至皮膚之下肌肉之間乃得謂之半表半裡症也然惟長而有力即微洪脈也此為陽明在經其症微有頭痛眼眶痛鼻乾不得眠發熱無汗用葛根解肌湯若渴而有汗不解或經汗過渴不解者用白虎湯加人參無渴不可用若脈弦而數此為少陽經病其症胸脅痛耳聾寒熱嘔而口苦兩陽交中故名曰少陽俱用小柴胡湯加減若兩經合病則脈弦而長以小柴湯加葛根芍藥緣膽無出入有三禁只宜和解表裡也沉者下指重按至肌肉之下筋骨之際乃得為沉脈至此方分陰陽而辨其寒熱也蓋沉數有力則為陽明之本表症解而熱入於裡惡寒頭痛悉除反覺怕熱欲揭衣被揚手擲足譫語狂妄躁渴或循衣摸床五六日不大便輕則大柴胡湯重則三承氣湯用以泄去胃中燥糞即愈若沉遲無力為寒外症無頭痛身熱不渴初起怕寒厥冷蜷臥或兼腹滿脹痛吐泄或戰栗面如刀刮或口吐白沫冷涎或小便清白或大小腹痛皆是陰經自中真寒症輕則理中湯重則姜附四逆湯溫之也此於浮中沉三者可以得汗下溫之大要焉傷寒三陽三陰指要夫傷寒症候傳變不一要當審其病在何經以施汗下溫三法也而三陽三陰究未可以日數拘矣仲景所云一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰此特言傳經次第由陽入陰之大概耳要之傷於寒邪而即發者是為正傷寒惟在太陽經則脈必尺寸俱浮其症惡寒發熱頭項痛腰脊強者以其脈上連風府故也在陽明經則脈必尺寸俱浮長其症身熱目疼鼻乾不得眠者以其脈夾鼻絡於目故也又曰不惡寒而作渴為在經不惡寒反發熱自汗出大便難為在府也在少陽經則脈必尺寸俱浮弦其症胸脅痛耳聾口苦舌乾往來寒熱而嘔者以其脈循脅絡於耳故也若在太陰經則脈必尺寸沉細也其症腹痛咽乾手足自溫直中者或腹痛自利不渴以其脈布胃中絡於喉故也在少陰經則脈必尺寸俱沉其症口燥舌乾而渴直中者惡寒口中和默默欲寐腹痛或咽痛以其脈貫腎絡於肺系舌本故也在厥陰經則脈必尺寸俱沉而微緩其症煩滿囊縮直中者唇青舌卷不欲食或吐蛔以其脈循陰器絡於肝故也若其邪入陽明胃府則潮熱自汗譫語發渴不惡寒反惡熱揭衣去被揚手擲足或發斑黃狂亂五六日不大便此乃陽熱既極陰氣消亡之候不可不以大承氣下之以承領其一線之陰使陰氣不盡為陽所劫因而得生矣夫傷寒之邪實無定體或入陽經氣分則太陽為首或入陰經血分則少陰為先而其脈以浮而有力無力則知表之虛實沉而有力無力則知里之寒熱中而有力無力則知半表半裡之緩急故陽盛陰虛則邪乘虛而入於裡下之則除其內邪而愈若誤汗則竭其津液而死矣陰盛陽虛則邪得客於胰理而未能入汗之則散其外邪而愈若誤下則邪盡入里而凶矣觀此不可以知脈症治法之大要乎按經文三陽傳經先太陽次陽明後少陽論傷寒者皆宗之不知太陽行乎身之後陽之表也陽明行乎身之前陽之裡也少陽行乎身之側半表半裡也如前所云焉有傳裡已後方傳半表半裡者哉此固所宜亟正也惟三陽熱邪傳至三陰藏府入里為盡無所復傳故言三陰無傳經也如再傳者是足傳手經也若云傳足不傳手者俗醫之謬也蓋傷寒者乃冬時感寒即病之名冬乃坎水司事其氣嚴寒時則太陽少陰正司其令觸冒之者則二經受病其次則足少陽厥陰繼冬而司春令而亦受傷何也春木之令起於大寒節正當十二月中至春分後方行溫令故風寒亦能傷之足陽明太陰中上也與冬時無預而亦傷之何也土無定位寄旺於四季能終始萬物則四時寒熱溫涼之氣皆能傷之也故表邪傷里必歸於脾胃而成燥糞矣手之六經主於夏秋故不傷之足之六經蓋受傷之方分境界也若言傷足不傷手則可以為傳足不傳手則不可耳況風寒之中人營衛晝夜循環無所不至豈間於手經哉傷寒傳變之大要舉此可推學者宜細究之若夫瘟疫症亦多類傷寒而其初起舌即有輕黃苔現非若傷寒黃苔兩邊猶紅也且症則惡食不惡寒又無頭疼或嘔吐酸臭是乃分別之切要也況右手關脈滑大可辨蓋時感瘟疫感天地之戾氣邪自口鼻入內不客藏府舍於伏脊之內去里不遠附近於胃乃表裡分界是為半表半裡針經所謂橫達膜原是也凡邪在經為表在胃為里今邪在膜原正當經胃交界之所病之所發惡食或懍懍怯寒甚則肢厥陽氣鬱極而通則厥回而中外皆熱始而怯寒既而發熱非若傷寒發熱而並惡寒也且其為變往往至急至危尤有大異於傷寒者此又不可不辨之也傷寒症治指要夫傷寒症治仲景方法具詳醫宜得其要也如太陽主表為一身之外藩綜六經而統營衛風為陽邪故傷衛寒為陰邪故傷營衛受邪則有汗或有咳鼻流清涕乃為虛邪故用桂枝湯或參蘇飲加荊防主之營受邪則無汗惡寒發熱頭痛脊強乃為實邪故用麻黃湯羌活湯香蘇散等主之營衛俱受邪俱無汗皆為實邪大青龍主之然太陽之症頭項強痛惡寒發熱脈必浮緊而有受邪重傷脈伏而附骨重按乃得沉緊之至是須重用發散之劑而脈始見也若單惡寒不頭痛項強而惟腹痛脈代者則又為直中陰經矣此又不可不知如陽明主裡內候胃中外候肌肉而有病經病府之分如雲身熱煩渴目疼鼻乾不得眠不惡寒反惡熱者此陽明經病也若潮熱譫語手足肢下濈然汗出腹滿痛大便硬不得解者此陽明府病也而其候有三經脈則有邪已傳陽明而表尚未罷兼見頭痛惡寒無汗之太陽症者有太陽之邪已盡悉傳陽明但見大熱有汗心煩不眠口渴引飲之陽明府者有陽明之邪未已復轉少陽兼見胸膈痛寒熱往來口苦而嘔目眩耳聾之少陽症者傷寒陰症陽症指要凡讀仲景書須將傷寒與中寒分別辨明庶不使陰陽二症混謬也夫邪之所湊豈有定所不必拘以六日傳畢六經而方愈故仲景立法在表發汗在中和解在裡攻下惟於邪之所在而驅散不過使邪退而正氣俱行耳彼凡陽症寒邪自外入內由皮毛及肌膚次及筋骨而達腸胃必先入太陽寒水之經便有惡風怕寒頭痛脊強諸症是為表症脈浮緊無汗為傷寒以麻黃湯主之得汗即解若無頭痛惡寒脈又不浮此為表罷而在中中者何表裡之間也乃陽明少陽之分脈不浮不沉在乎肌肉之間皮膚之下也脈洪而長即陽明脈也外症鼻乾不眠用葛根湯以解肌脈弦而數即少陽脈也外症脅痛耳聾寒熱往來而口苦以小柴胡湯和之蓋陽明少陽不從標本從乎中治也若有一毫惡寒尚在表也雖入中還當散邪過此邪入里為寒熱脈沉實洪數有力外症不惡寒而反惡熱譫語大渴掀衣氣粗揚手擲足四肢躁熱身輕易於轉側六七日不大便此為熱入里而腸胃燥實也輕則大柴胡湯重則三承氣湯大便通而熱愈矣若在陰症初起便怕寒手足厥冷或戰栗身靜氣短少息目不了了水漿不入二便不禁喜向壁臥閉目不欲見人唇口不紅不渴腹痛腹滿嘔吐泄瀉或口流涎沫面慘息冷引衣自覆身重難於轉側不發熱而脈沉遲或弦數無力此自陰經受寒即真陰症不從陽經傳入熱症治例更當看外症何如輕則理中湯重則姜附湯四逆湯以溫之不可少緩經所謂發熱惡寒者發於陽也無熱惡寒者發於陰也此法人皆知之至於發熱面赤煩躁揭去衣被脈大無力者人多不知誤作陽症妄投寒涼死者多矣不知陰症不分熱與不熱無論脈之浮沉大小但指下無力重按無力者便是伏陰急用五積散通解表裡之寒惟內有沉寒必須姜附溫之倘作熱治而用寒涼則渴愈甚而躁愈急豈得生乎此宜取脈不取症也夫六府屬陽陽經受寒邪先發於太陽五藏屬陰陰經受寒邪先發於太陰陽經發病必先疏表清利邪熱陰經發病必須溫托扶正祛邪藏邪無瀉法故傷寒者由皮毛而後入藏府初雖惡寒發熱而終為熱症中寒者直入藏府始終惡寒而並無發熱等症一則發表攻裡一則溫中散寒兩途判然明白要之傷寒發熱者陰寒既鬱而成熱遂從乎陽傳變不一中寒不發熱者陰寒一定而不移則不變也外寒所受皆同惟里之有火無火所以為傷為中則異耳治陰症以救陽為主治傷寒以救陰為主然傷寒縱有陽虛當治必看其人血肉充盛而陰分可受陽藥者方用回陽若面熏舌黑身如柴枯一團邪火內燔者則陰已先盡焉敢回陽益劫其陰邪傷寒論曰陰症得陽脈者生陽症得陰脈者死人皆奉其言未嘗繹其義夫正虛邪旺久而不痊但與扶正則邪自除此必見虛衰之陰脈也正氣實者多見陽脈正氣虛者多見陰脈症之陽者假實也症之陰者真虛也陳氏曰凡察陰症不論熱與不熱惟憑脈用藥百不失一不論脈之浮沉大小但重按無力便是伏陰忌用寒涼犯之必死然則沉小者人固知為陰脈不知浮大亦有陰脈也但內傷元氣者脈皆無力不可不辨耳是知諸病千變萬化只虛實二字盡之不獨傷寒一症也故凡氣實而病者攻邪無難挾虛而病者不補其正邪何能退奈何有傷寒無補法之語以致虛症因而束手待斃良可嘆也獨不觀仲景為傷寒之祖立三百九十七法脈症之虛寒者百有餘條定百一十七方用參者三十用桂附者五十餘即東垣丹溪節菴亦有補中益氣回陽返本溫經益元等湯未嘗不補也況今人挾虛傷寒者十常六七虛症類傷寒者十有八九醫者每因一語所誤虛而不補且復攻之危亡立待殊不知發散而汗不出者津液枯槁陰氣不能外達也人知汗屬於陽升陽可以解表不知汗生於陰滋水即所以發汗也清解而熱不退者陽無陰斂陰不足也人知寒涼可以去熱不知養陰即所以退陽也元陽中虛以致陰寒內襲者壯元陽即所以散外寒也脾胃正虛而元陽不能藏納以致餘熱潮熱不已者補脾胃即所以斂浮陽也陶節菴曰得其要易於拾芥脈症與理而已矣傷寒寒熱二症陰陽二厥指要夫傷寒變症不一而寒熱二症所當急辨也凡脈數者或飲水者或煩躁動擾者皆屬熱症若脈遲者或新咳嗽者或水液清徹而尿不澀者或手足厥冷者或大便完穀不化身涼不渴者皆屬寒症但手足厥冷亦有陰陽偏陷不能宣行是以陽氣蓄積於內不能營建四肢所謂熱深厥亦深者又宜細察惟氣虛甚者其脈沉細手足厥冷身倦息微而懶言動雖身熱而不渴者是也此為中氣太虛膚腠疏豁故外寒內冷得以感中不分經絡惟當溫補也若其厥證又所當辨況三陰三陽陽脈在五指陰脈聚足心集於膝下膝上故經曰陽氣衰於下則為寒厥陰氣衰於下則為熱厥蓋陽氣衰則陰氣盛自足心至膝而俱冷是謂陰厥然過膝者多不治陰氣衰則陽氣勝故必熱自五指而至足心是謂陽厥然熱極反兼寒化即所謂熱深厥亦深故陽厥必熱極而發厥兼以脈數昏憒煩渴身復時溫便祕厥冷者是也宜承氣湯下之陰厥必身不熱而便不祕脈遲微細而不渴引衣自蓋下利者是也宜四逆湯治之然有陽厥極深至於身冷脈微欲絶為熱極而將死急以大承氣湯下之則厥愈者所謂寒藥反能生脈而令身暖也若誤以熱藥助其陽則陰氣暴絶陽亦必絶而死矣如陰已先絶而陽亦將絶於此時而復下之則陰陽俱絶而亦死矣可不細辨歟至於陰症似陽者則如面目赤而引飲脈來七八至按之則散者此無根之脈也並有夾陰中寒面色青而脈沉厥冷舌卷囊縮下利清穀裡寒外熱者或身痛脈沉及脈微欲絶厥冷者並用四逆湯加減主之皆不可視為陽症也又凡身熱面赤眼紅六脈無力或豁大而空者此下元虛憊陽浮於上謂戴陽之症也陽已戴於上若再加表散或寒涼則孤陽浮越危亡立至矣故陶節菴以人參附子等藥收歸陽氣於下源而加蔥白透表以散外邪此顧本逐客之妙用也傷寒陰毒真假及格陽格陰並兩感指要夫陰毒病者腎經虛寒真假宜辨或傷生冷或感寒邪或汗吐亡陽以致手足指甲皆青腹中絞痛四肢逆冷虛汗恍惚擲聲嘔吐倦怠身痛六脈沉微或尺衰寸盛或沉細而急者必用溫和補氣之藥通其內外以復陽氣若俱不效乃死症也五日內可治六七日不可治然陰症而見陰脈人易知之或至反常則不易曉如發熱面赤煩躁飲冷揭去衣被而其脈反大若誤認為陽症妄投寒涼死者多矣必須審察其脈但見指下無力按至筋骨全無力者是有伏陰在內所以逼陽於外所謂陽欲暴脫者外顯假熱也此宜急與六味地黃大劑如或下部惡寒足冷上部渴甚燥極或欲飲而反吐即於六味地黃中加肉桂五味甚則加附子冷飲下咽即愈矣且舉傷寒口渴一症言之邪熱入於胃府消耗精液故渴恐胃汁干急下之以存津液其次有但云欲飲水者不可不與不可多與並無治法醫乃妄投芩連知柏麥冬花粉五味石膏知母之類此皆以有形之水沃其無形之火徒使水與火爭安能滋腎中之真陽耶若以六味地黃服之其渴立愈何至傳及少陰而成燥實堅之症乎既成燥實堅之症仲景不得已而以承氣下之此權宜之霸術所為諄諄有虛人老弱人之禁故以大柴胡湯代之陶氏以六乙順氣湯代之豈以二湯為平易乎代之而愈所損亦多矣況不愈者十之八九哉苟用六味地黃大劑服之取效雖緩其益無窮也況陰虛發熱者小便必少大便必實其前症口渴煩躁與傷寒無異彼之承氣者不過因亢則害下之以存真陰之氣耳今直探其真陰之原而補之如亢旱而甘霖一施土木皆濡頃刻為清涼世界矣若腎水既虛復經一下萬無可生之理矣慎之慎之此趙氏之創論實探本窮源之學也且夫陽盛格陰陰盛格陽二症至為難辨蓋陰盛極而格陽於外外熱而內寒陽盛極而格陰於外外冷而內熱經所謂重陰必陽重陽必陰重寒則熱重熱則寒是也當於小便分之便清者外雖躁熱而中必寒便赤者外雖厥冷而內實熱再看口中燥潤舌胎淺深蓋舌為心苗邪在表則未生胎邪入里而津液搏結則生胎而滑胎白者丹田有熱胸中有寒在半表半裡也熱入漸深則燥而澀熱爍於胃矣宜用承氣白虎若熱甚口乾舌黑乃腎水乘於心火熱益深而病篤矣然亦有胎黑屬寒者必舌無芒刺口有津液也而要宜以脈之有力無力細辨之耳至於兩感於寒而病者必死之候也如一日太陽與少陽俱病則發熱惡寒頭痛口乾煩躁而渴二日陽明與太陰俱病則腹痛身熱譫語不食睡臥不寧三日少陽與厥陰俱病則脅痛耳聾囊縮而厥水漿不入不省人事總為陰陽共病表裡俱傷府藏之氣不得通於上下營衛之精不得行於內外病至六日六經俱絶不可救治然何為而兩感也如太陽與少陰俱病則太陽府也邪自腎俞而入少陰藏也邪自鼻息而入鼻氣通於天故寒邪無形之氣從鼻而入腎為水藏物以類聚故腎受之經曰天之戾氣感則害人五藏內外兩感府藏俱病欲表之則有里欲下之則有表表裡既不能一治故曰兩感者不治然所稟有厚薄所感有淺深虛而感之深者必死實而感之淺者猶有可治表症多者先解其表里症多者先攻其里所謂治有先後要在臨症變通但得其宜亦多無害耳傷寒類症凶症指要凡症有類傷寒者如胸膈赤腫疼痛頭疼身痛發熱惡寒宜荊防敗毒散加瓜蔞子黃連黃芩元參紫金皮赤芍白芷升麻如症有表復有里者防風通聖散加瓜蔞子黃連紫金皮如表症已退大便燥實者涼膈解毒散加瓜蔞子枳殼桔梗紫金皮赤芍又宜以稜針刺腫處出血如胸膈腫痛而兼半表半裡者柴胡桔梗湯加瓜蔞子紫金皮赤芍服之凡耳中策策痛者是風入腎經也不治則變惡寒發熱脊強臂直如痙之狀名黃耳傷寒宜小續命湯去附子加殭蠶天麻羌活獨活次用荊防敗毒散加細辛白芷蟬蛻黃芩赤芍紫金皮又有解㑊傷寒解者肌肉解散㑊者筋不束骨其症似寒非寒似熱非熱四體節骨解散懈惰煩疼食不知味是也原其所因或傷酒或中濕或感冒風寒或房事過度或婦人經水不調血氣不和症與痧症相似實非痧病也宜先用熱水醮搭臂膊而以苧麻刮之宜服蘇合香散又有痧病者惟嶺南煙瘴之地陰毒砂風水弩射工蟈短狐蝦鬚之類俱能含砂射人被其毒者則憎寒壯熱百體分解似傷寒初發之狀彼土人治法以手捫痛處用角筒入肉以口吸出其砂外用大蒜搗膏封貼瘡口即愈諸毒惟蝦鬚為最若不早治十死八九其毒深入於骨如蝦鬚之狀其症類於疔腫彼地有鸂鶒等鳥專食以上諸蟲故以此鳥毛糞燒灰服之及籠此鳥於病者身畔吸之其砂聞氣自出而愈也更有大頭傷寒者發於鼻額紅腫以至兩目腫甚而不開額上面部皆赤腫者屬陽明也或壯熱氣喘口乾舌燥咽喉腫疼而脈來數大者用普濟消毒飲主之如內實熱盛用通聖消毒飲若發於耳之上下前後並頭角紅腫此屬少陽也或肌熱日晡熱寒熱往來口苦咽乾目疼脅下滿宜小柴胡加花粉羌活荊芥連翹芩連主之若發於頭上並腦後項下及目系赤腫者此屬太陰也宜荊防敗毒散主之若三陽俱受邪並於頭面耳目鼻者宜普濟消毒飲外以清涼救苦散敷之治法宜先退熱消毒虛人兼扶元氣胃虛宜助胃氣候其大便內結而熱甚方以大黃下之拔其毒根此緩急得宜不可不知也若夫傷寒凶候尤不可忽至如四五六日狂言直視小便遺失者腎絶也直視搖頭形體甚黑者腎水剋火而心絶也大小腸痛極者小腸為心府大腸為肺府火剋金而肺將絶因乃汗出如油喘而不休也爪甲青黑不省人事面青作搐舌卷囊縮者肝脾腎絶也大便似死血甚黑者或水穀不化藥食直下環口黎黑唇反者脾絶也傷寒以陽為主若手冷如冰足冷過膝皮肉瞤動自汗無度是陽已脫也陽先絶色青陰先絶色赤並皆不治若頭重視身天柱骨倒元氣已敗必死大便濁氣極臭者陰毒過六七日者死但欲寐而息高者死汗油發直喘不休者死寸尺俱虛熱不止者死大發濕家汗則痙熱而痙者死目睛正圓者死卵縮入腹脈見離經者死瘥後小便澀有血名內外瘡若黑靨不出膿者死熱盛躁極不得汗出是陽沒極死舌上黑胎生芒刺刮不去而易生者死鼻衄自汗者死胃寒發厄丁香茴香柿蒂良薑湯調服如脈不出加膽汁合生脈散其脈又不出或暴出者死大肉脫去者死凡此至凶之候臨症所當審也學者慎毋忽諸合病並病及兩感瘟疫指要趙嗣真曰愚嘗疑合病並病之難明也久矣今始釋之合病者二陽經或三陽經同受病病之不傳者也並病者一陽經受病又過一經病之傳者也且如太陽陽明並病一症若並而未盡是傳之未過猶有表症仲景所謂太陽症不罷面色赤陽氣拂鬱在表不得發越煩躁短氣是也猶當汗之麻黃桂枝各半湯若並之已盡是為傳過仲景所謂太陽症罷潮熱手足汗出大便難而譫語者是也法當下之以承氣湯是知傳則入府不傳則不入府所以仲景論太陽陽明合病止出三症如前於太陽陽明並病則言其有傳變如此也又三陽互相合病皆自下利仲景謂太陽陽明合病則主以葛根湯太陽少陽合病主以黃芩湯少陽陽明合病主以承氣湯至於太陽少陽並病其症頭項強痛目眩如結胸心下痞硬當刺大椎肺俞肝俞不可汗下但三陽合病仲景無背強惡寒語句雖別有口燥心煩背微惡寒乃屬太陽症而非三陽合病也三陽若與三陰合併即是兩感所以三陰無合病例也太陽陽明者本太陽病若汗若下若利小便亡津液胃中燥轉屬陽明大便難為脾約是也若惡寒升麻葛根湯不惡寒反惡熱白虎湯譫語者調胃承氣湯喘而胸滿者不可下麻黃湯太陽少陽者本太陽病不解傳入少陽頭項強急脅下硬滿乾嘔不能食目眩往來寒熱脈沉緊者小柴胡湯少陽陽明者本少陽病因發汗利小便後胃中燥實大便難調胃承氣湯正陽明者乃胃家風盛氣實也大柴胡湯大小承氣湯按輕重而用之三陽合病腹滿身重難以轉側譫語遺尿口中不仁白虎湯口燥舌乾不仁背惡寒同太陽陽明少陽陽明正陽陽明無表症者俱可下惟惡寒者為太陽陽明合病未過經為屬表可發汗蓋在經則汗過經則下也陽明少陽合病必下利其脈不負者順負者逆也互相剋賊曰負脈滑而數者有宿食也宜下之大承氣湯此為合病並病診治之大要不可忽也趙嗣真曰仲景論兩感為必死之症而復以治有先後發表攻裡之說繼之者蓋不忍坐視而欲觀其萬一之可治也仲景云太陽與少陰俱病則頭痛為太陽邪盛於表口乾而渴為少陰邪盛於裡也陽明與太陰俱病則身熱譫語為陽明邪盛於表不欲食腹滿為太陰邪盛於裡也少陽與厥陰俱病則耳聾為少陽邪盛於表囊縮為厥陰邪盛於裡也夫三陽之頭痛身熱耳聾救表宜汗也三陰之腹滿咽乾囊縮而厥救里宜下也活人書引下利身疼痛虛寒救里之例而欲施於煩渴腹滿譫語囊縮實熱之症謂宜先救里以四逆湯後救表以桂枝湯不亦謬乎蓋仲景所謂發表者葛根麻黃湯是也所謂救里者調胃承氣是也如活人言救里救表是以救為攻豈不相悖將藏府何由而通營衛何由而行其不坐以待斃者鮮矣噫兩感病固為不治之症也然用藥之法助正除邪之理學者不求定法於胸中而執活人一書其害人更不淺矣若夫疫病乃時行不正之氣從口鼻而入老幼相染緣人正氣既虛邪得乘機而入表症見者人參敗毒散半表半裡者小柴胡湯里症具者大柴胡湯下之而其症變不一多有至速至危之候尤宜參脈症而施治以平為期而已耳學者總宜細審毋忽傷寒變溫病熱病指要趙嗣真曰按仲景論謂冬月冒寒伏藏於肌膚而未即病因春溫氣所變則為熱夫變者改易之義也至此則伏寒各隨春夏之氣改變為溫為熱既變之後不得復言其為寒也仲景所謂春分以後秋分節前天有暴寒為時行寒疫是也三月四月其時陽氣尚弱為寒所折病熱則輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微是知時行寒疫與溫熱二病所論陽氣盛衰時月則同至於論暴寒之寒與伏寒已變之寒自是相違矣仲景又云其病與溫及暑病相似但治有殊者要在辨其病源寒熱溫三者之殊則用藥之冷熱判然矣夫溫病乃是冬時感寒所得至春變為溫病也經曰溫病之脈行在諸經不知何經之動隨其經之所在而取之如太陽症頭痛惡寒汗下後過經不愈診得尺寸俱浮者太陽病溫也如身熱目疼汗下後過經不愈診得尺寸俱長者陽明病溫也如胸脅痛汗下後過經不愈診得尺寸俱弦者少陽病溫也如腹滿咽乾診得尺寸俱沉細過經不愈者太陰病溫也如口燥舌乾而渴診得尺寸俱沉過經不愈者少陰病溫也如煩滿囊縮診得尺寸俱微緩過經不愈者厥陰病溫也是故隨其經而取之隨其症而治之如發斑乃溫毒也治溫大抵不宜發汗過時而發不在表也已經汗下亦不在表也經曰發熱不惡寒而反渴者溫病也其熱自內達外無表症明矣若傷暑與傷寒俱有熱如誤以傷寒治之則不可蓋寒傷血熱傷氣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脈虛此為異耳經曰脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯渴加知母石膏或人參白虎湯天久淫雨濕合大行蒼朮白虎湯若元氣素弱而傷之重者清暑益氣湯凡此皆舉其要而言之無非欲人按脈審症以善其治也學者宜切究之妊婦傷寒指要經曰有故無殞也大積大聚不可犯也損其大半而止過則殺也且妊婦傷寒保胎宜阿膠散大抵妊婦傷寒仲景無治法最宜避忌諸藥不可以尋常例視之凡有表症宜汗者用羌活沖和湯加當歸芍藥柴胡蘇葉之類速散表邪毋使入內是即安胎之第一義若裡實熱症大便不通而燥渴者則亦當用大黃芍藥須用酒製更兼芎歸以護之則無損於胎矣設或真寒脈伏厥冷者則用薑桂附子用大黃甘草制之乃無害也如有大寒大熱之症不急除去反足以損胎故曰有故無殞但中病即已毋過其劑外用井泥青黛伏龍肝末調勻塗於孕婦臍下二寸許干則再塗以保其胎也惟腸胃虛寒而畏寒泄瀉者忌之若夫産後傷寒不可輕易汗下恐産時傷力其發熱者有因去血過多或惡露不盡或三日蒸乳或早起勞動或飲食停滯俱有發熱惡寒狀類傷寒不可便用發表攻裡之藥但産後惡露不盡發熱惡寒者必脅肋脹滿連大小腹有塊作痛飲食停滯發熱惡寒者必有噯氣作酸惡聞食臭胸膈飽悶右關脈緊盛若蒸乳發熱惡寒者必乳間脹硬疼痛令産婦揉乳汁通其熱自除不藥而愈矣若系産後不謹虛中感冒者當以四物湯加入風藥尤宜審其正氣之虛實邪感之輕重以汗之至於熱邪傳裡燥渴便祕而脈見沉實熱甚譫語者重則下之用四物湯加柴胡黃芩熟大黃枳實輕則蜜導下後用四物加乾薑少許參朮大用以溫補其血氣如熱邪傳至半表半裡用四物合小柴胡湯主之然當産後氣血太虛諸病宜以大補為主雖有雜症以末治之況汗下乎是在臨症者細審之又婦人有熱入血室之候亦當分辨如婦人中風發熱惡寒而經水適來得之七八日熱除脈遲身涼胸脅滿如結胸狀譫語者此為熱入血室當刺期門隨其實而瀉之傷寒發熱而經水適來晝日明瞭暮則譫語如見鬼狀此為熱入血室無犯胃氣及上中二焦必自愈或中風七八日續得寒熱發作有時經水隨斷者此為熱入血室其血必結故如瘧狀宜小柴胡湯或陽明病下血譫語此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出而愈夫婦人熱入血室有二而經水適來二條不言治者蓋以經水方來熱氣乘虛而入經血止則熱亦出矣故不可用汗下藥犯其胃氣及上中二焦如胸滿譫語此內實也刺期門以泄之若經水適斷續得寒熱其血必結故用小柴胡湯若陽明熱入血室此男子失血之症但當刺以瀉熱耳此皆不可不明者也至若勞復之為壞症者如男子病新瘥婦人與之交曰陽易婦人病新瘥男子與之交曰陰易男子陰腫小腹痛婦人裡急連腰痛眼昏四肢拘急為女勞復者此皆為不治之症也已辨傷寒中寒假熱假脹之要凡霜降以後春分以前天氣嚴寒調理不謹或中其邪頭疼壯熱名為傷寒其餘三季雖寒而不嚴少有真傷寒之病也然冬月嚴寒何傷寒多而中寒者少三季微寒何傷寒無而中寒者偏多蓋冬主閉藏天之陽氣人之陽氣並伏於內所以外雖嚴寒不能直入乃名為傷當從表散表能里和無拘三陰傳變若在春夏天之陽氣人之陽氣升浮在外即有發熱者乃虛陽浮表也其脈必沉細而無神宜補中氣以斂虛陽有頭痛者虛上冒上也其脈必浮大而無力宜溫下元以藏龍火此引火歸原之法以治假熱之症也更有假脹者凡人中氣充足健運不息何有脹滿之處若胃虛不能納食則有虛飽之患脾虛不能化谷則有倒飽作脹之處更有下元虛極無根脫氣上乘胸次蓋腎主納氣肺主出氣腎虛不能閉藏則氣竟出而不納肺雖司出氣氣奔大迫有出無歸肺亦脹滿是脅胸膈之間脹悶難狀甚有攻刺衝心大痛欲絶此惟宜以補為消從塞因塞用之法心脾不足者大補心脾以使中氣運行則快若腎經虛寒者溫補下元使真氣封藏乃愈此納氣藏源之法以治假脹之症也如不知此一加消克順氣益令虛氣無依上攻喘促而死然氣病用氣藥而不效者緣氣之藏者無以收也肺主氣腎藏氣故古人用補腎藥加肉桂五味子以收濁氣下歸也總之表熱多由里陽外越上熱皆由下火上乘雖有外邪感觸亦不過初受發病之端況玩經云邪之所湊其正必虛可見外邪感襲亦由虛召至於春夏陽氣浮越尤易正氣外泄倘不知此輕投寒劑則外浮耗散之陽何自而歸內存幾希之陽復加撲滅重則暴亡輕則中滿奈何近醫不識病情凡五六月發熱概云瘟病傷寒稍見紅點即云時行瘟疹投以寒涼誤人多矣至於口乾煩渴喜冷浩飲似屬實熱然究其源若非胃汁乾枯即系腎水燥槁所以引水自救也冰水入胃津液愈凝寒入丹田虛火益上雖系龍雷亦能焚焦草木故面赤眼紅牙焦舌燥六脈洪數竟似有餘投以寒涼必致煩躁狂擾津液燥竭而死若能求源從治用水中補火熱藥涼飲之方二三劑後自然假陽之症潛消而真寒之症自退不知此而以寒涼誤投者更多矣惟真傷寒實熱便祕等候者則從寒涼利下先標後本可也然須辨症的確務審可寒則寒可下則下必期中病否則殺人如劍慎之評傷寒論夫人之有生者皆精氣神具備而成之也氣足而神生氣弱而神困矣氣化而精生氣虛而精散矣經曰精者身之本也故藏於精者春不病溫要知外邪之觸必乘正氣之虛治之者乘其表邪初客急為疏解使無深入以傷於裡繼以調和之劑則表邪散而中氣和自可相安無恙若外感少內傷多只須溫補不必發散正氣得力自然推去寒邪蓋元氣極虛之人雖即微邪易為感受惟使正氣一旺而健行則微邪不攻而自退若不顧正氣之虛而徒以逐邪為事則元氣轉傷邪反乘虛伏匿而為病矣況有毫無外感因勞而發熱者謂之勞發只須補中尤忌疏解即有頭痛惡風口渴等候須知頭痛者非虛火上浮即血虛作痛也惡風者陽虛不能衛表也口渴者藏府津液不足則腎虛引水自救也以脈消息病無遁情不論浮沉大小但重按無力便非實症奈何泥於前人多岐傳經支離等語凡有發熱頭疼即用古方太陽經藥重加發散津液耗亡欲不口乾發熱其可得乎復謂陽明經症見矣忍飢以虛其里疏散以虛其表化源之生機既絶陰道之消爍日深欲不脅痛耳聾其可得乎復謂少陽經症見矣柴芩和解之劑一投引邪深入之害實大以致脾虛氣弱欲不腹滿咽乾其可得乎復謂太陰經症見矣重為峻攻其里脾陰愈耗欲不口乾大渴便祕煩躁其可得乎復謂少陰經症見矣寒涼峻利之藥一投肝腎之陰愈槁欲不煩滿舌卷囊縮其可得乎尚謂厥陰經症見矣不知種種症候皆由調治失宜以令邪氣日深正氣日消所致直至手足厥冷脈細欲絶乃認虛寒方議溫補已無及矣故古人傷寒類方初則麻黃葛根柴胡等湯繼則調胃大小承氣回陽急救溫經益元等湯重用參耆苓桂朮附以追失散之元陽殊不知寒涼久進熱藥難溫克消久投補藥難挽奈何後人不詳此旨徒遵上古證治真傷寒之舊則引治今人稟賦虛弱者之類同凡遇本元虛損發熱口乾煩躁正氣不足之症以作外邪深入有餘之治縱得苟延殘喘而不至精神消耗殆盡者未之有也蓋古人傳經總論不過明其寒邪自陽及陰由表入里然邪之所湊豈有定位況陰陽相關表裡相應表病不解里亦隨病陽病不除陰亦隨傷此表裡陰陽本氣為病之必然豈必待有邪傳遍所致乎故始或因外邪感襲者亦有之然繼則纍及陰陽本氣自病矣故名傷寒復名病熱傷寒者已往之病原病熱者現在之實害寒既為熱則所傷之寒早已消弭經既曰藏於精者春不病溫原由陰精不足而致病熱病溫今既病而陰精愈消愈竭此時雖寒邪消散奈真陰正氣受傷更熱更損莫可發生以制陽光故久熱不已耳豈寒邪既由表入里而為熱復能變寒由里出表再傳而為二候三候乎此必無之理也若能以外邪為始病之因以陰陽本氣自病為繼病之實善為調之適之則何有大熱不解之候也如始終以寒邪為實症傳變為定期反覆攻逐是猶縛妻子以為賊指路人以為父何其冤哉抑皆未究治熱之所由來而不達經所謂陽強不能密陰氣乃絶陰平陽祕精神乃治之至理也況天人一理相生所以相繼相剋所以相成故天之火深藏於水土之中凡井水氣蒸土中溫暖則地表清肅猶人之丹田元陽封固則火不浮游於上中宮脾元充足則火不散越於表蓋火之藏納不外乎水土之中故發熱者即我身內之火因正氣虛而不能按納致邪乘虛而激出之乃陰陽本氣反常之變實非外來之火也凡遇客邪一退脾元虛者調中以斂陽陰中水虛者補水以配火陰中火虛者補火以藏源則故物仍歸病斯愈矣如不知此竟以火為外邪重汗以亡其陽陽無歸源之力矣重下以耗其陰陰無配陽之能矣復加寒涼峻削脾元益傷肌表之浮陽何能斂納將此身內必要之火驅滅必欲其盡將此有限之精氣神磨滅必欲其完以有形之猛劑攻無跡之陰陽況火者生身之始而精氣神亦因之以生者也試思人與物不熱則無氣矣故氣生於火而火即氣之祖也今但惡火之為熱而清之獨不思火去而氣亦絶矣此特表而出之願學者務求要領無事支離必詳虛實無拘故套既知百病之來莫不乘虛而入則以正虛為本而外邪為標保精氣神以治客病則客病退而正氣無傷矣惟初病正氣尚旺客病牢固者急為驅逐勿致蔓延若一概瞻顧因循猶似閉門留寇豈其治乎別症論凡治適病者易治失病者難今工者盡難蓋知虛實之變幻寒熱真假之不齊也庸者反易蓋不知虛虛實實之利害陰陽造化之深微常多一時之偶中也丹溪曰醫者臨機應變如對敵之師操舟之工自非隨時取中寧無愧乎潔古云運氣不齊古今易轍舊方新病難相符合許學士云豫讀仲景書守仲景法未嘗守仲景方乃為得仲景心也故醫術之要先尋大意大意既曉則條分縷析脈絡分明內經曰知其要者一言而終不知其要流散無窮歷觀名論皆以別症為先嗟嗟別症甚未易也脈有雷同症有疑似水火亢制陰陽相類大實有羸狀誤補益疾至虛有盛勢反瀉含冤陰症似乎陽清之必斃陽症似乎陰溫之轉傷蓋積聚在中實也甚則默默不欲語肢體不欲動或眩暈眼花或泄瀉不實皆大實有羸狀正如食而適飽反倦怠嗜臥也脾胃損傷虛也甚則脹滿而食不得入氣不得舒便不得利皆至虛有盛候正如飢而過時反不思食也脾胃虛寒真陰症也陰盛之極往往格陽面目紅赤口舌破裂手揚足擲語言錯妄有似乎陽正如嚴冬慘肅而水澤腹堅堅為陽剛之象也邪熱未解真陽症也陽盛之極往往發厥厥則口鼻無氣手足逆冷有似乎陰正如盛夏炎熱而林木流津津為陰柔之象也大抵症既不足憑當參之脈理脈又不足憑當取諸沉候久候彼假症之發現皆在表也故浮取脈而脈亦假焉真症之隱伏皆在裡也故沉候脈而脈可辨耳且脈之實者始終不變脈之虛者乍大乍小適當乍大之時便以為實適當乍小之時便以為虛豈不誤甚必反復久候則虛實之真假判然矣然脈辨已真猶未敢恃更察稟之厚薄病之久新醫之誤否合參共究自無遁情且臟之發也類於腑血之變也近於氣調氣者主陽而升調血者主陰而降差之毫釐失之千里要知醫為司命功專去病以長生慎勿捨生而治病未大虛而過加溫補所誤不至傷生繼以寒涼投之其功愈效若不足誤加寒涼克削猶死者不復生斷者不可續縱加溫補莫可挽回試思古云陽氣一分不盡則不死誠然也傷寒用藥舉要夫發表之藥用溫攻裡之藥用寒溫里之藥用熱者何也蓋表既有邪則為陽虛陰盛溫之乃所以扶陽陽有所助而長則陰邪所由以消故用辛甘溫之劑發散為陽此發表之藥宜溫也里既有邪則為陰虛陽盛寒之乃所以助陰而抑陽陽受其抑則微而真陰所由以長故用酸苦之劑湧泄為陰此攻裡之藥宜寒也陰經自受寒邪則為臟病主陽不足而陰有餘故用辛溫之劑以助陽抑陰此溫經之藥宜熱也表有邪不汗其邪從何而去里有邪不下其邪從何而出臟有寒不溫其寒何自而除此三者乃傷寒用藥之大要也然而五劑之藥醫所當識如表汗用麻黃無蔥白不發吐痰用瓜蒂無豉不湧去實熱用大黃無枳實不通溫經用附子無干姜不熱甚則以沉清水加蔥白煎之竹瀝無薑汁不能行經絡蜜導無皂角不能通祕結非半夏薑汁不能止嘔吐非人參竹葉不能止虛煩非小柴胡不能和解表裡非五苓散不能通利小便非天花粉乾葛不能消渴解肌非人參麥冬五味不能生脈補元非犀角地黃不能止上焦之吐衄非桃仁承氣不能破下焦之瘀血非黃耆桂枝不能實表間虛汗非茯苓白朮不能去濕助脾非茵陳柏皮不能除黃疸非大承氣不能制發狂非枳桔不能除痞滿非陷胸湯不能開結胸非羌活沖和不能治四時之感冒身痛非人參敗毒散不能治春溫非四逆湯不能救陰厥非人參白虎不能化斑非理中烏梅不能治蛔厥非桂枝麻黃不能治冬月之惡寒熱隨汗解非姜附湯不能止陰寒之泄利非大柴胡不能除實熱之妄言陰陽咳嗽上氣喘急用加減小青龍分表裡而汗下此用藥之大法不可不知也若夫兩感傷寒用沖和靈寶湯取微汗可愈如不愈表症多而甚急者方可用麻黃葛根湯解之表解如里症多而甚急者先以調胃承氣湯下之如陰經自中病發熱下利身痛脈沉細無力不渴倦臥昏重者又當先救里溫之回陽救急湯分表裡寒熱而治此權變大法也古云兩感雖為死症猶有可救之理若發表攻裡一誤則枉死者多良可痛矣至於劫病之法亦有不可忽者如傷寒發狂奔走人難制伏先於病人處坐火一盤用醋一碗傾於火上其煙沖鼻入內即安方可察其陽狂陰躁親切用藥庶無差也若病初起頭痛發熱惡寒方除以後登高而歌棄衣而走大渴欲死脈來有力者乃因邪熱傳裡陽盛發狂此為陽狂當用寒藥下之凡見舌卷囊縮者不治若病初起無頭痛身微熱面赤戴陽煩躁脈來沉微無力欲坐臥泥水中者乃因寒極而發躁即陰症似陽此為陰躁當用熱藥溫之凡見厥冷下利譫語者不治醫者不察脈之虛實妄以為陽虛上膈而躁誤為實熱反與涼藥使渴愈甚躁愈急則氣消而成大害矣又如傷寒腹中痛甚將涼水一盞與病人飲之其痛稍可者屬熱痛當用涼藥清之清之不已或繞臍硬痛大便結實煩渴屬燥屎痛急用寒藥下之如食積腹痛同此治法惟小腹硬痛小水自利大便黑身目黃者屬蓄血痛用寒劑加行血藥下盡黑物自愈此三者皆痛隨利減之法也若飲水後愈加作痛屬寒痛當用溫藥和之和之不已或四肢厥冷腹痛嘔吐泄瀉急用熱藥救之可也又如傷寒直中陰經真寒症甚重而無脈或吐瀉脫元而無脈將好酒薑汁各半盞與病人服之其脈來者可治當察其脈用藥不拘脈浮沉大小但指下出見者生如脈不出則死又當問其有何痛處若有痛症要知痛甚者脈必伏宜隨病制宜尤當問其平素有反關脈否反關用覆手取之脈必見也若素無反關因病診之無正脈用覆手取之而脈出者陰陽錯亂也宜和其陰陽如正取覆取俱無脈者必死無疑總之傷寒雖變症百出必須詳其脈之有力無力以明其虛實之要斯為良法耳要方備覽升麻發表湯即麻黃湯加減無汗用麻黃四分桂枝甘草各三分杏仁去皮尖白芷防風各八分升麻五分羌活川芎各一分姜蔥引一法加豆豉若發熱惡寒頭痛無汗而喘去升麻加乾葛身體痛去杏仁加蒼朮白芍身癢面赤者以不得汗出去白芷杏仁加柴胡白芍胸滿加枳殼桔梗感寒甚重服不作汗宜再服二三劑汗仍不出必死也疏邪實表湯即桂枝湯加減有汗用白朮赤芍各一錢桂枝三分防風川芎羌活各八分甘草三分若汗不止加黃耆喘加柴胡杏仁薑棗引一法加飴糖二匙羌活沖和湯以代麻黃桂枝青龍各半等湯此太陽經之神藥也治雜症亦神效川芎防風蒼朮各八分羌活黃芩地黃各一錢白芷八分細辛甘草各三分薑棗引一法加蔥白汁若胸滿去地黃加枳殼桔梗夏加石膏知母名神術湯如服此不作汗加蘇葉喘加杏仁汗後不解宜再服汗下兼行加大黃乃釜底抽薪之法若春夏秋感冒亦有頭痛惡寒少熱自汗脈浮緩宜實表去蒼朮細辛加白朮若汗不止加黃耆白芍柴葛解肌湯即葛根湯加減治足陽明胃經症若陽明府滿則別有治法柴胡乾葛黃芩芍藥各一錢羌活白芷各八分桔梗七分甘草三分姜棗引一法加石膏一錢無汗惡寒甚者去黃芩加麻黃春少加夏秋去麻黃加蘇葉柴胡雙解飲即小柴胡湯加減治足少陽膽經症柴胡一錢二分黃芩陳皮八分芍藥人參半夏各五分甘草三分姜棗引若小便不利加茯苓脅痛加青皮寒熱似瘧加桂枝痰多加瓜蔞仁貝母渴加花粉知母齒燥無津液加石膏嗽加金沸草虛煩加淡竹葉炒粳米若少陽與陽明合病加乾葛芍藥婦人熱入血室加當歸紅花男子熱入血室加生地嘔加薑汁竹瀝如無表症熱勝者加大黃甚則加芒硝桂枝大黃湯即桂枝湯加減治足太陰脾經症柴胡大黃芍藥各一錢桂枝甘草各五分枳實八分姜棗引若腹滿不惡寒而嘔者去甘草加大腹皮加味理中湯即理中湯加減治足太陰脾經臟寒症乾薑肉桂各四分白朮一錢人參陳皮茯苓各八分甘草三分姜棗引若厥冷消渴氣上衝心飢不飲食食即吐蛔腹痛大便實者加大黃蜜少許利之嘔吐加半夏薑汁倦臥沉重利不止少加熟附利後身痛者急溫之加熟附自利腹痛入木香磨薑汁調和之茵陳將軍湯即茵陳湯加減治足太陰脾經症脈沉實者大黃山梔黃芩各一錢茵陳厚朴枳實各八分甘草三分姜燈心引若大便自調者去大黃厚朴加大腹皮利以小便清為效導赤散即五苓散加減此小水不利小腹滿下焦蓄熱或引飲過多或小便赤澀而渴脈沉數者宜用惟汗下亡津液與陽明汗多者不宜服茯苓梔子白朮各一錢澤泄豬苓各八分甘草桂枝各三分滑石五分姜燈心引身目黃者加茵陳水結胸症加木通燈心若得病起無熱但譫語煩躁不安精采不與人相當此湯治之六乙順氣湯治傷寒熱邪傳裡大便結實口燥咽乾怕熱譫語揭衣狂妄揚手擲足斑黃陽厥潮熱自汗胸腹滿硬繞臍疼痛等症悉皆治之能代大小承氣三乙承氣調胃承氣大柴胡大陷胸等湯神效藥也大黃一錢二分枳實黃芩厚朴柴胡芒硝芍藥各一錢甘草三分凡傷寒過經及老弱並血氣虛人或婦人産後有下症或下後不解或表症未除里症又急不得不下者用此湯去芒硝下之最妙煎法先將水煎滾三沸後入藥煎至八分又法臨服入鐵鏽水三匙調服立效取其沉重之義最能墜熱開結有神此千金不傳之祕方也如神白虎湯即白虎湯加減治身熱渴有汗不解或經汗過渴不解脈微洪宜用石膏二錢麥冬知母梔仁各一錢人參五分甘草三分五味九粒姜棗引一法加淡竹葉十片若心煩加竹茹大渴背惡寒去梔仁加花粉無渴不加三黃石膏湯治陽毒發斑身黃如塗朱眼珠如火狂躁欲走六脈洪大燥渴欲死鼻乾面赤齒黃過經不解已成壞症此表裡皆熱實由熱在三焦閉塞經絡津液榮衛不通故也又治汗下後三焦生熱脈洪譫語晝夜喘息鼻衄身目俱黃狂妄通用此湯治之如神石膏三錢麻黃香豉各五分黃連黃柏黃芩梔仁各一錢姜棗引一法入細茶葉三黃巨勝湯治陽毒發斑狂亂妄言大渴叫喊目赤脈數大便燥實上氣喘急舌卷囊縮難治者權以此劫之即三黃石膏湯內去麻黃香豉加大黃芒硝是也薑棗引一法臨服入泥漿清水二匙沖和靈寶湯治兩感傷寒頭痛惡寒發熱口燥舌乾以陽先受病多者以此探之即愈羌活黃芩柴胡各二錢白芷防風乾葛川芎各八分地黃石膏各錢半甘草細辛各三分姜棗引一法入黑豆一撮桃仁承氣對子即桃仁承氣湯加減治熱邪傳裡熱蓄膀胱其人如狂小水自利大便黑小腹滿痛身目黃譫語燥渴為蓄血症脈沉有力宜此下之未服前而血自下者為欲愈不宜服桃仁去皮尖大黃芒硝柴胡各一錢芍藥枳實當歸各八分青皮五分桂枝甘草各三分姜引一法入蘇木煎汁三匙調服消斑青黛飲治熱邪傳裡裡實表虛血熱不散熱氣乘於皮膚而為斑輕則如疹子重則如錦紋重甚則斑爛皮膚俱宜此湯治之人參青黛黃連各五分犀角磨知母柴胡元參梔仁地黃各一錢石膏一錢五分甘草三分姜棗引一法臨服入苦酒一匙調服大便實者去人參加大黃生地芩黃湯治鼻衄成流久不止或熱毒深入吐血不止者或去血過多錯語失神撮空閉目不知人事者宜用此地黃一錢五分黃芩黃連梔仁柴胡各一錢桔梗芍藥川芎各八分犀角磨甘草三分棗引一法臨服入茅根搗汁磨京墨調服無茅根藕汁亦可鼻衄外用水濕紙札於鼻中加味犀角地黃湯治煩躁漱水不下咽者屬上焦有瘀血宜用犀角磨如無用升麻生地一錢五分芍藥桔梗當歸陳皮各八分甘草紅花各三分丹皮八分姜引一法臨服入藕汁回陽救急湯即四逆湯加減治寒邪直中陰經真寒症初起無身熱頭痛止惡寒四肢厥冷戰栗腹痛吐瀉不渴引衣自蓋倦臥沉重或手指甲唇青口吐涎沫或至無脈或脈來沉遲無力者宜用熟附乾薑人參各五分茯苓白朮各一錢官桂四分甘草三分陳皮半夏各七分五味九粒姜引若無脈加豬膽汁一匙泄瀉不止加升麻黃耆嘔吐涎沫或小腹痛加鹽炒吳萸嘔吐不止加薑汁回陽返本湯治陰盛格陽陰極發躁微渴面赤欲坐臥於泥水中脈來無力或全無欲絶者宜用熟附乾薑人參各五分腦茶甘草各三分五味九粒麥冬一錢陳皮七分澄清水煎一法臨服入蜜五匙冷服取汁面戴陽者下虛也加蔥七莖黃連少許溫經益元散治因汗後大虛頭眩振振欲劈地肉瞤筋惕及發汗太多衛虛亡陽汗出不止或下後利不止身體疼痛者宜用人參肉桂甘草各四分熟地生地白朮當歸各一錢白芍陳皮黃耆茯苓各八分姜棗引一法加糯米一撮煎服若飽滿去地黃加枳殼利不止去地黃當歸加炒白朮升麻陳壁土嘔吐加薑汁法半夏汗後惡風寒去生地肉桂加桂枝飴糖頭痛加川芎羌活有熱去肉桂瘦人去芍藥柴胡百合湯治瘥後昏沉發熱口渴錯語失神及食復勞復百合等症悉宜用柴胡生地黃芩各一錢知母百合陳皮人參各八分甘草三分姜棗引若頭微痛加羌活川芎胸中煩躁加梔仁嘔吐入薑汁炒半夏食復加枳實黃連産後乾嘔譫語失神呻吟睡不安者加黃連犀角心驚悸為血虛加當歸茯苓遠志咳嗽加杏仁痰甚加瓜蔞仁貝母勞復時熱不去加烏梅薑汁虛汗加黃耆棗仁胸中虛煩加竹茹竹葉疲倦加白朮腹鳴加煨姜如聖飲治剛柔二痙頭搖口噤身反張手足攣搐頭面赤項強急等症宜用羌活防風川芎白芷芍藥當歸各八分烏藥七分柴胡黃芩各一錢半夏甘草各四分姜引一法臨服入薑汁竹瀝溫服有汗是柔痙加白朮桂枝無汗是剛痙加麻黃蒼朮口噤咬牙大便實者加大黃逍遙湯治瘥後血氣未平勞動助熱復還於經絡因與婦人交而復發者謂之勞復因受淫欲而無病人反得病者謂之陰陽易豫曾見舌出數寸而死者多矣此症最難治宜用此方人參知母地黃柴胡各一錢甘草韭根各三分黃連五分犀角磨滑石一錢五分竹青姜棗引一法臨服燒褲襠末一錢五分調服以汗出為效如無效再服以小水利陰頭腫即愈升陽散火湯治叉手冒胸循衣摸床譫語昏沉不省人事名曰撮空症小便利者可治不利者難治人參當歸芍藥各八分黃芩麥冬白朮柴胡各一錢陳皮茯神各八分甘草三分姜棗引一法入金首飾煎若有痰加薑汁炒半夏大便燥譫語發渴加大黃再造散治頭痛發熱項脊強惡寒無汗用發藥二三劑汗不出者此陽虛不能作汗名無陽症庸醫不論時令妄用麻黃重藥及火劫取汗誤死多矣黃耆人參各一錢桂枝熟附細辛甘草煨姜各三分防風川芎羌活各八分棗引一法加芍藥若夏月加黃芩石膏黃龍湯治心下硬痛下利純清水譫語發渴身熱此利因熱邪傳裡胃中燥屎結實使然宜急下之名曰熱結利症身有熱者宜用無熱者用前六乙順氣湯大黃芒硝各一錢厚朴人參枳實當歸各八分甘草三分姜棗引一法加桔梗若年老氣虛者去芒硝調榮養衛湯即補中益氣湯加減治頭痛身熱惡寒微渴濈濈然汗出身痛腳腿痠疼無力沉倦脈空浮無力此因勞力內傷氣血外感寒邪名勞力感寒症宜用辛甘溫藥則愈有下症者大柴胡湯下之則緩前症若大發其汗則輕變重矣人參黃耆當歸羌活防風白朮陳皮各八分柴胡地黃各一錢甘草細辛各三分川芎七分姜棗一法加蔥白一莖若元氣不足者須知至陰之下求其升加升麻少許口渴加花粉知母喘嗽去升麻加杏仁汗不止去細辛升麻加芍藥飽悶去地黃黃耆甘草加枳殼桔梗痰盛去防風細辛加瓜蔞仁貝母腹痛去耆術加芍藥和之導赤各半湯治傷寒心下不硬腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句口舌唇焦舌乾不飲水稀粥與之咽不與則不思形如醉人此熱傳手少陰心也心火上而逼肺所以神昏名越經症人參黃連茯神各六分梔仁黃芩麥冬知母各一錢甘草三分滑石一錢五分犀角磨姜棗引一法加燈心一握益元湯治有身熱無頭痛不煩梗作躁悶而赤飲水不得入口此元氣虛弱無根虛火上炎名戴陽症庸醫呼為熱症而用涼藥誤死多矣熟附乾薑黃連人參各五分甘草陳艾各三分知母麥冬各一錢五味九粒姜棗加蔥二莖引一法入童便三匙冷服桂苓飲治初起無熱譫語煩躁不安此因熱結膀胱名如狂症庸醫呼為發狂妄用下藥誤死多矣豬苓澤瀉白朮黃柏各八分甘草桂枝蘇葉各三分梔仁知母各一錢姜引一法加滑石一錢微汗為效當歸活血湯治無頭痛惡寒止身熱發渴小便利大便黑口出語無倫此內傳心脾二經使人昏迷沉重名挾血如見祟症庸醫認作熱症而用涼藥誤人多矣當歸人參柴胡各八分地黃一錢赤芍枳殼桃仁泥紅花乾薑甘草桂心各三分姜引一法入酒三匙三貼後去桃仁紅花乾薑桂心加白朮茯苓加味導痰湯治痰症憎寒壯熱頭痛昏沉迷悶上氣喘急口出涎沫此因內傷七情以致痰迷心竅神不守舍則生痰名挾痰如鬼祟痰症類傷寒與此同治法茯苓白朮桔梗各八分南星枳實各七分半夏陳皮黃連瓜蔞仁貝母各五分黃芩一錢甘草三分姜棗引一法入竹瀝薑汁溫服加減調中飲治食積類傷寒頭疼惡寒發熱氣口脈緊盛但身不痛為異耳蒼朮厚朴陳皮枳實白朮神麯山楂各八分黃連五分草果四分甘草乾薑各三分姜引一法用木香磨汁入服若腹痛大便實加大黃去白木草果乾薑山楂神麯心中兀兀欲吐者與乾霍亂同治法用滾水一碗入鹽一撮皂莢末五分探吐加減續命湯治腳氣類傷寒頭痛身熱惡寒肢節疼便閉嘔逆腳軟屈弱不能轉動禁用補劑及淋洗防風蒼朮白朮川芎防己羌活各八分麻黃四分白芍一錢桂枝甘草各三分姜棗燈心引一法入薑汁若暑中三陰患必熱脈數去麻桂加黃芩黃柏柴胡寒中三陽患必冷脈遲加熟附起於濕者脈弱加牛膝木瓜起於風者脈浮加獨活元氣弱加人參大便實加大黃芩連消毒湯治天行大頭病發熱惡寒頭項腫痛脈洪喉痹痰熱黃芩柴胡各一錢桔梗川芎防風羌活枳殼各八分甘草三分連翹射干白芷黃連各七分荊芥三分姜引或鼠黏子一撮一法入竹瀝薑汁先服可加大黃利後去大黃加人參當歸六神通解散治時行三月後謂之晚發頭痛身熱惡寒脈洪數先用沖和湯不愈後服此麻黃四分甘草細辛各三分石膏滑石黃芩各一錢川芎羌活蒼朮各八分姜引或加豉蔥白獨活湯治傷風溫熱等症羌活一錢獨活枳殼防風各八分人參麻黃泡二次茯苓七分細辛菊花甘草各三分蔓荊五分姜三片薄荷五葉引解肌湯治瘟毒天行頭痛壯熱春感青邪發熱而渴不惡寒乾葛一錢桂枝三分黃芩芍藥各一錢麻黃四分甘草三分棗引如不解再服取汗凡傷寒祖方如麻黃湯桂枝湯大小青龍湯大小柴胡湯三承氣湯等以及五積散敗毒散參蘇飲之類方書無不詳列故不贅述茲所載者恐人所易忽而備及焉
