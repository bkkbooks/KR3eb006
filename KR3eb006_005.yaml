body:
  text: 卷五症治舉要詳指傷中合併及運氣之義古云傷寒為諸病之祖勞瘵為虛損之宗蓋傷寒外感之重者也勞瘵內傷之重者也內傷以肝腎虛損者為陰虛勞以心脾右腎虛損者為陽虛勞肺氣損而嗽者為勞傷心肺並損而熱咳者為勞瘵又或微兼內傷時未能辨脈用藥並致水火虧損而陰虛勞作矣或致火土同敗而陽虛勞起矣保治弗能如法久漸肝腎廢殘不能納諸經之氣氣逆而肺受之咳嗽生矣嗽久則津液盡化為痰而肺經清肅之令不行則龍雷陰火無濟必暗動而為潮熱矣熱嗽咸集虛並至而勞已成矣此略舉虛勞大概而精微妙用貴乎臨症會通先哲有言凡治內傷虛損如奉魯哀朝惟道以法祖其旨深矣若夫外感以兩經傷中而平等者為並病以二三經輕重而差等者為合病傷寒要治賴仲景祖述岐黃著論闡發立三百九十七法以窮一百一十三湯之用又著卒病論指明暴中陰症經曰西北之氣散而寒之散言發汗即解表也寒言涼瀉即攻裡也東南之氣收而溫之收言急收回邪犯本臟之元真溫言藥宜熱補以驅其陰寒也所謂同病異治者同病指東西南北之傷中言異治指散寒收溫之方法言也蓋西北高厚陵居而苦風寒人身腠理縝密夏秋略熱則亢春冬微寒輒冰傷之感之多屬邪實熱病症依次序傳經藥可計日施治間有症符傳病內中微別兩感治療頗不相侔東南卑薄山多濕重嵐瘴之鄉濕鬱甚燥倏寒倏熱乍濕乍燥氣蒸迫汗腠理疏㿔音洞先因情欲勞損致正虛而關門失堵復由沐雨櫛風招外邪以乘間直入中之者多傷之者僅見千百中一二故每見陰寒冷症若只謹守一日太陽二日陽明定期遵其一日二日發表而散常法有不誤人者鮮矣且東南之人魚米嗜炙勞多逸少加之以酒為緣無分晝夜以色為常不滿冠笄先元后乾未盈即虛離日坎月不圓而缺以致腑嬌臟空神疲氣弱五淫之邪皆能深中豈獨寒之為然耶經曰或其傳化有不以次正謂此也每見東南之人所感多屬合邪為病病既越乎祖病之外湯又何不可以變祖方而施治也須知六氣首推風寒可分可合可兼分則獨傷獨中合則兩傷兩中兼則夾帶暑濕燥火因此暑濕躁火必要假合風寒兩賊附一才能透皮毛開腠理干筋骨亂氣血犯腑臟變脈象而傷人中人煞人也凡欲治療傷中暴卒先將各經本脈病脈真臟死脈或在本部或夾順逆縱橫摸認準的次將腑絡標本精詳然後於仲景祖病論中各經傷病中病合病並病壞症辨別臨診俱要細審邪犯何經病止何地藥兵進所必由之路賊邪走決衝犯之鄉盡皆一一籌畫何經氣足脈實可以假道而驅邪邪去料正無用補何經脈虛神困先調重兵以把守致邪賊不敢內侵務使邪氣一攻直去可免流連沖返災及他經也或只除邪而正自足或只養正而邪自服四氣中或風挾何氣為病或寒帶何氣為病或風寒合引數氣為病或風邪乘虛直中或寒邪乘虛直中或風寒乘虛直中因怒中肝手足麻痹筋攣亦中肝因房勞中腎夢遺泄精亦中腎大喜過樂亦中腎因憂中心驚懼怔忡亦中心諸般失血亦中心經期産後亦中心寢魘猛跌亦中心因悲中肺鬥鬧喊喝亦中肺因恐中脾食寒飲冷亦中脾泄瀉下利亦中脾食飽房勞亦中脾凡此皆經文令不得以其次之隱衷也宜於傷寒條內截其後湯後法視病之合併輕重節取對症加減施治烏有不效者乎經曰補上下者從之從者言順其病性以熱治熱即用熱不遠熱之法治上下者逆之逆者言反其病情以寒治熱即用寒不遠熱之法以寒熱盛衰而調之者調言其以和平為正毋使太過不及也人身中五臟所藏之精神猶樹木本根腑脈臟脈猶樹木正干外現病症猶樹木上之枝花花有結子實花似真陽症熱病也有不結子虛花似假陽症冷病也是枝花榮枯即枝花亦不得而自主也其所以主之者在乎本根而病症之虛實生死即病症亦不得而自主也其所以主之者在五臟中之胃氣神氣凡病機權變轉換處皆曰症症者證也務必取諸臟腑之虛實邪正以即證其病之虛實邪正庶幾萬無一失若只徒分某症為虛某症為實是望見花葉而棄根柢則千百中直一二驗耳經曰必先歲氣毋伐天和言攢一歲之和氣在是故此不可攻伐曰無盛盛下盛字言既受天時之實邪而病上盛字戒醫者無再補以助其實曰無虛虛下虛字言既受天時之虛邪而病上虛字戒醫者無再攻以益其虛曰無致邪有邪弗攻為致曰無失正誤損真元為失凡病症雖有千形萬狀脈象不過虛實邪正死絶而已如遇此經脈虛則所發之症皆出於此經之正虛如遇彼經脈實則所發之病皆出於彼經之邪實正虛急補正元邪實速攻邪氣經曰上取下取言病在上取法乎下病在下取法乎上以別邪氣清濁內取外取言內索本臟經脈外求腑標絡脈之病以求其過言細求發病根源能毒者以厚藥言治虛虛實實重病用藥貴取大毒以其味厚氣猛力能大攻大補不勝毒者以薄藥言即系小虛小實之病藥亦宜乎氣味均薄取其溫補清涼勝病而已其所言正虛者乃五臟神氣內奪也假如左手三部脈象細如蛛絲遲微無力斷續無常隱顯不一又或有腑無臟右關尺兩部反見搏堅急躁疾湧如奔馬圓實若轉豆輕按有餘重按不足奔馬系孤陽無陰轉豆似心臟脈絶喜在部位均有兼夾明顯孤陽為寒陰克戰脈因亡血著象時畏寒時昏躁似熱實非熱似渴實無味間或喜怒無因有時尋死缺計藥忌重辛散陽重燥傷陰偏火枯水偏氣竭血偏於扶陽則孤陽依附失所偏於補陰則將滅之陽受劫皆非翕陽和陰之道法宜生津補虛津生則精血自生虛補則陰平陽祕藥之性味取能扶陽強陰即書云養陰則不滯不寒強陽則不燥不熱是也宜於補陽隊中加入鹿茸鹿膠人參巴戟枸杞蓯蓉北味烏梅飴糖乳汁之類如或亢極隔藥服補輒生躁悶甚至喉焦舌爛腫痛異常又當於法中加法引以黃連豬膽汁藕汁梨汁童便竹瀝生兌冷服經曰治寒以熱涼而行之治熱以寒溫而行之治溫以清冷而行之治清以溫熱而行之因事制宜貴乎與病適當假如右關右尺之脈俱和緩有神左關左尺之脈均微弱無力法當陰陽平補如左關尺脈俱微弱或遲慢無力右關尺脈胃足神旺微帶滑數雖系陰虧水弱亦不可妄行滋陰降火以傷其陽恐陽損難於猝復也假如五經臟脈俱和緩溫柔神旺胃足六腑絡脈亦帶滑數有力方敢大攻大瀉如或左右關尺脈神胃兩虛微弱遲小雖屬水火陰陽均衰又不宜陰陽平補理應先救真臟自然陽生陰長如或兩關尺脈右弱左強水旺火虧又不容不偏補火土急救真元也假如兩經三經合病內中有虛有實虛甚者法當先補虛必俟虛經脈回然後治其實略虛者法宜虛實並治補瀉兼施假如右關脈浮緊左關脈浮弦或左關脈浮緊右關脈浮弦沉指肝脾及各部臟腑脈均帶真滑真數者此為少陽陽明合病風寒停滯中焦勿拘所現病症皆以大青龍湯主之如右關脾部不見沉指臟脈皆並現於腑而浮或弦硬澀小或微急虛恍此脾經已屬重傷加之心肝腎命諸部臟脈失其乳哺皆惶惶錯亂或微或緊或弦或硬或急責在脾氣垂絶症必四肢軟弱元陽陷下氣之出入升降不相接辰巳時病增渴愛飲滾而不耐多飲後輒渴仍如故面色枯黃準頭紫赤上眼皮現摺卓曰難開即開瞳神無移不耐久睜上下唇口或枯燥或紅色光亮枯燥者口必無涎紅亮者口必多涎無涎者危多涎者略輕甚有腹脹洞瀉完穀不化厄逆噫嚏病原起於大恐或貪食飲冷或瀉後或大病體未復即勞傷醉飽而成斯病者急宜多服立元湯俟本經臟脈回然後能更他方以除其病如右寸肺部不見沉指臟脈皆並現於腑而浮或硬澀而微或毛多胃少此肺經已屬重傷加之各部臟脈俱於虛弱中皆帶毛象此肺經垂絶之候症必聲嘶口渴喘咳氣逆唾如寡蛋肌膚消瘦絲絲汗出透體如珠膠凝黏手小便短少胸膈脹滿飲食難下不能坐臥俯仰維艱肺俞獨寒闕中黑暗面白唇青毛枯發槁有時赤燥寅卯時病重熱甚此乃肺痿之症作矣病原起於忿悶憂鬱過於悲哀鬥鬧喊喝之後即繼以煎炒厚味醉飽房勞所致急宜多服立魄湯俟本經及各臟腑脈回才能另更他方以除其病假如兩經三經合病內中並無虛脈只有得全實邪侵犯腑合即徑行攻邪瀉實之法凡屬實熱者乃五臟六腑胃神過甚氣血有餘加以當令淫邪從皮毛客入肌膚由合及腑郁遏臟中強陽盛氣不得舒瀉故實也治實大概木鬱宜達火鬱宜發土鬱宜奪金鬱宜泄水鬱宜折又必先其所因毋助真過毋抑假盛毋愆期使大過生災毋失勢使不及莫救如果外挾風邪宜於治郁隊中加入桂枝防風蘇葉枳殼藁本獨活秦艽乾葛柴胡白芍水蔥之類果挾寒邪宜於治郁隊中合入麻黃細辛前胡杏仁羌活蒼朮菖蒲川烏附子炮薑肉桂生薑吳萸川椒蓽茇澄茄之類果挾暑邪宜於治郁隊中合入人參香薷乾葛炙草白朮黃耆砂仁扁豆藿香麥冬北味青皮陳皮半夏升麻蒼朮當歸黃柏之類果挾濕邪宜於治郁隊中合入蒼朮羌活茵陳茯苓厚朴白朮黃柏香附枳實鬱金元胡麻黃草蔻白蔻川烏草烏首烏荊芥神麯山楂黑薑青蒿仙茅遺糧北味之類果挾火邪宜於治郁隊中合入大黃芒硝黃柏黃連黃芩梔仁蓮子心膽草石蓮元參苦參豆根人中黃蘆薈沉香木香檀香川楝之類果挾燥邪宜於治郁隊中合入天冬麥冬生地竹瀝梨汁藕汁荷汁薑汁薄荷汁荊汁白蜜元胡鬱金知母貝母人參元參地骨皮人乳羚羊犀角之類假如六部本脈停勻有似和緩不急宜加細察系何臟略帶真滑真伏真數真實真牢便是此臟陽郁復加浮指輕按腑標絡象果系六氣中何氣六郁內何郁亦如前條別類加減以消息之更宜加察歲運之司天在泉天政地政主氣客氣司天之左間右間在泉之左間右間以天干化氣為中運地支本音為歲氣以定上下之位推算平氣太過不及之紀平氣之歲木曰敷和火曰升明土曰備化金曰審平水曰靜順不及之歲木曰委和火曰伏明土曰卑監金曰從革水曰涸流太過之歲木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍不及之歲其數生水一火二木三金四土五譬如物類初萌不堪旱潦風霜太過之歲其數成水六火七木八金九土十譬如物類堅實可耐霜雪飄暴平氣之歲其數中水合一六土和五十火歸二七木符三八金涵四九五十蔟攢九六沖和雨順風調寒暑適中人安物阜自具氤氳太和景象此天地氣運自然之理也故五行各有本初之氣各有更革之氣本初正氣也更革邪氣也正氣有定例邪氣無定時有間客氣搏換為邪氣者有間主氣驟發為邪氣者經曰非其位則邪當其位則病言勝本先受微邪所傷猶未現象時當邪氣主令其症必發矣古人於此深致意焉甲己化土五十同途乙庚化金四九為朋丙辛化水一六同宗丁壬化木三八為友戊癸化火二七同道除陰年陽年內之平氣而外中有陽年化氣太過者有陰年化氣不及者皆非中和之正悉能為殃如犯孤虛空亡者危經曰乘年之虛則邪甚也失時之和亦邪甚也遇月之空亦邪甚也即太陰消滅重感於邪則病危矣所謂感邪而生病也六甲之年敦阜之紀歲土大過濕氣盛行其邪乾水左腎為孤六乙之年從革之紀歲金不及炎火盛行其邪干金肺臟為虛六丙之年流衍之紀歲水太過寒氣盛行其邪干火心與右腎為孤六丁之年委和之紀歲木不及燥金盛行其邪干木肝臟為虛六戊之年赫曦之紀歲火太過炎火盛行其邪干金肺臟為孤六己之年卑監之紀歲土不及風氣盛行其邪乾土脾臟為虛六庚之年堅成之紀歲金太過燥氣盛行其邪干木肝臟為孤六辛之年涸流之紀歲水不及濕氣盛行其邪乾水左腎為虛六壬之年發生之紀歲木太過風氣盛行其邪乾土脾臟為孤六癸之年伏明之紀歲火不及寒氣盛行其邪干火心與右腎為虛兼犯四時主客空亡則不治主氣空亡即春土夏金秋木冬火四季月水是也若與客氣同到必死不救客制主生者病輕主制客生者病危大凡起病日時最忌干支化氣與主制客犯符合經曰從其氣則和違其氣則病不當其位者病迭移其位者病失守其位者危尺寸反者死陰陽交者死先立其年以知其氣左右應見乃可以言生死之順逆故歲運不及者宜補孤虛用攻藥涼藥有犯歲氣太過者宜損淫邪用補藥熱藥者有犯運氣平治者雖可隨症攻補亦宜中病即止無令藥劑太過不及者以犯之經曰司氣以熱用熱無犯司氣以寒用寒無犯司氣以涼用涼無犯司氣以溫用溫無犯間氣同其主無犯異其主可小犯之太乙天符者至尊之貴人也中之犯之其病暴而死天符同天符者猶執法之相傳也中之犯之其病速而危歲會同歲會者猶行令之方伯也中之犯之其病徐而遲中者邪之所中氣虛而邪得所湊犯者藥之所犯傷損而正氣致失中固由天而犯全在人醫者不可不慎如遇歲運太過不及之所中所犯病輕如值當令旺季救治得法可獲半死半生若犯孤虛空亡乃不治之症也即或不加不臨無太乙天符無天符無歲會及無同天符無同歲會者雖為平治之年藥亦不宜過犯以逆其政令經曰無失天信無逆氣宜無翼其勝無贊其復是謂至治先明天時次察地利又次察人情日用辨別東西南北兼理水土厚薄抑揚性情急緩至於年齒老少秉賦虛實形質肥瘦天時旱潦風寒邪正以及先苦後樂先樂後苦富貴貧賤不同藜藿膏粱適異外顯病症雖符內用治療宜別醫者欲萬舉萬全其於脈象虛實豈可忽乎診治六部虛實六部之脈必有虛實辨症用方自無差謬如左寸心脈三按有力為實其外症必口燥舌乾煩悶癲狂汗如流水面似桃花小便短少宜黃連瀉心湯麥冬湯三黃湯竹葉石膏湯如左寸心脈三按無力為虛其外症多怔忡健忘宜養心湯歸脾湯茯苓補心湯如左關肝脈三按有力為實其外症必惡風怕寒遍體疼痛發熱頭疼宜麻黃湯桂枝湯或平肝飲吳苓飲或清脾飲或逍遙散如左關肝脈三按無力為虛其外症必雙目多淚兩足乏力眼睛時痛女子經來少必差後宜補肝飲或三陰煎或大補血湯補元煎或四物湯或七寶美髯丹如左尺腎脈三按有力為實其外症必小便癃閉不時淋瀝常帶紅赤或眼中如流火宜知柏四物湯或知柏地黃湯如左尺腎脈三按無力為虛其外症必男子頭暈腰痛心沖兩足無力雙目瞶瞶不時流淚夜間尿湧遺精敗濁女子崩帶腰痛眼朦時腳痹而底疼時經水而不通宜歸腎丸或左歸丸左歸飲或大補元煎或地黃飲補血湯或還少丹或五味子散如右寸肺脈三按有力為實其外症必胸脹滿鼻衄血夾背汗流宜香蘇散四七湯有熱脈數瀉白散或清脾飲或黃芩竹葉石膏湯如右寸肺脈三按無力為虛其外症不時汗出如珠頭昏若倒語言蹇澀氣脫亡陽女子帶淫白濁崩漏宜參耆湯或補中益氣湯或耆附四君湯耆附六君湯如右關脾脈三按有力為實其外症必齒牙常痛面常浮腫夜難安臥腹時疼痛善飢善飽宜瀉黃散或竹葉石膏湯或清胃散或小承氣湯或正氣散或香砂平胃散或保和丸或養胃湯如右關脾脈三按無力為虛其外症必不時瀉泄四肢難舉面黃目暗宜朮附湯或四君湯或桂附四君湯或補中益氣湯或參苓白朮散或耆附六君湯或真武湯如右尺腎脈三按有力為實其外症必夢遺淋瀝女子多淫穢育兒多癬疥宜元麥地黃湯或六味地黃湯或一陰煎如右尺腎脈三按無力為虛其外症必脾胃吐瀉夢遺滑精宜右歸丸右歸飲或黑錫丹硫黃丸或桂附丸耆附丸學者按脈審症如此而瀉如此而補庶無誤矣心脈實用方黃連瀉心湯研細末或五分或一錢麥冬湯麥冬白苓淨風黃芩竹葉三黃湯黃連黃柏黃芩梔仁大黃竹葉石膏湯人參麥冬半夏石膏竹葉甘草粳米姜引心脈虛用方養心湯人參黃耆當歸川芎茯神茯苓半夏五味遠志棗仁柏子去油肉桂一方無耆桂苓志芎夏有生熟二地麥冬歸脾湯人參黃耆當歸白朮茯神遠志棗仁龍眼木香甘草姜棗引茯苓補心湯人參白苓當歸川芎白芍熟地前胡蘇葉半夏陳皮甘草姜棗引肝脈實用方麻黃湯麻黃桂枝杏仁甘草桂枝湯白芍桂枝甘草平肝飲吳苓湯吳萸白苓清脾飲柴胡青皮黃芩白朮白苓半夏川朴草果甘草姜棗引逍遙散當歸白芍白朮白苓柴胡薄葉川朴姜引肝脈虛用方補肝飲四陰煎沙參麥冬白芍白苓百合生地甘草三陰煎當歸熟地酒芍棗仁人參炙草大補血湯即補血湯人參淮藥熟地當歸棗皮杜仲枸杞甘草補元煎即大補元煎人參當歸熟地川芎白芍茯神棗仁麥冬陳皮五味梔仁甘草四物湯當歸川芎白芍熟地七寶美髯丹何首烏白苓當歸淮膝枸杞菟絲固脂忌鐵重用枸杞杜仲腎脈實用方知柏四物湯當歸熟地川芎白芍知母川柏知柏地黃湯熟地淮藥白苓棗皮丹皮澤瀉知母川柏或加淮膝金叉木通擇而用之腎脈虛用方歸腎丸熟地淮藥白苓當歸棗皮枸杞菟絲杜仲左歸丸熟地淮藥川膝棗皮枸杞菟絲鹿膠龜膠左歸飲熟地淮藥白苓棗皮枸杞甘草大補元煎人參淮藥熟地當歸棗皮杜仲枸杞甘草地黃飲熟地巴戟蓯蓉白苓棗皮遠志五味麥冬熟附肉桂石斛菖蒲入薄葉薑棗引補血湯熟地當歸川芎白芍人參茯神棗仁麥冬陳皮五味梔仁甘草還少丹五味子散五味吳萸姜棗引肺脈實用方香蘇散蘇葉香附陳皮甘草四七湯白苓川朴半夏蘇葉姜棗引瀉白散桑皮地骨粳米甘草清肺飲連翹川芎白芷黃連黃芩荊