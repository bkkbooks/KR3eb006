body:
  text: 卷四脈義之要內經曰上焦開發宣五穀味熏膚充身澤毛若霧露之溉是謂氣中焦受氣取汁變化而赤是謂血壅遏營氣令無所避是謂脈然則脈固主宰乎氣血所以行氣行血者也要實本乎穀氣也內經曰人受氣於谷谷入於胃以傳於肺五臟六腑皆以受氣清者為營濁者為衛營行脈中衛行脈外此明胃氣為脈道之根藏府之本血氣之自出也夫人之生皆受氣於谷萬物資生之本也凡谷之入必先至於胃萬物歸土之義也坤土不能自專精微上輸於肺蓋地道卑而上行也肺為乾金所受精微下溉藏府蓋天道下濟而光明也金土互輸地天交泰清而上升者為營血陰生於陽也濁而下降者為衛氣陽根於陰也營血為陰故行脈中衛氣為陽故行脈外也是故華元化云脈者氣血之先也而內經論脈則曰有胃氣則生無胃氣則死正以胃氣為脈之根蒂也故東垣亦曰脈貴有神此可知脈有本原誠為診治之大要也脈度之要明寸關尺人迎寸口氣口及常變與獨之體總現乎表裡虛實之間內經曰從魚際至高骨卻行一寸名曰寸口從寸至尺名曰尺澤故曰尺寸寸後尺前名曰關大指從魚際穴至高骨後一寸故名為寸也肘腕內廉尺澤穴至高骨後一尺故名為尺也扁鵲曰尺寸脈之大要會也從關至尺是尺內陰之所治也從關至魚際是寸口內陽之所治也上部法天主胸以上至頭之有疾中部法人主膈以下至臍之有疾下部法地主臍以下至足之有疾浮脈法天輕手按之以察其表也中候法人不輕不重按之以察其半表半裡也沉候法地重手按之以察其里也寸為陽為高常宜浮大尺為陰為下常宜沉小左脈不和為病在表為陽主四肢右脈不和為病在裡為陰主腹藏關前一分人命之主左為人迎以察外因右為氣口以察內因寸關尺三部各占三分共成寸口故知關前一分左關之前一分屬少陽膽部膽為風木之司故曰人迎緊盛傷於風也東方風木主天地春升之令萬物之始生也經云肝者將軍之宮謀慮出焉與足少陽膽相為表裡膽者中正之官決斷出焉人身之中膽少陽之脈行肝脈之分外肝厥陰之脈行膽脈之位內兩陰至是而交盡一陽至是而初生十二經脈至是而終且膽為中正之官剛毅果決凡十一藏咸取決於膽故左關之前一分為六府之源頭為諸陽之主宰察表者不能外也右關之前一分屬陽明胃部胃為濕土之司故曰氣口堅實者傷於食也中央濕土得天地中和之氣萬物所歸之鄉也經曰脾胃者倉廩之官五味出焉土為君象土不主時寄旺於四季之末故名孤藏胃為五藏六府之海其精氣上交於肺肺氣從太陰而行之為十二經脈之始故右關之前一分為五藏之隘口為百脈之根荄察里者不能廢也況乎肝膽行春令春氣浮而上升陽之象也陽應乎外故以候表焉脾胃為居中土性凝而重濁陰之象也陰應乎內故以候里焉若人迎違度則發生之本虧氣口先撥則資生之元壤古人以為人命之主厥有旨哉然又須知氣口即寸口也黃帝曰氣口何以獨為五藏主岐伯曰胃者水穀之海六府之大源也五味入口藏於胃以養五藏氣氣口亦太陰也是以五藏六府之氣皆出於胃變見於氣口氣口六部之總稱非專指右關之前也難經曰十二經皆有動脈獨取寸口何也寸口者脈之大會會於手太陰之動脈也肺為五藏六府之華蓋位處至高受百脈之朝會布一身之陰陽故經曰藏真高於肺以行營衛陰陽者是也是以十二經皆有動脈獨取肺家一經之動脈可以決五藏六府之強弱吉凶也要之決壽夭則存乎肺肺主氣也決傷食則存乎胃胃主食也何莫非系乎右之關前也至於察脈須明其常變凡脈有素大素小素陰素陽者此其賦自先天各成一體也而邪變之脈有倏緩倏疾乍進乍退者此其根於病本隨氣各異也故凡診視必須先識藏脈而後可以察病脈先識常脈而後可以察變脈於常脈可以察人之器局壽夭於變脈可以察人之吉凶生死至於男以陽為主若寸反弱於尺者腎氣不足也女以陰為主若寸反旺於尺者上焦有餘也有餘不足固皆病也老弱之人脈宜緩弱若脈旺者病也然有脈旺而非躁疾此乃天稟之厚引年之徵也名為壽脈如脈見躁疾有表無里則為孤陽死期近矣而少壯之人脈宜充實若脈見微弱病可知矣其有脈細而和緩三部同等此天稟之靜清逸之士也名曰陰脈如細小而徑直前後不等短期必矣肥人當沉而反浮瘦人當浮而反沉亦自可以類推耳而又有其要者則在獨見其真也獨之為義有在於部位者謂諸部無恙惟此獨乖處藏姦此其獨也有在於藏氣者不得以部位拘也如諸見洪者皆是心脈諸見弦者皆是肝脈肺之浮脾之緩腎之石五藏之中各有一脈五脈互見獨乖者病乖而弦者即本藏之有餘乖而弱者即本藏之不足此藏氣之獨也若脈體之獨者如經所云獨小者病獨大者病獨疾者病獨遲者病獨熱者病獨寒者病獨陷下者病此脈體之獨也要此三者之獨亦總歸於獨大獨小獨疾獨遲之類但見其一即得其病之本矣故經曰得一之精以知死生又曰知其要者一言而終不知其要流散無窮正此之謂也然綜而觀之則表裡虛實四字尤為脈之切要者矣表陽也腑也凡六淫之邪襲於經絡而未入胃府及藏者皆屬於表也里陰也藏也凡七情之氣鬱於心腹之內不能散越及飲食之傷留於藏府之間不能通泄皆屬於里也虛者元氣之自虛精神耗散氣力衰竭也實者邪氣之太實由於正氣之本虛邪得乘之非元氣之自實也故虛者補其正氣實者瀉其邪氣經曰邪氣盛則實精氣奪則虛此大法也然而大實有羸狀誤補益疾至虛有盛候妄瀉含冤陰證似乎陽清之必斃陽證似乎陰溫之轉傷此非察於陰陽脈絡之微鮮不誤矣諸凡疑似之際大抵證不足憑當參之於脈而脈又不足據則必取諸沉候彼假證之發見皆在表也故浮取脈而脈亦假焉真證之隱伏皆在裡也故沉候脈而脈乃見耳此特為之提綱挈領以為診視入門之準而醫之大要已可睹矣學者宜深玩之脈有浮中沉三按之要明上中下三部專求互證之義夫經所言上中下者寸關尺之部位也內外者浮沉之部位也掌後高骨為關中部也關前為寸上部也關後為尺下部也皮膚取而得之謂之浮外也肌肉取而得之謂之沉內也右寸浮以候胸中沉以候肺左寸浮以候膻中即心主包絡沉以候心右關浮以候胃沉以候脾左關浮以候膽沉以候肝左尺浮以候膀胱洪大是膀胱中以候小腸脈圓是小腸沉以候腎右尺浮以候三焦洪大是三焦中以候大腸脈直是大腸也沉以候腎腎有兩枚均司水火而有水火之別故兩尺以候腎經曰腎合三焦膀胱蓋膀胱為腎之水府三焦為腎之火府故左尺以候膀胱右尺以候三焦三焦之氣生於腎從下而上分隸於胸膈腹而候於右尺者乃其所居之定位而又候於上中下三部者乃其遊行之部署也是以寸候胸中主上焦也關候膈中主中焦也尺候腹中主下焦也若夫膈膜之脈亦有診焉內固不在府外亦不在經所謂半表半裡似也非是也時行瘟疫之邪氣不由皮毛而入故不在經府其邪之入也自口鼻而入於膜原伏於背脊之前腸胃之後經所謂橫連膜原治之以膽膜原故其脈或在左關或在右關其名曰動其象如豆大上下無頭尾其動數而不移即厥厥動搖之動此動脈不可以概二十八脈之動膈膜有病之診也然診脈之法貴於圓通肺與大腸為表裡心與小腸為表裡則尺寸可以互相印證肺與膀胱同主腠理則右寸左尺亦可以互相印證夫麻黃為肺家喘藥而仲景用以解太陽之邪硝黃為腸胃主藥而局方用以瀉心經之火即此乃知可以印證也而治法亦於此可推矣如浮主皮膚之病中主肌肉之病沉主筋骨之病此雖不以藏府之部位言實浮中沉之確義診家之切要也內經曰寸口主中人迎主外兩者相應俱往俱來若引繩然蓋寸口者右寸之前也人迎者左關之前也主中主藏也主外主肌也十二經脈之流行始肺終復由肝注肺故曰兩者相應俱往俱來若引繩然又曰寸口人迎大小齊等春夏人迎微大秋冬寸口微大名曰平人蓋齊等則藏府無有偏勝微大則應時而旺四時之脈獨診肺肝者肝藏屬木生火統主春夏肺藏屬金生水統主秋冬此以候平人之無病也又曰人迎大一倍於寸口病在足少陽一倍而躁病在手少陽人迎二倍病在足太陽二倍而躁病在手太陽人迎三倍病在足陽明三倍而躁病在手陽明寸口大於人迎一倍病在足厥陰一倍而躁病在手心主寸口二倍病在足少陰二倍而躁病在手少陰寸口三倍病在足太陰三倍而躁病在手太陰蓋藏氣盛則寸口大於人迎府氣盛則人迎大於寸口虛則皆見其小此以候藏府之盛虛也如一盛瀉膽以補肝二盛瀉膀胱以補腎可以類推夫經脈之次第肺始而肝終寸口人迎之盛虛則由肝以及肺膽附肝為甲木故也其序不可紊而氣脈之貫通如此所以寸口又為六府之總稱也內經曰氣口何以獨為五藏主曰胃者水穀之海六府之大源也是以五藏六府之氣味皆出於胃變見於氣口故曰氣口緊盛傷於食人迎緊盛傷於風人迎者肝膽脈也肝膽主風氣口者脾胃脈也脾胃主食人迎氣口乃左右關部之前一分也關脈一部分為三分仍在關上但在前之一分耳若夫脈口兩寸之口以候經絡之氣者也內經曰上部天兩額之動脈額之兩旁足太陽膀胱脈所行上部地兩顴之動脈鼻之兩旁近巨勝之分足陽明胃脈所行上部人耳前之動脈耳前麴車下陷中手太陽小腸脈所行中部天手太陰也兩手氣口之動脈肺脈所行中部地手陽明也合谷之分動脈大腸脈所行中部人手少陰也鋭骨端之動脈心脈所行下部天足厥陰也毛際外氣街下五里之分動脈肝脈所行下部地足少陰也足內踝後太溪之分動脈腎脈所行下部人足太陰也魚腹上越兩筋間箕門之分動脈脾脈所行故下部之天以候肝地以候腎人以候脾胃之氣中部之天以候肺地以候胸中之氣人以候心上部之天以候頭角之氣地以候口齒之氣人以候耳目之氣夫經脈環絡一身故候法不獨寸關尺而十二經脈獨稱九候者神藏五形藏四也神藏五者心藏神肝藏魂肺藏魄脾藏意腎藏志也形藏四者大腸小腸膀胱胃皆藏有形之物也合為九藏惟膽無出入三焦包絡皆無所藏故不論也而九候之外又有謂之衝陽太衝者與九候中之太溪同為足之三動脈皆古脈法之切要者衝陽者胃脈也在足背上中間太溪者腎脈也在足內踝後跟太衝者肝脈也足大指本節後凡病危篤當候衝陽以驗胃氣候太溪以驗腎氣候太衝以驗肝氣絶者不治然百脈籍養於胃衝陽不衰雖危猶可治也若似有似無為陽虛重按似緊為中寒耳且夫在經者在藏府之外在府者在藏府之內如太陽經也膀胱府也在經之脈洪緩不一總皆浮也在府之脈或浮數而團或沉實而長平脈篇曰脈浮為在表沉為在裡數為在府遲為在藏夫浮者皮膚取而得之脈也故主表沉者筋骨取而得之脈也故主裡數者一息六至之脈也故為陽府屬陽故主之遲者一息三至之脈也為陰藏屬陰故主之而程知曰軀殼之外營衛為表軀殼之內藏府為里故以浮沉別之諸陽雖皆屬府諸陰雖皆屬藏當以遲數別之然傷寒之傳變亦有數而入藏遲而入府者熟讀經文自知也若夫脈之來去疾遲所以診表裡虛實法也來者自骨肉之分而出於皮膚之際氣之升而上也此陽脈也故以候表去者自皮膚之際而還於骨肉之間氣之降而下也此陰脈也故以候里疾者脈數疾有餘也故以候實遲者脈徐遲不足也故以候虛虛為正虛實為邪實出來疾入去遲為表實裡虛出來遲入去疾為表虛里實經曰來者為陽去者為陰疾為陽太過也遲為陰不及也表實裡虛者陰不及而陽太過也表虛里實者陰太過而陽不及也來去出入者脈之大關鍵也表裡虛實者病之大綱領也知內外之陰陽而辨其孰為虛孰為實者診家之切要也凡此明藏府之定位內外之定候表裡之定情皆為內經之要旨學者蓋可忽乎哉脈有藏府六經之要明六經平脈病脈及陰陽五行相乘之義內經曰平心脈來纍纍如連珠言滑利如珠連綿相貫如循琅軒言溫潤而柔滑二象喻其盛滿流行無太過不及之象也曰心平夏以胃氣為本平肺脈來厭厭聶聶澀之象也如落榆莢毛之象也言輕浮和緩為和平之象也曰肺平秋以胃氣為本平肝脈來軟弱招招言乍起乍伏之象也如揭長竿末梢長而軟也此喻其弦長而兼和緩柔軟之象曰肝平春以胃氣為本平脾脈來和柔相離言悠悠揚揚時一代也如雞踐地雞之行也舉足獨緩雞足四爪踐地四布此形容脾脈之灌溉四藏和緩而四布也長夏以胃氣為本平腎脈來喘喘纍纍沉實是生動之象如鉤如水流而回轉之象按之而堅不空虛也此言心腎同象心主血腎主水故也曰腎平冬以胃氣為本言四時脈應手中和意思欣欣難以名狀者胃氣脈也此五藏平脈之切要也內經曰病心脈來喘喘連屬急數之象其心微曲尚未至於全曲鉤多胃少之象也曰心病病肺脈來不上不下澀之象也如循雞羽浮之象也毛多胃少肺金之病將見曰肺病病肝脈來盈實而滑弦之太過如循長竿長竿無梢則失其和緩之意曰肝病弦多胃少故病病脾脈來實而盈數如雞舉足舉足非如踐地之和亦不至於鳥距之疾弱多胃少之象也曰脾病病腎脈來如引葛牽連引蔓之象按之益堅腎多胃少曰腎病此五藏病脈之切要也內經象曰太陽脈至洪大以長少陽脈至乍數乍疏乍短乍長陽明脈至浮大而短又曰厥陰之至其脈弦少陰之至其脈鉤太陰之至其脈沉故太陽脈浮浮緩中風浮緊傷寒脈浮而緊風寒症具當兩解之陽明浮長其病在經陽明長洪在經熱甚陽明脈實其熱入府少陽為病其脈必弦若陽氣微結其脈則細凡脈細脈沉脈緊皆陽熱鬱之症可見陽氣一結不但陽症似陰陽脈亦似陰矣太陰沉遲陰邪脈也沉遲而數陽症必見少陰沉細陰邪脈也沉細而數陽症當辨人知數而熱不知沉細中見數為寒甚真陰寒症脈嘗有七八至者但按之無力而數耳宜深察之厥陰微細陰邪脈也邪從陽化陽症當辨此六經脈象之切要也內經曰心脈急甚者為瘛瘲心為火藏寒甚故瘛瘲微急為心痛引背食不下微則薄於宮城之分食氣入胃濁氣歸心心氣逆故食不下也緩甚為狂笑心氣有餘心藏神神有餘故笑不休緩為伏梁在心下心下有餘之積上下行時唾血心主血熱則上益而時唾大甚為喉吤心氣盛故喉中吤然有聲微大為心痹引背心氣逆於心下善淚出心氣行於上則心精隨氣上湊於目小甚為善噦厄逆也心藏虛則火土之氣弱故善噦微小為消疸三消之症心肺主上消脾胃主中消肝腎主下消滑甚為善渴陽氣盛而有熱盛於上故渴微滑為心疝引臍小腹鳴小腹當有形也澀甚為喑微澀為血溢心主言心氣少故喑血多故溢於上維厥四維也陽氣少故手足四維厥冷也耳鳴癲疾心開竅於耳心氣虛故耳鳴癲疾肺脈急甚為癲疾寒甚故也所謂重陰則癲微急為肺寒熱皮寒熱也寒在皮毛也怠惰咳唾血引腰背胸若鼻息肉不通肺主氣此皆肺氣虛寒之所致緩甚為多汗熱甚故也微緩為痿瘻肺熱葉焦則為痿也偏風身偏枯不用頭以下汗出不可止腠理開故也頭以下者頸項胸背之間肺之外部也大甚為脛腫微大為肺痹引胸背大主多氣少血氣盛於下則為脛腫微盛於上則為肺痹引胸背也起惡日光陰血少故惡日光金畏火也小甚為泄氣血皆虛故也肺與大腸相表裡也微小為消疸肺主津水之生源也滑甚為息賁上氣陽氣盛故如此微滑為上下出血血隨氣行者也澀甚為嘔血血留不行故為嘔血微澀為鼠瘻在頸肢腋之間寒熱病也下不勝其上其應善痠矣痠者陰寒而痠削不能行肺主氣而發原在下少氣有寒則下不勝其上矣肝脈急甚者為惡言肝主語在志為怒肝苦急故急甚為惡言微急為肥氣在脅下若覆杯皆有餘之氣也緩甚為善嘔食氣入胃精散於肝緩主多熱熱則肝氣逆也微緩為水瘕痹亦飲食所積也大甚為內癰大主肝氣盛則鬱怒而不得疏達故也善嘔衄肝氣逆於上也微大為肝痹陰縮肝氣逆於下也咳引小腹肝脈抵小腹上注肺咳引小腹者經氣逆於上下也小甚為多飲微小為消疸木火盛故如此滑甚為㿉疝氣盛而熱故也微滑為遺溺肝主疏泄肝氣盛故遺溺澀甚為溢飲飲留於四肢則經脈阻滯故脈澀微澀為瘛攣筋痹肝氣虛而有寒故如此肝主筋也脾脈急甚為瘛瘲瘛者急而收引瘲者縱而懈弛脾主四肢故急甚為瘛瘲微急為膈中食飲入而還出後沃沫脾有寒不能運化飲食故為膈中不能遊溢津液上歸於肺四布於皮毛故涎沫從口出也緩甚為痿厥微緩為風痿皆四肢癱瘓而不為所用四肢不用心慧然若無病病在外而不及於中大甚為擊僕四肢不舉若擊之而仆地也微大為疝氣腹裡大膿血在腸胃之外皆有餘之積聚也小甚為寒熱血氣虛也微小為消疸不能為胃行其津液故也滑甚為㿉癃濕熱則為疝㿉為小便閉癃微滑為蠱毒蛔蠍腹熱濕熱則生蟲也澀甚為腸㿉脾氣虛而有寒微澀為內㿉多下膿血多血少氣故也腎脈急甚為骨癲疾陰寒太甚故也微急為沉厥奔豚正氣虛寒則為沉厥虛氣反逆故為奔豚足不收陰寒在下不得前後腎開竅於二陰氣虛不化故如此緩甚為折脊督脈屬腎貫脊緩則督脈懈弛故折脊也微緩為洞洞者食不化下溢還出腎氣緩故如此大甚為陰痿陰器不舉微大為石水腎水也起臍以下至小腹腄腄然上至胃腕水泛而土敗也不治小甚為洞泄腎氣虛也微小為消疸精血不足滑甚為癃㿉腎有熱則為小便癃閉為睪丸腫㿉微滑為骨痿坐不能起熱傷腎氣也起則目無所見熱傷骨精也澀甚為大癰血氣阻滯故也微澀為不月沉痔氣血不行故也諸急者多寒寒氣收徑故急緩者多熱熱氣散弛脈緩大者多氣少血宗氣營氣行於脈中衛氣行於脈外故大主多氣小者氣血皆少滑者陽氣盛微有熱澀者多血少氣微有寒按內經曰澀者陽氣有餘言陽氣受傷故脈澀也滑者陰氣有餘也言血隨氣行陰血沸騰故脈滑也此六經病脈之切要也要之各藏各經無非氣血陰陽之相周通也則陰陽五行之相乘可弗辨哉夫陰脈不足陽往從之陽脈不足陰往乘之如寸脈微名曰陽不足陰氣上乘入於陽中則灑淅惡寒尺脈弱名曰陰不足陽氣下陷於陰中則發熱此內傷不足陰陽相乘有休止之惡寒發熱也若脈緊無汗灑淅惡寒發熱者是傷寒也脈緩有汗灑淅惡寒發熱者是中風也皆外感有餘風寒中傷營衛無休止之惡寒發熱也至於水乘火金乘木乘其所勝是相剋也名曰縱火乘水木乘金乘所不勝是反侮也名曰橫水乘金火乘木子乘其母是倒施也名曰逆金乘水木乘火母乘其子是相生也名曰順五藏之脈肝弦心洪脾緩肺浮腎沉五藏各見本脈自無病也若見他脈以此推之縱者病甚橫者病危逆者病虛順者病實也金木水火皆生於土故不言乘爾凡此皆診視之要旨明於內經學者苟能深究焉則藏府六經之間寧有遁情哉脈有本脈變脈真藏之要明縱橫順逆及有胃氣無胃氣之義心肝脾肺腎五藏其中各有本象平脈各有淫情病脈各有真藏死脈三者均要心領神會本脈維何一如肝藏微弦心臟微鉤脾臟微緩肺臟微毛腎臟微石本象各現於本部者為本脈若現於別臟部位當以順逆縱橫論之凡順逆縱橫即變脈也變脈維何諸書言生剋制化暗包夫妻母子順逆縱橫在內經曰上下者指標脈本脈言萬物之終始左右者右左指經脈絡脈言陰陽之道路指臟神腑氣言又曰五臟相通移指順脈言又曰變化相移指縱脈言以觀其妙又曰從其氣則和指縱順言違其氣則病指橫逆言不當其位者病言鬼賊入宮也迭移其位者病言飛弱坐虛也失其位者危指本脈失位言尺寸反者死指逆脈言陰陽交者死指橫脈言先立其年是言司天在泉以知其氣言主氣客氣左右應見天泉定而應與不應分矣當應而見則吉不當應而見則凶然後可以言生死之順逆以逆為死脈以順為生脈大意已見雖只舉順逆而縱橫自寓其中以上經文皆是指順逆縱橫而言順者心部與右腎部得肝脈肝部得左腎脈左腎部得肺脈肺部得脾脈脾部得心與右腎脈是也逆者心部與右腎部見左腎脈左腎部見脾脈脾部見肝脈肝部見肺脈肺部見心與右腎脈是也縱者心部見肝脈肝部見心脈左腎部見肝脈肝部見左腎脈肺部見脾脈脾部見肺脈右腎部見脾脈脾部見右腎脈是也橫者心部見肺脈肺部見心脈肝部見脾脈脾部見肝脈左腎部見右腎脈右腎部見左腎脈是也平人忽得全順之本脈者清秀主身榮名貴愚濁主發財見喜病人忽變全順之本脈者可以不藥自愈平人忽得全逆之純脈者病象主危平象主重病非災病人忽變全逆之純脈者死不治平人忽得全縱之本脈者清秀主青雲穩步愚濁主時運亨通病人忽變全縱之病脈者此為勿藥有喜平人忽得全橫之本脈者清秀主重病非災愚濁主死病人忽變全橫之病脈者救之有法僅可萬死一生然而得全脈者少犯三者多全者易治不全者難治凡臨症無論大小輕重均要凝神細思握定經絡標本順逆縱橫以核妥病症之傷中專吞合併新久分臟分府審虛審實擇取七方中對症之一如法施治自然應手取效如或萬無生理可不必用心於無益之地間或稍能施巧務宜詳據六臟之脈象以弦多胃少為肝病弦甚曰今病但弦無胃曰死鉤多胃少為心病鉤甚曰今病但鉤無胃曰死毛多胃少為肺病毛甚曰今病但毛無胃曰死石多胃少為左腎病石甚曰今病但石無胃曰死虛浮濡澀為右腎病搏硬曰今病忽散無胃曰死虛澀堅快為脾病舂硬曰今病乍疏乍數軟散無胃曰死此乃內經要緊真祕最宜熟味至於脈象去來之間或夾二象三象中含陽氣沖蓄而溫柔者為靜名曰有胃氣症雖危險不死若是二三象全帶陰硬合現名曰胃少若只一象獨見無兼而躁者名曰無胃乃真臟死絶之脈經曰陰氣者靜則神藏躁則消亡陰氣指六陰藏之元神真氣飲食自倍一餐能吃兩餐除中之症作矣脾胃乃傷將絶若脈來純急如兩指用力轉豆塊圞堅硬上戴尖鋭微舂似笠頂者此心家真臟脈也如純弦硬若長木正身中夾急促而外形粗澀似刀斫砍此肝家真臟脈也如風爍擺燈焰倏滅倏明似無似有往來不耐指按者此肺家真臟脈也如純急若手指彈石越按越覺楞澀此左腎真臟脈也如慢則似斷似續動若魚翔蝦遊知其逝而不覺其返急則勢如迸泉自井底不流水中湧出到水面即一圈而散皆右腎真臟脈也至於脾家真臟書云雀啄屋漏水流覆杯猶覺似是而非形容尚未盡善經云乍數乍疏擬議何其神也粵稽滑動數脈名曰三陽開泰象之甚美者也胡為竟與死脈並看要須於乍字深味凡脈連來幾至圓活轉動形情似數非本性之善乃如燈將滅而復明又來幾至疏離渙散楞澀舂硬如鳥之距如鳥之啄又若雞之舉足此乃元陽谷氣垂絶象脾家之真臟脈也以上六種真象無論心肝脾肺腎獨現於脾部者為最心與右腎絶遇壬癸日時死肝絶庚辛日時死脾絶甲乙日時死肺絶丙丁日時死左腎絶戊己日時死凡六臟絶脈各現於本位者心與右腎現丙丁日時死肝現甲乙日時死脾見戊己日時死肺見庚辛日時死左腎見壬癸日時死以上如系暴病或為誤醫胃氣臟真俱為藥邪吞併以致脈現真象者的準此期若於久病則不然每多應在當令日內時日亦可如前而定更須兼察夾護夾護者即當迎送之令脈也假如脾臟真脈或現於本部或現於別部春季宜防三月內別部應戊己日時本部應甲乙日時假如肝脈尚未重損而可送心脈猶未全憊而可迎此為夾護得力三月可以無礙如心脈雖未大損而可送肺脈全壞不能迎此為夾護已傷的於六月殞命別部應戊己日時本部應甲乙日時九月十二月之脈理同推其餘心肝肺腎五臟真脈理可類推然必以餘脈雖損未現真象惟此一臟獨見者方準此斷若是別有兩部三部兼帶此臟真脈更屬確而且的如或兩臟三臟同絶數經真脈雜現則難決定期間有內久因病形肉盡削脈雖不現真臟亦死其餘暴病間或夾帶一二縱橫宜於症治用方舉要説內參究至於壽夭窮通無不顯著於脈象大抵清秀奇特者貴和緩停勻者富神氣流通者福胃氣強旺者壽斷續不勻者夭滯澀短促者貧橫逆帶輕者貧賤橫逆帶重者貧而且夭全橫全逆者必遭凶禍死刑縱順夾少者富縱順夾多者福而兼壽全縱全順者必主富足貴顯未發者心宜洪盛圓通已發者肝宜長弦流利脾主財祿腎主嗣續凡此應驗理有固然學者宜於脈細求之也藏府驗於形體括略人身形體之於藏府內外相應其驗不爽醫者所宜析究也夫心者君主之官神明出焉是心為生之本神之變也其充在血脈而心之合脈也其榮色也其主腎也制則化生心合小腸小腸者亦脈其應也肺者相傅之官治節出焉是肺為氣之本魄之處也其充在皮而肺之合皮也其榮毛也其主心也肺合大腸大腸者亦皮其應也肝者將軍之官謀慮出焉是肝為罷音疲極之本魂之處也其充在筋而肝之合筋也其榮爪也其主脈也肝合膽膽者亦筋其應也脾者倉廩之官五味出焉是脾為營之居也其充在肉而脾之合肉也其榮唇也其主肝也脾合胃胃者亦肉其應也腎者作強之官技巧出焉是腎主封蟄藏之本也精之處也其充在胃而腎之合骨也其榮發也其主脾也腎合三焦膀胱三焦膀胱者腠理毫毛其應也若膽為中正之官決斷出焉膻中為臣使之官喜樂出焉胃為水穀之海五味出焉大腸為傳道之官變化出焉小腸為受盛之官化物出焉三焦為決瀆之官水道出焉膀胱為州都之官津液藏焉氣化則能出矣是皆名曰器能化糟粕轉味而出入者也其華在唇四白其充在肌也是故面赤心之色也好喜心之志也臍上動氣心之部位也胸膈間痛心之宮城也舌色紅心開竅於舌也口乾心煩心之熱也驚悸怔忡心神不安也發狂昏冒心實而熱乘之也悽然好悲心虛而神怯也面白肺之色也好悲肺之志也右脅動氣肺之部位也咳動肩背肺之腧也胸痹而痛肺之府也灑淅惡寒膚痛汗出肺主皮毛也咳嗽唾痰噴嚏流涕喘呼氣促氣短不續肺氣虛也面青肝之色也好怒肝之志也左脅動氣肝之部位也右脅下痛引小腹肝脈所循也抽搐昏黑肝主風也耳聾不聰肝與膽為表裡也目䀮䀮無所見肝開竅於目虛故也如有人將捕之肝虛則膽薄也面有微塵膽之色也體無膏澤木鬱不能敷榮也善太息木氣不舒也善嘔嘔有苦長太息心中惔惔恐人將捕之邪在膽逆在胃膽氣泄則口苦胃氣逆則嘔苦數唾膽有邪也嗌中吤吤然膽為相火也膻中包絡代心行事面赤本色也氣舒則喜樂不舒則悲愁膻中為氣海也手心熱臂肘攣急腋腫外因也胸脅支滿心中憺憺大動目黃喜笑不休有餘也面黃脾之色也憂思脾之志也當臍中有動氣脾之部位也病則食少脾主味也倦怠乏力脾主四肢也腹滿腸鳴痛而下利脾主腹也此皆脾虛之症身體沉重腹脹便閉脾主肉也此為脾實之症也腹滿胃實也飢不受穀食胃虛也脹滿胃中寒也消穀善飢胃中熱也寒栗鼓頷胃氣虛也當心而痛胃脘痛也臍以上皮熱胃中熱也臍以下皮寒腸中寒也胃寒腸熱脹且泄也胃熱腸寒小腹痛脹而疾飢也能食而脈浮數有力與三陽熱症同見者陽結便閉也不能食而脈沉遲有力與三陰寒症同見者陰結便閉也便硬腹痛胃實也先硬後溏腹縮脾虛也噎膈反胃氣道阻隔也久病老弱血液乾枯也當臍而痛不能久立此大腸病也小腹痛乃小腸病也膀胱移熱於小腸則下不得小便上為口瘡控睪引腰脊上衝心邪在小腸也當耳前熱苦寒甚若獨有上熱甚小腸之脈上頰入耳中交肩上也面黑腎之志也恐腎之忐也臍下動氣腎之部位也腹脹喘不得臥腎主水也溲便不利腎開竅二陰也少腹滿背與骨痛腎主骨膀胱為表裡也呵欠腎主欠也心主飢腎邪上乘於心也足寒腎氣厥也腹氣滿小腹尤堅不得小便窘迫三焦病也三焦病氣滿於皮膚中輕輕然而不堅下焦病實則癃閉虛則遺溺閉則點滴不出小腹脹痛癃則勤出無度莖中澀痛三焦主氣癃閉氣實也遺溺氣虛也小腹偏腫而痛以手按之即欲小便而不得肩上熱膀胱病也小便之赤白主乎里之寒熱也赤者為熱若平素淺紅淡黃則為陰虛也白者為寒若平素白渾如米泔則為濕熱所化也此皆五臟六府之必應昭然若揭矣而內經有曰五臟六腑肺為之蓋巨肩陷咽候見其外五臟六府心為之主缺盆為之道䯏骨有餘以候𩩲骭肝主為將使之候外欲知堅固視目小大脾者主為衛使之迎糧視唇好惡以知吉凶腎者主為外使之遠聽視耳好惡以知其性胃為之海廣骸大頭張胸五穀乃容鼻隊以長以候大腸唇厚人中長以候小腸目下窠大其膽乃橫鼻孔在外膀胱漏泄鼻柱中央起三焦乃約又曰頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將敗矣膝者筋之府屈伸不能行則僂附依附而行筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣手屈而不伸者其病在筋伸而不屈者其病在骨肺心有邪其氣留於兩肘肝有邪其氣留於兩腋脾有邪其氣留於兩髀腎有邪其氣留於兩膕又曰邪之中人或中於陰或中於陽上下左右無有恆常其中人也方乘虛時及新用力若飲食汗出腠理開而中於邪中於面則下陽明中於項則下太陽中於頰則下少陽其中膺背兩脅亦中其經膺屬陽明背屬太陽脅屬少陽中於陰者當於背胻始手臂足胻之陰屬三陰經臂與胻其陰皮薄臂外側屬三陽內側屬三陰經其肉淖柔軟澤光潤故俱傷於風獨傷其陰又曰從腰以上手太陰陽明主之從腰以下足太陰陽明主之傷於風者上先受之傷濕者下先受之蓋人身八萬四千九毛竅應呼吸為開合而風邪隨處可入故聖人避風如避矢石焉此舉邪之所傷歸於藏府症之所發驗於形體而內外相因之理皆內經所闡明者大要如此學者尋繹經旨觸類推求診治不皆確然有據也哉診外感內傷脈舉要凡人之病內傷外感雖症有可驗而脈實宜審得其要者治乃有濟矣夫外感無非六淫如風脈浮緩而喻嘉言曰中風之脈必有所兼兼寒則浮緊兼熱則浮數兼痰則浮滑兼氣則浮澀兼火則盛大兼陽虛則脈微兼陰虛則脈數或細如絲虛滑為頭痛遲緩為營衛衰虛浮遲緩正氣不足自可補救急大數疾邪不受制必危無疑若數大未至急疾尚有可救者寒脈浮緊三陽脈浮大有緊有數三陰脈沉小有緊有數而仲景於三陰統以微細言之蓋沉必重按始得緊數亦在沉細中見不似三陽脈浮大而緊數也暑脈浮濡暑乃天之氣系清邪所以中手少陰心經其症多與傷寒相似但傷寒脈必浮盛傷暑脈必濡弱為不同耳蓋寒傷形表邪外盛故脈大而有餘暑傷氣元氣耗傷故脈虛而不足濕脈濡滯經曰肝腎並沉為石水並浮為風水水在皮膚故脈浮脈浮惡風惡寒不渴名風水脈沉腹滿不喘水積胞中堅滿如石名石水脈沉遲發熱胸滿身腫汗如柏汁名黃汗脈沉遲且喘名正水脈浮胕腫如泥按之沒指其腹如鼓不惡風不口渴名皮水陽水沉數陰水沉遲躁脈遲數經曰諸澀枯涸幹徑皸揭皆屬於燥乃肺與大腸陽明燥金之氣也肝血不足風熱甚而金燥心火爍腎消爍腎脂令腎枯燥仲景曰脈浮而數名曰陽結脈沉而遲名曰陰結脈結而代皆躁脈也即以陽結陰結明之平脈篇曰其脈浮而數能食不大便者此為實名曰陽結陽能消穀故能食其脈沉而遲不能食身體重大便反硬名曰陰結陰不能消穀故不能食又曰脈藹藹如車蓋者名曰陽結也浮數中有擁上之象脈纍纍如循長竿者沉遲中有直引強硬之象名曰陰結也陽結者偏於陽而無陰以生液陰結者偏於陰而無陽以生液皆於脈之浮而數沉而遲如車蓋如循長竿辨之也凡病後傷液多有此症或潤竅以導之或軟堅以下之乃不至於窘苦萬狀也若關格一候非可以外感之燥症概之也關格之脈有以尺寸候者如雲浮大之脈在於尺為關陰關閉陰氣不能施化故不得小便浮大之脈在於寸為格陽格拒陽氣不能宣通故吐逆浮為正氣虛大為邪氣實此一候也有以內外候者如雲脈上來微小下去反大名曰反脈上來益大下去微小名曰覆反者病在裡為陰盛覆者病在表為陽盛陽盛則病格陰盛則病關陰陽盛極不相交通則病關格此又一候也有以衝陽候者如雲衝陽脈伏則尺寸之陰陽不升降故吐逆水穀不入名曰格衝陽脈澀則三焦之元氣不流通故不得小便名曰關此又一候也其症頭無汗者陽未離陰可治頭有汗則陽已上脫不可治此不得視為燥者也火脈洪長朱丹溪曰氣有餘便是火也其脈洪大而長虛火外炎脈浮細而數虛火內灼脈沉細而數六淫之外感其脈有如此者若夫內傷則有七情之脈凡喜傷於心者氣緩而脈散悲則氣消而脈短怒傷於肝者氣上衝而脈促驚傷於膽者氣亂而脈動掣憂傷於肺者氣沉而脈澀思傷於脾者氣結而脈短恐傷於腎者氣怯而脈沉此大較也而飲食勞倦所宜辨也其診皆在右關右關浮而有力為飲食傷胃飲食傷形為有餘故脈浮而有力右關沉而無力為勞倦傷脾勞倦傷氣為不足故脈沉而無力若寒氣在內腹滿絞痛腸鳴洞泄則胃脈浮緊亦屬內傷如寒氣在外骨筋煩痛六脈浮緊是外感也而食厥氣厥亦宜辨也人有忽然厥逆手足逆冷口不能言肢不能舉者名曰食厥食填太陰抑遏肝膽之氣不得上升兩實相搏痛連胸膈陽氣不舒手足逆冷下焦隔絶尺脈不至若作中風中氣治之危可立待經曰上部有脈下部無脈其人當吐不吐者危宜先以鹽湯吐之再行消食導氣之劑此法大勝惟如人有厥逆痰壅口噤脈伏者身溫為中風身冷為中氣中風多痰涎中氣無痰涎以此為辨暴怒暴喜憂愁不已之人氣多厥逆往往得中氣之症因怒而得者為多局方用烏藥順氣散治之不可作中風治然而中風多挾中氣內因七情得者法當調氣外因六淫得者於調氣中依所感六淫治之宜用八味順氣散此嚴氏之法也若元氣虛弱者又當變而通之玉機微義論之詳矣抑又有宜辨者則為疝瘕之脈內經曰腎脈大急沉肝脈大急沉皆為疝心脈搏滑急為心疝少腹當有形也肺脈沉搏為肺疝肺脈當浮沉搏寒氣也三陰急為疝三陽急為瘕腎脈小急肝脈小急心脈小急不鼓皆為瘕小急為虛寒不鼓為血不流故內凝為瘕也此疝與瘕之有可辨者也若六郁者其症與脈不又有辨歟滑伯仁曰郁者結聚而不得發越當升者不得升當降者不得降當變化者不得變化所以傳化失常而病見矣氣鬱者胸膈痛濕鬱者周身痛或關節痛遇陰寒即發痰鬱者動則氣喘寸口沉滑熱鬱者昏冒便赤脈浮數六郁不言風寒者風寒鬱而為熱也血鬱者四肢無力能食食鬱者噯酸腹飽不能食寸口緊盛六者之中以氣為主氣行則鬱散矣此則內傷外感所兼有之症不可不知也要之凡此內傷外感有症有脈病本輕淺別無危候但因其症以治其標無不可也若病關藏氣稍見疑難須辨虛實憑脈用藥方為切當輕者從症十惟二三重者從脈十常八九此脈之關係非淺也夫治病之法有舍症從脈者有舍脈從症者迷途莫此為甚如外煩熱而脈見微弱者必虛火也腹脹滿而脈見微弱者必胃虛也虛火虛脹其堪攻乎此當從脈之虛不當從症之實也如無煩熱而脈見洪數者非邪火也如無脹滿而脈見弦強者非內實也無熱無脹其堪泄乎此當從症之虛不當從脈之實也蓋實無假實虛無假虛凡此可以類推然真實假虛之説豈曰必無或寒邪內傷或食停氣滯而心腹急痛者則脈或沉或伏或促或結脹雖似虛此假虛也或四肢厥逆或惡寒畏風內有煩熱便結等症而脈見滑數者症雖似虛亦假虛也治傷寒者每以陰脈作伏脈不知伏脈之體雖細必隱隱有力況傷寒明明有症豈容任意胡猜草菅人命哉雖然脈症尤宜審其順逆也暴病之脈浮洪數實者為順久病之脈微緩軟弱者為順暴病而沉微細弱久病而浮洪實數皆為逆也有餘之病浮洪緊數為順不足之症和緩柔軟為順有餘而微澀細弱不足而洪大浮數亦皆逆也明乎此則欲愈之脈症必能知矣凡病人發熱身疼脈反沉遲者是陽症而見陰脈為難愈也若其人有恬然嗜臥之狀熱除身輕之意其脈沉而遲者為欲愈也何以知之表有病者脈當浮大今反沉遲是無表脈故知欲愈也凡此診脈之切要明辨以晰學者可勿熟玩而深求哉脈有內外候之要人身中臟腑既具自有經脈絡脈衝貫主六腑之絡脈細而浮為陽為表取之以察腑合之病症主五臟之經脈粗而沉為陰為里取之以決元真之有亡浮指輕探肘端肌肉之間得絡中之陽象乃腑脈沉指重按肘旁筋骨之界得經中之陰神乃臟脈腑者府也以其能受能盛猶之朱門大廈故曰府臟者藏也言神不能自藏須假他物以藏之譬如幽居密室故曰臟腑以表名言其表彰於用也臟以里名言其收斂於內也細體外候胃內候脾二語知分臟內腑外的系經文正旨於是因從而正之曰下附上左內以候水腎外以候腹中右內以候火腎外以候命門中附上左內以候肝外以候膈右內以候脾外以候胃上附上左內以候心外以候膻中右內以候肺外以候胸中寸關尺正經脈之兩傍即經所云季脅脈也季脅乃奇經八脈之絡邪犯奇經則參差倚斜現於正經左右上面無病亦不現也於是分心肝肺脾腎六神臟於內候分胸中膻中腹中命門為四形臟統轄膽胃大腸小腸膀胱包絡六腑於外候膽候膈中胃候右關包絡寄候膻中小腸寄候命門大腸膀胱寄候腹中則內經九臟六腑之旨昭著於內外二候之中十二經十五絡之義三部九候之法分明於六指之下矣內經言形臟有四有注為骨脈膽女子胞者有注為耳目齒頭角者其説不一內經已分骨脈於合分膽於腑女子胞系命門安得又入形臟且女子以胞為臟則男子豈不止有形臟也甚為可笑況臟之為言藏也竟以耳目頭角之顯露為藏更為可笑用以數十年辛苦而得諸試驗者特為闡揚經旨願以質之同人焉脈有經絡之要脈有體象宜細參求如先分診一指獨按寸關尺脈之形象俱皆強旺有力不急後來總診三指齊按或於中候間有力量不足而沉按則更力微氣弱甚有全然不到寸關者當以分診之力量為假宜作神虧虛病治假若先分診獨按力量強旺可愛後來總診三部齊按其力量仍如此當以分診之力量為真宜作神強實病醫然所言強旺非謂其急硬扛指也甚言胃氣與神氣相失離奇欠貫疲憊遲渙結澀倉惶是也若形象長硬如棍堅鋭如刀力大如舂碓搏擊如張弦俱屬純寒純冷之象切勿誤認為有力而妄行攻伐也如或浮指輕取則有指尖絡脈沉指重按絶無指端經脈此係臟神為腑氣所並如或象代結革遲細弦澀堅硬長搏尚不過為虛為寒若系一味浮薄微恍斷續軟散或急促硬散俱系真元絶憊臟神已為腑氣所吞甚難醫治必大方重劑而藥力猛方可挽救也如或形肉脫盡者必不治初病得此脈雖輕亦重假如浮指輕候不見指尖絡脈沉指重按總現指端經脈此為腑氣歸臟如同葉落歸根生氣收藏之謂也加以和緩停勻輕舒流動皆為體旺無病如或帶滑帶數俱屬臟氣太過宜作火旺實強治如帶遲弦緊急細弱硬澀均屬臟真火虧宜作神傷虛損醫初病人如得此脈雖重可治若浮部指尖絡脈高厚或有一部及一候不符即當留神細察本部沉候指端另有一脈在下安靜和緩此不過外因天時六淫所幹其病在腑務宜細心審的果系六氣中何氣因風帶弦因寒帶緊因暑浮洪而虛因濕緩大而澀因燥洪數因火滑數仍存各象是病起於枝葉法當正治即取時賢方中之對症一湯攻其標邪而病自已病去然後養體無妨即經云從外之內者治其外又曰從外之內而盛於內者先治其外而後調其內是也如或沉候不見指端臟脈止有浮部一按候盡薄而欠圓此無力無神是病起於七情內損臟真須要細察本部之正脈可是本經病脈否不然又要探的本脈飛在何部或躔強或坐虛又須細辨本部的系何臟之客脈加臨可遵順逆縱橫條內分虛損善惡制方急救本臟以退逆橫必俟本經凶症悉除主回脈轉而象漸現漸寬者乃腑脈或象漸現漸厚者乃標脈均可另更攻伐之劑以靖外邪庶可保全性命即經云從內之外者調其內又曰從內之外而盛於外者先調其內而後治其外是也如無腑脈標脈現不可妄動攻伐除此有一種外不因於天時之六淫內不因於人事之七情或臟或腑偶然一時無情之生克以致夫妻母子轉盼參商自相勝負更互為病名曰不內外因症惟此種最輕脈當取其獨大獨小獨浮獨沉獨滑獨數獨疾獨遲獨弦獨緊獨微獨澀者為病脈認的經絡瀉其太過補其不及有邪攻邪有積去積小其方緩其制取專經對症之品或宜補七攻三或宜攻七補三或宜攻補均施或宜先攻後補或宜先補後攻或宜專攻或宜專補引之以嚮導濟之以活法此即經云中外不相及則治主病者是也凡此皆為按脈施治之要學者宜熟念之脈分臟腑經絡之要經曰心藏神肺藏氣肝藏血脾藏肉腎藏精與智六臟之道皆出於經隧以行血氣故神智六者有餘不足而百病生焉神有餘則笑不休神不足則悲氣有餘則喘咳上氣不足則息短少氣血有餘則怒不足則恐形有餘則腹脹涇溲不利不足則四肢不用志有餘則腹脹飧泄不足則厥精有餘則少腹脹莖中痛赤白癃閉不足則少腹引痛腰脊強疼機關不利又云肝脈滿腎滿肺滿皆實即為腫肺之壅喘而兩胠滿肝壅兩胠滿不得小便腎壅腳下至少腹滿脛有大小髀音彼䯒音杭大跛易偏枯心脈滿大癇瘛筋攣肝脈小急癇瘛筋攣肝脈鶩暴有所驚駭直急急亂皆曰鶩脈不至若喑不治自已腎脈小急肝脈小急心脈小急不鼓皆為瘕腎脈肝脈並沉為石水並浮為風水並虛為死並小弦欲驚腎脈大急沉肝脈大急沉皆為疝心脈滑急為心疝肺脈沉搏為肺疝陰氣作痛為疝三陽指太陽急為瘕三陰指太陰急為疝二陰指少陰急為癇厥二陽指陽明急為驚肝脈外鼓沉為腸澼腸澼泄痢也外鼓沉指脾藏標脈言此標脈當作胃府絡脈看不言脾藏內候即包本脈和緩在內學者要知此等間文即系脈關竅最宜細玩久自已府藏之脈所以易愈是知包函脾脈和緩之意肝脈小緩為腸澼易治肝脈小緩則肝氣強旺知為經淫入絡之腑病小緩又為二象兼見之印證腎脈小搏沉為腸澼下血小搏沉乃三象兼見之印證腸澼下血系腎臟陰病須要小心仔細血溫身熱者死誤作腑病陽症醫治致其元氣外越故身熱陰火內躁故血溫知為腎臟憊絶必死也心肝澼亦下血兩臟總斷一句不言脈象即隱然在上文小搏沉也二臟同病者可治其脈小沉澀為腸澼分而言之如心脈小沉澀為心澼肝脈小沉澀為肝澼合心肝二脈俱帶小沉澀為少陰厥陰並病純陰脈象甚為難治其身熱者死誤以陽症治故必死熱見七日死胃脈沉鼓澀純陰寒冷之象胃外鼓大此指胃之外邪標脈亦見純陰寒象詳究胃內胃外二語不惟臟脈有根盤標本及數象兼見之殊即腑脈亦有根盤標本及數象兼見之別細心領會診脈關竅在是心脈小堅此足徵離陽失柄陰冷侵陵背膈偏枯男子發左女子發右不喑舌轉可治脈至而搏血衄身熱者脈來懸鉤浮為常脈脈至如喘名曰暴厥暴厥者不知與人言純陰脈象乃虛冷之症脈至數脈兼陽象使人暴驚見症亦輕三四日自已陽脈陽症故可不藥自愈人咸以數脈為凶曷不以此證之脈至浮合浮合如數倉卒探之有似乎數細心領會實是弱急乃神氣脫離之象醫要用意一息十至已上是經氣豫不足也微見九十日死脈至如火薪然即前所謂形如燈焰之閃灼是也是心經之豫奪也草乾而死象如吹毛乃肺之真臟脈現其應在秋脈至如散葉所謂軟散脈是也是肝氣之豫虛也脈至塞而鼓乃死硬草脈之象是腎氣豫不足也懸去沉指無根棗華而死脈至如丸泥形如豆之堅硬死頑死圞若燥土之枯澀是胃精豫不足也榆夾落而死脈至如橫格形如板木橫格上下難去難來乃結脈無氣無神之變象是膽氣豫不足也禾熟而死即秋初時脈至如弦縷即新張弓弦之象是胞精豫不足也病善言下霜而死不言可治心神不亂則無妄言雖弦且喜中帶綿縷之軟善於調治則死硬不現尚有可起之機脈至如交漆謂脈象如急流旋水乍分乍合急射合撞硬轉交後圓作四圓而散交漆者左右傍至也微見三十日死脈至如湧泉所謂硬散脈象是也浮鼓肌中太陽氣豫不足也少氣者韭英而死脈至如禿土謂脈象散亂難於尋按捉摸也按之不得是肌氣豫不足也乃脾氣憊壞之互詞五色先見黑白壘發而死脈至如懸甕其象輕似實而重即空輕似聚而重似散也懸甕者浮揣切之益大是二俞之豫不足也水凝而死懸甕即腎真石脈之變體死應在冬脈至如偃刀謂形如刀之堅鋭是也乃肝臟死絶真脈偃刀者浮之小急按之堅大急五臟苑熟小急堅大急陰象雖有兼象猶萬物茂極已熟勢將枯稿也寒熱獨並於腎也陰水嚴凝為寒陰火酷烈為熱兩相吞併真精暗損矣如此其人不得坐不得起床立春而死脈至如丸滑不直指輕按似豆之直留而下形似叢聚而不圓轉重按則形象頓失全不當手矣不直指者按之不可得是大腸氣豫不足也棗生而死脈至如華者形如花瓣大放似叢而實鬆散輕取似有重按全無此乃胃神兩失也令人善恐不欲坐臥行立常聽間忒是小腸氣豫不足也季秋而死季秋九月也心與右腎之元真既憊則依傍命門之腑難立火庫歸戌乃臟腑表輸應之理以上悉皆內經辨別臟腑之數象兼見主病真臟脈與腑氣吞臟脈之必死定期玩此則分臟經腑絡為兩診確乎其有據矣而六臟有真象與夫吞臟之腑脈亦有真象腑象遲臟象速均不可忽也脈分有力有神有胃氣之要凡臟脈去無力形象浮薄者悉屬元真虛弱無疑矣如或浮而且大更屬營氣不足法宜溫中養胃浮小又兼臟精虛憊法宜峻補脾胃浮澀系陰經元陽不足宜於扶陽隊中少加補血益陰之品浮微本於真精不足而元真無倚無藏以致二陽暴露藥忌辛香燥烈切恐精液重損則元真二氣反逐藥性而散故方宜太緩而味尚甘溫久則本液自生真精隨復二陽漸收漸旺矣如帶浮搏弦硬均系陰寒動克元真宜於峻補大方內加入辛香燥烈發散之品加麻黃附子細辛小建中湯是也浮洪系陽中真陰不足陰血虛損不能翕和其陽以致陽氣獨盛治法不可抑陽只宜偏補真陰則水火自相既濟如或浮急浮結浮澀浮緊浮革均系臟真耗損元陽困憊凝成純陰冷象方宜重大燥補藥忌陰潤凝滯以建立中氣為主選擇突將飛騎急救其元是正法也至於躁脈後人誤擬為燥故立湯有滋燥養營之名立言有滋陰降火之論施於真浮元越陽元津枯可謂冤沉海底躁指臟神舞跳不安因於元真喪憊務要細心分察或於諸般浮象動中忽然踴躍舞跳狀異乎象宛如豆爆相似名曰陽躁乃陽中之真陰虧損不能吸引下交於腎或於諸般沉象靜中忽然踴躍舞跳狀異乎象亦如豆爆相似名曰陰躁系陰中之真陽虛損墜陷於下不能呼陰精上媾於心二者均屬陽虛陰弱元真衰頽起於大驚大怖大懼大恐傷腎動心或並病而為夢遺或直中而為自泄或於初病未困之先或於大病既愈之後實因一念之魔曰妄動曰神交至擾元神真精皆能令脈現躁察的浮沉兼帶分清臟腑受病淫情根蒂虛實始末吞併因由果系陽躁宜於保陰隊中加入安神鎮驚補真助元之品果系陰躁宜於扶陽劑內加入寧魂奠魄退陰提陽之味關鎖陰精填益骨髓則躁象自除神氣自交諸病不作矣凡診脈無論粗細強弱均以指端羅紋來往自然形迹以過指者為真元陽氣以耐尋按者為有力以得六臟正象者為有神於中暗蓄和緩生機者為有胃氣縱帶虛損中傷症雖危急不死如或倚斜短促脈獨不上指心羅紋時或恍惚如燈焰間耳依稀中羽毛輕重尋按有時似覺乍遇浮沉捕捉久候似難再獲皆為陽氣脫離胃神憊絶猝難回生也若是形迹大過得強急搏堅結緊澀革之鼓指者又系純陰無陽此乃切要之元機醫者不可不知也脈象之關緊要者莫如胃氣經曰四時百病胃氣為本何等明切無奈後人妄指胃氣為神氣大失旨矣夫胃為水穀之海凡飲食入胃賴水火二氣泌蒸化生五味味中之清氣精液上升於肺葉華蓋之下將胃中精氣聚化成液滴入血海滋血養氣貫運於脈中而各歸本臟培養靈根填補精髓內強筋骨外潤皮肉名曰營氣以其源發於胃故又名胃氣以胃中之精液生於穀又曰穀氣神氣者指六臟中所藏真神而言心神之象鉤肝神之象弦脾神之象緩肺神之象毛腎神之象左石右動如胃中谷氣盛則營衛充而六臟元神自足徵應於脈象心旺則微鉤肝旺則微弦脾旺則和緩肺旺則微毛左腎旺則微石右腎旺則舒軟若胃中谷氣減少則營氣虧而六臟元神自弱徵應於脈象心虧則鉤多胃少肝虧則弦多胃少脾虧則弱急舂硬肺虧則毛多胃少左腎虧則石多胃少右腎虧則虛浮恍澀假若元真兩憊則龍雷之火散於外釜底寒陰起於內飲食入胃輒飽脹厄逆回酸吐噦完穀不化盡顯火力不能泌蒸之症以致胃氣盡絶六臟真神獨見內經曰皆真臟即死脈也絶脈也如此分胃分神何等透徹誠於鉤多胃少弦多胃少毛多胃少石多胃少弱急舂硬虛浮恍澀之時驟建真元急退寒陰庶龍雷關鎖不擾斯盡善矣如或認脈欠的邪正猜疑虛實無憊補瀉妄施則龍雷熯燎於上釜底寒生於下穀氣斷絶於中一八但鉤無胃但弦無胃但毛無胃但石無胃急散無胃軟散無胃雖岐黃之聖惡能斷鰲立極於無有之鄉哉脈有先天后天之要察精氣神之隱微無過乎脈象分脈象中之平病死不離乎精氣神三者大要又在先天后天苟能留心細察則壽夭窮通吉凶邪正無不蘊蓄其中矣先天乃人身元精元氣元神後天系人身凡精凡氣凡神元精主氤氳凡精主交媾元氣主升降凡氣主呼吸元神主恬淡凡神主欲慮元神主悟性凡神司記性元氣藏皮肉凡氣發皮外元精沖臟腑凡精潤皮毛先後兩旺氣色均善先後兩憊氣色俱凶先天獨用有氣無色曰困後天獨用有色無氣曰憊脈象中之先天后天元神至則體象虛靈為六臟脈中之主宰凡神現則體象圓活為六臟沖和之本脈元氣至則輕舒沖和凡氣至則力強活健元精至則流暢圓通凡精至則停勻潤澤元精失則枯澀搏堅凡精失則浮躁瞤惕元氣失則斷續參差凡氣失則短縮滯缺元神失則飄搖閃走凡神失則慌忙急促先天為脈中主宰動應指心後天為脈象濡潤溫柔軟款三元並失脈象中空而軟散三凡並失脈象中急而硬散先後俱喪為臟真絶脈先天為陽火後天為陰火脈象之大要陽舒陰慘陽靜陰躁陽軟陰硬陽和陰烈陽通陰滯陽聚陰散陽滑陰澀先天秉父母之所鍾受天地之滋長後天賴五穀之栽培假五味之滋灌飽於谷則傷合於味則泄縱於欲則損恣於情則漏過於漏則精竭精竭則氣脫氣脫則神離神離則後天盡矣後天既喪先天豈能獨存也夫先天猶山澤也後天猶草木也草木非出澤不能滋長山澤無草木不能陰藏誠能融會先天后天入脈自於醫道神矣
