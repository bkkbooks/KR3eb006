body:
  text: 卷二先天根本論夫元黃未兆天一之水先生胚體未成兩腎之元先立蓋嬰兒未成先結胞胎其象中空一莖直起形如蓮蕊一莖即臍帶蓮蕊即兩腎也而氤氳一點元陽之為命者寓於中焉水生木而後肝成木生火而後心成火生土而後脾成土生金而後肺成五藏既成六府隨之四肢乃具百骸乃全仙經曰借問如何是元牝嬰兒初生先兩腎未有此身先有兩腎故腎為臟腑之本十二脈之根呼吸之主三焦之源而人資之以始者也故曰腎水者先天之根本也一點元陽寓於兩腎之間是為命門蓋一陽居二陰之間所以位乎北而成乎坎也人非此火無以運行三焦腐熟水穀內經曰少火生氣仙經曰兩腎中間一點明逆為丹母順為人夫龍潛海底龍起而火隨之元陽藏於坎府運用應於離宮此生人之命根也乃知陽火之根本於地下陰火之源本於天上故曰水出高源又曰火在水中夫水火者陰陽之徵兆天地之別名也獨陰不生孤陽不長天之用在於地下地之用在於天上則天地交通水火混合而萬物生焉古之神聖察腎為先天根本故其論脈者曰人之有尺猶樹之有根枝葉雖枯稿根本將自生傷寒危篤寸口難稽猶診太溪以卜腎氣夫精也者水之華也神倚之如魚得水氣依之如霧覆淵神必依物方有附麗精竭神散勢之自然方其為嬰兒也未知牝牡之合而勃然能作精之至也純純全全合於天方溟溟清清合於無淪年十六而真精滿始能生子精泄之後乾破而為離真體已虧不知節嗇則百脈空虛不危何待世有以固精采補者是大不然男女交接必擾其腎外雖不泄精已離宮必有真精數點隨陽之痿而溢出如火之有煙焰豈能復返於薪哉是故貴寡欲然損精傷腎是非一端若目勞於視精以視耗耳勞於聽精以聽耗心勞于思精以思耗體勞於力精以力耗隨事節之則精與日俱積矣是故貴節勞腎司閉藏肝主疏泄二臟皆有相火其系皆上屬於心心君火也怒傷肝而相火動則志泄者用事而閉藏者不得其職雖不交合精已暗耗矣是故貴息怒酒能動血飲酒則身面俱赤是擾其血也數月不近色精已凝厚一夜太醉精隨薄矣是故宜戒酒經曰精不足者補之以味然膏粱之味未必生精恬淡之味最能益精洪範論味而曰稼穡作甘世間之物惟五穀得味之正淡食五穀大能養精經曰胃為水穀氣血之海化榮衛而潤宗筋又曰陰陽總宗筋之會而陽明為之長故胃強則腎充而精氣旺胃病則精傷而陽事衰也靈樞曰生之來謂之精此先天元生之精也素問曰食氣入胃散精於五臟此水穀日生之精也然日生之精皆從元氣所化而後分布其臟盈溢則輸之於腎故曰五臟盛乃能泄若飲食之精遇一臟有邪則一臟之食味化之不全不得與元精俱藏而時自下矣故腎之陰虛則精不藏肝之陽強則氣不固若遇陰邪客於竅與所強之陽相感則精脫而外淫矣陽強者非真陽之強乃肝之相火強耳夫五臟俱有火惟相火之寄於肝者善則發生惡則為害獨甚於他火其陰器既宗筋之所聚凡人入房強於作用者皆相火充其力也若遇接內與陰氣合則三焦上下內外之火翕然下從百體元府悉閉其滋生之精盡會於陰器以躍出豈止腎所藏者而已哉有年老彌健或問其故曰曾讀文選石韞玉而山暉水懷珠而川媚於斯二語悟得葆精之道故足於精者百疾不生窮於精者萬邪蜂起先哲洞窺其本力免固全遇症之虛者亟保北方以培生命之本水不足者壯水之主以制陽光六味丸是也火不足者益火之元以消陰翳八味丸是也只於年力方剛尺脈獨實者微加炒枯知柏抑其亢炎奈昧者遂為滋陰上劑救水神方不問其實而概投之不知知母多則腸胃滑黃柏久則腸胃寒陽明受賊何以化榮衛而潤宗筋髓竭精枯上消下泄而幽潛沉冤此皆守河間有熱無寒之論丹溪陽常有餘之説貽禍如此其烈耳致求正録云朱劉之言不息則軒岐之澤不彰誠斯道之大魔亦生人之厄運也雖其言未免過激然亦補偏救弊之一片苦心也後天根本論夫人墮地一聲之後命曰後天後天之根本脾胃是也脾胃屬土土為萬物之母易曰至哉坤元萬物資生是以胃者衛之源脾者榮之本脾胃者即後天元氣也針經云榮出中焦衛出上焦然胃為陽益之必以辛脾為陰補之必以甘辛甘相合脾胃健而榮衛通經曰脾胃者倉廩之官五味出焉又曰食入於胃散精幹肝淫氣於筋濁氣歸心淫精於脈脈氣流經氣歸於肺飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行合於四時五臟陰陽揆度以為常也是知水穀入胃灑陳於六腑而氣至焉和調於五臟而血生焉行於百脈暢於四肢充於肌肉而資之以為生者也故曰安穀者昌絶谷者亡蓋人生一日不再食則飢七日不食則腸胃竭絶而死矣人之有脾胃猶兵家之有餉道也餉道一絶萬衆立散脾胃一敗百藥難施上古聖人見土為後天之根本故其著之脈者曰四時以胃氣為本有胃氣則生無胃氣則死是以傷寒當危困之候診衝陽以察胃氣之有無衝陽應手則回生有日衝陽不應則坐而待斃矣東垣先生深窺經旨獨著脾胃論以醒提聾瞶其言胃中元氣盛則能食不傷過時而不飢脾胃俱旺能食而肥脾胃俱虛不能食而瘦善食而瘦者胃伏火邪於氣分則能食脾虛則肌肉削或曰血實氣虛則體易肥氣實血虛則體易瘦也凡七情箋其內六氣攻其外皆足以致虛惟飲食與勞倦兩端其關尤大經曰飲食自倍腸胃乃傷又曰水穀之寒熱感則害人六腑夫飲者水也無形之氣也經曰因而大飲則氣逆或為喘咳或為水腫或為嘔吐之類食者物也有形之血也經曰因而飽食經脈橫解腸澼為痔或為脹滿或為積聚或為吐利之類此所謂飲食傷也經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣熏胸中故內熱又曰勞則氣耗勞則喘息汗出內外皆越故氣耗矣有所勞倦皆損其氣氣衰則虛火旺旺則乘脾脾主四肢故因熱無氣以動懶於言語動則喘乏表熱自汗心煩不安此所謂勞倦傷也蓋人受水穀之氣以生所謂清氣營氣衛氣皆胃氣之別名也胃為水穀之海五臟六腑皆受灌輸若起居失度飲食失節未有不傷脾胃者也脾胃一傷元氣必耗心火獨炎心火即下焦陰火心不主令相火代之火與元氣勢不兩立一勝則一負陰火上衝氣高而喘身熱而煩脾胃之氣下陷穀氣不得升浮是春生之令不行無陽以護其營衛乃生寒熱經曰勞者溫之損者溫之又曰溫能除大熱最忌苦寒反傷脾胃東垣於勞倦傷者立補中益氣湯純主甘溫兼行升發使陽春一布萬物敷榮易老於飲食傷者立枳朮丸一補一攻不使通化但使胃強不復傷耳此皆炎黃之忠藎後進之標的也羅謙甫更發其旨故云脾虛少食不可克伐補之自然能食是則更有法焉東方之仇木宜安恐木實則侮土而厥張也西方之子金宜顧恐子虛則竊母以自救也若夫少火實為生氣之元故中央之土虛者則有補母之論存焉許學士云腎虛不能化食譬如釜中水穀下無火力何能熟耶嚴用和云房勞過度真陽衰弱不能上蒸脾土中州不運以致飲食不消脹滿痞塞須知補腎腎氣若壯丹田火盛上蒸脾土土溫自治矣統而論之脾具坤順之德有乾健之運坤德或慙補土以培其卑監乾健稍弛益火以助其轉運此東垣謙甫以補土立言學士用和以壯火垂訓土強則出納自如火強則轉輸不怠火為土母虛則補其母此治病之常經也世俗一遇脾胃虛滯便投曲卜楂芽香砂枳朴甚而黃連山梔以為脾胃良方而夭枉者不可勝數矣不知此皆實則瀉子之法因脾胃有積聚實火元氣未衰邪氣方張用破氣之劑以瀉肺金主氣之藏若虛而伐之則愈虛虛而寒之且遏絶真火生化之元矣有不敗其氣而絶其谷乎最而異者以參術為滯悶之品畏之不啻砒毒獨不聞經云虛者補之勞者溫之又曰塞因塞用乎又不聞東垣云脾胃之氣實則枳實黃連瀉之虛則白朮陳皮補之乎又不聞丹溪云實火可瀉芩連之屬虛火可補參耆之屬乎凡飲食初傷壅成濕熱元氣未敗黃連楂曲暫其宜也但土喜暖而惡寒過劑則脾陽愈弱而轉化愈難矣至若病稍日久元氣必虛陽氣不充陰寒為祟反服黃連無異於入井而反下石耳經曰飲食勞倦損傷脾胃始受熱中末受寒中則始宜清熱終宜溫養灼然有辨豈無先後次第者乎且聖人治未病不治已病故既濟之象曰君子以思患而預防之隨之象曰君子以嚮晦入晏息頤之象曰君子以節飲食豈非明飲食勞倦之足以傷生耶故養生家尤亟於養氣行欲徐而穩言欲定而恭坐欲端而直聲欲低而和常於動中習靜使此身常在太和元氣中長生祕典曰內勞神明外勞形質俱足夭折惟房勞為甚為其形與神交用精與氣均傷也語云修養不如節勞服藥不如忌口斯言頗切理要誠能使土強而臟腑俱安則後天之根本不損營衛中和而長有天命矣水火立命論夫人何以生生於火也人生於寅寅者火也火陽之體也造化以陽為生之根人生以火為命之門儒者曰天開於子子為元醫者曰人生於水腎為元孰知子為陽初也腎為火藏也陰生於陽故水與火為對名而火不與水為對體其與水為對者後天之火離火也其不與水為對者先天之火乾火也夫乾陽之純也夫陽火之生也夫水火之原也後天之火有形而先天者無形有形之火水之所克無形之火水之所生然取水者迎月之光而不迎其魄何也魄陰也而光借於日則陽也水不生於水而生於火明也故其藏於水也其象在坎一陽陷於二陰之中而命門立焉蓋火也而腎水寄之矣而其生於火也其象在乾純陽立於離卦之先左旋而坎水出焉右旋而兌水納焉蓋水也而陰陽之火則分而寄之矣此所謂後天中之先天也陽生陰寄運於三焦水升火降所謂既濟故養生莫先於養火奈何世之人並不究其由來惟知氣血則曰氣陽血陰惟知臟腑則曰臟陰腑陽即知水火者不過離心坎腎而已孰知氣血更有氣血之根陰陽更有真陰真陽之所水火更有真水真火之原也凡暴病而卒死絶處而得生者皆在乎根本真處而得之非泛泛在乎氣血間也學者能明水火為氣血之根水火為真陰真陽之所芎歸辛竄僅可調榮難補真陰真水苓朮甘草僅可調衛難補真陽真火即炮薑炙草僅可溫中難到腎經其為水火真陰真陽之寶者惟仲景八味而已故不求真陰真陽而欲求生者用四君四物以補真陰真陽者並不達水火立命之本真陰真陽之至理者也調護水火論經曰精氣奪則虛又曰邪之所湊其氣必虛虛者空也無也譬諸國內空虛人民離散則盜賊蜂起鎮撫為難若非委任賢智安靖休養以生息之安可保其無事也病之虛者亦猶是已經曰不能治其虛安問其餘蓋言虛為百病之本宜首舉以冠諸症也然充足空虛者氣血也化生氣血者水火也水火者生身之本神明之用也靈樞曰水之精為志火之精為神然水火宜平不宜偏宜交不宜分火性炎上故宜使之下水性就下故宜使之上水上火下名之曰交交則為既濟不交則為未濟交者生之機不交者死之徵也如消渴症不交火偏虛也水氣症不交水偏盛也少火者陽也氣也與水為對待者也水為陰精火為陽精二物匹配名曰陰陽和平亦名少火生氣如是則諸病不作可得長生矣倘不善攝養以致陰虧水涸則火偏勝所謂陰不足則陽必湊之是為陽盛陰虛亦曰壯火食氣是知火即氣也氣即火也東垣云火與元氣不兩立蓋水火既濟火即為真陽之氣及其偏也則即陽氣而為火矣始與元氣不兩立而成乖否之象焉故戴人曰莫治風莫治燥治得火時風燥了苟能解此則已達陰陽水火之原曲暢旁通何施不可但重養陰者謂人之一身水一而已火則二焉陽常有餘陰常不足自老至少所生疾病靡不由於真陰不足況節欲者少嗜欲者多以致陰水愈虧陽火愈旺奈陰道難長峻補亦無旦夕之功故補陰之品自少至老不可一日間斷其補陽之藥勸戒諄諄雖然性稟不同陽盛人補陰固宜陰盛人補陽尤要況陰從陽長單滋陰分徒傷胃氣反絶後天生化之源要知純陰之藥則多肅殺閉藏之氣何有陽和化育之功哉況天地以陽為生之根人生以火為命之門天開於子而陽生焉是子為陽之本而為先天人生於寅而火兆焉是寅為火之母而為後天火者生之本也陽者火之用也故曰天非此火不能化生萬物人非此火不能有生天之陽氣能交於下地之陰氣能交於上人之真火能藏於下則真水能布於上陽施陰化之氣克昭氣血和平之長日旺蓋陰陽之精互藏其宅陰中有陽陽中有陰故心火也而含赤液腎水也而藏白氣赤液為陰白氣為陽循環往來晝夜不息此常度也苟不知攝養縱恣情欲虧真陰陽無所附因而發越上升此火空則發之義是周身之氣並於陽也並於陽陽愈盛而陰愈虧由是上焦發熱咳嗽生痰迫血吐衄頭痛煩躁胸前骨痛口乾舌苦五心煩熱潮熱骨蒸小便短赤此其候也久則孤陽不能獨旺無根之火豈能長明經所謂壯火蝕氣氣亦弱矣而陽亦虛焉由是飲食不化泄瀉無度丹田不暖筋骨無力夢遺精滑眩暈自汗卒倒僵仆此其候也然少陰臟中重在真陽陽不回則邪不去厥陰臟中職司藏血血不養則脈不起故治之者陽甚虛補陽以生陰使陰從陽長也陰甚虛補陰以配陽使陽從陰化也陰陽調和百病消解若以偏重或陰或陽執見則不惟設藥以救偏而反增偏害之至矣乙癸同源論古稱乙癸同源腎肝同治其説維何蓋火分君相君火者居乎上而主靜相火者處乎下而主動君火惟一心主是也相火有二乃肝與腎腎應北方壬癸於卦為坎於象為龍龍潛海底龍起而火隨之肝應東方甲乙於卦為震於象為雷雷藏澤中雷起而火隨之澤也海也莫非水也莫非下也故曰乙癸同源東方之木無虛不可補補腎即所以補肝北方之水無實不可瀉瀉肝即所以瀉腎至於春升龍不現則雷無聲及其秋降雷未收則龍不藏但使龍歸海底必無迅發之雷但使雷藏澤中必無飛騰之龍故曰腎肝同治東方者天地之春也勾萌甲坼氣滿乾坤故在人為怒怒則氣上而居七情之升在天為風風則氣鼓而為百病之長怒而補之將逆而有壅絶之憂風而補之將滿而有脹悶之患矣北方者天地之冬也草黃木落六宇蕭條在人為恐恐則氣下而居七情之降在天為寒寒則氣慘而為萬象之衰恐而瀉之將怯而有癲僕之虞寒而瀉之將空而有涸竭之害矣然木既無虛又言補肝者肝氣不可犯肝血自當養也血不足者濡之水之屬也壯水之源木賴以榮水既無實又言瀉腎者腎陰不可虧而腎氣不可亢也氣有餘者伐之木之屬也伐木之乾水賴以安夫一補一瀉氣血攸分即瀉即補水木同府總之相火易上身中所苦瀉木所以降氣補水所以制火氣即火火即氣同物而異名也故知氣有餘便是火者愈知乙癸同源之義矣然時醫多執肝常有餘之説舉手便云平肝殊不思經曰東方木也萬物所以始生也聖濟經云四時之所化始於木十二經之所養始於春女子受娠一月是厥陰肝經養之肝者乃春陽發動之始萬物生化之源故戒怒養陽使先天之氣相生於無窮是攝生之切要也蓋春屬肝木乃吾身升生之氣此氣若有不充則四臟何所稟承如春無所生則夏長秋收冬藏者將何物乎五行之中惟木有發榮暢茂之象水火金土皆無是也使天地而無木則世界黯淡其無色矣培之養之猶恐不暇而尚欲剪之伐之乎故養血和肝使火不上炎則心氣和平而百骸皆理況腎主閉藏肝主疏泄是一開一闔也俗云肝有瀉無補不知六味地黃湯七寶美髯湯等劑皆補肝之藥也人特習而不察耳辨宗氣衛氣營氣靈樞曰五臟者所以藏精神魂魄者也六腑者所以受水穀而化行物者也其氣內於五臟而外絡肢節其浮氣之不循經者為衛氣其精氣之行於經者為營氣陰陽相隨外內相貫如環之無端故經曰治病之道氣內為寶真萬古醫者之格言也靈樞曰審察衛氣為百病母蓋人身之中惟氣而已宗氣者丹田先天之大氣也猶天地之有太極也衛氣者健運周身之陽氣也猶太極之動而生陽也營氣者根中守固之陰氣也猶太極之靜而生陰也天地間惟氣以為升降而水則從氣者也故天包水水承地一元之氣升降於太虛之中水不得而興也故潮之往來常隨氣耳非潮自能然也人身亦惟以氣為主而血則猶水不可以血即為營氣也彼謂血即為營者非經旨也靈樞營衛生會篇謂營氣化血以奉周身則營氣始能化血焉可以血為營耶故氣而云宗者元氣之宗也氣而云衛者固表而捍外也氣而云營者守營而固中也宗氣也營氣也衛氣也可不細辨歟化源論經曰資其化源又曰治病必求其本又曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也垂訓諄諄無非專重本源耳苟捨本從標不惟不勝治終亦不可治故曰識得標只取本治千人無一損如脾土虛者溫暖以益火之源肝木虛者濡潤以壯水之主肺金虛者甘緩以培土之基心火虛者酸收以滋木之宰腎水虛者辛潤以保金之宗此治虛之本也木欲實金當平之火欲實水當平之土欲實木當平之金欲實火當平之水欲實土當平之此治實之本也金為火制瀉心在保肺之先木受金殘平肺在補肝之先土當木賊損肝在生脾之先水被土乘清脾在滋腎之先火承水制抑腎在養心之先此治邪之本也金太過則木不勝而金亦虛火來為母復仇木太過則土不勝而木亦虛金來為母復仇水太過則火不勝而水亦虛土來為母復仇火太過則金不勝而火亦虛水來為母復仇土太過而水不勝而土亦虛木來為母復仇皆亢而承製法當平其所復扶其不勝經曰無翼其勝無贊其復此治復之本也至於陰陽生克虛實真假意會無窮難可言盡即六淫易著然風兼寒當從溫散兼熱當從辛涼寒獨寒當從溫補兼濕當從溫滲中暑當從清解傷暑當兼益氣濕外受當從發散內生當從燥滲濕寒溫散濕熱清利燥本枯稿之象大半火爍金水受傷然亦有陰寒太過津液收藏猶肅殺凜冽之後陽和之水皆成堅冰燥裂矣火之原原在水中而與元氣勢不兩立故有火者必元氣傷者半陰水虧者半正治益熾從治乃息惟驟受外邪者暫行清利但六淫皆為客氣未有不乘內傷傷多傷少孰實孰虛標本既明輕重乃別斯無誤矣尊生救本論經曰精神內守病安從來又曰邪之所湊其氣必虛不治其虛安問其餘可知虛為百病之由治虛為去病之要故風寒外感表氣必虛飲食內傷中氣必弱易感寒者真陽必虧易傷熱者真陰必損正氣旺者雖有強邪亦不能感感亦必輕故多無病病亦易愈正氣弱者雖即微邪亦得易襲襲則必重故最多病病亦難瘥治之者明此標本輕重之道以投顧主逐客之方則重者輕而輕者愈要知精神內長於中邪氣自解於外精神耗散於內即我身之津液氣血無所主宰皆可內起為火為痰而成邪豈必待外因所致哉倘不知此徒知或從表以發散或從里以克削現在已有之虛不為補救未來無形之邪妄肆祛除有是病者病受何妨無是病者正氣益困以致精神疲憊性命昏沉若不急為猛省峻加挽救之功何以續一息於垂絶奈俗以虛極不可大補些小調益何異深沉海底輕舒一臂之力以望救溺之功哉況有復加峻削寒涼者更似入井而反下石耳且諸病不論虛實未有不發熱者然此熱非從外來即我所仗生生之少火有所激而成壯火為壯熱也故壯火即由少火之變少火非火乃丹田生生真元之陽氣一呼一吸賴以有生即人之受胎先稟此命經曰一息不運則機緘窮故此火也氣也皆為無形有神有情而為生身之至寶是真陽之宗也元氣之本也化生之源也長生之基也命門坎宮是其宅也蒸腐水穀化生精華得其平則安其位萬象泰然生生無窮失其平則離其位而為旺火反為元氣之賊浮遊乎三焦蒸爍乎臟腑炮熾乎肌肉而為病矣不治此火則何以去病然欲去此火更何以得生則有因所因以調之安之從之撫之以平而已則火不去而安全無恙病既退而元氣無傷則火原為我用之至寶矣若惡其熱而滅其火非滅火也是滅氣也以無形無情之藥妄攻無形有情之氣欲不受傷其可得乎但火空則發若不大為填塞其空焉可御其乘空炎上之勢若欲火退而後補孰知火之為害甚速而與元氣不兩立所謂壯火蝕氣火熾氣日消亡且火之為用每挾風木之象力窮乃止止則火息陽亡脫症俱備方議補之已無受補之具矣況有進濃雲驟雨之藥益令龍雷妄熾以速焚爍之害哉倘稟受壯盛或從寒涼折之而愈者但病愈之後必真氣漸衰精神不長縱先天真元不足者若從本調治則病去之後發生之勢日隆後天之長反旺故曰識得標只取本治千人無一損正重此也今人勿察其源僅從膚見以寒治熱以熱治寒陰陽真假之象從治正治之宜顧本窮源之要置之勿問以致夭枉日多先後俱薄矣學者不可不潛心默會其旨乎諸病求源論人之有生初生兩腎漸及臟腑五臟內備各得其職五象外布而成五官為筋為骨為肌肉皮毛為耳目口鼻軀殼形骸然究其源皆此一點精氣神遁變而凝成之也猶之混沌未分純一水也水之凝成處為土為石為金皆此一氣化源故水為萬物之原土為萬物之母然無陽則陰無以生故生人之本火在水之先也無陰則陽無以化故生人之本水濟火之次也經所謂陽生陰長而火更為萬物之父者此耳是以維持一身長養百骸者臟腑之精氣主之充足臟腑固注元氣者兩腎主之其為兩腎之用生生不盡上奉無窮者惟此真陰真陽二氣而已二氣充足其人多壽二氣衰弱其人多夭二氣和平其人無病二氣偏勝其人多病二氣絶源其人則死可見真陰真陽者所以為先天之本後天之命兩腎之根疾病安危皆在乎此學者僅知邪襲而不知乘乎內虛僅知治邪而不知調其本氣僅知本氣而不知究其臟腑僅知臟腑而不知根乎兩腎即知兩腎而不知由乎二氣是尚未知求本者也何況僅以軀殼為事頭痛救頭腳痛救腳而不知頭腳之根在臟腑者何以宰司命之任而體好生之道歟故先哲云見痰休治痰見血休治血無汗不發汗有熱莫攻熱喘生無耗氣精遺勿澀泄明得箇中趣方是醫中傑真求本之謂也臟腑心腎貴賤論夫貴臟而賤腑書未講明醫多忽略視為尋常而不推究以致輕重標本不知其所矣以臟腑統而言之則臟如一家之主人也各藏其神魂意魄志為神明之用以運用於上傳注於下此所謂勞其心者也腑如一家中之奴婢塊然無知者也承接上令各司乃職溲便糟粕傳運啓閉此所謂勞其力者也勞力者但勞其形骸而不耗其神氣重濁象地濁陰養之如藜藿之民習以為常雖勞庸何傷也故多無病病而易治勞心者所耗皆其精華而非糟粕輕清象天多動少靜七情之為害惟多陰精之上奉實少況如膏粱子弟體質嬌嫩勞易傷傷難復也故易多病病亦難治以五臟指而言之惟心腎兩家更勞猶一家中之主父主母離坎互為其配水火互為其根蓋神明之用無方無體誠難言也然樞機萬物神思百出者非心之用乎更曰思之為害甚於欲以勞心過極並及於腎腎藏志也所以有無子責乎心發白責乎腎之語以其陰精上耗也離陰既耗乎上坎水豈能獨充乎下況節欲者少嗜欲者多上下更有分消者乎故其病更多更深而尤難治也故臟者藏也陰也宜藏而不宜見經曰陰者真臟也見則為敗敗必死也又曰五臟者藏精氣而不瀉也六腑者傳化物而不藏也故臟無瀉法至於腎者尤為主蟄封藏之本精之處也有虛無實更無瀉之之理矣真陰真陽論人身之陰陽相抱而不脫是以百年有常故陽欲上脫陰下吸之不能脫也陰欲下脫陽上吸之不能脫也蓋陰陽互為其根陰根於陽陽根於陰無陽則陰無以生無陰則陽無以化從陽而引陰從陰而引陽各求其屬而窮其根人知氣血為陰陽而不知火為陽氣之根水為陰血之根猶日為火之精故氣隨之月為水之精故潮隨之也人身心肝脾肺腎五行具存而所以運行於五臟六腑之間者有無形之相火行陽二十五度無形之腎水行陰二十五度而其根則原於先天太極之真此所以為真也一屬有形便為後天而非真矣非根矣要之天包地外地處天中天地一太極也人以一陽陷於二陰之中陰中有陽男子陰內陽外女子陽內陰外人之一太極也然二者陰也後天之形一者陽也先天之氣神自氣化氣本於天故生髮吾身者即真陽之氣也形以精成精生於氣故立吾身者即真陰之精也經曰女子二七天癸至男子二八天癸至又曰人年四十而陰氣已半丹溪乃謂陽常有餘陰常不足不知天癸未至本由乎氣而陰自半亦由乎氣是形雖屬陰而氣則從陽也陽來則生陽去則死陽全陰固陽脫陰敗故經云陽氣者若天與日失其所則折壽而不彰可見人生仗此一點真陽而為運行不息孰謂陽常有餘而以苦寒之味伐之乎天癸者天一所生之真水也在人身是謂元陰即曰元氣人之未生此氣根於父母謂之先天元氣人之既生此氣蘊於吾身謂之後天元氣但氣之初生真陰甚微及至既盛精血乃旺然必真陰足而後精血化是真陰在精血之先精血在真陰之後是先天之真陰為後天精血之根也若以天癸即精血論則女子七七男子八八而天癸絶其周身之精血何以仍運行於榮衛之中而未嘗見其枯竭也夫陰陽者虛名也水火者實體也寒熱者天之淫氣也水火者人之元氣也淫氣湊邪可以寒熱藥攻之真元致病即以水火之真調之然不求其屬投之不入先天水火原屬同宮火以水為主水以火為原故取之陰者火中求水其精不竭取之陽者水中尋火其明不熄彼誤認水火為心腎無怪後人之懵懂也至人有偏陰偏陽者此氣稟也大陽之人雖隆冬身不著綿口常飲水色欲無度大便數日一行芩連知柏恬不知怪大陰之人雖暑月不離復衣飲食稍涼便覺腹痛泄瀉參朮薑桂時不絶口一有欲事呻吟不已兩等人者各稟陰陽之一偏者也則人之受病以偏得之用藥必救其偏以寒治熱以熱治寒此方士之繩墨也然而苦寒頻進而積熱彌熾辛熱一投而沉寒益滋者何耶此不知陰陽之屬也經曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也故云寒之不寒是無水也熱之不熱是無火也無水者壯水之主以鎮陽光無火者益火之原以消陰翳達至理於繩墨之外也且以臟腑脈病論之六腑者表也陽也五臟里也陰也表之脈陽也里之脈陰也關前陽也關後陰也病之熱者陽也病之寒者陰也症之躁者陽也症之靜者陰也而有假陰假陽者多以誤人如大熱發躁口渴舌燥非陽症乎視其面色赤此戴陽也切其脈尺弱而無力寸關豁大而無倫此係陰盛於下逼陽於上假陽之症以假寒之藥從其性而折之頃刻平矣如惡寒身不離復衣手足厥冷非陰症乎視其面色滯切其脈澀按之細數而無力此係假寒之症寒在皮膚熱在骨髓以辛涼之劑溫而行之一汗而愈凡此皆真氣之不固故假者得以亂其真假陽者不足而示之有餘也假陰者有餘而示之不足也故河間曰夏熱太甚林木流津火極似水也冬寒太甚流水冰堅陰極似陽也夫陰脈有沉有數有緊仲景統以微細言之蓋沉必重按始得緊數亦在沉細中見不似陽症浮大而緊數也薛氏曰人知數為熱不知沉細中見數為寒甚真陰寒症脈常有七八至者但按之無力而數耳宜深察之經曰亢則害承乃制也如冬至陰盛極陽生承之此所謂陽盛亢則害陰承乃制之然冬至一陽生當漸向暖和何為臘月大寒冰雪反盛夏至一陰生當漸向清涼何為三伏溽暑酷熱反熾乎曰此將來者進成功者退隱微之際未易以明也蓋陽伏於下則逼陰於上井水氣蒸而堅冰至也陰盛於下則逼陽於上井水寒而雷電合也今人病面紅口渴煩躁喘咳者誰不曰火盛之極抑莫知其為腎中陰寒所逼耳以寒涼之藥進而斃者不知其幾矣冤哉總之陰陽之理變化無窮而治法之要有扶陽抑陰之微權有以陽生陰之妙用不獨滋陰養陽為燮理陰陽之道也如補陽用參耆之屬補陰用歸地之屬補真陰真陽不求之氣血而求之水火陽虛則惡寒以辛溫散之陰虛則發熱以甘溫調之古人立方義固顯然若夫治血必先理氣血脫益氣以陽統乎陰血隨乎氣務使陽生陰長故補血一湯以黃耆為君而當歸為臣也又如失血熱甚欲絶者則有獨參湯以有形之血不能速生幾微之氣所當急固蓋陰陽之妙原根於無也至於陽氣下陷者用味薄氣輕之品若柴胡升麻之類舉而揚之使地道左旋而升於九天之上陰氣不降者用感秋氣肅殺而生之品若瞿麥扁蓄之類抑而降之使天道右旋而入於九地之下此東垣補中益氣湯開萬世無窮之利不必降也升清則濁自降矣夫聖人裁成天地之化補相天地之宜於用藥之下按陰陽而分寒熱溫涼辛甘酸苦咸之辨凡辛甘者屬陽溫熱者屬陽寒涼者屬陰酸苦者屬陰陽主生陰主殺司命者欲人造殺而就生甘溫者用之辛熱者用之使共躋乎春風生長之域一應苦寒者俱不輕用不特苦寒不輕用至於涼者亦少用蓋以涼屬秋氣萬物逢秋不長矣嗚乎醫可不明乎陰陽之道哉五運六氣舉要內經曰五運陰陽者天地之道也古人有言不明五運六氣檢遍方書何濟然理奧詞微卒難悟解學者所當切究也夫五運六氣天道之常變在焉四時之常者春溫夏熱秋涼冬寒是也一日之常者朝涼午熱夕溫夜寒是也四時之變者冬有非時之溫夏有非時之寒春有非時之涼秋有非時之暖一日之變者或朝溫而午寒或夕涼而夜熱時日之常變如此也而地氣又有不同者西北高燥多寒東南卑濕常溫經曰至高之地冬氣常在至下之地春氣常在崇高則陰氣治之汗下則陽氣治之此之謂也故方土不齊寒暄不等而病亦因之而異善言理氣者隨機觀變方達古人未發之旨耳夫運氣之理小大不遺雖有微疴罔不由期若時行疫病尤為最緊者茲各明其大要惟願醫者先知受病之因不致妄投湯藥誤人性命斯可矣運氣舉原夫五運者天干之陰陽合而為五也甲己合為土運化陽土合胃化陰土合脾也乙庚合為金運化陰金合肺化陽金合大腸丙辛合為水運化陽水合膀胱化陰水合腎丁壬合為木運化陰木合肝化陽木合膽戊癸合為火運化陽火合小腸化陰火合心屬相火陽火合三焦陰火合包絡相火代君火而行令者也此五運合藏府之義也六氣者地支陰陽合而為六也子午主少陰君火合心與小腸丑未主太陰濕土合脾與胃寅申主少陽相火合三焦包絡卯酉主陽明燥金合肺與大腸辰戌主太陽寒水合膀胱與腎巳亥主厥陰風木合肝與膽此六氣合藏府之序也五運之節令以二十四氣五分分之為五運之五位也初運木大寒日交二運火春分後第十二日交三運土芒種後十日交四運金處暑後七日交終運水立冬後四日交此五運節令之序也六氣之節令以二十四氣六分分之為六氣之六步也初之氣厥陰自大寒至驚蟄二之氣少陰自春分至立夏三之氣少陽自小滿至小暑四之氣太陰自大暑至白露五之氣陽明自秋分至立冬終之氣太陽自小雪至小寒此六氣節令之序也若夫運有主運者主運行四時之常令也木火土金水各一氣木之氣風布春初之運也火之氣熱暑布夏二之運也土之氣濕布長夏三之運也金之氣燥布秋四之運也水之氣寒布冬終之運也氣有主氣者亦四時之常令也厥陰風木主春初之氣也少陰君火主夏二之氣也少陽相火主盛夏三之氣也太陰濕土主長夏四之氣也陽明燥金主秋五之氣也太陽寒水主冬六之氣也而客運則以所化統主本歲中氣運為初運五行相生以次輸取如甲巳年土運統之以土起初運土生金為二運金生水為三運水生木為四運木生火為五運餘四運皆仿土運起之乙丁己辛癸屬陰乾為五陰年主五少不及之運也甲丙戊庚壬屬陽干為五陽年主五大太過之運也平運者司天與運同氣也平氣之運正大寒日交不及之運大寒後十三日交太過之運大寒前十三日交木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍此名太過也木曰委和火曰伏明土曰卑監金曰從革水曰涸流此名不及也木曰敷和火曰升明土曰備化金曰審平水曰靜順此名平氣也客氣司天在泉間氣乃加臨主氣六位之客氣也司天者天之氣在泉者地之氣左右者陰陽之道路也司天之左右面北而定其位如子午之年少陰司天左太陰右厥陰也卯酉之年陽明司天左太陽右少陽也寅申之年少陽司天左陽明右太陰也巳亥之年厥陰司天左少陰右太陽也辰戌之年太陽司天左厥陰右陽明也丑未之年太陰司天左少陽右少陰也在泉之左右面南而定其位如子午之年陽明在泉左太陽右少陽也卯酉之年少陰在泉左太陰右厥陰也寅甲之年厥陰在泉左少陰右太陽也巳亥之年少陰在泉左陽明右太陰也辰戌之年太陰在泉左少陽右少陰也丑未之年太陽在泉左厥陰右陽明也陰陽之氣由下而升上故以在泉起之從在泉之左間由司天之右間至於司天從司天之左間由在泉之右間終於在泉在泉之左間為客初氣司天之右間為客二氣司天為客三氣勝之常也司天之左間為客四氣在泉之右間為客五氣在泉為客六氣復之常也經曰歲半以前天氣主之歲半以後地氣主之上下交互氣交主之蓋司天之氣始於地之右在泉之氣本乎天之左天地之氣互相感召又非獨天主上半歲地主下半歲也且五運有齊化兼化五運之中運統主一歲甲曰太宮土齊木化丙曰太羽水齊土化戊曰太徵火水齊化庚曰太商金火齊化壬曰太角木金齊化此五太過之年也太過則旺勝己者畏其旺反同其化名曰齊化乙曰少商火金兼化丁曰少角金兼木化己曰少宮木兼土化辛曰少羽土兼木化癸曰少徵水兼火化此五不及之年也不及則弱勝己者乘其弱來同其化名曰兼化也六氣有正化對化六氣之客氣同化一歲厥陰風木司巳亥亥木正化巳木對化少陰君火司子午太陰濕土司丑未少陽相火司寅申陽明燥金司卯酉太陽寒水司辰戌寅午未酉戊亥為正化正化者司化令之實主有餘也子醜卯辰巳申為對化對化者司化令之虛主不足也至於歲會者謂本運臨本支之位也如丁卯歲木運臨卯戊午歲火運臨午乙酉歲金運臨酉丙子歲水運臨子此是四正甲辰甲戌己丑己未土運臨四季此是四維也天符者謂中運與司天之氣相符也如丁巳丁亥木運厥陰木司天也戊子戊午少陰戊寅戊申少陽火運火司天也己丑己未太陰土運土司天也乙卯乙酉陽明金運金司天也丙辰丙戌太陽水運水司天也太乙天符者謂天符之年又是歲會是天氣運氣歲支三者俱會也如己丑己未中運之土與司天土同氣又土運臨丑未也乙酉中運之金與司天金同氣又金運臨酉也戊午中運之火與司天火同氣又火運臨午也同天符同歲會者謂在泉之氣與中運之氣同一氣者也陽年曰同天符如壬寅壬申木運厥陰木在泉也甲辰甲戌土運太陰土在泉也庚子庚午金運陽明金在泉也陰年曰同歲會如辛丑辛未水運太陽水在泉也癸卯癸酉癸巳癸亥火運少陰少陽火在泉也夫邪之中人在天符之年名曰中執法是犯司天之氣也天氣陽也陽性速故其病速而危也在歲會之年名曰中行令是犯在泉之氣也地氣陰也陰性徐故其病徐而持也在太乙天符之年名曰中貴人是犯司天在泉之氣也天地之氣俱犯故其病暴而難治也君相二火雖屬同氣相得然有順逆之嫌君火在上相火在下為順順則其病小也相火在上君火在下為逆逆則其病大也運氣總紀內經曰天以六為節地以五為制周天氣者六期為一備六氣一備終地紀者五歲為一周五運一周君火以明子午司天相火以位巳亥在泉五六相合而七百二十氣為一紀十五日為一氣凡三十歲千四百四十氣凡六十歲而為一周不及五少之運太過五太之運斯皆見矣甲己之歲土運統之甲己化土乙庚之歲金運統之乙庚化金丙辛之歲水運統之丙辛化水丁壬之歲木運統之丁壬化木戊癸之歲火運統之戊癸化火子午之歲上見少陰少陰君火司天陽明燥金在泉丑未之歲上見太陰太陰濕土司天太陽寒水在泉寅申之歲上見少陽少陽相火司天厥陰風木在泉卯酉之歲上見陽明陽明燥金司天少陰君火在泉辰戌之歲上見太陽太陽寒水司天太陰濕土在泉巳亥之歲上見厥陰厥陰風木司天少陽相火在泉少陰所謂標也子午司天之始厥陰所謂終也巳亥司天之終厥陰之上風氣主之風木少陰之上熱氣主之熱火太陰之上濕氣主之濕土少陽之上相火主之火熱陽明之上燥氣主之燥金太陽之上寒氣主之寒水所謂本也是真元一氣化而為六也氣有餘則制己所勝而侮所不勝如木剋土而及侮金之類其不及則己所不勝侮而乘之己所勝輕而侮之如金克本而土反凌木之類侮反受邪始於侮彼求勝終則己反受侮侮而受邪寡於畏也無所畏憚不能自保所以貴有承製也相火之下火亢金害水氣承之水制木生水位之下水亢火害土氣承之土製金生土位之下土亢水害風氣承之木製火生風位之下木亢土害金氣承之金制水生金位之下金亢木害火氣承之火制土生君火之下陰精承之水承火亢亢則害承乃制制則生化如火位於上而無承製則太過矣少生氣則不及矣有承製木生於下則火生而不亢矣蓋六氣各專一令專令者常太過過極則為亢亢甚則害作故各有所承乃以制其亢甚為害也制其太過則以生其不及則亢害者可化為和平矣夫五行之妙用在於相剋承乃制正所以轉五運而調六氣也此理氣之精義神而明之自處處人保身守家之道亦在其中蓋道無不在也茲總六十歲中運司天生克同氣而又分為六紀司天生中運甲子火生土癸巳木生火辛卯金生水甲午火生土癸亥木生火辛酉金生水甲寅火生土乙丑土生金壬辰水生木甲申火生土乙未土生金壬戊水生木此十二年天氣生運以上生下名曰順化為相得之歲也司天克中運庚子火剋金已巳木剋土丁卯金剋木庚午火剋金已亥木剋土丁酉金剋木庚寅火剋金辛丑土剋水戊辰水剋火庚申火剋金辛未土剋水戊戌水剋火此十二年天氣克運以上克下名曰天刑為不相得之歲也中運生司天壬子木生火辛巳水生木己卯土生金壬午木生火辛亥水生本己酉土生金壬寅木生火癸丑火生土庚辰金生水壬申木生火癸未火生土庚戌金生水此十二年運生天氣以下生上名曰小逆主微病也中運克司天丙子水剋火乙巳金剋木癸卯火剋金丙午水剋火乙亥金剋木癸酉火剋金丙寅水剋火丁丑木剋土甲辰土剋水丙申水剋火丁未木剋土甲戌土剋水此十二年運克天氣以下克上名曰不和主病甚也氣運相同戊子運氣皆火丁巳運氣皆木乙卯運氣皆金戊午運氣皆火丁亥運氣皆木乙酉運氣皆金戊寅運氣皆火己丑運氣皆土丙辰運氣皆水戊申運氣皆火己未運氣皆土丙戌運氣皆水此十二年運氣皆同皆天符也雖曰同氣不無偏勝亢害焉子午之紀甲子甲午上少陰火司天中太宮土運合化下陽明金在泉庚子庚午上少陰火司天中太商金運合化下陽明金在泉壬子壬午上少陰火司天中太角木運合化下陽明金在泉丙子丙午上少陰火司天中太羽水運合化下陽明金在泉戊子戊午上少陰火司天中太徵火運合化下陽明金在泉南政年脈兩寸不應北政年脈兩尺不應五行惟土為火土運所以為南政也南面行令則名南政南政年脈不應宜南面以觀之也金木水火四運皆為北政北面受令則名北政北政年脈不應宜北面以觀之也而政運之脈有不應者蓋以少陰所居之處言之也謂少陰所在脈乃沉細不應於診經曰少陰之至其脈鉤脈不應者謂脈不鉤也凡值此不應之脈乃歲運合宜命曰天和不必求治若誤治之反伐天和矣丑未之紀己丑己未上太陰土司天中少宮土運合化下太陽水在泉乙丑乙未上太陰土司天中少商金運合化下太陽水在泉丁丑丁未上太陰土司天中少角木運合化下太陽水在泉辛丑辛未上太陰土司天中少羽水運合化下太陽水在泉癸丑癸未上太陰土司天中少徵火運合化下太陽水在泉南政年脈左寸不應北政年脈右尺不應寅申之紀甲寅甲申上少陽相火司天中太宮土運合化下厥陰木在泉庚寅庚申上少陽相火司天中太商金運合化下厥陰木在泉壬寅壬申上少陽相火司天中太角木運合化下厥陰木在泉丙寅丙申上少陽相火司天中太羽水運合化下厥陰木在泉戊寅戊申上少陽相火司天中太徵火運合化下厥陰木在泉南政年脈左尺不應北政年脈右寸不應卯酉之紀己卯己酉上陽明金司天中少宮土運合