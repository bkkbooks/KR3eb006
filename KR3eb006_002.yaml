此即毋伐天和之謂也然尚有舍時從症之時也謂不明五運六氣檢遍方書何濟者正指後人不明五運六氣之所以而誤於方册之所載依而用之動輒成過則雖檢遍方書亦何益哉故張仲景華元化越人叔和並未嘗載有是説即六經治法之中亦並無一字及之且見性理所載元儒草廬吳氏天之氣運之中亦備載之益信其為天運氣數之法而非獨醫家治療之書也況流傳既久天地人物氣化轉薄亦難以同年而誤矣故宜知之者以明天氣歲氣立法之常也不可執之者以處天氣歲氣法外之變也天有寒暄早晚之不同人有盛衰時刻之迥別豈可以干支司歲一定之數以定無窮時刻盛衰之變哉天地六氣歌厥陰風木天風化少陰君火天熱化太陰濕土天雨化少陽相火天暑化陽明燥金天清化太陽寒水天寒化交六氣節令歌大寒初氣春分二小滿三兮大暑四秋分交著五之初小雪為終六之次逐年主氣歌初氣厥陰二少陰三四少陽太陰尋五六陽明並太陽主氣歲匕以次輪逐年客氣歌厥陰太陰與少陰少陽陽明並太陽客氣之行各不同豈能歲歲如其常子午太陽為初氣丑未初氣厥陰章寅申初氣少陰火卯酉初氣太陰強辰戌少陽相火初巳亥初氣陽明當初氣既明以次數由初至終如指掌三為司天終為泉合之五運察災祥司天歌子午少陰為君火丑未太陰臨濕土寅申少陽相火旺卯酉陽明燥金所辰戌太陽寒水邊巳亥厥陰風木主初氣起地之左間司天在泉對面數左右間氣歌初氣地左二天右三為司天歲半周四為天左五地右終氣在泉歲半後巳亥起厥陰順數看其年上是何字即其年分之司天前二位是初氣一位是二氣本位司天三氣後一位四氣二位五氣後三位在泉是終氣六十年六氣主病例甲子甲午庚子庚午丙子丙午戊子戊午壬子壬午十年初氣太陽水生木始大寒寅初初刻終驚蟄子初四刻上年巳亥大寒以前溫暖蟄蟲出此時乃冰霜復降陽氣鬱民得寒病腰痛至二月初炎暑初起中外瘡瘍二氣厥陰木生火始春分子正初刻終立夏戌正四刻風木客加君火主司天君火未盛寒氣時至木火應時民氣和人病淋目瞑目赤氣鬱於上而熱君火為病也三氣少陰君火合相火始小滿亥初初刻終小暑酉初四刻客氣君火司天加相火上火極水復熱極寒生寒氣時至二火交熾人病氣厥心痛寒熱更作咳喘目赤氣交夏至後立秋前上火下金水火寒熱持於氣交熱氣生於上清病生於下寒熱凌犯而爭於中人病咳喘血溢血泄噴嚏目赤眥瘍寒厥胃心痛腰痛腹大嗌乾腫上四氣太陰土主客同始大暑酉正初刻終白露未正四刻濕土盛溽暑至大雨時行寒熱互至大病寒熱嗌乾鼻衄黃疸飲發五氣少陽火剋金始秋分申初初刻終立冬午初四刻畏火臨暑反至陽乃化萬物乃長乃榮民乃康時寒氣熱陽邪盛也民病溫終氣陽明金生水始小雪午正初刻終小寒辰正四刻金客加水主金主收燥令行五行之餘火內格寒氣數舉人病腫上咳喘血溢肋下連少腹作寒乙丑乙未丁丑丁未己丑己未辛丑辛未癸丑癸未十年初氣厥陰木主客同巳初初刻卯初四刻客主皆風寒乃去濕土司天風濕相搏風勝濕雨後時風傷肝人病血溢筋絡拘強關節不利身重筋痿二氣少陰火主客同卯正初刻醜正四刻客主皆君火大火氣正太陰司天濕蒸相薄雨時降火盛氣熱大病瘟癘大行遠近咸若三氣太陰土主火土客寅初初刻子初四刻客土主火濕氣降地氣騰雨時降寒隨之太陽在泉起而用事故也寒凝濕滯人病身重跗腫胸腹滿氣交天濕氣下降地寒氣上騰主氣濕土客氣相火土氣稍溫物以之成人病寒濕腹滿胕腫痞逆寒厥拘急四氣少陽火生主土子正初刻戌正四刻客相火主濕土火土合氣溽蒸上騰天氣為之痞隔然太陽在泉寒風隨發以濕遇火濕化不流惟白露陰布以成秋令五氣陽明金主客同亥初初刻酉初四刻客主皆金慘令行寒露下霜早降寒氣及體人病皮腠終氣太陽水主客同酉正初刻未正四刻客主皆寒水寒大舉濕大化水堅冰陽光不治丙寅丙申戊寅戊申庚寅庚申壬寅壬申甲寅甲申十年初氣少陰火主生客申初初刻午初四刻君火司氣兼相火司天風勝寒來不殺君相二火合氣溫病乃起氣拂於上血溢目赤咳逆頭痛血崩肋滿膚腠中瘡三氣太陰土主生客午正初刻辰正四刻濕土用事主氣君火反郁主客相生民乃康濕熱為病熱鬱於上咳逆嘔吐瘡發於中胸嗌不利頭痛身熱昏憒膿血二氣少陽火主客同巳初初刻卯初四刻客主皆相火交熾發為熱病熱中聾瞑血溢膿瘡鼻衄咳嘔渴欠喉痹目赤善暴死氣交火盛則水復風熱參布太陰橫流寒乃時至涼雨並起火盛於外民病寒中外熱發瘡瘍內寒為泄滿熱盛寒復則水火交爭人病寒熱瘧吐泄怫鬱腫變色四氣陽明金主土生卯正初刻醜正四刻客金主土以間而化土金相生民氣和平燥勝肺病胸滿濕勝脾病身重五氣太陽水主金生寅初初刻子初四刻寒水客加金主水寒金斂陽乃去寒乃來人避寒邪君子固密終氣厥陰木主水生子正初刻戌正四刻木用事主水生之時當閉藏而風木動風為陽陽氣不閉藏心痛而咳丁卯丁酉己卯己酉辛卯辛酉癸卯癸酉乙卯乙酉十年初氣太陰土主木克亥初初刻酉初四刻主風客濕風陽濕陰為患木剋土土剋水脾腎受傷病中熱脹面目浮腫善眠鼻衄嚏嘔溲黃赤甚則淋二氣少陽火主君火酉正初刻未正四刻相火用事於春分後主氣君火二火交熾臣位於君民病疫癘暴死三氣陽明金主火克甲初初刻午初四刻金用事涼乃行然主火當令燥熱交合至三氣之末主太陰客太陽燥極而澤矣陽盛時行金令民病寒熱氣交金司天下火克之陽專令火盛金火相持勝復互作陰陽擾亂人病咳嗌塞寒熱發暴振栗癃閉四氣太陽水主土克午正初刻辰正四刻水用事於濕土王時寒雨降四氣後在泉君火所主而寒水臨之水火相犯人病暴僕振栗譫妄嗌乾心痛癰瘡瘧疾骨痿便血五氣厥陰木主金克巳初初刻卯初四刻風木用事得在泉火溫春令反行草木反榮人無病終氣少陰火主水克卯正初刻醜正四刻少陰火用事陽氣布候反溫蟄蟲見水不冰人病溫戊辰戊戌庚辰庚戌壬辰壬戌甲辰甲戌丙辰丙戌十年初氣少陽火主木生寅初初刻子初四刻客火主木風火相搏人病溫癘身熱頭痛嘔吐瘡瘍二氣陽明金主火克子正初刻戌正四刻金用事大涼至而火氣抑清寒滯於中陽氣不行人病氣鬱中滿三氣太陽水克主火亥初初刻酉初四刻水用事寒氣行寒水侮陽人病寒反熱中癰疽注下心熱瞀悶不治者死氣交寒盛火鬱鬱極必發夏至後相火旺時寒水之客勝其主交於四氣則太陰用事濕化大布寒濕之氣持於氣交人病肌肉痿足痿不收濡泄血溢四氣厥陰木克主土酉正初刻未正四刻木客加土主風濕交爭木值大暑時木能生火人病大熱脾土受傷病少氣肉痿足痿注下赤白五氣少陰火克主金申初初刻午初四刻君火用事陽復化以土在泉而得火化物乃長成人亦無病終氣太陰土克主水午正初刻辰正四刻土在泉濕令行風木非時相加多病胎産己巳己亥辛巳辛亥癸巳癸亥乙巳乙亥丁巳丁亥十年初氣陽明金克主木巳初二刻卯初四刻金用事寒肅殺氣至金旺傷肝人多筋攣二氣太陽水克主火卯正初刻醜正四刻以水客加主火其氣必應陽復化客寒外加火應人病熱中三氣厥陰木生主火寅初初刻子初四刻木司天用事風時舉風木之病泣出耳鳴眩掉氣交木在上風生高遠火在下炎熱從之土氣得溫濕化行風甚則燥甚燥勝則熱復風燥火熱勝復更作熱病行於下風病行於上四氣少陰火生主土子正初刻戌正四刻火客加土主濕熱大行人病黃疸胕腫五氣太陰土生主金亥初初刻酉初四刻客土主金燥濕更勝沉陰乃布寒氣及體風雨乃行終氣少陽火主水克酉正初刻未正四刻相火在泉陽大化時寒氣熱其病溫癘
