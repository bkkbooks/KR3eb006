body:
  text: 卷三二十八脈指要夫脈之體象不同其名亦因以異以部位名之者浮沉是也以至數名之者遲數是也以有力無力名之者虛實是也脈之大綱大法在於是矣凡病之所在在藏在府在經在絡在表在裡在半表半裡診脈之浮沉遲數有以辨之也凡病之見證或陰或陽或寒或熱或虛或實或不虛不實診脈之浮沉遲數中有力無力有以明之也今仿劉立之之法以浮沉遲數虛實六脈條列於前為診家升堂之道路仿仲景法以緩疾諸脈擇其對待次第於後為診家入室之門戶仿李士材博採前賢諸說詳貫於下務求精確有所依准以得其要而已學者宜熟玩之浮脈體象浮行皮下如水漂木舉之有餘按之不足主病浮陽主表風淫六氣左寸浮者膻中邪氣右寸浮者胸中邪氣中焦受邪浮見兩關右胃左膽分別而觀左尺浮大足太陽病右尺浮長手陽明病二便之病多在兩經風淫兩寸便亦不行兼證浮緩風濕浮數風熱無力表虛有力表實浮緊風寒浮散虛竭浮滑風痰浮弦風飲浮遲表冷浮洪陽盛浮澀虧陰浮濡暑侵集要浮脈法天有輕清在上之象然浮雖主表而風寒重傷者脈反不浮但其緊數而略兼浮象便是表邪其證必發熱無汗或身有疼酸即其候也若浮而兼緩則非表邪矣大抵浮而有力為陽有餘陽有餘則火必隨之或痰見於中或氣壅於上可類推也若浮而無力空豁者為陰不足陰不足則水虧之候或血不營心或精不化氣中虛可知也若以此等為表證則害莫甚矣至有寸關尺俱浮直上直下或癲或癇腰背強痛不可俯仰此督脈為病也又有浮大弦硬之極甚至四倍以上者則經謂之關格此非有神之謂乃真陰虛極而陽亢無根大凶之兆也且須知浮而盛大為洪浮而軟大為虛浮而柔細為濡浮而弦芤為革浮而無根為散浮而中空為芤毫釐疑似之間不可不細心體認也夫肺藏職掌秋金天地之氣至秋而降且金性重而下何以與浮脈相應蓋肺金雖沉而所主者實陽氣也況處於至高為五藏六府之華蓋輕清之用與乾天合德故與之相應耳沉脈體象沉行肉裡如蟲藏蟄輕手不見重取可得主病沉陰主裡七情氣食左寸沉者心病可識右寸沉者肺病可測沉見兩關病在脾肝浮為胃膽同部分看或為肝鬱或為脾寒兩尺見沉腎藏之厄左為水涸右為火熄水火不盛心肺亦病兼證沉遲里冷沉數里熱無力裡虛有力裡實沉緊冷痛沉伏閉郁沉澀痹氣沉滑痰食沉緩寒濕沉弦飲疾集要沉脈法地有淵泉在下之象然沉雖主裡要必察其有力無力以辨虛實沉而實者多滯氣故曰下手脈沉便知是氣氣停積滯者宜消宜攻沉而虛者陰陽不達因氣不舒陽虛氣陷者宜溫宜補其有寒邪外感陽為陰蔽脈見沉緊而數及有頭痛身熱等證正屬表邪不得以沉為里也又須知沉而軟細為弱沉而弦勁為牢沉而著骨為伏剛柔淺深之間宜熟玩而深思也夫腎之為藏配坎應冬萬物蟄藏故其脈主沉陰而居里若誤與之汗則如蟄蟲出而見霜誤與之下則如飛蛾入而見湯此叔和入理之微言也若沉滑而濡此沉而有胃氣是腎平脈也若沉滑而少濡和此沉多胃少是腎病脈也沉主冬令若陽明關脈微沉而不滑是失正陽為胃不和若少陰尺脈微滑而不濡是失純陰為腎不和胃不和其人飲食僅自可也腎不和其人股內汗出陰下濕也難經曰如三菽之重與皮毛相得者肺部也六菽之重與血脈相得者心部也九菽之重與肌肉相等者脾部也十二菽之重與筋平者肝部也按之至骨舉之來疾者腎部也此以皮之浮脈之浮而別心肺之浮也以筋之沉骨之沉而別肝腎之沉也脾主肌肉而肌肉在皮脈筋骨之間故以候脾也遲脈體象遲脈屬冷不及之勢往來遲慢一息三至主病遲寒主藏陰冷相干有力寒痛無力虛寒兼證浮遲表冷沉遲里冷有力實積無力虛冷集要遲為陽不勝陰乃陰盛陽虧之候為寒為虛浮而遲者裡氣虛沉而遲者表氣虛遲在上則氣不化精遲在下則精不化氣氣寒則不行血寒則凝滯若遲兼滑大者多風痰頑痹之候遲兼細小者必真陽虧弱而然或陰寒留蓄於中則為泄為痛或元氣不營於表則為慄為攣大都脈來遲慢者總由元氣不充不可妄施攻擊蓋陰性多遲滯故陰寒之證脈必見遲凡陰寒之病見陽熱之脈則吉謂邪氣自里之表欲汗而解也陽熱之病見陰寒之脈則凶以邪氣自表入里正虛而邪盛也夫脈以一息四至為和平若一息二三至則遲而不及也遲而不流利則為澀遲而歇止則為結遲而浮大且軟則為虛至於緩脈絕不相類緩以脈形之寬縱得名遲以至數之不及為義故緩脈四至寬緩和平遲脈三至遲滯不前此二脈之不容混也數脈體象數脈屬陽太過之勢脈流疾薄一息六至主病數熱主府數細陰傷有力實熱無力虛瘡兼證浮數表熱沉數里熱有力實熱無力虛熱集要數為陰不勝陽故脈來太過然數脈有陰有陽內經曰諸急者多寒緩者多熱滑者陽氣盛微有熱粗大者陰不足陽有餘為熱中也曰緩而滑者為熱中舍此之外並無以數言熱者後世皆以數為熱脈則泥於難經所云數則為熱遲則為寒之說故舉世宗之乃自歷驗以來凡見內熱伏火等證脈反不數而惟洪滑有力如經文所言者是也至於數脈之辨大約有七一外邪有數脈凡寒邪外感脈見緊數然初感便數者原未傳經邪自外來所以只宜溫散即或傳經日久但見數而滑實方可言熱到底乃是陰證只是溫中此外感之數不可盡以為熱也若概用寒涼無不殺人一虛損有數脈凡患陽虛而數者脈必數而無力或兼細小而證見虛寒此則溫之且不暇尚堪作熱治乎又有陰虛之脈必數而弦滑雖有煩熱等證亦勿妄用寒涼若但清火至令脾泄而敗且患虛損者脈無不數愈虛則愈數愈數則愈虛豈數皆熱病乎若以虛數為熱治則萬無不敗者矣一瘧疾有數脈凡瘧作之時脈必緊數瘧止之時脈必和緩豈作即有火而止即無火乎能作能止者惟火邪之進退耳真火真熱則不然也此瘧疾之數不可盡以為熱也一痢疾有數脈凡痢疾之作率由寒濕內傷脾腎俱虧所以脈數但兼弦澀細弱者總皆虛數非熱數也悉宜溫補命門百不失一其有形症多火年力強壯者方可以熱數論治然必洪滑實數之脈方是其證一癰瘍有數脈凡脈數身無熱而反惡寒飲食如常者或身有熱而得汗不解即癰疽之候也然瘡瘍之發有陰有陽可攻可補亦不得盡以脈數者為熱證一癥瘕有數脈凡脅腹之下有塊如盤者以積滯不行脈必見數若積久成疳陽明壅滯而致口臭牙疳發熱等證者乃宜清胃瀉火如無火證而脈見細數者亦不得認以為熱也一胎孕有數脈以衝任氣阻所以脈數本非火也此當以強弱分寒熱不可因其脈數而即以為熱而以黃芩為聖藥也又痘證有數脈以邪毒未達也達則不數矣此當以虛實大小分陰陽亦不得以數為熱也夫數之為義躁急而不能中和也火性急速故陽盛之證脈來必速數而有力也故須知數而弦急則為緊數而流利則為滑數而歇止則為促數而過極則為疾數如珠粒則為動肺部見之則為金家賊脈秋日逢之為克令凶脈也總之邪盛者固多數脈虛甚者亦多數脈當審察形氣隨證施治可也虛脈體象虛合四形浮大遲軟及乎尋按幾不可辨主病虛主諸虛虛因有三六氣外伐七情內侵不內不外勞倦已深左寸見虛勞神傷心右寸見虛損氣傷金虛見兩關土木傷殘虛見兩尺腎氣虛寒兼證浮為氣虛沉為血虛遲為陽虛數為陰虛集要虛之脈有陰有陽為無力為無神為正氣虛也故但見指下無神者總是虛脈內經曰按之不鼓諸陽皆然即此謂也大凡洪大無神者即陰虛也細小無神者即陽虛也陰虛則金水虧殘龍雷易熾而五液神魂之病生焉或盜汗遺精或上下失血或驚怔不寧或咳喘勞熱皆其證也陽虛則火土受傷真氣日損而君相水源之病生焉或頭目昏眩或膈寒脹滿或汗多亡陽或瀉利疼痛皆其證也救陰者壯水之主救陽者益火之源虛而不補陽氣將何以復此實生死之關也李士材曰大凡證之虛極者必挾寒理勢然也故虛脈行指下則益火之源以消陰翳可劃然決矣更有浮取之而且大且軟重按之而豁然如無此名內真寒而外假熱古人以附子理中湯冰冷與服以治其證也而張璐曰人之一生以胃氣為本凡久虛不愈諸藥不效者惟有益胃補腎兩途然當先培中土使藥氣四達則周身之機運流通水穀之精微敷布何患其藥之不效哉喻嘉言曰虛勞病至於亡血失精陰血枯槁難為力矣急宜建其中藏使飲食增而陰血旺故但用稼穡作甘之味生其精血而酸辛鹹苦在所不用舍是無良法也故參朮苓草之甘溫所以為四君子也觀此可知虛脈之為治其要盡於是矣夫虛之為義專以軟而無力得名而虛之異於散脈者則虛按之雖軟猶可見也散脈按之絕無不可見也虛之異於濡脈者虛則遲大而無力濡則細小而無力也虛之異於芤脈者虛則愈按而愈軟芤則重按而仍見也至王叔和脈經云血虛脈虛而獨不言氣虛何也氣為陽主浮分血為陰主沉分惟因浮分大而沉分空故獨主血虛耳學者欲知虛脈之診於此不悉得其要哉實脈體象實脈有力長大而堅應指愊愊三候皆然主病實主諸實實火成狂譫語頻頻陽毒為殃兩寸見實心肺火熱咽疼舌強胸臆氣塞左關木熱熱盛生風右關土熱火炎中宮兩尺見實腸癰不通兼證實而且緊寒積稽留實而且滑痰凝作祟集要實脈屬火而邪氣實也有陰有陽為三焦壅滯之候表邪實者浮大有力以風寒暑濕外感於經為傷寒瘴瘧為發熱頭痛為鼻塞頭腫為筋骨肢體痠疼癰毒等證里邪實者沉實有力因飲食七情內傷於藏為脹滿為閉結為癥瘕為瘀血為痰飲為腹痛為喘嘔咳逆等證火邪實者洪滑有力為諸實熱等證寒邪實者弦緊有力為諸痛滯等證凡其在氣在血脈有兼見者當以類求然實脈有真假真實者易知假實者易誤故必問其所因而兼察形證必得其神也夫實之為義專以長大有力而得名以邪氣盛滿堅動有餘之象也蓋既大而且兼長而且有力而且三候皆然則諸陽之象莫不畢備焉見此脈者必有大邪大熱大積大聚故叔和曰血實脈實又曰脈實者水穀為病又曰氣來實大是為太過由是測之則但主有餘不主不足較若列眉矣若緊脈之與實脈雖相類而實相懸但緊脈弦急如切繩而左右彈人手實脈則且大且長浮中沉三候皆有力也緊脈者寒為熱束故其來繃急而不寬舒實脈者邪為火迫故其象堅滿而不和緩以證合之以理察之不可混淆也濡脈體象濡脈極軟按之不得如水上漚如水中帛主病濡主陽微亦主衛氣寸部見濡汗出驚悸左關見濡木氣不升右關見濡土氣不行尺部見濡溫補可徵集要濡主陰虛為髓竭陰傷為健忘驚悸為腠虛自汗為血不榮為脾虛濕侵為精血枯損為真火衰殘濡之為義在浮候見其細軟而中候沉候不可得而見也叔和比之帛浮水面時珍比之水上浮漚皆狀其隨手而沒之象耳濡脈之浮軟與虛脈相類但虛脈形大而濡脈形小也濡脈之細小與弱脈相類但弱在沉分而濡在浮分也濡脈之無根與散脈相類但散脈從浮大而漸至於沉絕濡脈從浮小而漸至於不見也從大而至無者大凶之象從小而至無者為吉凶參半也夫浮主氣分浮候之而無力陽氣微也然氣猶未敗故浮舉之而尚可得沉主血分沉按之而無力陰氣衰也然惟血已衰殘故沉按之而至全無此在久病年老之人尚未至於必絕若平人及少壯暴病見之名為無根慎與為治也弱脈體象弱脈極軟按之無力浮取不見沉取乃得主病弱主陰虛亦主營氣不止發熱筋急不利寸中見弱心肺薄削關中見弱土衰木落尺中見弱腎水將涸集要弱主陽陷為真氣衰陷為怔忡健忘為自汗短氣為土寒不運為精冷為火衰弱之為義沉而細小之候也叔和脈經曰弱脈極軟而沉細按之而得舉之無有可謂詳且晰矣曰極軟明其無力也曰極軟而沉明其沉而無力也曰沉明其在陰分也沉以候陰沉而無力是血虛也是營氣微也故仲景云脈綿綿如瀉漆之絕者亡其血也曰按之乃得舉手無有則浮分絕無矣夫浮以候陽陽主氣分浮取之而如無則陽氣衰微礁然可據彼陽氣者所以衛外而為固者也亦所以運行三焦腐熱五穀者也弱脈形見而陰霾已極自非見睍而陽何以復耶按素問云脈濡以滑是有胃氣脈弱以澀是為久病竊思弱可重按陰猶未絕若兼澀象則氣血交敗生理滅絕矣而仲景云陽陷入陰當惡寒發熱久病及年衰見之猶可繼持新病及少壯得之不死安得柳氏云氣虛則脈弱寸弱陽虛尺弱陰虛關弱胃虛亦皆診治之切要不可不知也牢脈體象牢脈極沉實大而長似沉似伏非伏之藏主病牢脈中實堅積為殃肥氣奔豚息賁伏梁心肺腎肝各有其方脾積如盤在胃之疆集要牢主堅積病在乎內為伏梁心之積也起於臍上止於心下為奔豚腎之積也下發於小腹上至於心下為息賁肺之積也發於右脅之下為肥氣肝之積也發於左脅之下脾之積在胃脘則為痞滿之類也他如為痃癖為疝瘕為瘀血莫非積也夫牢有二義為堅固牢實之義又沉潛在裡之義也沈氏曰似沉似伏牢之位也實大弦長牢之體也牢脈所主之證以其在沉分也故悉屬陰寒以其形弦實也故咸為堅積若其失血亡陰之人則內虛而當得革脈乃為正象如反得牢脈是脈與證違可以卜死期矣至叔和脈經云牢脈似沉似伏實大而長微弦而牢脈既實大弦長才重按之便滿指有力矣又何以謂之似伏平蓋伏脈雖重按之必推筋至骨乃見其形何可混也此學者所當細審者耳革脈體象革如鼓皮脈弦而芤不見於沉惟見於浮主病革脈中虛男女異病亡血傷精男子之應半產漏下婦人之應或云表邪斟酌體認集要革主表寒中虛之候革者皮革之象也表亦有餘而內則不足也恰如鼓皮外則剛急內則空虛也浮舉之而弦大非剛急之象乎沉按之而豁然非中空之象乎惟表有寒邪弦急之象見焉惟中虧氣血故虛空之象見焉仲景曰革脈弦而芤弦則為寒芤則為虛虛寒相搏此名為革男子亡血失精女子半產漏下時珍云此芤弦之脈相合故均主失血之候而諸家皆以為即牢脈也混而莫辨不知革浮牢沉革虛牢實脈形與病證皆異也按甲乙經曰渾渾革至如湧泉病進而色弊綿綿其去如弦絕者死謂脈來濁亂不明如皮革之堅硬急如湧泉出而不返也其曰湧泉則浮取之不止於弦大而且數且搏矣曰弦絕則重按之不止於豁然而且絕無根蒂矣故曰死也王貺以為溢脈者因其有湧泉之喻而附會其說也不知溢脈者自寸而上貫於魚際直衝而上如水之汛而盈溢也與革脈奚涉乎朱丹溪曰如按鼓皮其於中空外急之義最為親切之喻耳微脈體象微脈無力細軟有別似有似無欲絕非絕主病微為不顯陽氣衰殘陰乘於陽灑淅惡寒集要微主久虛之候仲景曰脈索索如蜘蛛絲者陽氣衰也陽微則惡寒陰微則發熱是必有須於峻補也凡脈緊無汗灑淅惡寒發熱者是傷寒也脈緩有汗灑淅惡寒發熱者是中風也寸脈微灑淅惡寒者為陽不足陰氣上乘主於陽中是陽不足以勝陰而與陰俱化也尺脈微發熱者為陰不足陽氣下陷入於陰中是陰不足以勝陽而從陽化之也按士材曰數以十微為一忽十忽為一絲十絲為一毫十毫為一釐由是推之則一釐之少分而為萬方始名微則微之渺少難見蓋可知已散脈體象散脈渙漫有表無里浮如楊花沉不見矣主病散為不聚元氣已傷如木無根敗葉飄揚集要散主本傷見則危殆為氣血俱虛根本脫離之脈為怔忡不臥為自汗淋漓為溢飲為脹滿為水竭為陽消皆其候也散有二義為自有漸無之象亦散亂不整之象也當浮候之儼然大而成其為脈也及中候之頓覺無力而減其十之七八矣至沉候之杳不可得而見矣漸重漸無漸輕漸有明乎此八字而散脈之象詳明而散脈之義確著故叔和脈經曰散脈大而散有表無里而柳氏云無統紀無拘束至數不齊或來多去少渙漫不收蓋言散亂而不能整齊之意此又補叔和未備之旨深得散脈之神者也戴同父云心脈大而散肺脈短澀而散皆平脈也心脈軟散為怔忡肺脈軟散為汗出肝脈軟散為溢飲脾脈軟散為胻腫皆病脈也腎脈軟散諸病脈代散皆死脈也古人以代散為必死者豈以散為腎敗之徵代為脾絕之診也腎脈平沉而散脈按之不可得見是先天資始之根本絕也脾脈主信而代脈歇止不愆其期是後天資生之根本絕也故二脈獨見均為危殆之候而二脈交見尤為必死之期耳伏脈體象伏隱筋下更下於沉推筋至骨方可得尋主病伏離於陽抱病在陰消陰補陽伏起於沉集要伏為陰陽潛伏阻隔閉塞之候或火閉而伏或寒閉而伏或氣閉而伏為痛極為霍亂為疝瘕為閉結為氣逆為食滯為忿怒為厥逆水氣皆其候也伏之為義隱伏而不見之謂也浮中二候絕無形聲雖至沉候亦必重按著骨方得見耳然伏脈之見雖與沉微細脫相類而實有不同也蓋脈之伏者本有如無而一時隱蔽不見耳有胸腹痛劇而伏者有氣逆於經脈道不通而伏者有偶爾氣脫不相接續而伏者此必暴病乃有之調其氣而脈自復矣若此外而有積困綿延脈本細微而漸至隱伏者即是燈燼將絕之兆安得尚有所復常見庸醫診此無論久暫虛實動稱伏脈而破氣導痰等劑任意妄投是真恐其就道稽遲而復行催牒耳按士材曰伏脈主病多在沉陰之分隱深之處非輕淺之劑所能破其藩垣也李瀕湖曰傷寒以一手脈伏為單伏兩手脈伏為雙伏不可以陽證見陰脈為例也火邪內郁不得發越乃陽極似陰也故脈伏者必有大汗而解正如久旱將雨必先六合陰晦一回雨後庶物咸蘇也又有陰證傷寒先有伏陰在內而外復感邪陰氣壯盛陽氣衰微四肢厥逆六脈沉伏須投姜附以灸關元陽乃復回脈乃復出也若夫太谿衝陽皆無脈者不可治矣劉元賓曰伏脈不可發汗為其非表脈也亦為其將自有汗也而潔古欲以附子細辛麻黃髮之非伏脈所宜也詳究其旨而伏脈診治之要不可得而明之哉芤脈體象芤是草名形如慈蔥浮沉俱有中按則空中空非全無也主病芤主血病營不宜實固衛調營血則歸經集要芤為孤陽脫陰之候為失血脫血為氣無所歸為陽無所附為陰虛發熱為頭暈目眩為驚悸怔忡此雖為陽脈而陽實無根總為太虛之候也芤脈之象叔和脈經曰浮大而軟按之中央空兩旁實劉三點曰指下有窟有邊無中意涉於晦學者難明惟士材以其與蔥無異義乃晰矣蓋以指候蔥浮候之著上面之蔥皮中候之正當蔥中空處沉候之又著下而之蔥皮以是審察可知空必有邊其邊實冇邊即此意也而芤脈之義亦確乎其不可疑矣戴同父云營行脈中脈以血為形芤脈中空脫血之象也張會卿曰芤為陽脈凡浮豁弦洪之屬皆相類也而芤雖陽脈陽實無根總屬大虛之候觀此則芤脈診治之要亦可得而明矣緩脈體象緩是平和往來甚勻微風輕揚楊柳初春主病緩為胃氣不主於病察其兼見方可論定浮緩風證沉緩濕證堅大熱證澀小痹證集要緩脈之象王叔和戴氏楊元操滑伯仁狀之詳且盡矣李士材曰緩脈以寬舒和緩為義若陽寸陰尺上下同等無有偏勝者和平之象也故曰緩而和勻不浮不沉不大不小不疾不徐意思欣欣悠悠揚揚難以名狀者此真胃氣脈也凡一切脈中皆須挾緩謂之胃氣蓋緩主脾脈土為萬物之母中氣調和則百病不生矣夫脾為土藏位居中央孤藏以灌四旁者也不得中和之氣則有太過不及之分當知藥味之有兩宜也脾脈來如水之流者此為太過病在外則宜食苦以燥之脾脈來銳堅如鳥之喙者此為不及病在中則宜食鹹以滋其潤澤使行灌溉經曰脾色黃宜食鹹脾苦濕急食苦此之謂也總之緩脈之義有三凡從容和緩浮沉得中者此是平人之正脈若緩而滑大者多實熱如內經所言者是也緩而遲細者多虛寒即諸家所言是也實熱者必緩大有力多為煩熱為口臭為腹痛為癰瘍為二便不利或傷寒瘟瘧初愈而餘熱未清者多有此脈虛寒者必緩而遲細為陽虛為畏寒為氣怯為頭痛為眩運為痹弱為痿厥為怔悸健忘為飲食不化為鶩溏飧泄為精寒腎冷為小便頻數女人為經遲血少為失血下血及中風產後皆有此脈經言一切脈中皆須挾緩謂之胃氣但得本藏之脈無胃氣以和之則真藏脈見與之短期又云有胃氣則生無胃氣則死緩之於脈大矣哉疾脈體象疾非經常形象速急七至八至數至於極主病疾為陽火其病不一脈號離經陰氣欲竭傷寒熱甚脈不忌疾余病得之皆為不吉集要疾為陰竭陽極之候或名曰疾或名曰極總是急速之形數之甚者也是惟傷寒發熱方見此脈然必洪數滑數有力方可以熱論治如見澀數細數無力則急宜溫補故東垣南陽傷寒脈急疾七八至皆主大溫取效須與熱極當別也若虛勞之人亦或有之則陰精下竭陽光上亢如有日無月矣陰陽易病者脈常七八至號為離經此二者咸在不治之例至於孕婦將產亦得離經之脈此又非以七八至得名如昨浮今沉昨遲今數但離於平素經常之象即名為離經矣夫脈一息四至則一晝一夜約一萬三千五百息而脈得八百一十丈此人身經脈流行之常度也若一息八至則違運行之常矣必至喘促聲細僅能呼吸於胸中數寸間而不能達於根蒂真陰極於下孤陽亢於上而氣之短已極矣夫人之生由於氣凡殘喘之尚延者祗憑此一線之氣未絕耳一息八至之候則氣已欲脫而猶冀以草木生之何怪乎不相及也促脈體象促脈來去徐疾不常數時一止如趨偶傷主病促為陽火五因為禍左寸脈促心火炎灼右寸脈促肺鳴喀喀左關脈促血滯火伏右關脈促非狂即毒兩尺脈促火盛水涸集要促為火亢物停之候促為之義於急促中時見一歇止為陽盛之象也其因有五或因氣滯或因血凝或因膠痰或因積飲或因食壅皆能阻遏其運行之機故惟當往來急數之時忽見一止耳如止數漸減則為病瘥止數漸添則為病劇矣夫人身之血氣貫注於經脈之間者刻刻流行綿綿不息藏氣乖違則稽留凝泣阻其運行之機因而歇止者其止為輕若真元衰憊則陽弛陰涸失其揆度之常因而歇止者其止為重然促脈之故得於藏氣乖違者十之六七得於真元衰憊者十之二三也結脈體象結為凝滯緩時一止徐行而怠頗得其旨主病結屬陰凝氣滯之徵結見左寸溫溫液液結見右寸咳唾呃逆結見左關肝膽血鬱結見右關脾胃痰食結見兩尺陰寒之厄集要結為遲滯中時見一止也越人曰結甚則積甚結微則氣微浮結者外有痛積伏結者內有積聚故知結而有力者方為積聚結而無力者是真氣衰弱違其運化之常惟一味溫補為正治也仲景云累累如尋長竿曰陰結藹藹如車蓋曰陽結脈經云如麻子動搖旋引旋收聚散不常曰結不治夫是三者雖同名為結而義實有別浮分得之為陽結沉分得之為陰結止數頻多參伍不調為聚散不常由斯測之則結之主證未可以一端盡之也夫熱則流行寒則停滯理勢然也人生少火衰微中氣虛寒失其乾行之健則氣血痰食互相糾纏而運之機緘不利故脈滯遲乃成結也張會卿曰結脈多由血氣漸衰精力不繼所以斷而復續續而復斷久病者有之虛勞者有之誤用攻擊消伐者有之留滯鬱結者有之素稟異常無病者亦有之但遲而結者為陽虛數而結者為陰虛不可不辨也緊脈體象緊如切繩來往有力又如轉索左右彈擊主病緊主寒邪亦主諸痛浮緊傷寒沉緊冷痛人迎緊盛傷寒切中氣口緊盛傷食施用集要緊乃陰邪搏激之候氣為寒束寒性斂縮陽不得伸故脈來剛急而形如絞縛也要略所謂寒令脈急是也素問曰往來有力左右彈人手蓋寒乃北方剛勁蕭殺之氣故緊急中復兼左右彈手之象也緊勁而急與弦脈相類但比之於弦有更加勁挺及轉索之異按繩索之轉以兩股三股糾合而成之者不獨直有剛勁之象亦且左右有轉側之形也程知曰緊為寒邪方盛直細中有轉動急疾之意故謂如轉索耳張仲景曰弦者狀如弓弦按之不移也緊者如轉索無常也張錫駒曰弦緊之分在移與不移耳此不可不舉而別之也緊之所主在表為傷寒發熱為渾身筋骨疼痛為胸腹脹滿為中寒逆冷為吐逆食出為風痛反張為痃癖為瀉痢為陰疝在婦人為氣逆經滯在小兒為急驚抽搐皆其候也診治之要豈他求哉弦脈體象弦脈端直弓弦新張按之不移指下挺長主病弦為陰脈陰盛痰飲弦為木脈木侮土甚寸弦乘陽則為頭痛尺弦乘陰則為腹痛集要弦乃陽中伏陰之候為氣血不和為氣逆為邪勝為肝強為脾弱為寒熱為痰飲為宿食為積聚為脹滿為虛勞為疼痛為拘急為瘧痢為疝痹為脅痛皆其候也弦從木化氣通乎肝可陰可陽但其弦大兼滑者便是陽邪弦緊兼細者便是陰邪弦而大為太過弦而細為不及弦而軟其病輕弦而硬其病重凡藏府間胃氣所及五藏俱安肝邪所侵則五藏受病也蓋木之滋生在水培養在土若木氣過強則水耗土傷水耗則腎虧土傷則胃損腎為精血之本胃為水穀之海水穀不化精血不盛生氣敗矣所以木不宜強也矧人無胃氣則死故脈見和緩者吉指下弦強者凶諸病皆然也夫弦之為義如琴絃之挺直而略帶強也岐伯曰春脈肝也東方木也萬物之所始生也故其氣來濡弱輕虛端直以長故曰弦又曰肝脈濡弱迢迢如揭長竿末梢曰肝平春以胃氣為本肝脈來盈實而滑如循長竿曰肝病肝脈來急而益勁如新張弓弦曰肝死弦脈與長脈皆主春令但弦為春初之象陽中之陰天氣猶寒故如琴絃之端直而挺然猶帶一分之緊急也長為暮春之象純屬乎陽絕無寒意故如木干之迢直以長純是發生之氣象也若兩關俱弦謂之雙弦若不能食木來剋土土已敗矣必不可治長脈體象長脈迢迢直下直上如循長竿盈實滑象主病長則氣治和勻非病長而硬滿反常之應陽毒癲癇陽明熱證集要長主有餘亦為氣逆火盛之候為木強為土鬱為奔豚中競為相火專令皆其候也長之為義首尾相應往來端直也在時為春在人為肝肝主春生之令天地之氣至此而發舒脈象應之故候得長脈也內經曰長則氣治人之肝脈得春和之氣者壽之徵也脾脈得中和之氣者富貴之應也李月池曰心脈長者神強氣壯腎脈長者蒂固根深皆長脈之平者凡實牢弦緊皆兼長象故古人稱長脈主有餘之疾也內經曰脈來軟弱迢迢如揭長竿末梢曰肝平脈來盈實而滑如循長竿曰肝病軟弱者柔和之象也迢迢者起伏之象也長竿末梢長而軟也若盈實而滑則無軟弱之象也如循長竿則無迢迢之象矣故知長而和緩即合春和之氣而為健旺之徵長而硬滿即屬火亢之形而為疾病之應也舊說過於本位為長脈不知寸而上過則為溢脈寸而下過則為關脈關而上過則為寸脈關而下過則為尺脈尺而上過則為關脈尺而下過則為覆脈由此察之則過於本位理之所必無惟其狀如長緊則直上直下首尾相應非他脈之首尾不均此凡實牢弦緊諸脈皆兼長脈古人稱主有餘之疾豈虛語哉短脈體象短脈縮縮首俯尾俯應指而回不能滿部主病短則氣病尺寸是真寸主頭痛尺主腹屯短而滑數為酒傷神集要短主不及為氣虛之候為心神不定為肺虛頭痛為肝氣有傷為膈間不利為少腹痛為真火衰皆其候也短之為義兩頭俯下而中間獨浮也在時為秋在人為肺肺應秋金天地之氣至是而收斂故蓄納之象相應而短矣內經曰短則氣病蓋以氣屬陽主乎充沛若短脈獨見氣衰之徵兆矣然肺為主氣之藏偏與短脈相應則又何以說也素問曰肺之平脈厭厭聶聶如落榆莢則短中有和緩之象氣應治也若不上不下則往來澀滯無厭厭聶聶潤澤動搖之象矣輕薄而虛如循雞羽如落榆莢不疾不徐虛中有實之象矣而謂氣不病乎按同父云短脈只見於尺寸若關中見短上不通寸下不通尺為陰陽絕脈而不治而高陽生以短為中間有兩頭無其說不能無弊蓋脈以貫通為義一息不運則機緘窮一毫不續則穹壤判豈有斷絕不通之理哉假令上不貫通則為陽絕下不貫通則為陰絕矣殊不知短脈非兩頭斷絕特兩頭俯而沉下中間實而浮起仍是貫通者也李時珍曰長脈屬肝宜於春短脈屬肺宜於秋但診肺肝則長短自見故知非其時非其部則為病耳凡澀結微弱皆兼短象故古人稱短脈主不足之疾也洪脈體象洪脈似大來盛去衰狀如洪水滔滔而來主病洪為實熱去來有別去衰來盛脈之無病來盛去盛太過之脈來衰去盛不及之脈膚痛浸淫太過之證咳唾氣泄不及之證集要洪脈為陽乃血氣燔灼火熱之候浮洪為表熱沉洪為裡熱為痰渴為煩渴為狂躁為癍疹為頭疼面熱為咽乾喉痛為口瘡癰腫為大小便不通為痛血此陽實陰虛氣實血虛之候若洪大至極甚至四倍以上者是即陰陽離絕關格之脈也為不可治洪之為義素問曰來盛去衰萬物之所以盛長也反此者病來盛去亦盛此為太過病在外來不盛去反盛此謂不及病在中夫洪脈只是盛滿卻非堅硬若使大而堅硬則為實脈而非洪脈矣古人鉤洪二字名夏脈頗有微旨鉤者以木喻也夏木繁滋枝華敷布暢遂下垂有如鉤也五氣篇曰心脈鉤以火喻也火氣炎盛而秒則環轉有如鉤也洪者以水喻也脈之來盛去衰有如洪水漂流之象也凡失血下血久嗽久病之人俱忌洪脈經曰形瘦脈大多氣者死可見形瘦不與脈合者均非吉兆耳動脈體象動脈不一浮滑而急厥厥動搖形如豆粒主病動為速甚寸尺有別陽乘於寸陽動發熱陰乘於尺陰動汗出陰陽互乘發熱汗出按之不鼓陽衰之切汗出惡寒形冷無熱集要動有陽盛陽虛之候陽盛之動動而有力也陽虛之動動乃擾亂也為痛為驚為自汗為拘攣為心脾疼痛為心突精失皆其候也動之為義以厥厥動搖急速有力得名也厥厥者謂似有根之動搖動而不移非若滑脈之流動動而不居也動脈似數惟上下無頭尾如豆大厥厥動搖故名動也然以兩頭俯下中間突起則又極與短脈相類但短脈為陰不數不硬不滑也動脈為陽且數且硬且滑也關前為陽關後為陰故仲景云陽動則汗出分明指左寸之心汗為心之液右寸之肺主皮毛而司腠理故汗出也又曰陰動則發熱分明指左尺見動為腎水不足右尺見動為相火虛炎故發熱也因是而知舊說以動脈只見於關上者非也且素問曰婦人手少陰心脈動甚者妊子也則手少陰非左寸乎而謂動獨見於關乎此不可不辨也滑脈體象滑脈替替往來流利盤珠之形荷露之義主病滑司痰病關主食風寸候吐逆尺便血膿兼證浮滑風痰沉滑痰食滑數痰火滑短氣結滑而浮大風熱之疾滑而浮散風虛之疾滑而沖和胎孕可決集要滑乃氣虛血虛之候為呃逆為食滯為嘔吐為滿悶為痰飲滑大滑數為內熱上為頭目咽喉心肺之熱下為小腸膀胱二便之熱婦人滑脈數而經斷者為有孕若平人脈滑而和緩此是營衛充實之兆若過於滑大則為邪熱之病又凡為虛損者多有弦滑之脈此陰虛而然也瀉痢者亦多弦滑之脈此腎肝受傷也不得概以火論也滑之為義往來流利而不滯澀也陰氣有餘故脈來流利如水蓋脈者血之府也血盛則脈滑故腎脈宜之夫滑脈為陽中之陰以其形兼數也故為陽以其形如水也故為陽中之陰大抵兼浮者毗於陽兼沉者毗於陰是以或寒或熱古無定稱也衡之以浮沉辨之以尺寸庶無誤耳澀脈體象澀脈往來如刀刮竹遲細而短三象審度主病澀虛濕痹尺精血傷寸汗津竭關膈液血兼證澀而堅大實熱炎灼澀而軟弱虛火乃作集要澀為陰虛乃血氣俱虛之候為少氣為憂煩為痹痛為拘攣為麻木為無汗為脾寒少食為胃寒多嘔為二便不和為四肢厥冷男子為傷精女子為不孕為經脈不調凡脈見澀滯者多由七情不遂營衛耗傷血無以充氣無以暢其在上則有上焦之不舒在下則有下焦之不運在表則有筋骨之疲勞在裡則有精神之短少凡此總屬陽虛諸家言氣多血少豈以脈不流利猶有氣多者乎澀之為義不流利不爽快之謂也內經云參伍不調謂其凝滯而至數不和勻也脈訣以如刀刮竹為喻者正謂其阻滯而不滑也通真子以如雨沾沙為喻者謂水沾金石則滑而流利雨沾沙土則澀而不流也須知極細極軟似有若無為微脈浮而且細且軟為濡脈沉而且細且軟為弱脈三者之脈皆指下模糊而不清爽有似乎澀而實有別也肺之為藏氣多血少故右寸見之合體之診腎之為藏專司精血故左尺見之為虛殘之候不問男女凡尺中沉澀者必難於嗣正以血少傷精之故如懷孕而得澀脈則血不足以養胎如無孕而得澀脈將有陰衰髓竭之憂大抵凡物之體濡潤者則必滑枯槁者則必澀故滑為痰飲澀止陰衰理有固然無足異者細脈體象細如絲線直軟難見較顯於微似微而非主病細主勞損宜培其本左寸細者補肝生心右寸細者培土生金兩關見細土濕木枯兩尺見細陰陽殊塗集要細主氣衰為諸虛勞損為怔仲不寐為嘔吐氣怯為肝陰衰為胃虛脹為瀉利遺精為下元冷憊皆其候也細之為義小也細也狀如絲也微脈則模糊而難見細脈則顯明而易見故知比於微則稍稍較著也脈理曰細為血少氣衰有此證則順無此證則逆故吐利失血得沉細者生憂勞過度之人脈亦多細為自伐其氣血也春夏之令少壯之人俱忌細脈謂其不與時合不與形合也秋冬之際老弱之人不在禁例大抵細微之脈俱為陽氣衰殘之候內經曰氣主煦之非行溫補何以復其散失之元陽乎嘗見虛損之人脈已細而身常熱醫者不究其原而以涼劑投之遂使真陽散敗飲食不進上嘔下泄是速之使去耳素問曰壯火食氣少火生氣火即氣也火壯則能耗散元氣少火則能生長元氣人非少火無以運行三焦熟腐水穀未徹乎此者安足以操司命之權哉然虛勞之脈細數不可並見並見者不治細則氣衰數則血敗氣血交窮將何以濟惟帶和緩則投治或有回生之日也代脈體象代脈中止不能自回因而復動良久方來主病代則氣衰下元已虧腹疼瀉痢脾土敗矣吐瀉交患胃中寒矣傷寒心悸氣血憊矣懷胎之訣已三月矣集要代主藏衰危急之候為脾敗為吐利為中寒為腹痛兩動一止三四日死四動一止六七日死次遞推求不失經旨也夫代者禪之義也如四時之禪代不息其期也結促之止止無常數代脈之止止有常數結促之止一止就來代脈之止良久方至內經以代脈為藏氣衰微脾氣脫絕之診也惟傷寒心悸懷胎三月或七情太過或跌打重傷及風家痛傢俱不忌代脈未可斷其必死也滑伯仁曰無痛而羸瘦脈代者危候也有病而氣血乍損只為病脈此為暴病言也若久病得代脈而冀其回春萬不能耳內經曰代則氣衰又曰代散者死蓋代脈見而脾土衰散脈見而腎水絕二脈交見雖神聖亦當望而卻走矣夫脈來一息五至則五藏之氣皆足故五十動而不一止者合太衍之數謂之平脈反此則止乃見焉腎氣不能至則四十動而一止肝氣不能至則三十動而一止脾氣不能至則二十動而一止心氣不能至則十動而一止肺氣不能至則四五動而一止同父云三部九候每候必滿五十動出自難經而偽訣五藏歌中皆以四十五動為準乖乎經旨矣柳東楊曰古人以動數候脈是吃緊語須候五十動乃知五藏缺今人指到腕臂即云見了夫五十動豈彈指間事邪故學者當診脈問證聽聲察色斯備四診而無失耳按代脈之義自叔和仲景俱云動而中止不能自還因而復起脈代者死又曰脈五來一止不復增減者死經名曰代脈七來是人一息半時不復增減亦名曰代正死不疑故太僕之釋代脈亦云動而中止不能自還因而復動由是復止尋之良久乃復強起為代故後世以結促代並言之為止脈豈足以盡其義哉夫緩而一止為結數而一止為促其至或三或五或七或八至不等然皆至數分明起止有力所主之病有因氣逆痰壅而為間隔者有因血氣虛脫而為斷續者有因生平稟賦多滯而脈道不利者此皆結促之謂也至於代脈之辨則有不同如五十動而不一代者乃至數之代即靈樞根結篇所云是也若脈本平勻而忽強忽弱者乃形體之代即平人氣象論所云長夏胃微軟弱曰平但代無胃曰死者乃言胃氣去而真藏見者死非謂代為止也又若脾主四季而隨時更代者乃氣候之代即宣明五氣篇所云脾脈代邪氣藏府病形篇所云黃者其脈代皆言藏氣之常候非謂代為止也凡脈無定候更變不常則均謂之代各因其變而察其情庶得其妙設不明此將於脈象之吉凶究茫然莫知所辨矣又烏足以言診哉脈法總論夫脈狀繁多未可以二十八字盡也然於表里陰陽虛實之義已能括其綱要矣即凡脈有奇情變象要不外此二十八之形致耳故內經之所云鼓者且浮且大也曰搏者且浮且疾也曰疏者且遲且軟也曰格者人迎倍大也曰關者氣口倍大也此二脈者後世不深維內經之旨而誤作病名不知病因脈得名也曰溢者自寸口上越魚際氣有餘也覆者自尺部下達臂間血有餘也如仲景脈論曰縱者水乘火金乘木也曰橫者火乘水木乘金也曰逆者水乘金火乘木也曰順者金乘水木乘火也曰反者來微去大病在裡也曰覆者頭大本小病在表也曰高者衛氣盛也陽脈強也曰章者營氣盛也陰脈強也曰綱者高章相搏也曰惵者衛氣弱也陽脈衰也曰卑者營氣弱也陰脈衰也曰損者惵卑相搏也又有曰堅者實之別名也曰橫者洪之別名也曰急者緊之別名也凡諸此類即含藏於二十八脈之中根乎陰陽形諸體象無非診治之切要也而猶不止此也陰陽不可不分而剖色脈不可不合而辨尺膚不可不詳而考王病不可不諳而識四者得而持脈之道思過半矣凡脈之診陽動陰靜陽剛陰柔陽先陰後陽上陰下陽左陰右數者為陽遲者為陰表者為陽里者為陰至者為陽去者為陰進者為陽退者為陰其常經也或陰盛之極反得陽象或陽盛之極反得陰徵或陽窮而陰乘之或陰窮而陽乘之隨證更遷與時變易此陰陽之不可不分而剖也岐伯曰察脈動靜而視精明察五藏觀五色有餘不足六府強弱形之盛衰以此參伍決死生之分又曰形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣靈樞曰色脈與尺如桴鼓相應青者脈弦赤者脈鉤黃者脈代白者脈毛黑者脈石見其色而不見其脈反得相勝之脈則死矣得相生之脈則生矣又曰精明五色者氣之華也赤欲如白裹朱不欲如赭白欲如鵝羽不欲如鹽青欲如蒼璧不欲如藍黃欲如羅裹雄黃不欲如黃土黑欲如重漆色不欲如地蒼此色脈之不可不合而稽也靈樞曰審尺之緩急大小滑澀肉之堅脆而病形定矣目窠微腫頸脈動時咳按之手足凹而不起風水膚脹也尺膚滑而淖澤者風也尺膚滑者風痹也尺膚粗如枯魚之鱗者溢飲也尺膚熱甚脈盛躁者病濕也脈甚滑者病且出也尺膚寒脈小者泄而少氣也尺膚炬然熱也腰以上熱手前獨熱者腰以下熱肘前獨熱者膺前熱肘後獨熱者肩背熱臂中獨熱者腰腹熱肘後粗以下三四熱者腸中有蟲掌中熱者腹中熱掌中寒者腹中寒魚上有青脈者胃中寒尺炬然熱人迎大當奪血尺堅大脈小少氣晚有加主死又曰脈急者尺膚亦急脈緩者尺膚亦緩脈小者尺膚亦減而少氣脈大者尺膚亦賁而起脈滑者尺膚亦滑脈澀者尺膚亦澀此尺膚之不可不詳而考也脈要精微論曰長則氣治短則氣病數則煩心大則病進上盛則氣高下盛則氣脹代則氣衰細則氣少澀則心痛渾渾革至如湧泉病進而危斃綿綿其去如弦絕者死平人氣象論曰脈短者頭疼脈長者足脛痛脈促上擊者肩背痛脈沉而堅者病在中脈浮而盛者病在外脈沉而弱寒熱及疝瘕少腹痛脈沉而橫脅下有積腹中有積橫痛脈沉而喘為寒熱脈盛滑而堅者病在外脈小實而堅者病在內小弱以澀謂之久病浮滑而疾謂之新病脈急者病瘕少腹痛脈滑曰風脈澀曰痹緩而滑曰熱中盛而緊曰脹臂多青脈曰脫血又脈緩澀謂之解㑊安臥脈盛謂之脫血尺澀脈滑謂之多汗尺寒脈細謂之後泄尺脈粗常熱者謂之熱中此主病之不可不諳而識也若由此而欲窮變探微非精研靈素博宗百家不可也許礽宗曰脈之候幽而難明惟博極而心靈自啟思深而鬼神將通則三指有隔垣之照二豎無膏肓之遁矣若夫病瀕於死脈候多怪其運三五至而歇歇而再至如雀啄食者脾絕也良久一至如屋漏滴水之狀者胃絕也從骨間劈劈而至尋而即散如指彈石者腎絕也散亂如解繩索者精血竭絕也沉時忽一浮如蝦游靜中一躍者神魂絕也浮時忽一沉如魚翔之似有似無者命絕也脈息有出無入如釜中之水火燃而沸者陰陽氣絕也凡此所述脈系生死可得其概矣苟能觸類而引伸之將融會貫通而全體大用必無不明庶無慚慚於司命之職也奇經八脈奇經八脈之名散見靈素無篇次可考其名曰任曰督曰陰蹺陽蹺曰沖曰帶日陰維陽維任者任於前督者督於後陰蹺為足少陰之別陽蹺為足太陽之別沖為諸脈之總會帶為諸脈之總束陰維則維絡諸陰陽維則維絡諸陽蓋脈有奇常十二經脈者常脈也人之氣血常行於十二經脈經脈滿溢流入他經別道而行則名奇經以其不拘於常也茲錄集各脈經文診法主治取八脈交會之義編為次第而不列於十二經脈之下列於二十八脈者以便於初學恐其眩目而惑心也任脈診治寸口丸丸緊細實長男疝女瘕任脈可詳任下鳩尾散於腹皮實則皮痛虛則癢奇集要素問曰任脈起於中極之下以上毛際循腹裡上關元至咽喉上頤循面入目靈樞曰任脈衝脈皆起於胞中上循腹裡為經絡之海其浮而外者循腹上行會於咽喉別而絡口唇按任脈為陰脈之妊養診其脈寸口脈丸丸而緊細實長至關是也其所主病男子內結七情女子帶下癥瘕叔和以為繞臍引陰中痛又曰寸口丸丸主腹中有氣如指上搶心俯仰拘急丸丸動貌狀如豆粒厥厥動搖故主氣上衝心緊細實長中寒而氣結也督脈診治尺寸俱浮直下直上中央浮動督脈之象脊強而厥五痓可想身柱三灸比藥為良集要素問曰督脈者起於少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡循陰器合篡間繞篡後別繞臂至少陰與巨陽中絡者合少陰上股內後廉貫脊屬腎與太陽起於目內眥上額交巔上入絡腦還出別下項循肩膊內俠脊抵腰中入循膂絡腎其男子循莖下至篡與女子等其少腹直下者貫臍中央上貫心入喉下頤環唇上系兩目之下中央女子廷孔之端即男子陰器合篡間也男子精孔溺孔合併之處是合篡間也女子胞孔溺孔合併之處是孔廷之端也故曰與女子等靈樞曰頸中央之脈督脈也名曰風府督者都也為陽脈之都綱任者妊也為陰脈之妊養督任沖三脈雖有言胞中不言胞中者實未嘗不起於胞中也胞中者謂男女丹田之通稱也在女子謂之女子胞在男子即精室也按督脈為陽脈之都綱診其脈尺寸脈中央俱浮直上直下是也其所主病為外感風寒之邪內經以為實則脊強虛則頭重叔和以為腰脊強痛不能俯仰大人癲病小兒風癇皆其候也蹺脈診治脈涉於足因以蹺名一陰一陽分別宜精寸左右彈陽蹺可決尺左右彈陰蹺可別集要左右彈緊脈之象也陽蹺主陽絡故應於寸陰蹺主陰絡故應於尺陰蹺集要靈樞曰蹺脈者少陰之別起於然谷之後上內踝之上直上循陰股入陰上循胸裡入缺盆上出人迎之前入頄屬目內眥合於太陽陽蹺而上行氣並相還則為濡目目氣不榮則目不合按陰蹺者以其所行陰經也起於足少陰腎經張潔古曰蹺者捷疾也二蹺起於足使人蹺捷也陽蹺在肌肉之上陽脈所行貫通六府陰蹺在肌肉之下陰脈所行貫通五藏陽蹺主表陰蹺主裡越人曰陰蹺為病陽緩而陰急叔和注云當從內踝以上急外踝以上緩凡癲癇寒熱皮膚淫癢少腹痛裹腰及髓窌下連陰痛男子陰疝女子漏下皆其候也陽蹺集要難經曰陽蹺脈者起於跟中循外踝上行入風池蓋起於跟中上外踝循脅上肩夾口吻至目極於耳後風池穴也越人曰陽蹺為病陰緩而陽急叔和注曰當從外踝以上急內踝以上緩凡腰背痛癲癇僵仆惡風偏枯痹痛體強皆其候也衝脈診治直上直下尺寸俱牢中央堅實衝脈昭昭胸中有寒逆氣裡急疝氣攻心支滿溺失集要素問曰衝脈者起於氣街並於少陰之經夾臍上行至胸中而散靈樞曰請言氣街胸氣有街腹氣有街頭氣有街脛氣有街故氣在頭者止之於腦氣在胸者止之膺與背俞氣在腹者止之背俞衝脈在臍之左右之動脈者氣在脛者止之於氣街與承山踝上又曰衝脈者十二經之海與少陰之大絡起於腎下出於氣街是起於腹氣之街也名曰氣街謂氣所行之道路也衝脈血盛則滲溢皮膚生毫毛女子數脫血不榮其口唇故髭鬚不生宦者去其宗筋傷其衝脈故須亦不生按衝脈與督脈無異但督脈浮衝脈沉耳直上直下弦長相似尺寸俱牢亦兼弦長是以有逆氣裡急之證疝氣攻心逆急也支滿者脹也溺失者衝脈之邪干腎也越人曰凡逆氣上衝或兼裡急或作燥熱皆衝脈逆也宜補中益氣湯加炒柏炒連知母以泄衝脈凡秋冬厥逆氣上衝咽不得息而喘息有音不得臥宜調中益氣湯加吳茱五分若夏月有此乃大熱之證治法不同叔和云沖督用事則十二經不復朝於寸口其人若恍惚癡狂也帶脈診治帶脈在腰脈應於關關左右彈帶脈可探小兒㿗疝女子經病小腹腰脊痛繞臍行集要靈樞曰足少陰上至膕中別走太陽而合上至腎當十椎出屬帶脈難經曰帶脈者起於季脅回身一周按帶脈者足少陽膽經之穴名也總束諸脈使不妄行在人腰間如人束帶而前垂故名其應於關此脈若固則無帶下漏經之病矣帶之為病越人曰腹滿腰溶溶如坐水中明堂曰女人少腹痛裡急瘛瘲月事不調赤白帶下血崩久而成枯者宜澀之血閉久而成竭者宜破之破血有三治始則四物入紅花調黃耆肉桂次則四物入紅花調鯪鯉甲桃仁肉桂童便煎服末則四物紅花調易老沒藥散可也陰維陽維診治脈名同維分陰分陽自尺至寸內外宜詳尺外斜上至寸陰維尺內斜上至寸陽維集要從右尺外斜至寸上是陰維脈也從左尺內斜至寸上是陽維脈也斜上者不由正位而上斜上大指名為尺外斜上小指名為尺內邪氣在陽維陽蹺則發癇癇動而屬陽邪氣在陰維陰蹺則發癲癲靜而屬陰故也越人曰陽維為病苦寒熱陰維為病苦心痛張潔古曰衛為陽主表陽維受邪為病在表故苦寒熱營為陰主裡陰維受邪為病在裡故苦心痛李瀕湖曰陽維之脈與手足三陽相維而足太陽少陽則終始相聯附者寒熱之證惟二經有之故陽維為病亦苦寒熱寒熱之在表而兼太陽證者有汗當用桂枝無汗當用麻黃寒熱之在半表半裡而兼少陽證者當用小柴胡加減治之若夫營衛惵卑而病寒熱者黃耆建中及八物湯之類主之陰維之脈雖交三陰而行實與任脈同歸故心痛多屬少陰厥陰任脈之氣上衝而然暴痛無熱久痛無寒按之少止者為虛不可近按者為實凡寒痛兼少陰及任脈者四逆湯兼厥陰者當歸四逆湯兼太陰者理中湯主之凡熱痛兼少陰及任脈者金鈴散延胡索散兼厥陰者失笑散兼太陰者承氣湯主之若營血內傷兼夫任沖手厥陰者則宜四物養榮妙香之類因病治之庶乎其不差矣陰維集要難經曰陰維起於諸陰交叔和曰陰維主病癲癇僵仆失音肌肉痹癢汗出惡風身洒洒然也又曰陰維沉實而大主胸中滿心痛如貫珠者男子脅下實腰中痛女子陰中痛如有瘡陽維集要難經曰陽維起於諸陽之會叔和曰陽維主病肌膚痹癢而痛下部不仁汗出而寒顛仆羊鳴手足相引甚者不能言也脈要歌括脈有三部部有九候逐部先尋次宜總究左寸心經火位脈宜流利洪強左關肝膽弦而且長尺即膀胱沉靜彌良右寸肺金之主輕浮充暢為宗脾胃居於關部和緩胃氣常充右尺三焦連命沉靜而實則隆四時相代脈狀非同秋微毛而冬石春則弦而夏洪滑而浮洪者肺恙弦中兼細者脾殃心疾則血衰脈小肝證則澀見弦長大而兼緊腎疾難當寸口多弦頭面何曾舒泰關前若緊胸中定是症殃急則風上攻而頭痛緩則皮頑癢而不良微是厥逆之陰數為虧損之陽滑則痰涎而胸膈氣壅澀緣血少而背膊疼傷沉乃背心之痛洪為胸脅之妨若夫關中緩則飲食必少滑實胃火煎熬小弱胃寒逆冷細微食少膨脹衛之虛者澀候氣之滯者沉當左關微澀兮血少右關弦急兮過勞洪實兮血瘀之結遲緊兮脾冷之殃至於尺內洪大則陰虛可憑或微或澀便濁遺精弦者腹痛伏者食停滑兮小腹急痛滯則病在月經澀為嘔逆翻胃弦強陰疝血崩緊乃小腹作痛沉微必主腰疼要之緊促形於寸此氣滿於心胸緊弦見於關斯痛攻乎腹脅兩寸滑數兮吐逆上奔兩關滑數兮蛔蟲內齧心胸留飲寸口沉潛臍腹或症關中促結左關弦緊兮緣筋脈之拘攣右關沉滑兮因食積之作孽脈有浮沉遲數診必挈要尋端浮而無力為虛有力為邪所幹浮大傷風兮浮緊傷寒浮數虛熱兮浮緩風涎沉緩滑大兮多熱沉遲緊細兮多寒沉實須知積滯沉弦氣病淹淹沉遲有力疼痛使然遲弦數弦兮瘧寒瘧熱之辨遲滑洪滑兮胃冷胃溫之愆數而有痛恐發瘡瘍若兼洪滑熱甚宜涼陰數陰虛必發熱陽數陽強多汗黃脈有七情之傷而有諸氣之逆怒傷於肝者其脈促而氣上衝驚傷於膽者其氣亂而脈動掣過於喜者傷於心故脈散而氣緩過於思者傷於脾故脈短而氣結憂傷於肺者脈必澀而氣沉恐傷於腎者脈當沉而氣怯若脈促而中氣消因悲傷則心象急傷於寒者脈多遲其人必致氣收傷於熱者脈大數其人必主氣泄脈體既明脈證須徹浮多虛而表顯沉乃實而里決滑是多痰芤固失血濡散總因虛而冷汗弦緊共為寒而痛切洪則躁煩遲為冷別緩則風而木頑實則脹而秘結澀兮血少而寒長兮癇而又熱短小元陽必敗堅強患乎滿急伏因痛痹伏藏細弱真陽內傷結促惟虛斷續代云變易不常緊急或緣瀉利緊弦症痞相妨數主心煩大為病進上盛則氣高下盛則氣脹大是血虛之候細為氣虛之恙浮洪則外證推測沉弦惟內疾斟量陽芤兮吐衄立至陰芤兮下血須防盛滑則外疼可別實緊則內疾多傷弱小澀微為久病浮數滑疾是新殃沉而弦緊痃癖內痛脈來緩滑胃熱須涼長而滑大者酒病浮而緩濡者濕傷堅而疾者為癲遲而伏者必厥洪大而疾則發狂緊滑而細為嘔吵脈洪而疾兮因熱結以成癰脈微而澀兮必崩中而脫血陰陽皆澀數知二便之艱難尺寸俱虛微明精血之內竭脈見危機者死只因指下無神不問何候有力為神按之則隱可見無根蓋知元氣之存必見力和而緩邪氣之至力強而峻彈石為硬來即去解索則散亂無緒屋漏半晌而落雀啄三五而住魚翔似有似無暇遊靜中一躍更有鬼賊雖如平類土敗於木真弦可畏是亦危機因無胃氣以此而推五藏不異諸逢此者見幾當避宜忌括略傷寒病熱兮洪大易治而沉細難醫傷風咳嗽兮浮濡可攻而沉牢當避腫脹宜浮大癲狂忌虛細下血下痢兮浮洪可惡消渴消中兮實大則利霍亂喜浮大而畏微遲頭疼愛浮滑而嫌短澀腸癖臟毒兮不怕沉微風痹足痿兮偏嫌數急中痰中風緩滑則生心腹作痛沉細為良喘急浮洪者危咳血沉弱者康脈細軟而不弦洪知不死於中惡脈微小而不數急料無憂於金瘡吐血鼻衄兮誠不喜其實大跌僕損傷兮是則畏其堅強痢疾身熱而脈洪其災莫測溫病體煩而脈細此患難當水瀉脈大者可怪亡血脈實者不祥病在中兮脈虛為害病在外兮脈澀為殃腹中積久而脈虛者死身表熱甚而脈靜者亡陽證而見陰脈病勢入深陰證而見陽脈雖困無妨汗後脈靜而身涼知為易已汗後脈躁而熱甚識其將喪蓄血之候牢大可攻骨蒸之餘虛數可降淋宜實大澀小不利疝必脈弦牢急非見藏為積兮府為聚實強生兮沉細亡新產之脈小緩可喜虛勞之脈細數堪傷凡此有宜有忌吉凶可辨而在為診為治仔細以詳
