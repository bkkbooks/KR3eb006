body:
  text: 卷六補藥得宜論夫虛者宜補然亦有不受補者乃補之不得其當也必須察脈用藥不可問病執方六脈一部或大或小之間便有生克勝負之別一方分兩或減或加之中便有重此彼輕之殊脈有真假藥有逆從假如六脈洪大有力者此真陰不足也六味地黃湯右寸更洪更大者麥味地黃湯如洪大而數者人謂陰虛陽盛而用知柏地黃湯則誤矣如果真陽盛實則當濟其光明之用資始資生而致脈有神疾徐得次以循其常經矣惟其真陽不足假陽乘之如天日不彰而龍雷之火妄熾疾亂變常也宜六味加五味子肉桂助天日之陽光以逐龍雷之假火若至弦數細數則更系真陰真陽虧損便當重用六味少加桂附類既可從承乃可制火既制而陰易長矣況脈之微緩中和胃之氣也不微而洪大不緩而弦數近乎無胃用此既補真陰以息假陽復借真火以保脾土此補腎中真陰真陽之至論也更有勞心運用太過飢飽勞役失調以致後天心脾氣血虧損者設以根本為論從事補腎則元氣反隨下陷化源既絕於上腎氣何由獨足於下縱下實而上更虛矣故凡如六脈浮大無力者此中氣不足榮陰有虧而失收攝元氣之用宜於溫補氣血之中加以斂納之味如養榮湯加五味子更宜減去陳皮是也六脈沉細無力者此元陽中氣大虛大宜培補中州溫補氣血蓋脾胃既為氣血之化源而萬物之滋補亦必仗脾胃運行而始得故古方諸劑必用薑棗即此義也況中氣既虛運行不健故用辛溫鼓舞使藥力自行藥力不勞於脾胃之轉輸如歸脾湯之用木香十全湯之用肉桂是也輕則人參理中湯重則附子理中湯不得雜一陰分之藥蓋陽可生陰陰能化陽耳如六脈細數久按無神者此先天后天之陰陽並虧也早服八味地黃湯晚服人參養榮湯去陳皮或十全大補湯去川芎生地換熟地可也如兩寸洪大兩尺無力者是上熱下寒上盛下虛也宜八味地黃湯加牛膝五味子服至尺寸俱平而無力則照前方另煎參湯沖服如兩尺有力兩寸甚弱者此元氣下陷下實上虛也宜補中湯升舉之地既上升天必下降二氣交通乃成雨露此氣行而生氣不竭矣先天之陽虛補命門後天之陽虛溫胃氣先天之陰虛補腎水後天之陰虛補心肝蓋心為血之主而肝為血之藏也然更重乎太陰蓋脾者榮之本血之統化源之基也其一味之中與脈有宜有禁宜者加之禁者去之如應用十全大補湯而肺脈洪大者則芎耆應去而麥味應加者也蓋芎辛而味升耆味雖甘氣厚於味故功專脾肺而走表也六脈無力則十全最宜倘無力服參者耆術倍加止用當歸勿用地芍蓋重於補氣則歸為陰中之陽地芍為陰中之陰耳至於地黃一湯依脈輕重變化百病俱見神功但六脈沉微亡陽之症切宜忌之蓋雖有桂附之熱終屬佐使而地茱一隊陰藥乃系君臣故能消陰翳之火也其熟地重可加至二三兩山茱只可加至三四錢蓋酸味獨厚能掩諸藥之長況過酸強於吞服便傷胃氣矣此特取數端以證變化之無盡學者類推之而自得其神矣治法提綱夫治病者當知標本以身論之外為標內為本陰為標陽為本六腑屬陽為標五臟屬陰為本臟腑在內為本十二經絡在外為標以病論之人之元氣為本病之邪氣為標先受病機為本後受病症為標故治病必求其原而先治其本古聖之至論但急則治其標緩則治其本後哲之變通然病在於陰毋犯其陽病在於陽毋犯其陰犯之者是謂誅伐無過病之熱也當察其源火果實也苦寒鹹寒以折之若其虛也甘寒鹹寒以攝之病之寒也亦察其源寒從外也辛熱辛溫以散之動於內也甘溫以益之辛熱辛溫以佐之經曰五臟者藏精氣而不瀉也故曰滿而不能實是有補而無瀉者此其常也臟偶受邪則瀉其邪邪盡即止是瀉其邪非瀉臟也臟不受邪毋輕犯也世謂肝無補法知其謬也六腑者傳道化物糟粕者也故曰實而不能滿邪客之而為病乃可攻也中病乃已毋盡劑也病在於經則治其經病流於絡則及其絡經直絡橫相維輔也病從氣分則治其氣虛者溫之實者調之病從血分則治其血虛則補肝補脾補心實則為熱為瘀熱則清之瘀者行之因氣病而及血者先治其氣因血病而及氣者先治其血因證互異宜精別之病在於表毋攻其里病在於里毋虛其表邪之所在攻必從之受邪為本現症為標五虛為本五邪為標如腹脹由於濕者其來必速當利水除濕則脹自止是標急於本也當先治其標若因脾虛漸成脹滿夜劇晝靜病屬於陰當補脾陰夜靜晝劇病屬於陽當益脾氣是病從本生本急於標也當先治其本舉一為例余可類推矣病屬於虛宜治以緩虛者精氣奪也若屬沉痼亦必從緩治虛無速法亦無巧法蓋病已沉痼凡欲施治宜有次第如家貧年久室內空虛非旦夕間事也病屬於實宜治以急實者邪氣勝也邪不速逐則為害滋蔓故治實無遲法亦有巧法如寇盜在家宜開門急逐即安此病機緩急一定之法也故新病者陰陽相乖補偏救弊宜用其偏久病者陰陽漸及扶元養正宜用其平若久病誤以重藥投之徒增其竭絕耳至於藥性之溫者於時為春所以生萬物者也藥性之熱者於時為夏所以長萬物者也藥性之涼者於時為秋所以肅萬物者也藥性之寒者於時為冬所以殺萬物者也夫元氣不足者須以甘溫之劑補之如陽春一至生機勃勃也元氣不足而至於過極者所謂太虛必挾寒須以辛熱之劑補之如時際炎蒸生機暢遂也熱氣有餘者須以甘涼之劑清之如涼秋一至溽燔如失也邪氣盛滿而至於過極者所謂高者抑之須以苦寒之劑瀉之如時值隆冬陽氣潛藏也故凡溫熱之劑均為補虛寒涼之劑均為瀉實然元氣既虛但有秋冬肅殺之氣獨少春夏生長之機虛則不免於熱倘不察虛實便以寒涼之劑投之是病方肅殺而醫復肅之矣其能久乎故無陽則陰無以生無陰則陽無以化蓋物不生於陰而生於陽如春夏生而秋冬殺也如向日之草木易榮潛陰之花卉易萎經曰陰陽之要陽密乃固此言陽密則陰亦固而所重在陽也又曰陽氣者若天與日失其所則折壽而不彰故天運當以日光明此言天之運人之命俱以陽為本也古人莫不喜陽而惡陰即丹溪主於補陰亦云實火可瀉芩連之屬虛火可補參耆之屬今人但知有火而不分虛實喜用寒涼者是欲使秋冬作生長之令春夏為肅殺之時令斯民折壽而不彰乎治療大法指要夫虛實者諸病之根本也補瀉者治療之綱紀也經曰邪之所湊其氣必虛凡言虛者精氣奪也凡言實者邪氣勝也是故虛則受邪邪客為實經曰邪氣盛則實精氣奪則虛者此耳倘邪重於本則以瀉為補是瀉中有補也本重於邪則以補為瀉是補中有瀉也且升降者病機之要括也升為春氣為風化為木象故升有散之之義降為秋氣為燥化為金象故降有斂之之義如飲食勞倦則陽氣下陷宜升陽益氣瀉利不止宜升陽益胃鬱火內伏宜升陽散火因濕洞泄宜升陽除濕此類宜升之者也如陰虛則水不足以制火火空則發而炎上其為症也咳嗽多痰吐血鼻衄頭疼齒痛口苦舌乾骨蒸勞熱是謂上熱下虛之候宜用麥冬貝母枇杷葉白芍藥牛膝五味子之屬以降氣氣降則火自降而氣自歸源更之益以滋水添精之藥以救其本則諸症自瘳此類宜降之者也更有塞因塞用者如脾虛中焦作脹腎虛氣不歸源以致上焦逆滿用人參之甘以補元氣五味子之酸以斂虛氣則脾得建運而脹自消腎得斂藏而氣自歸上焦清泰而逆滿自平矣通因通用者如傷寒挾熱下利或中有燥糞必用溫胃承氣下之乃安傷暑滯下不休得六一散清熱除積乃愈然治寒以熱治熱以寒此正治也如熱病而反用熱攻寒病而反用涼劑乃從治也蓋聲不同不相應氣不同不相合大寒大熱之病必能與異氣相拒善治者乃反其佐以同其氣復令寒熱參合使其始同終異也如熱在下而上有寒邪拒格則寒藥中入熱藥為佐內經云若調寒熱之逆冷熱必行則熱藥冷服下膈之後冷體既消熱性隨發寒在上而上有浮火拒格則熱藥中入寒藥為佐下膈之後熱氣既散寒性隨發情且不違而致大益病氣隨愈嘔吐皆除所謂寒因熱用熱因寒用使同聲易於相應同氣易於相合而無拒格之患經曰必先其所主而後其所因也用熱遠熱者是病本於寒法應熱治所投熱藥僅使中病毋令過焉過則反生熱病矣用寒遠寒者是病本於熱法應寒治所投寒劑僅使中病毋令過焉過則反生寒病矣故益陰宜遠苦寒以傷胃益陽宜遠辛散以逆氣祛風勿過燥清暑毋輕下產後忌寒涼滯下忌斂澀然天地四時之氣行乎六合之間人處氣交之中亦必因之而感春氣生而升夏氣長而散長夏之氣化而軟秋氣收而斂冬氣藏而沉人身之氣自然相通其生者順之長者敷之化者堅之收者肅之藏者固之此藥之順乎天者也春溫夏熱元氣外泄陰精不足藥宜養陰秋涼冬寒陽氣潛藏勿輕開通藥宜養陽此藥之因時制用補不足以和其氣者也然既戒勿伐天和而又防其太過所以體天地之大德也昧者捨本從標春用辛涼以伐肝夏用鹹寒以抑火秋用苦溫以泄金冬用辛熱以涸水謂之時藥殊失內經順逆之理夏月伏陰冬月伏陽推之可知矣然而一氣之中初同末異一日之內寒燠迥殊且有乖戾變常之時大暑之候而得寒症大寒之候而得熱症症重於時則舍時從症時重於症則舍症從時六氣太過為六淫六淫致疾為客病以其天之氣從外而入也七情動中為主病以其人之氣從內而起也此用藥權衡主治之大法萬世遵守之常經雖聖哲復起莫可變更也然有性稟偏陰偏陽又當從法外之治假於性偏陰虛雖當隆冬陰精虧損水既不足不能制火陽無所依外泄為熱或反汗出藥宜滋陰設從時令誤用辛溫勢必立斃假如性偏陽虛雖當盛夏陽氣不足不能外衛其表虛不任風寒灑淅戰慄思得熱食及御重裘是雖天令之熱亦不足以敵真陽之虛病屬虛寒藥宜溫補設從時令誤用苦寒亦必立斃故變通合宜之妙存乎其人且人稟天地之氣以生而強弱莫外乎天地之運氣當天地初開氣化濃密則受氣常強及其久也氣化漸薄則受氣常弱故上古之人度百歲乃去今則七十稱古稀矣蓋天地運氣漸薄人亦因之以致血氣精神亦應因之漸衰故用藥消息亦必因之漸變不可執泥古法輕用峻利況近世之囂竟日深斵喪牋賊難解難遏於是元氣轉薄疾病叢生虛多實少臨症施治專防克伐多事溫補痛戒寒涼抵當承氣日就減少補中歸脾日就增多此今日治法之急務也設使病宜用熱亦當先之以溫病宜用寒亦當先之以清縱有積滯宜消必須先養胃氣縱有邪氣宜祛必須隨時疏散不得過劑以損傷氣血氣血者人之所賴以生者也氣血充盈則百邪外御病安從來氣血一虧則諸邪輻輳百病叢生世大之病十有九虛醫師之藥百無一補豈知用藥一誤則實者虛虛者實是死於藥而非死於病也且古人立方既有照膽之朗識復盡活人之苦心有是病方下是藥分兩多而藥味寡譬如勁兵專走一路則足以破壘擒王矣後人既無前賢之識見徒存應世之遊移分兩減而藥味多譬猶廣設攻圍以庶幾於一遇嗟乎品類既繁攻治必雜病之輕者因循而愈病之重者豈能一得乎然藥雖有大力之品終屬草木之華必藉人之正氣為倚附方得運行而獲效如中氣餒極雖投硝黃不能迅下也榮陰枯槁雖投羌麻不能得汗也元陽脫盡雖投熱藥不覺熱也真陰耗極雖投寒藥不覺寒也正氣重傷雖投補藥不覺補也非醫者立見不移病人專心守一焉有日至功成之益哉用方舉要古人所制諸方何嘗不可圓而用之也蓋方必詳其所治之症為宜對症用之也然有所加減於其間則即示以變通之妙焉是其體則方而用則圓也故無論症不盡乎方之所指固當有加有減即症是相當而勢有孰輕孰重之分則方亦有孰君孰臣之宜安得拘泥古方而不知所善用也今竊略舉一二以廣體方用圓之義試以四逆一湯言之炙草二兩炮姜一兩人參五錢生附子五錢方也若病者左關左尺臟脈平等右關右尺弦急乃逆脈此係右腎真陽衰弱譬如天氣苦寒室無火而寒自生本非左腎陰寒動剋火土之比火雖虧弱尚未離宮陽即困乏猶未浮越唇舌雖欠潤猶未至枯燥手足雖憎寒猶未至厥冷可以如湯分兩易熟附子甚妥若加口角流涎手足厥冷明見內招外犯陰寒略重宜用炮姜為君熟附次之人參甘草又次之若是舌潤多涎元陽受濕仍君甘草必犯嘔吐宜乎偏重姜附以救真元可也若氣冷四肢逆厥如坐泉水中牙關緊閉頸筋粗大左右手關脈尺脈俱見浮革急梗橫逆形象顯著此乃真元將滅純陰冷症一切潤藥概不宜入恐引陰寒上干清道窒塞則吐瀉之症作矣宜用生附子為君如或上唇紅枯舌本無胎肉黑微渴而潤者生若干澀如鉤鑿而渴甚渴喜飲滾不耐多飲飲後輒渴仍如故此係元虧津憊手足微溫懶食少氣理合偏補元陽方取人參為君炙草次之姜附又次之兼補真陽以生元陽用之何其圓也又如六味地黃一湯若病者左手關尺臟脈洪澀或浮弱無力右手關尺真緩實此乃火強土旺水虧陰損宜本方地黃為君如左手關尺臟脈稍平獨右關臟脈細弱者宜用山藥為君地黃制干少用如挾痰濕而小便欠利者宜用茯苓為君若右關脾脈緩滑或浮數力盛挾火而小便短赤者宜用澤瀉為君如右手關尺臟脈沉數有力左手關尺臟脈微弱少神此乃火旺水虧宜用丹皮為君若右手關尺臟脈和緩力盛獨左關肝脈微弱或闊漫少神其人平日手足間筋攣上齶舌根夜燥兩脅常緊如痛似脹此因血虛致肝氣不收宜用棗皮為君用之又何其圓也其餘古湯能仿此二意變換自見圓活之法耳既見圓活更引之以向道濟之以權宜施之以法度則用無不當當無不效矣至於內經方法至神至化至圓至活大小緩急奇偶復七方是也仲景因創一百一十三方悉遵法制後代稱為祖方醫者臨症諦視合併直中邪正久暫採大小緩急奇偶復七方之一對脈主治品味分配君臣佐使制輕制重制戰制守制分制合制攻制和贏輸操縱在我範圍藥力在彼務期有當而已如病直中一經宜取君一臣一奇其制也擇專經對症之藥一味為君重其分兩曰大方又要另揀二味與君同性同氣者分兩減半為臣以輔君不用佐以牽制其雄入之勢不用使恐先動把關拒敵之兵專取飛騎猛將勇往直前攻其無備出其不意也若病傷乎兩經名曰並病病者兩經兩症平現猶二雄並爭一國方取君二臣四偶其制也擇取專經對症之藥二味一味君此經一味君彼經彼此二味務要分兩均重為大方又要另揀二味與君同性同氣者分兩減半為臣以輔彼君以攻彼經之邪輔此君以攻此經之邪亦不用佐使如遇危險逆症宜將君臣藥品分作數罐另煎退火稍冷和服其效尤速至於合病又有兩經三經之別假如兩經合病有一經病重而症多有一經病輕而症少方取君二臣三奇其制也專經對症之藥二味一味君此經一味君彼經彼此二味分兩俱要均重為大方又擇與此君同氣二味分兩折半為臣輔此君以攻病症重經之邪又揀與彼君同氣一味分兩折半為臣輔彼君以攻病症輕經之邪亦不用佐使義同三經合病若有兩經病症平現而重多一經病症稍差而輕少宜於並病方內增入二臣分攻其最輕即君二臣六是也如一經症獨重兩經症輕而平等者即宜更用君一以治其獨重以四臣分攻平等之兩輕乃君一臣四之偶制也如或一經病症重多一經病症略少又一經病症最輕宜用君一臣二以治其重經用君一臣一以治其略少用君一臣一以治其最輕亦君二臣四之偶制也然而並病合病重者固多而輕者亦復不少重者方制可如前訂稍輕者又當小其方偶其制若君二臣六之類是也病輕者宜增佐於方內假如先前病重服大方重劑後而病症漸次減輕者亦可與小方輕劑凡治頭面耳目口鼻齒舌齶手胸背肺心肝膽咽喉膈包絡胸中膻中之病方宜奇制經曰近者奇之之謂也凡治脾胃兩腎命門丹田腹中大小腸膀胱陰股膝足大小便道之病者方宜偶制經曰遠者偶之之謂也發表不遠熱者以清邪干犯肌表腠理得緩則開而汗汁易於滲泄庶外邪可以假汗直去而解散也攻裡不遠寒者以濁邪蘊蓄腸胃膀胱之火熱鬱毒得寒則煞可以便於乘勢而斬關奪門也汗者不可以奇恐清陽因汗散越以致魄汗淋漓亡陽亂語之症作矣故分兩品味俱宜偶制以留戀其陽毋犯重陽是也下者不可以偶防清陽隨藥力下墜溺陷難升致生腸滑飧瀉痎瘧腸澼之病起矣故分兩品味俱宜奇制以提挈其陽勿犯重陰是也補上治下制以緩者藥品眾而氣味薄分兩輕而性力緩及丸散服藥之類取其藥性輕清易於上浮也補下治下制以急者藥品少而分兩重氣味厚而性力沉及骨角金石之類取其力猛勢重易於下走也經曰近而奇偶制小其服也遠而奇偶制大其服也大則數少小則數多多則九之少則二之九為老陽剛強已極譬如用其大方二為柔陰輕弱之至譬如用輕小方二為之中量遠近制輕重配奇偶以為大方小方活法神且化矣大則補陽補氣補火之數宜奇壯陰壯水壯火之數當偶此方法中之秘竅也如或四經五經駁雜互相為病氣宜補而血亦喜扶火宜清而水亦當養病惟此種最輕少則九味十一味多則十餘味二十味或一二湯或三四湯合而用之皆曰複方復者重也湯不厭含藥不嫌眾也凡物有隧道者亦名曰復因時取義於一劑藥中兼療數經病症一方法內統制升降浮沉七方惟此不用細解今人動手便是尤嫌其過於重複耳至若向導一法又不可不繼七方而亟講也假如直中一病就取直達本經一味自兼嚮導便可其餘合病並病以及諸經雜病則不然當取諸藥味之咸者入腎故內經治一切腎病以咸散之以咸收之以咸補之以咸瀉之以咸軟之以鹹溫之以咸燥之如味不咸者要取直捷入腎補火補水須制之以鹽或入鹽同煎若要取其入腎清火除熱宜制之以童便或用童便參服凡藥味辛辣者即能入肺故內經治一切肺病以辛散之以辛收之以辛緩之以辛燥之以辛清之以辛溫之以辛涼之以辛補之以辛瀉之如味不辛者要取直捷入肺須制之以薑汁或用竹瀝參服凡藥味之酸者即能入肝故內經治一切肝病以酸散之以酸收之以酸緩之以酸燥之以酸溫之以酸清之以酸涼之以酸補之以酸瀉之如味不酸者宜制之以醋凡藥味之苦者能入心故內經治一切心病以苦散之以苦壯之以苦緩之以苦燥之以苦清之以苦溫之以苦涼之以苦收之以苦瀉之如味不苦者宜炮令致苦以補之或入黃連膽汁以瀉之凡藥味甜者能入脾故內經治一切脾病以甘散之以甘壯之以甘緩之以甘燥之以甘清之以甘溫之以甘涼之以甘補之以甘瀉之如或味欠甘欲其補脾宜制以蜂蜜調之以飴糖人乳或炒黏米糯米同煎欲其清胃則參之以生蜂蜜梨汁藕汁竹瀝取其味性相投故曰稼穡作甘也此為同氣相求又以品味色赤者入心色青者入肝色白者入肺色黃者入脾色黑者入腎此為同類相得心合血心與包絡為表裡三者有病治宜用苦赤同法肝合筋肝與膽為表裡三者有病治宜用酸青同法脾合肉脾與胃為表裡三者有病治宜用甘黃同法肺合皮毛肺與大腸為表裡三者有病治宜用辛白同法左腎合精右腎合骨左腎與膀胱為表裡右腎與小腸為表裡六者有病治宜用鹹黑同法至於藥味性情有專入一經者取之為君固妥亦有能入兩經三經者用以為君則不受本方統轄用以為臣為使則不服君藥節制勢必離奇撒野別生禍端全在用法圓通毋徒執拘為貴凡治腑合之病先將人本臟本腑品味會煉成陣預煎令熟後取直達病所一味投入數滾即起取其生性輕浮力能上行外走引經之法也如病者手足通身逆冷牙關緊閉胸膈間寒涎凝結不省人事速用艾灸關元攔阻陰寒來路急投辛香熱燥峻補之品濃煎滾服斬關之法也如治下焦中焦臟寒上熱假症宜將峻補臟氣藥品濃煎退火如冰冷服又或細末為丸裹以甘寒外殼藥過咽胸全無苦燥偷關之法也如喉舌已為陰火燥烈疱腫潰痛熱補入口倍增其苦先將補藥熬煎後入黃連些少數滾即起或入豬膽汁幾點將喉舌陰火假掩使劑中雄兵猛將安然乘勢直下瞞關之法也如胸膈為痰涎凝阻藥不能入急取生半夏生南星牙皂細辛生礬硃砂薑汁竹瀝之類視病重輕擇取兩味細末水調灌入外用薑蔥搗炒或燒酒拌淬紅灰包熨胸背俟其一吐稍開旋以正藥急投闖關之法也經曰奇之不去則偶之是為重方偶之不去則反佐以取之所謂寒熱溫涼反從其病也如遇吐血衄血嘔血崩產及諸般失血過多百藥罔效脈因亡血盡見代芤濡弱捉摸甚難法取細料薄紙或湖綿蘸收本血曬焙毋拘速以燒灰調入養氣補血安血藥內重用人參無不應手取效又如盜汗淋漓諸方難收速用淨青布拭體收其本汗曬乾再抹如此多次方用滾水沃布取汗煎藥數服即收又如素因酒損致病諸藥不能投效宜取酒煎立效如小兒嘔泄拒藥尤宜講究若嗜酒則用酒調丸藥自然投合矣如不喜酒又當別詢所好旋取所好和藥必效蓋亦藉嚮導以收從治之勳假因緣而獲萬全之效也至於藥有宜於食前服者取其腹內空虛藥力易於直下施蓋以食可免犯上之弊治下法也藥有宜於食後服者先取其穀氣實腹使藥後住胸中借下焦火力隔胃薰蒸氣性易於挽上就勢飛達巔頂治上法也藥有宜於食遠服者取其不飢不飽藥往胃中易於達膈療脅運行四肢調中法也以上所言盡皆關係法之一字加配於七方十劑前後中間豈不至通至靈至圓至活至易於效驗至極其穩當猶武候之用兵能制勝而不行險斯為可宗可法也歟調經扼要脈經曰婦人寸關調如故而尺脈絕不至者月水不利當患小腹引腰痛氣滯上攻胸臆也又云尺脈來而斷絕者月水不利又云脈來狀如琴絃若小腹痛主月水不利孔竅生瘡又云尺脈滑血氣實月水不利凡婦人之脈總宜肝腎有神不宜肺部太旺此所云月水不利者謂其差前差後之不調也夫女子以血為主天真氣降壬癸水合腎氣全盛血脈流行常以三旬一見以象月盈則虧故曰月經其來也有信其去也有時方能育子若差前而來多必左肝腎脈同旺右肺脈緊實此氣血盛而火有餘也宜芩附四物湯內用生地酒洗再加丹參丹皮差後而來少必左肝腎脈不足右寸尺無神此氣血不足也宜十全大補湯補血湯或左歸九右歸丸或歸脾湯多服可也未行而先腰腹疼痛者由七情憂鬱所致必兩寸沉澀有力宜七制香附丸或香蘇飲合芎歸湯加丹參淮膝或茯苓補心湯除地黃加香附或四七湯或小溫經湯最妙行過而腹痛者由去血過多而血海空虛也必肝腎部及右尺寸均無力宜十全大補湯或歸脾湯補血湯服之至於數月不行經年不至者均氣血虛也必兩尺浮弱兩寸短澀宜補血湯合參附湯或十四味建中湯或十全大補湯或補元煎舉元煎擇而服之若破氣破血則正氣愈不足邪氣更留之而經水愈不行矣有月前十日而來少月後十日又不多者此非有餘乃經血錯亂妄行之所致也宜八珍湯十全大補湯或補元煎歸脾湯切不可用耗氣清涼之品耳有紫黑成塊者必兩寸脈同旺而兩尺脈同衰略帶浮數皆由賦性躁急淫欲過度宜芩附四物湯內用生地加丹皮丹參或知柏地黃湯除棗皮易當歸加丹參香附間有兩寸不旺而兩尺不足者略帶遲緩其來也亦見黑象此寒凝氣滯非有火也宜理中湯或十全大補湯加熟附砂仁若帶濁下者緣濕熱氣虛而起右寸關濡弱而兩尺亦衰用補中益氣湯加白苓黃芩酒炒或調中益氣湯加淨風白苓或防風除濕湯或舉元煎加淮藥龍骨總宜溫中大補血氣崩漏者全屬氣虛下陷間有濕熱以末治之故日華先生云氣升則無下陷之憂也必右寸微弱肝腎衰虛宜大補血湯或補中益氣湯或舉元煎補元煎或阿艾四物湯加炙耆炙草間有血熱脈必帶數均加酒芩或六味地黃湯亦可頭目昏眩氣血虛也腰背痠疼氣血虛而兼火兼郁也兼火鬱者右寸沉澀宜補中益氣湯加砂仁或調中益氣湯加砂仁茯苓或八物湯加砂仁或十全大補湯五心煩熱者由心火陷於脾家憂思抑鬱於內必左肝脈弦緊兩尺微弱宜逍遙散加丹參丹皮麥冬或柴芍地黃湯加丹參麥冬目如針刺腳底刀刮者因縱慾無度腎水虧乏故也必肝腎兩脈弱而無力或間有結代之象宜左歸丸左歸飲或右歸丸右歸飲七寶美髯丹加炙耆連進可愈雙足乏力者此脾虛也必右關虛而無力宜補中益氣湯或四君湯加耆附或歸脾湯或黃耆六君湯服之即愈學者能依方脈照病證加減疊進則功效必多矣調經用方芩附四物湯生地當歸川芎白芍香附黃芩加丹參丹皮十全大補湯熟地當歸川芎白芍人參黃耆白朮白苓肉桂甘草補血湯左歸丸右歸丸歸脾湯七制香附丸香蘇散合芎歸湯香附蘇葉陳皮當歸川芎甘草加丹參淮膝茯苓補心湯除淮地加香附四心湯小溫經湯熟地當歸川芎白芎白朮砂仁香附小茴炒黃芩羌活白芷桂枝柴胡枳殼甘草姜引若血氣刺心腹痛難忍者加元胡乾漆炒五分補血湯合參附湯熟地當歸川芎白芍陳皮茯神棗仁五味麥冬梔仁人參熟附甘草十四味建中湯人參黃耆白朮白苓熟地當歸川芎白芍半夏麥冬肉桂蓯蓉熟附甘草舉元煎黃耆白朮升麻甘草補元煎人參淮藥熟地當歸棗皮杜仲枸杞甘草八物湯即八珍湯知柏地黃湯除棗皮用當歸加丹參香附十全大補湯加熟附砂仁理中湯人參白朮乾薑甘草補中益氣湯人參黃耆白朮當歸陳皮升麻柴胡甘草加白苓酒芩調中益氣湯人參黃耆蒼朮木香陳皮升麻柴胡甘草加淨風白苓防風除濕湯防風白苓蒼朮陳皮厚朴半夏甘草大補血湯熟地當歸川芎白芍人參茯神棗仁麥冬陳皮梔仁五味甘草阿艾四物湯熟地當歸川芎白芍白朮黃芩阿膠砂仁香附艾藥粳米煎加炙耆炙草地黃湯熟地淮藥白苓棗皮澤泄丹皮逍遙散當歸白芍白朮白苓柴胡川樸薄葉姜引加丹參丹皮麥冬柴芍地黃湯即地黃湯加柴胡白芍加丹參麥冬左歸飲右歸飲黃耆六君子湯人參白朮白苓半夏陳皮黃耆甘草胎產扼要內經曰婦人陰搏陽別謂之有子又曰手少陰脈動甚者妊子也脈經曰妊娠初時寸微小呼吸五至三月而尺數也脈滑疾重以手按之散者胎已三月也脈重手按之不散但疾不滑者五月也又曰三部脈浮沉正等按之不絕者妊娠也又曰寸微關滑尺數流利往來雀喙者為有妊也又法妊娠四月欲知男女左疾為男右疾為女俱疾為生二子又法尺脈左大為男右大為女左右俱大產二子大者如實狀婦人懷妊離經其脈浮設腹引腰痛為欲生也俱離經者不病又法婦人慾生其脈離經不同常度如昨大今小昨緩今數之意半夜覺日中則生婦人已產脈宜小實沉細緩滑微小忌浮虛實大弦急牢緊此皆妊娠之脈要學者所當切究也若其診治則方書可考書云胎前清熱與養血月分依經善調燮一足厥陰二少陽三四包絡三焦決五脾六胃七肺經八手陽明成竅穴九腎十膀神氣完半產須防三七月又曰胎前必先以安胎為主驅邪次之蓋胎固則病自安邪退則病自痊予覽斯言何其切而當歟然女子善懷憂疑易起故嘗有子懸子氣子腫子煩子嗽子淋子癇子喑惡阻轉胞胎漏墮胎之見種種惡狀怪候皆由七情之火而妄動五味之偏而不節耳甚則縱勞縱欲任性任能耗散元陽虧損真陰若不審其虛實明其表裡妄投發表妄施攻伐其不致殺人也幾希故善治者但見其胎氣不和湊上胸腹心脅俱疼者名曰子懸必右寸實大左關不足宜紫蘇飲加生薑或芩術湯妊娠數月以來雙足浮腫或流黃水喘悶不食者名曰子氣此任脈素受風邪兼抑鬱感寒必右寸沉實宜天仙藤散加白苓胎中挾水遍體浮腫者名曰子腫必右關浮虛土不制水宜六君湯除半夏甘草加桑皮淮藥受妊五月心驚膽怯煩悶不休者名曰子煩必左寸洪實宜竹葉湯或麥冬湯不時咳嗽由邪火上衝名曰子嗽必右寸有力宜紫菀湯加淮藥沙參房勞虛損觸動相火小便淋瀝者名曰子淋必左關虛怯左寸洪數宜安營散除木通加淮藥杜仲偶受風寒角弓反張口流涎沫昏不知人名曰子癇必左肝腎虛弱兩寸略旺宜八物湯除地黃加粉葛防風或羚羊角散受妊三五月忽失音不語名曰子喑此胞絡系絕不須服藥分娩後自能言語受妊一月飲食不納噦嘔頻作者名曰惡阻必肝脾兩脈浮數而滑此穢惡之氣留住子宮而胃中痰火沖溢上焦俟百日內自安宜二陳湯加黃芩酒炒胎壓一邊臍下急痛小便欲出不出者名曰轉胞必左關尺弱右肺脾虛宜參朮飲除半夏加淮藥杜仲受妊數月不時血來名曰胎漏必右寸浮虛左肝腎微弱宜舉元煎加阿膠淮藥杜仲或阿艾四物湯加炙耆文蛤杵碎酒炒受妊三月而胎下或七月而胎下名曰墮胎必右關尺衝任兩脈浮數而弱兩寸浮數無神由於淫火日熾真陰虧損故也宜千金保胎散加熟地當歸麥冬熱甚者芩術湯蓋婦人天癸未行屬少陽既行屬厥陰已絕屬太陰胎產之病治厥陰者是祖化之源也切不可汗下利小便也汗則痞滿下則傷脾利小便則亡津液尤宜禁忌飲食少於房事其庶平安矣凡胎前宜以和氣飲為主左肝腎虛重用淮藥杜仲胎前用方紫蘇飲當歸川芎白芍人參陳皮蘇葉腹毛甘草姜引一方有香附無人參芩術湯黃芩白朮天仙藤散天仙藤即青木香酒拌略炒蘇葉陳皮香附烏藥木瓜加甘草姜引或加蒼朮六君子湯加桑皮淮藥去半夏甘草竹葉湯白苓淨風麥冬黃芩人參竹葉五片煎麥冬湯白苓淨風麥冬黃芩竹葉紫菀湯紫菀天麥桑皮杏仁桔梗竹茹甘草加淮藥沙參安榮湯人參當歸麥冬細辛滑石木通燈芯甘草除木通加淮藥杜仲參朮飲熟地當歸川芎白芍人參白朮半夏陳皮甘草姜引除半夏加淮藥杜仲八物湯熟地當歸白芍川芎人參白朮白苓甘草除熟地加淨風粉葛羚羊角散當歸川芎白苓茯神薏仁甘草杏仁羚羊角棗仁加皮淨風獨活木香姜引舉元煎黃耆白朮升麻甘草阿艾四物湯熟地當歸川芎白芍白朮黃芩阿膠砂仁香附艾葉粳米煎一方加蒲黃炒陳皮杜仲鹽水炒續斷甘草去艾葉千金保胎散熟地當歸人參白朮陳皮黃芩香附續斷杜仲鹽水炒一方惟用續斷杜仲二味為末糊丸山藥為糊一方去人參加砂仁川芎阿膠艾葉益母草棗肉為丸二陳湯陳皮半夏白苓甘草加黃芩酒炒用小兒診法小兒非無脈可診虛實不易定耳不若以指紋之可見者與面色病候相印證此望切兩兼之意按十二經脈始於太陰肺其支者從腕後出食指之端以交於陽明大腸脈即此指紋是也夫指紋與寸關尺同一脈也但由旁支脈體差小耳苟神明於用則與寸關尺互相印證而又聞聲察色其病情自可得矣稽古內經乳子之病有二曰病熱曰中風病熱之脈宜浮洪忌沉細中風之脈宜實大忌急數若大而緩乃胃氣存而邪氣退則在所不忌此經訓言簡意切總括無餘者也然小兒自彌月以至三歲診之為難故宋孝子錢仲陽乃始明指紋之法以食指分為三關第一節寅位為風關第二節卯位為氣關第三節辰位為命關位則自上而下邪則自淺而深證則自輕而重紋見寅關邪氣初入紋見卯關邪氣正盛紋見辰關邪氣充盛設透關射甲則邪無所容如亢龍之象矣然紋之所見總以活動紅潤為吉滯澀黑黯為凶不得徒執衝上辰關遂為不救耳且又當以浮沉分表裡紅紫辨寒熱淡滯定虛實如指紋紅黃隱隱乳子無病之診指紋若浮邪尚在表速宜疏散指紋若沉邪已入里但淺而半沉往來寒熱則邪尚在經治宜解肌瀉火若深而極沉則邪已入府急須攻下救里倘見身熱猶以風藥治之此病在內而治其外不特邪不能服適足燥其陰血愈增其困也如指紋紅鮮由血滯也此寒邪初入皮毛之應無論內寒外熱初病久病一見此紋總以寒症施治若紋色淡瑩中氣弱也淡而兼紅虛寒之應也惟紋見深紅由寒閉汗孔腠理不通寒化為熱矣若熱壅經絡紋必見紫紫為熱盛千古定論也至於肝膽受邪指紋必青此傷風候也但可以風熱目之不可云驚風以誤人如紫而兼青者是為傷食蓋飲食有形之物阻抑中焦壅遏脾氣不能宣布故風木乘其困而侮之所以痰氣上逆也疏通壅滯令其流利則病愈矣惟青而兼黑者此風痰實熱固結中焦脾氣抑鬱之至急宜攻下庶有生機誤認驚風百無一救耳若夫小兒稟賦陽虛面色㿠白唇舌淡瑩者指紋四時皆淡即有病之時亦止淡紅淡青淡紫而已淡紅為虛寒淡青為虛風淡紫為虛熱無論新病久病總歸於虛切勿誤投攻伐致成莫救如指紋澀滯全無活潑流利之象此由飲食風熱相搏是為實證急宜盪滌去其菀莝則可愈也若三關純黑推之不動或硬如木直或間如黑子最危最惡不可治矣若其紋形主病皆可詳推如紋入掌中則為腹痛知掌心為包絡所主知胃之大絡入心則知治法矣至若紋如彎弓內外有別彎向中指為內此外感風寒治之猶易惟彎向大指為外此內傷飲食治之稍難其有紋形如水字者此食填太陰阻塞中焦陰陽之氣不得升降治之宜宣通也此皆診視指紋之切要也然小兒診法尤有要焉夫內經以大小緩急診視小兒亦浮沉遲數之意蓋大即浮洪類也小即沉細類也急即數緩即遲也不若易以浮沉遲數之為得乎再以有力無力辨其陰陽表裡寒熱虛實此至顯明至平易至確當誠診視小兒不易之妙法也第手腕短促惟以一指候之誠非易易事然保赤之道亦在心誠求之而已矣茲採明白易曉者四條錄之以示為準則如脈之主病浮脈主表病在外沉脈主裡病在內遲脈主藏病為寒數脈主府病為熱四至五至為遲為不足浮遲外寒沉遲內寒有力實寒無力虛寒此一要也又如脈之主證浮而有力為風熱無力為陰虛沉而有力為痰食無力為氣滯遲而有力為疼痛無力為虛寒數而有力為實熱無力為瘡瘍此一要也又如脈證之有虛實浮洪壯熱表之實也浮濡大汗表之虛也沉而有力痰凝食滯結於裡也沉而無力氣滯於中不運化也遲主虛寒諸痛多實數主實熱瘡瘍多虛此亦一要也又如脈證之有宜忌脈浮身熱陽邪居表應從汗解如沉細身涼則無論表裡不堪攻伐凡面腮紅大便秘小便黃渴不止上氣急足心熱眼紅赤七者皆屬熱證忌用溫補面㿠白糞青白肚虛脹眼珠青吐瀉無熱足脛冷睡露睛七者皆屬寒證忌用清涼此亦一要也凡此指紋脈證皆小兒診視之切要學者所當熟識也按此而精求治法則左右逢原自可得心而應手矣痘位脈證總要小兒出痘自頭面以及周身各有藏府所屬部位治者須詳察部位以定吉凶如額先見點者是毒發於心也頦先見點者毒發於腎也左頰先見點者毒發於肝也右頰先見點者毒發於肺也鼻先見點者毒發於脾也項背腰臀足踹太陽經所屬也頭顱眉眶胸乳牙齦陽明經所屬也左右額角耳前腋脅少陽經所屬也中腕兩肘四肢太陰經所屬也臍腹手足心內廉足跟少陰經所屬也頭項小腹男婦陰器厥陰經所屬也至於包絡乃周身脂膜之絡聯屬百骸藏府者也周身發痘俱從此出故無一定部位也凡痘瘡手足常要和暖不宜大熱大寒寒熱太甚則水火偏勝而殘矣如病人六府閉結狂妄煩躁口乾作渴其脈洪數沉緊者是也手足熱本病也若手足冷陽極似陰謂之陽厥下之勿疑宜承氣化毒湯或曾經吐瀉其脈沉細微弱者虛也手足冷本病也若手足熱乃陰極似陽謂之陰燥宜補之回陽化毒湯溫之此痘之大要也至其間變態錯出臨證察脈用藥施治要在人之神而明之已耳若夫水痘似正痘外候面赤唇紅眼光如水咳嗽噴嚏涕唾稠黏身熱二三日始出明淨如水泡此發於脾肺二經由濕熱而成也其顆易脹易靨不似正痘之漿難滿而痂難收也若溫之則痂亦難落變成爛瘡切忌姜椒辛辣並沐浴冷水犯之則成瘡疥水腫自始至終惟小麥湯為準此又不可不辨者也麻疹證治總要麻疹乃胎元之毒伏於六府感天地陽邪火旺之氣毒起於胃熱流於心終始之變腎則無證藏府之傷肺則尤甚初起之候咳嗽噴嚏鼻流清涕眼淚汪汪兩胞浮腫身熱二三日或四五日如見點於皮膚之上形如麻粒色如桃花間有類如痘大者此麻疹初發之狀也胃脈浮洪者加減升麻心脈浮洪者加減涼膈肺脈浮洪者加減荊防敗毒凡麻疹出貴透徹宜先用升發使毒盡達於肌表若過用寒涼多致毒氣內攻喘悶而不可治若已出透者又當加清利之品以去餘熱庶免疹後諸證麻疹屬陽邪熱甚則陰分受傷血為所耗而出沒之後須以養血為主可保萬全此首尾治疹之大法至於臨時權變制宜亦惟神而明之而已若夫癮疹法脈則又當辨癮疹者乃心火灼於肺金又兼外受風濕而成也發必多癢色則紅赤隱隱於皮膚中故名癮疹俗名風丹其脈六部浮大浮為風虛大為氣強強者熱也風熱相搏必成癮疹身體為癢癢者肌虛熱氣外薄故也經曰泄風蓋諸癢為虛血燥不榮肌腠故癢也治法先用加減羌活散疏風散濕繼以加味消毒飲清熱解毒表裡清而疹自愈耳至若斑與疹又宜辨也輕如蚊點為疹重若錦紋為斑疹為風邪發於太陰肺經客於皮毛斑為熱毒發於陽明胃經蘊於肌肉表裡藏府治法天淵夫疹為風邪法當宣揚大忌苦寒遏其宣發斑為熱毒法當清火大忌溫補助其毒勢若其陰證發斑其脈微其色淡紅隱隱見於肌表者此胃氣極虛誤服寒涼立見危殆矣此皆醫之切要所關學者能勿思臨證之宜細審哉附方羌活散羌活前胡薄荷防風川芎枳殼桔梗蟬蛻連翹甘草赤苓姜引加味消毒飲荊芥防風牛子升麻甘草赤芍山楂連翹小兒徵病說驗諸小兒病症一歲二歲臟氣未滿者固不可以診定三歲四歲血氣靡定者亦未可以脈論務宜察面鼻部位以所現之氣色而辨別虛實邪正然面上部位當依靈樞所指黃帝曰庭者首面也指天庭穴管頭面事也闕上者咽喉也指稍下天庭分許管咽喉中也關中者肺也指又下關上分許在眉尖之上管肺與胸中事也下極者心也指在兩眉尖中間名曰印堂乃心經離陽所主管胸膻膈中事也直下者肝也指又下印堂分許在山根年壽之間管腹中事也肝左者膽也謂膽寄於肝故附徵於肝部之旁也下者脾也指準頭又曰明堂乃面王也管脾胃及諸臟之善惡也方上者胃也指附於準頭之旁內即鼻隧迎香乃胃家善惡之應也中央者大腸也指人中管大腸也夾大腸者腎也指上口唇上乃人中之兩旁左管左腎也右管右腎也面王以下者小腸也指人中上截鼻間之間管小腸也當腎者臍也指在口唇下承漿上乃膀胱子處之應也徵氣之色有六青為肝氣赤為心氣黃為脾氣白為肺氣黑為左腎氣紅紫為右腎氣青欲如蒼璧不欲如藍赤欲如白裹朱不欲如赭黃欲如羅裹雄黃不欲如黃土白欲如鵝羽不欲如鹽黑欲如重漆色不欲如地蒼紅欲如珊瑚不欲如塗朱大凡各色現於部位以相生相旺者為順如脾部得紅黃色肺部得豕膠之白色肝部得鳥羽之青色心部得雞冠之赤色左腎部得烏羽之黑色右腎部得石榴之紅色是其正也以相剋相戰者為逆如脾部得青黑色肺部得赤青色肝部得白黃色心部得白黑色左腎部得黃色右腎部得丹紙之色是其逆也生旺者吉逆克者凶理則然也若五色主病大概可推青為感冒風寒重青為傷風青白為傷寒青黑為陰寒黑滯為寒痛孤黃獨赤為欲痙沉濁雜紫為傷食紅黃隱隱為無病紅黃氣深為胃寒上下唇俱帶紫紅色似腫而厚者為真陽上浮虛症必壯熱渴汗宜於養陰隊內大補真陽以生元陽如口唇紫色更加腫而枯燥者此則不惟真陽浮越且兼脾元損憊津液不潤可知急宜大補真元加入生津補液方是正治若誤認作陽症清之涼之及敷臍退熱等法必致不救矣如上下唇口俱帶紅氣薄潤如常面上臟腑部位別無青黑氣色此為火旺胃實可攻可伐可清可瀉者也凡小兒總宜氣色隱隱紅黃為得胃氣神氣所養又有一種同經異治最難用藥後先標本尤宜精究如下唇所現之氣或青或白或紅紫而枯燥者皆是火浮脾虛而上唇薄帶紅黃真氣此係胃實火旺見其下唇所現是色法宜先補脾家臟真必俟脾氣強壯方可清解胃熱庶免以輕變重若見下唇所現是氣即於補脾隊內略加清胃之品一舉而兩功並收其餘肝虛膽實肺虛大腸實心虛包絡實左腎虛膀胱實右腎虛小腸實俱宜仿此以消息之至於手上關筋之虛實與面部氣色無異同看法將小兒食指側面正筋分作三截以左手近指甲一頭辰內候膻中正卯位候心卯內候膽正寅位候肝寅內候腹中近虎口一頭以入掌心橫紋正位候左腎以右手食指側面正筋候胸肺正位候脾內候胃正位候右腎俱宜以氣色善為腑實腑實其病在合以色惡氣善為腑困腑困其病在裡以氣色俱惡為臟虛臟虛其病在神凡氣色以青淺為外邪深黑為臟憊浮粗為外感沉散為不足紫滯為傷食青白為多痰赤潤為火毒紅紫為疳積血色不沖和為氣滯推之欲其活動如輕云之過太虛推後喜其聚斂若霓虹之沉水底總以扒得動為活不動力死扒來而間或凝結如珠亦危此其要也其餘病症與大人治療無異獨於驚風一症原無經旨皆後人因象取名妄擬混呼由是訛以傳訛謬增症治耳夫驚者駭也恐怖也懵然觸其不備之謂也前哲云小兒陽常有餘言其氣浮而暴非真陽有餘乃氣躁也小兒陰常不足言臟元之未滿非真陰不足也故小兒因臟腑神氣不固心怯膽小偶睹奇形怪象突聞驟震大呼以及雞犬牛馬之奔弛能令小兒致驚驚則真元恍惚寤寐不寧作熱作搐恐挾外感即於養臟安神隊中兼帶發散自愈如無外感則取大人寧靜之精神安鎮小兒擾攘之氣魄所謂同氣相求以為翕聚之機也溯諸本旨今人所云急驚即傷寒門中剛痙剛痙原系陽症起於淫邪侵犯腑合發熱口渴手足抽掣角弓反張形狀類風宜遵正治有風治風見痰治痰發熱退熱畏寒除寒略重者須於剛痙條內節取祖方治之今人所云慢驚即傷寒門中柔痙柔痙本屬陰症因於胎元不足有發熱不發熱者有口渴不口渴者反張抽掣較剛痙差緩宜遵反治急須分經溫補先救臟真則痰搐寒熱可不治而自愈矣間有內外病因須要微存寒熱風痰不可盡徹必俟臟氣大回凶症悉減方可更藥去之今人所云慢脾即傷寒門中亡陽壞症筋惕肉瞤是也明見機兆一至急取四將四逆或真武等湯救之凡治真元衰憊要在病症未及全現之先庶可挽回千百中之一二如病盡發而後藥之勢必萬無可及矣至有吐泄並作非關陽腑嘔泄者更宜急補火土間有半陰半陽病症夾雜者亦宜穩守陰盡回陽方可更行清涼以盡拔病本耳又有一種小兒胎元充足臟氣強旺生來面部關筋氣色俱善縱冒重感均屬淫邪暴病如果僅在合分皮毛血肉骨骼之間尚與臟腑無咎不可亂投藥餌恐其引邪入內宜遵推拿之法即安但或氣色不善不可妄推臟氣若經推散病勢頓劇卒難生聚慎之慎之列圖於下以便需用者之採擇焉推法先取生薑水蔥搗碎巾裹揪出自然汁三盞暖熱用二大拇指醮汁先從眉心雙推二十四下次從眉心分推左右至太陰太陽九下次從天庭步步下至承漿各穴掐一下以代針法更於太陰太陽二穴或發汗或止汗次將兩耳下垂尖掐而揉之次將兩手捧頭而搖之以順其氣次看寒熱向手推三關六腑運八卦分推胸口並揉臍挨委中畢再揉井肩至於別穴看症再加揉法推三關退六腑運八卦男女俱在左手以男左女右分論大誤兒眼翻上者將大指甲在小天心向掌心一掐即平又眼翻上者將大指甲在小天心向總筋一掐即平凡推上三關十下必須退下六腑三下以應之宜輕如退下六腑十下當輕輕推上三關三下以應之庶為補瀉得宜推往手背一頭為上推往五指尖梢為下三關陽也此處為陽極陰生之地女陰道故從陰生處推上為涼為瀉六腑陰也此處為陰極陽生之地男陽道故從陽生處退下為涼為瀉訣曰腎水一紋為後谿推上為清下補之小便閉赤清之妙腎虛便速補為宜心肝脾肺四臟在上故以推上為補推下為瀉腎臟在下故以推下為補推上疏通水道而小便自清故為瀉反此必推之不驗凡驚搐來急於大墩穴拿之或鞋帶穴對拿如小兒溺死在大墩穴按之無脈再按解谿穴又無脈不必醫治若二處稍有急以參附大方救之即蘇凡驚搐來時兒身往前僕即將委中穴向下掐住身便正若身往後仰即將膝上鬼眼穴向下掐住身便正望形色審苗竅小兒惟以望為主問繼之聞又次而切則無矣蓋望形審竅自知其病五臟之苗竅形見於頭面之間舌乃心之苗紅紫心熱也腫黑心火極也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃脾敗也牙床紅腫熱也破爛脾胃火也唇乃脾胃之竅紅紫熱也淡白虛也如漆黑者脾胃將絕也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也齒如黃豆腎氣絕也目乃肝之竅勇視而睛轉者風也直視而不轉睛者肝氣將絕也以目分言之又屬五臟之竅黑珠屬肝純是黃色凶症也白珠屬肺色青肝風侮肺也淡黃色脾有積滯也老黃色乃肺受濕熱疸症也瞳人屬腎無光采又兼黃髮腎氣虛也大角屬大腸破爛肺有風也小角屬小腸破爛心有熱也上皮屬脾腫脾傷也下皮屬胃青色胃有寒也上下皮睡合不禁露一線縫者脾胃虛極也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也唇之上下屬腎坎水也五臟里也六腑表也小腸心之表小便短黃澀痛心熱也清長而利虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃也大腸肺之表閉結肺有火也肺無熱而便閉必血枯不可通下脫肛肺虛也膽乃肝之表口苦肝旺也聞聲作嚇肝虛也膀胱腎之表居臍下氣海之右筋腫筋痛腎水之寒氣入膀胱也面有五色一曰紅紅病在心面紅者熱一曰青青病在肝面青者痛一曰黃黃病在脾面黃者脾傷一曰白白病在肺面白者寒一曰黑黑病在腎面黑而無潤澤腎氣敗也望其色若異於平日而苗竅之色與面色相符則臟腑虛實無有不驗者矣臍風說凡小兒初離母胎時當以暖護為第一緊要三朝內外必須時時檢點謹防臍風如過一七外則此症無憂矣如小兒兩眼內角挨眉心之下山根年壽之間微起黃色狀類雞胵里之皮則兒口含乳吞吃之間必較先前略鬆此即臍風初起徵兆急將兒左手小指曲著醮點薑蔥熱汁重揉外勞宮隨用燈火於囟門眉心人中承漿兩手大指少商穴每穴一灸臍輪六灸未落臍帶即於帶口燃之或灸之如臍帶已落即於臍心一灸共十三灸則風止寒散而黃皮漸退矣如過期治緩則黃色侵入鼻準而兒口緊撮侵入人中兩旁則拘急囊縮侵入明堂則舌強難乳侵入天庭則兩目直視鼻孔黑煤而死矣凡此皆系初浴兒時欠細心之故也因其扎臍繩松則兒之元氣真血俱從此處走泄兼以拭水未盡一經風襲則生寒風寒假氣血之玄關而變為劫廬之捷逕由臍入腹郁生頑痰肝臟風木也撓之則鳴肝竅通於目徵位應乎山根故微黃初發起於目之兩內角連及山根之間木病必逆傳於上脾開竅於口故黃色侵鼻而口隨撮矣土病必逆傳於水腎之苗發宗筋徵應在人中之兩旁故黃色侵入則囊縮矣腎統周身筋骨故現拘急水病必逆傳於心舌乃心之苗徵應在明堂故黃色侵入則舌強短縮真火發越故筋惕肉瞤風火交煽故躁擾不寧閃撲呱呼咬舌嚼指勢所必至心病必逆傳於金肺竅通於鼻孔徵位應在天庭若黃色侵入則鼻孔黑燥汗透如珠金再逆回於木肺傳之肝則兩目圓直上視六臟絕六腑盡九竅閉筋骨弛硬而死矣以上諸症均系小兒臨危必有之候不獨臍風為然也學者察之病須知機與大人可參黃帝問曰願聞病機何如岐伯對曰諸風掉眩皆屬於肝諸寒收引皆屬於腎諸氣膹郁皆屬於肺諸濕腫滿皆屬於脾諸熱瞀瘛皆屬於火諸痛癢瘡皆屬於心諸厥固泄皆屬於下諸痿喘嘔皆屬於上諸禁鼓慄如喪神守皆屬於火諸痙項強皆屬於濕諸逆衝上皆屬於火諸脹腹大皆屬於熱諸躁狂越皆屬於火諸暴強直皆屬於風諸病有聲鼓之如鼓皆屬於熱諸病胕腫疼酸驚駭皆屬於火諸轉反戾水液渾濁皆屬於熱諸病水液澄澈清冷皆屬於寒諸嘔吐酸暴注下迫皆屬於熱謹守病機各司其屬有者求之無者求之盛者責之虛者責之必先五勝疏其血氣令其調達而致和平又云黑色現於明堂大如拇指者其人必暴死夫明堂本屬心火正位黑乃左腎寒水真色今無故而逆加天庭必其人相火已損不能暖散寒邪君火已傷難於照伏陰翳宜急施參附薑桂大方重投至黑色收盡為度庶令將滅之陽火復明已動之寒陰歸位耳凡醫診視病者務必大燃火炬將氣色二字睈音逞的如遠觀面目鼻唇紅明閃爍鮮豔可愛而口渴壯熱近覸皮內肉氣黯滯青恍此係真陽浮越純陰凶急之機宜用四將四逆遵法收之十中可挽一二若誤認作陽症汗之下之以除煩解躁清之涼之以止渴退熱轉瞬必變氣喘痰鳴頸大筋粗肉瞤筋惕手足抽掣兩目虫敢矊上𤸷呃逆而死矣如遠觀面目鼻唇黑滯䱒䱂色惡不堪近覸皮內肉氣動隱紅黃濃睡神安倦食懶言此乃元真搏聚雷斂龍伏不過外感風寒蘊蓄火毒純陽之機兆也急宜發散以除煩渴攻裡而解燥熱自獲安愈若誤認為虛妄投參朮勢必病上加病而致重實矣經曰諸寒之而熱者取之陰諸熱之而寒者取之陽所謂求其屬也其餘大小病症無不各有機兆如或面色青者乃陰寒為痛之機面色赤者真元外越之機面色黑者勞損之機面色黃者脾胃受傷之機面黃色而鮮明者胸中有留飲之機鼻頭色青者胸中有寒痰之機鼻頭色微黑者胸中有陰寒鼻頭色黃者脾胃有痰積鼻頭色白者病因亡血鼻色紅活鼻氣黃潤乃是陽火生土鼻色紫赤鼻氣枯紅即系陰火燥土凡看面圖部位青如翠羽赤如雞冠黃如蠏腹中白如豕膏黑如烏羽紅如石榴子乃氣色俱善之生機也若青如草滋赤如衃血黃如枳實白如枯骨黑如煙煤紅如丹紙乃色枯氣脫之殺機也又以面黃目青面黃目赤面黃目黑者為生機面青目赤面赤目白面青目黑面黑目白面白目青者為殺機聲呼而手頻握者肝病之機時笑時憂而怔忡者心病之機歌唱而噦者脾病之機哭泣時咳者肺病之機呻吟戰慄者腎病之機聲音如向甕中言者中濕之機語言微小後語似難接續者氣奪之機語言失謹不顧廉恥者神亂之機語聲寂寂然喜驚呼者骨節間受病之機語聲喑喑然不徹者胸膈間受病之機語聲啾啾然細而長者頭腦中受病之機首身先俯欲言強仰言未盡聲中忽帶噯哊而側向者腰腹股節間受病之機聲中重濁者痰病之機鼻中言語者寒病之機語言蹇澀者風病之機語言疾憤者火躁之機語言斷續者脾病之機胸中悶亂者嘔之機腹內煩冤者瀉之機壯熱者痙之機燥悶者汗之機眸睛恍惚側觀上瞬似無一定矚物者痰病之機安眠氣靜遍體微熱日重夜輕狀似蠃弱者實症之機躁擾不歇身半以上熱身半以下冷頭生瘠疽喉舌腫潰夜重日輕者陰症之機凡病初來診其邪犯之所如止在絡脈經脈安靜此犯腑之機也治在腑合即俗云腦痛救腦腳痛救腳其病立愈如或脈止有浮無沉錯亂參差又或急硬堅搏似棍如刀病雖在腑內淫犯臟之機已現急早施補養以救臟真庶可保全若誤作腑合病治直逼邪氣之深入速催臟氣之喪亡也更有一種肌肥肉厚之小兒內氣光白外色紅豔體質豐而皮毛脆媆貌雄偉而神瞳黯䱂無時口角流涎沫沾衣襟即損此係痰胎先天生來火土不足三元秉賦欠充乃純陰慘惡之機傷比酒色尤甚非假參附薑桂拔盡本原陰毒病發即不治矣凡病無大小各有機兆學者不可不察之也
