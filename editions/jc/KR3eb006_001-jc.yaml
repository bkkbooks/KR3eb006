body:
  text: 卷一臟腑系屬圖說臟腑內景各有區別故咽喉二竅同在一脘異途施化喉在前主出咽在後主吞喉系堅空連接肺本為氣息之路呼吸出入下通心肝之竅以激諸脈行氣之要道以行肌表臟腑者也咽系柔空下接胃本為飲食之路水穀同下並歸胃中乃糧運之關津以司六腑之出納者也二道並行各不相犯蓋飲食必歷氣口而下氣口有一會厭當飲食方咽會厭即垂厥口乃閉故水穀下咽咽不犯喉若言語呼吸則會厭開張故當食言語則水穀乘氣送入喉脘遂嗆而咳矣喉下為肺兩葉白瑩謂之華蓋以覆諸臟虛如蜂窠下無透竅故吸之則滿呼之則虛一呼一吸本之有源無有窮也乃清濁之交運人身之槖鑰肺之下為心心有系絡上繫於肺下乃灌注其象尖長而圓其色赤其中竅數多寡不同上通於舌下無透竅心之下有心包絡即膻中也象如仰盂心即居於其中九重端拱寂然不動凡脾胃肝膽兩腎膀胱各有一系繫於包絡之旁以通於心此間有宗氣積於胸中出於喉嚨以貫心脈而行呼吸即如霧者是也如外邪干犯則犯包絡心不能犯犯即死矣此下有膈膜與脊脅周流相著遮蔽濁氣使不得上熏心脈膈膜之下有肝肝有獨葉者有二三葉者其系亦上絡於心包為血之海上通於目下亦無竅肝短葉中有膽附焉膽有汁藏而不瀉此喉之一竅也施氣運化薰蒸流行以成脈絡者如此咽至胃長一尺六寸通謂之咽門嚥下是膈膜膈膜之下有胃盛受飲食而腐熟之其左有脾與胃同膜脂𫆳相連色如馬肝赤紫形如刀鐮聞聲則動動則磨胃食乃消化胃之左有小腸後附脊膂左環回周疊橫其注於迴腸者外附臍上共盤十六曲右有大腸即迴腸當臍左回周疊積而下亦盤十六曲廣腸附脊以受迴腸左環疊積下闢乃滓穢之路廣腸左側為膀胱乃津液之府五味入胃其津旋上升精者化為血脈以成骨髓津液之餘流入下部得三焦之氣施化小腸滲出膀胱滲入而溲便注泄矣凡胃中腐熟水穀其精氣自胃口之上口曰賁門傳於肺肺播於諸臟其滓穢自胃之下口曰幽門傳於小腸至小腸下口曰關門泌別其汁清者滲出小腸而滲入膀胱滓穢之物則轉入大腸膀胱赤白瑩淨上無所入之竅止有下口其出其入全假三焦之氣化施行氣不能化則關格不通而為病如入氣不化則水歸大腸而泄瀉出氣不化則閉塞下竅而為癃閉矣此咽之一竅資生氣血轉化糟粕而出入者如此三焦者上焦如霧中焦如漚下焦如瀆有名無形主持諸氣以象三才故呼吸升降水穀腐熟皆待此通達與命門相為表裡上焦出於胃口並咽以上貫膈而布胸中走脅循太陰之分而行傳胃中谷味之精氣於肺肺播於諸脈即膻中氣海所留宗氣是也中焦在中脘不上不下主腐熟水穀泌糟粕蒸津液化其精微上注於肺脈乃化為血液以奉生身即腎中動氣非有非無如浪花泡影是也下焦如瀆其氣起於胃下脘別迴腸注於膀胱主出而不納即州都之官氣化則能出者下焦化之也腎有二精所舍也生於脊膂十四椎下兩旁相去各一寸五分形如豇豆相併而曲附於脊外有黃脂包裹里白外黑各有帶二條上條繫於心包下條系屏翳穴後趣脊骨兩腎一屬陰一屬陽命門即在兩腎各一寸五分之間當一身之中經曰七節之旁有小心是也名曰命門是為真君主乃一身之太極兩腎以為安宅也其右旁有一小竅即三焦之䘁穴也三焦是其臣使之官稟命而行周流於五臟六腑之間而不息名曰相火此先天無形之火與後天有形之心火不同其左旁有一小竅乃真陰真水氣也亦無形上行脊至腦為髓海泌其津液注之於脈以榮四肢內注五臟六腑以應刻數隨相火而潛行於周身與兩腎所主後天有形之水不同但命門無形之火在兩腎有形之中為黃庭故曰五臟之真惟腎為根人之初生受胎始於任之兆惟命門之一點先具而後有腎則與命門合二數備是以腎有兩岐而命門居於其中也由是肝心脾肺相繼而生五臟成而百骸備矣可見命門真火者立命之本為十二經之主腎無此則無以作強而技巧不出矣膀胱無此則三焦之氣不化而水道不行矣脾胃無此則不能蒸腐水穀而五味不出矣肝膽無此則將軍無決斷而謀慮不出矣大小腸無此則變化不行而二便閉矣心無此則神明昏而萬事不能應矣夫既為立命之門則此火乃人身之至寶而世人不知保養此火醫者不知溫養此火是安望其有生氣也然命門之火乃水中之火相依而永不相離也火之有餘緣真水之不足也毫不敢去火只補水以配火壯水之主以鎮陽光火之不足因見水之有餘也亦不必瀉水就於水中補火益火之源以消陰翳是為同氣相求斯易以入也今之醫者知風寒暑濕之為客氣而漫不加意於主氣何也即有言固主氣者亦專以脾胃為一身之主焉知坤土為離火所生而艮土又為坎水所生也吾知為仙為佛不過克全此火而歸之耳改正內景之圖心系七節七節之旁中有小心以腎系十四椎下由下而上亦七節衝任皆起於胞中而上行於背裡即子宮也為男子藏精之所為女子於此受孕因名胞舊圖有精道循脊背過肚門且無子宮命門之象皆誤也今改正之三焦圖三焦者決瀆之官水道出焉是經少血多氣中藏經曰三焦者人之三元之氣也主升降出入統領五藏六府營衛經絡內外左右上下之氣三焦通則內外左右上下皆通其於周身灌體和內調外營左養右導上宣下號曰中清之府莫大於此也形色最赤總護諸陽非無狀而空有名者也經絡貫通說臟腑經絡與周身相貫通故視其外應各得其本乎內者之所由矣如頭面者六陽脈之會也足太陽膀胱之經脈上額交巔入絡腦其經筋一結於完骨一結於枕骨手太陽小腸之經脈別頰上䪼外絡顴其經筋上結於完骨下結於頷間足陽明胃之經脈從頰車循髮際至額顱其絡脈絡於頭項其經筋合於頄足少陽膽之經脈上頭角抵䪼下加頰車其經筋上額角交巔上下走於頷上結於頄手少陽三焦之經脈至䪼交頰其經別別於巔其經筋當曲頰手陽明大腸之經脈上頸貫頰其絡脈上曲頰其經筋上頰結於頄上左角絡頭下右頷此六陽脈之循於頭面者也手足陰脈惟腎之經筋結於枕骨肝之支脈從目系下頰裡肝之經脈從目繫上頭額與督脈會於巔蓋督脈亦上額交巔入絡腦也枕骨之脈凡三陽維經脈入髮際循枕骨腎之經脈結於枕骨膀胱之經筋亦結於枕骨完骨之脈凡二膀胱之經筋結於完骨小腸之經筋亦結於完骨巔之脈凡五膀胱之經脈交於巔三焦之經脈別於巔肝與督脈會於巔膽之經脈交於巔上額之脈亦五督脈同膀胱上於額肝脈出於額胃脈至於額顱膽脈上於額角眉屬此二經而眉心曰闕應肺頰之脈凡四小腸之經脈別於頰大腸之經脈貫於頰肝之經脈下於頰三焦之經脈交於頰曲頰之脈凡二三焦之經脈當曲頰大腸之經脈上曲頰頰車之脈亦二胃之經脈循頰車膽之經脈加頰車䪼切拙之脈凡三小腸之經脈上於䪼三焦之經脈到於䪼膽之經脈抵於䪼頄之筋凡四胃之經筋合於頄膽之經筋結於頄大腸結頄陽維入頄音葵求同頷之筋凡三小腸之經筋結於頷大腸之經筋下右頷膽之經筋下走頷出頤頷中頤之脈凡二胃之經脈循於頤後膽之經筋出於頤中頭腦之脈凡四膀胱與督脈絡於腦胃之絡脈大腸之經筋絡於頭而小腸一脈獨絡於顴也髮際之脈凡二胃之經脈循於額前陽維之經脈入於腦後面之脈凡四任之經脈循於面心之絡脈出於面膽之經別散於面陽明之脈營於面耳目之脈內經曰耳者宗脈之所聚也宗脈者百脈一宗肺所主也百脈之血氣水穀所生胃所主也故胃中空則宗脈虛虛則耳鳴膽之經脈起於目銳眥上抵頭角下耳後從耳後入耳中出走耳前至目銳眥三焦之經脈系耳後出耳上角其支者從耳後入耳中走出耳前亦至目銳眥蓋耳目之上下前後惟手足少陽之經脈往來為多胃之經脈出耳前包絡經別出耳後膀胱經脈至耳上角小腸支脈入於耳中大腸之經脈入耳合於宗脈目者亦宗脈之所聚也膀胱之經脈起於目內眥其經筋為目上綱胃之經別系目系其經筋為目下綱膽之經脈起目銳眥其經別系目系其經筋結於目眥為外維小腸三焦之支脈並至目銳眥其經筋皆屬目外眥心之經脈系目系合目內眥肝之經脈連目系督脈起目眥蹺脈屬目內眥任脈入目下而絡承泣口鼻之脈內經曰口鼻者氣之門戶也經脈循行於口鼻者凡八一曰胃其經脈起於鼻之交頞中循鼻外挾口環唇交承漿其經別循咽出於口其經筋挾口結於鼻一曰大腸其經脈挾口交人中左之右右之左上挾鼻孔一曰小腸其經脈別頰上䪼抵鼻至目內眥一曰肝其經脈從目系下頰裡環唇內一曰任其脈別絡口唇一曰督其脈上頤環唇一曰陰蹺其脈入頄鼻之旁一曰陽蹺其脈與胃脈會於口吻循行於鼻旁八脈循行於口鼻之外者如此齒舌之脈陽脈入齒故剛陰脈系舌故柔足陽明胃脈入上齒中手陽明大腸脈入下齒中心之絡脈系舌本肝之經筋絡舌本脾之經脈連舌本散舌下腎之經脈挾舌本咽喉之脈咽之脈五心之經脈從心系上挾咽系目系脾之經別結於咽貫舌中膽之經別貫心以上挾咽出頤頷中胃之經別上通於心循咽出於口小腸經脈絡心循咽下膈喉之脈七心之經別由心中上走喉嚨包絡經別由三焦出循喉嚨腎之經脈入肺中循喉嚨挾舌本肝之經脈循喉嚨之後上入頏切杭顙肺之經別上出缺盆循喉嚨大腸經別上循喉嚨入缺盆胃之經脈下人迎循喉嚨入缺盆胃之絡脈上絡頭項合諸經之氣下絡喉嗌頸項之脈腦後為項兩旁為頸經脈循行於項者凡五膀胱經脈上額交巔入絡腦還出別下項是從前而上入而復出從後而下者也胃之絡脈上絡頭項下絡咽嗌是從後而上從前而下者也膀胱經別從膂出於項腎之經別從舌出於項膀胱經筋挾脊上項腎之經筋挾膂上項督脈從目內眥上額交巔下項陽維脈從背外肩髀項旁上頭後會督脈於風府啞門穴經脈循行於頸者凡四胃之經脈從頤後出大迎循頰車是從上而下下而復上者也大腸支脈從缺盆上頸貫頰是從下而上者也小腸支脈從缺盆循頸上頰膽之經脈從頰車下頸合缺盆是膽與小腸頰與頰車一上一下之有別者也此其起止上下出入先後而莫可混同也胸腹之脈內經曰胸腹者藏府之郭也而膈者胸腹之界畔經脈之總關也經脈之循行上下於胸膈腹者凡十有五肺者百脈之始也其經脈起於胃之中焦下絡大腸還循胃口上膈其經筋上結於缺盆下結於胸裡其次為大腸之經脈上出督脈之大椎下入缺盆絡肺下膈其經別循行於膺乳其次為胃經脈之支者從缺盆下膈絡脾其直者從缺盆下乳內廉下挾臍入氣街中其絡脾之支起於胃口下循腹裡至氣街中而合會衝脈而上行會任脈於承漿者胃脈之環唇者也其大絡名曰虛里貫膈絡肺出左乳下其經筋從陰器上腹而四布至缺盆而總結其次為脾之經脈從膝股內前廉入腹絡胃而絡胃之支復從胃而上膈其大絡四布於胸脅其經筋從陰器上腹結於臍循腹裡結於肋其次為心之經脈從心系下膈絡小腸其經筋挾乳里上結胸中下繫於臍其次為小腸之經脈入缺盆絡心循咽下膈抵胃屬小腸之分其次為腎經脈之支者從肺出絡心注胸中其經脈與膀胱交絡腎絡膀胱膀胱絡腎腎與膀胱為表裡故也十二經脈惟膀胱脈不行於胸膈腹其次為包絡之經脈起於胸中下膈歷絡三焦其支者循胸中出脅其經筋由腋散於胸中其次為三焦之經脈入缺盆布膻中散絡心包下膈其絡脈外繞於臂內注於胸中其經別上入缺盆下走三焦散於胸中其次為膽之經脈從缺盆以下胸中貫膈絡肝循脅裡出氣街其直者循胸腹過季脅行帶脈五樞維道居髎切料其經別循腹裡其經筋繫於膺乳結於缺盆其次為肝之經脈過陰器抵小腹挾胃絡膽貫膈注肺肺肝所以為終始也任脈起於毛際循腹內行會於衝脈循腹外行至於咽喉督脈循腹裡與任脈會於關元之間與衝脈會於腹氣之街衝脈者起於腹氣之街也帶脈者起於季脅周迴一身如束帶然是總束一身之脈者也腰背之脈腰背界限分在脊骨自大椎而下十四節為背自尾骶切邸而上七節為腰而督脈循行上下於二十一節其下而上者循篡上少腹貫臍中央入喉上頤環唇系目其上行而下者從目內毗上額交巔下項挾脊抵腰中下至篡環轉周身前後應天道之繞地環轉以總督一身之陽十四節之下七節之上其間為性命之門故名曰命門乃督脈之穴也夫循行於背脊之中者督脈也而脊骨之左右各開一寸五分膀胱之經脈也其脈從大椎循肩髀內挾脊抵腰中從腰中挾脊貫臂下膕此夾督脈之第一行五臟之腧穴所由出者也脊骨之左右各開三寸膀胱之支脈也其脈從膊內左右別下貫脾挾脊內過髀樞下合膕中此夾督脈之第二行循京骨至小指外側者也腰背之脈凡五行經曰五藏之腧出於背背中大腧在抒骨之端肺腧在三焦之間心腧在五焦之間膈腧在七焦之間肝腧在九焦之間腎腧在十四焦之間皆挾脊相去三寸所左右各開中行一寸五分則欲得而驗之按其處應在中而痛解乃其腧也灸之則可刺之則不可夫五藏之腧皆出於足太陽之經者五行之生本乎天一之水膀胱為水府而應於督脈此陰陽水火之氣交也經曰腰脊者身之大關節也故養生之大法在督而其至要在腰脊蓋五藏皆繫於背腰脊豎立則背脊正直背脊正直則四體五官皆正四體五官皆正則五藏之系無有不順正而和暢矣腋脅之脈肩下曰腋腋下曰脅脅之盡處曰季脅季脅之下曰䏚俠骨兩旁虛軟處之名也肺之經脈從肺系橫出腋下其經筋從胃之賁門下抵乎脅心之經脈從心系上肺下出腋下其經筋從肘之內廉上入於腋包絡經脈循胸中出脅下腋三寸上抵腋下其經筋自肘內廉上臂陰結於腋下下散前後挾脅膽之經脈循脅裡出氣街其直者從缺盆下脅循胸過季脅其經筋上乘䏚季脅上走脅前廉繫於膺乳結於缺盆其直者上出腋脾之大絡出膽經之淵液穴下四布於胸脅其經筋從臍循腹裡結於肋小腸之經筋自肘內銳骨之後入結於腋下帶脈與足少陽交於季脅之下陰維脈與足厥陰交於乳下二肋端縫此經脈循行於腋於脅於䏚於季脅者凡七也肩手之脈經脈行於手者六陰脈內行故手三陰肺心包絡脈皆行於腋臑肘臂腕掌之內也陽脈外行故手三陽大腸小腸三焦脈皆行於肩臑肘臂腕掌之外也肺脈從肺系橫出腋下循臑內下肘中循臂內入寸口上魚循魚際出大指之端其支者從腕後出食指之端其經別入掌中其經筋下結於魚後上結肩前髃心脈從心系上肺下出腋下循臑內後廉下肘內循臂內後廉抵掌後銳骨之端入掌內後廉出小指之端包絡脈從胸中出脅下腋三寸上抵腋下循臑入肘中下臂入掌中循中指出其端其支者別掌中循無名指出其端肺脈行包絡脈之前心脈行包絡脈之後包絡脈行肺脈心脈之中此三陰脈止於大指小指中指三指之端而皆出於腋下者也大腸脈起於食指之端出合谷循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉小腸脈起於小指之端循手外側上腕出髁中循臂骨下廉出肘內側循臑外後廉出肩解繞肩𬌺交肩上三焦脈起於無名指之端循手表腕出臂外上貫肘循臑外上肩而交出足少陽膽脈之後大腸脈行三焦脈之前小腸脈行三焦脈之後三焦脈行大腸小腸脈之中此三陽脈起於食指小指無名指三指之端而皆出於肩上者也肺之經脈出大指肺之支脈出食指三焦經脈出中指三焦支脈出無名指是一脈而行於兩指者也肺之支脈出食指內廉大腸經脈出食指上廉心脈出小指內側小腸脈起小指外側包絡脈出無名指內側三焦脈起無名指外側是一指而有兩脈者也股足之脈經脈行於足者六陰脈三曰脾腎肝陽脈三曰胃膽膀胱內陰而外陽此手足之所同者也脾脈起於大趾之端循趾內側過核骨後上內踝前循腨內脛後由膝股內前廉入腹腎脈起於小趾之下斜趨足心循內踝之後入跟中由腨內膕內股內後廉貫脊肝脈起於大趾叢毛之下循足跗上廉由內踝上膕內廉循股陰入毛中脾脈行肝脈之前腎脈行肝脈之後肝脈行脾脈腎脈之中此三陰脈行於股足之內者也胃脈循腹裡以下髀關抵伏兔由膝臏中循脛外廉下足跗入次趾外間其本支別支一自下巨虛穴下入次趾外間一別循跗上入大趾次趾間出其端膀胱脈從腰中挾脊貫腎過髀樞循髀外入膕中貫腨內出外踝之後循京骨至小趾外側膽脈繞毛際入髀厭中循髀陽出膝下由外輔骨之前下抵絕骨之端出外踝循足跗入四趾之間其支者別於跗上入大趾之間循大趾岐骨內出其端還貫爪甲出三毛胃脈行膽脈之前膀胱脈行膽脈之後膽脈行胃脈膀胱脈之中此三陽脈行於股足之外者也脾與胃肝與膽腎與膀胱內外相對表裡交通足與手無以異也二陰之脈內經曰腎開竅於二陰肝腎經脈同行於膕過二陰之前後腎之經脈則出膕外廉上股內後廉貫脊屬腎絡膀胱肝之經脈則上膕內廉循陰股入毛中過陰器抵小腹挾胃屬肝絡膽肝腎之經筋雖並循陰股結於陰器足少陰之筋起於小指之下合於足太陽足厥陰之筋起於大指之上絡於諸筋起止有不同者也脾胃之經筋亦並結於陰股聚於陰器雖與肝腎同處然結與循聚與結有不同者也凡此經脈之循行起止結聚不可不細辨也經曰前陰者宗筋之所聚太陰陽明之所合也前陰後陰之間有穴名會陰者乃任督沖三脈同出之源一源而三岐也任脈上毛際循腹裡會衝脈於氣街督脈由毛際之下橫骨內之中央女子入系廷孔男子循陰器合篡間繞篡後合膀胱於尾閭經曰衝脈者經脈之海也主滲灌溪谷與陽明合於宗筋陰陽總宗筋之會陰陽即以上諸脈會於氣街而陽明為之長陽明者胃脈也心脾之所資生者也若夫肺開竅於鼻肝開竅於目腎開竅於耳心開竅於舌脾開竅於唇口以及肺主皮毛肝主筋腎主骨心主血脈脾主肌肉四肢其內外相因之理無不昭然若揭也矣骨度名位內經曰骨為幹脈為營夫十二經脈之在身無處不周流貫通雖爪甲毫毛不可忽視靈樞序經脈固為詳明如曰起曰支曰別曰中曰橫直曰側斜曰廉際曰上下前後表裡內外曰循行抵挾曰趨走屈卻曰過還歷至曰環繞布散出入交會曰連繫曰屬絡曰貫注曰間曰會曰從曰端不熟於骨度名位而欲求其辨別詳明未可擬議而能知者也經曰治病必求於本故欲知脈者不可不知身身者經脈經絡經別經筋奇經八脈之本也頭為身之首頭之頂曰巔頂之中央有穴名百會諸陽之會也顛之前曰囟音信囟前髮際下曰額顱一曰顙兩旁曰頭角兩太陽之骨曰鬢骨顛之後曰腦後骨其下曰枕骨枕骨之下耳之後曰完骨眾骨之合為腦經曰腦為髓之海夫面為藏府肢節之部五色之辨經曰十二經脈三百六十五絡其血氣皆上於面而走空竅目者司視之竅也上下眼皮曰胞為目之外衛上下眼弦曰綱一名瞼一名睫司目之開闔眼角曰眥外決於面者曰銳眥在內近鼻者曰內眥上曰外眥下曰內眥黑白珠曰目睛入腦之系曰目系目上之骨曰眶一名眉稜骨目下之骨曰䪼耳者司聽之竅也耳門曰蔽耳輪曰郭曰頰耳前也曰客主人膽經之穴名也在耳前之起骨曰曲頰曲如環形受頰車骨尾之鉤者曰頰車下牙床骨尾形如鉤上控於曲頰之環耳前上下之骨也顴音權者面兩旁之高骨耳門之內上通腦髓耳門之骨兩骨合鉗上即曲頰下即頰車鼻者司臭氣好之竅也鼻之梁曰頞音遏鼻兩旁曰頄音逵近門牙之骨者鼻之盡處曰准音拙頭鼻之竅曰孔兩孔之界骨曰鼻柱內竅曰頏顙在口內上齶外竅曰畜門口者司言食之竅也口端曰唇四周曰吻口角後曰頤頤後曰顑音坎俗呼為腮在頰前空軟處下唇之末曰頦音孩俗名下巴殼上載牙齒上唇之中曰人中下唇之中曰承漿頦之下結喉之上兩側曰頷在兩旁虛軟處齒本曰齘頷之後曰大迎胃之穴名也舌者司味之竅也舌根曰舌本小舌曰懸雍垂會厭者覆喉管之上似皮似膜聲音之戶也發聲則開咽食則閉咽者飲食之路也居喉之後喉者聲息之路也居咽之前喉嚨者肺之系也咽嗌者胃之系也結喉者喉之管頭也瘦人見於皮下肥人隱於肉中結喉兩旁曰人迎亦胃之穴名也頭下兩旁為頸頸前為喉頸後為項項下之骨三直歷項下名曰柱骨其下曰大椎骨即骨脊第一節兩肩端之骨曰髃音魚兩肩後之骨曰肩胛音夾肩內之骨曰肩膊音博其臼接臑骨上端其外捲曲翅骨者肩後之稜骨也夫背自大椎骨以下盡尻骨之上端凡二十一節名曰骨脊上載兩肩內系肺肝其兩旁諸骨附脊橫疊而彎合於前則為胸脅脅骨一名肋骨季脅者脅之盡處季脅之下夾骨兩旁其名曰䏚音秒俠脊兩旁虛軟處腎外當䏚踝骨之上腰下兩旁其肉曰胂音砷胂下尻邱刀切考平聲旁之大肉曰臀兩旁直上曰膂音呂膂者如藕中之經緒膂上兩角為肩解下曰膝解連綴肢節曰解脊骨之下肛門之後其骨名曰尻骨男子周布九竅女子周布六竅一名尾骶肛門者大腸之下口也喉下之骨三橫列喉下其在下者名上橫骨兩旁之骨名拄音主骨橫臥於兩肩之前內接橫骨外接肩解兩陷中曰缺盆缺盆之外拄骨之下曰胸兩旁高處曰膺蔽心骨曰鳩尾兩旁曰岐骨胸脅交分之扁骨曰骹胸下邊肋曰鳧骨缺盆以下九寸曰𩩲骭兩乳中間曰膻中其下曰腹腹下曰臍臍下曰小腹一名少腹下曰毛際兩旁曰氣街前陰曰陰器男曰莖垂女曰廷孔兩陰之間兩股相合之縫前自水道後至穀道名曰篡環繞陰器曰毛中男子兩丸曰睪音高丸經曰前陰者宗筋之所聚太陰陽明之所合也夫一身之骨皆彎合於前惟上下橫骨彎合於後上橫骨外接拄骨關鍵兩肩之內為兩肱之樞機咽喉之關也下橫骨外連髁骨關鍵兩臀之內為兩股之樞機腸胃之關也肩下脅上曰腋肩肘之間曰臑臑之盡處曰肘肘以下曰臂肘內高骨曰銳骨臂之盡處外側高骨亦曰銳骨一名髁骨掌骨之後盡處曰腕掌骨曰壅骨掌中曰手心掌外曰手背手掌之面大指之下肉形隆起如魚謂之魚而內側白肉際曰魚際肺之穴名也大指食指兩骨之間曰合谷俗名虎口大腸之穴名也手指五曰大指曰小指曰中指曰大指次指即食指曰小指次指即無名指臀下膝上曰股股之大骨曰髀音彼骨上端如杵名髀樞上接踝骨之臼其臼名髀厭杵臼相交之外側曰髀陽即膽經之環跳穴也踝骨之面曰髖音寬婦人骨俗名交骨形如楗柱橫寬如楗兩末垂下如柱居尻之前與尻骨成鼎足之形為坐之主骨也髀骨下端如杵接於胻音桁骨其骨三名一名脛一名成一名骭音干髀胻之交名曰膝膝上蓋骨曰臏賓去聲骨形圓而扁覆於髀胻兩骨相交之上膝外側兩高骨曰連骸內外之骨突出者曰輔骨內曰內輔外曰外輔腨膝上之肉隆起似兔伏曰伏兔伏兔後曰髀關膝後屈處如側凹曰膕其下曰踹音短即腳肚骨下兩旁之高骨曰踝音懷在外為外踝上曰絕骨足三陽大絡之會處也在內為內踝胻前曰然谷足少陰腎經之穴名也足大指內側骨形圓突者曰核骨足小指之後外踝下之前曰京骨跟骨者上承胻輔二骨者也足背曰跗一名足趺底曰踵中曰足心爪甲之後為三毛橫紋之後為叢毛夫手足之指數同而節數不同近掌曰本節由本節而次數之曰二節三節有異同焉手足之大指皆三節足之小指亦二節手足之中三指皆三節手之小指亦三節指甲曰爪甲兩骨曰歧骨此手足之所同名者凡此皆經絡起止循行之處故聖人謹詳周身骨度名位所以視人經絡之在於身者以此此經脈經絡經別經筋奇經八脈之階梯也學者由此熟讀經文細玩圖注則經絡之條理貫通思過半矣藏府總論內經曰藏府之在胸脅腹裡之內也各有次舍異名而同處一域之中其氣各異所謂藏者心肝脾肺腎包絡是也六者為陰陰氣主內故沉以候藏府者膽胃大腸小腸膀胱三焦是也六者為陽陽氣主外故浮以候府十二經脈者外絡形身內連藏府而肺胃為藏府之總系者也肺管剛空藏之系也喉主天氣故膽附於肝是以凡十一藏皆取決於膽也胃管柔空府之系也咽主地氣故脾連於胃是以脾為孤藏以灌四旁者也夫咽喉為藏府之門戶主開闔而司出納者肺胃也肺者大氣之主也繫於脊之第三椎居於胸中象太虛之清與手足陽明同氣其屬金其色白其惡寒開竅於鼻司呼吸吸則入呼則出呼之氣短吸之氣長病在呼呼出心與肺上焦也呼之氣長吸之氣短病在吸吸入腎與肝下焦也呼吸氣均短是脾胃之氣阻塞中焦陰陽不得升降也經曰諸氣膹郁皆屬於肺肺氣盛則脈大脈大則不能偃臥臥而喘者是腎藏之水氣上客於肺也風邪客肺而二便病者是肺氣不能調和於下也調氣之法必別陰陽陰氣少而陽氣盛則熱而煩滿陽氣少而陰氣多則身寒如從水中出氣盛身寒得之傷寒氣虛身熱得之傷暑夫百病生於氣也怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收熱則氣泄驚則氣亂勞則氣耗思則氣結九氣不同生病各異怒則氣逆甚則嘔血及飧泄故氣上矣喜則氣和志達營衛通利故氣緩矣悲則心系急肺布葉舉而上焦不通營衛不散熱氣在中故氣消矣恐則精卻卻則上焦閉閉則氣還還則下焦脹故氣不行矣寒則腠理閉氣不行故氣收矣熱則腠理開營衛通汗大泄故氣泄矣驚則心無所倚神無所歸慮無所定故氣亂矣勞則喘且汗出外內皆越故氣耗矣思則心有所存神有所歸正氣留而不行故氣結矣肺者氣之本魄之處也而營氣者宗氣即大氣也積於胸中出於喉嚨以貫心脈心主包絡而行呼吸一呼一吸為一息晝夜一萬三千五百息為一周此氣之行於脈中循脈度環轉者也衛氣者大氣積於胸中出於肺循喉嚨而行呼吸呼出而周身之毛竅皆闔吸入而周身之毛竅皆開此氣之行於脈外而司開闔者也三焦少陽之氣通會於周身之腠理膀胱太陽之氣總六經而統營衛與肺同主皮毛者也太陽也少陽也營氣也衛氣也宗氣大氣也皆胃中後天水穀之氣本乎腎中先天之一氣者也然而肺為腎母腎納肺氣故曰肺者大氣之主也心者五藏六府之主也繫於脊之第五椎居於肺下如日麗天其屬火其色赤其惡熱開竅於耳舌是以心和則舌知味夜臥聞聲而心知也夜臥之時五官皆不用事惟耳能聽目為心使不可遠而耳則能與外物相接於不見蓋善生心源惡生氣海善惡之念皆生於所感感於善則心靜感於惡則心動動則為火火淫於上則肺金受傷火淫於下則肝木失藏惟動靜以敬則心源自清氣海自定外事不能擾邪欲不能作言行不亂而肺金以全寵辱不驚而肝木以寧肝得所藏而魂自安肺得其職而魄自寧魂魄安寧則喜怒明治節理驚悸怔忡之病皆無矣夫心高居清宮本不受邪所病者皆由於喜怒哀樂之不和也然心為神明之主心正則五藏六府皆正心不正則五藏六府皆危故曰心者五藏六府之主也心主包絡者心藏之宰輔也包繞綿絡其心故名包絡其系下連肝膽脾腎三焦上連心肺居於膻中經曰膻中者心主之宮城也夫膻中為氣之海清淨之府也濁氣上干則胸膈為塵埃之鄉此心所以不和風火上炎則胸膈正燎原之地此心所以不寧分理三焦所以和心也安靖肝膽所以寧心也外邪干犯止及包絡不能犯心蓋膻中為君主之外藩包絡為君主之內藩內外夾輔君主故曰心包絡者心藏之宰輔也包絡之下有膈膜與脊脅周迴相著遮蔽濁氣所謂膻中也膻中之下又有膈膜前齊鳩尾後齊脊之十一椎左右隨脅之長短自鳩尾斜著於脊是為肝膽之居也夫時行瘟疫之邪其氣乃從口鼻入於膜原故多發於少陽陽明久而流入於太陽此吳又可所以有達原三消承氣諸方也肝者風木之藏也繫於脊之第九椎居於脅中其系從膻中之左透膈而下其屬木其色蒼其惡風開竅於目與膽同主春升生髮之氣令應東方位居震巽有風雷之象經曰風氣通於肝雷氣通於心風動木萌雷起火發陽和布化生物之道宜然一旦火炎風狂則為心肺之災於是神明昏亂輸調失職營衛錯行經絡失次非平抑狂邪升散風熱難於調和矣經曰天食人以五氣地食人以五味五氣入鼻藏於心肺肺為風府呼吸之門溫散肺氣所以升發於上也五味入口藏於腸胃胃為谷海根基之地疏通胃氣所以降瀉於下也六經惟肝為難治其本陰其標熱其體木其用火木盛則生風火旺則水虧或收或散或逆或從隨所利而行之調其中氣使之和平是治肝之法也若培養之法下滋腎陰上補心血雨潤風和則木得其養矣經曰在志為怒善怒之性不可救藥是在君子克治之功也夫木者溫則發生寒則摧萎溫和發散則條暢軟萎鬱抑則捲曲故曰肝者風木之藏也膽者附於肝與三焦同氣者也四時之氣少陽主春其氣半出地外半在地中人身之氣亦如之軀殼之裡藏府之外兩界之隙地所謂半表半裡乃少陽所主之部位也人之一身風寒在下燥熱在上濕氣在中火遊行其間六氣和平百骸皆理惟亢害淫勝然後為病膽主甲木為五運六氣之首膽氣升則五藏六府之氣漸升膽氣不升木氣散入土中而胃陽受困則飧泄腸澼不一而起矣前賢言三陽經惟少陽為難治何也太陽行身之後屬寒水陽明行身之前屬燥金少陽行身之側屬相火與三焦手足同氣後先同行與厥陰為表裡近後則寒近前則熱上犯包絡則心煩而悸下歸厥陰則痛引胸脅從陰化寒從陽化熱故其為病陰陽錯雜寒熱混淆其脈往來無定盛衰無常治少陽者當圖機於陰陽疑似之辨及仲景少陽制方之旨加減之法所云上焦得通津液得下胃氣因和盡之矣夫肺與肝主十二經脈之終始膽與三焦主十二辰之終始晦朔之理陰之初盡即陽之初生所以厥陰病熱是少陽使然也故曰膽者附於肝與三焦同氣者也兩腎者蟄藏水火者也繫於脊之十四椎居於背脊之兩旁其系自膻中循脊直下當胃兩旁與臍平其屬水水中之陽氣為火其色赤其惡燥上竅於耳舌下竅於二陰夫藏司水火竅開上下惟腎為然水虧則火炎於上火虧則水淫於下滋陰以降火所以補心肝也補陽以行水所以補脾胃也火盛則水耗水盛則火熄瀉火以救水所以補膀胱也瀉水以救火所以補三焦也經曰少陽屬腎少陽三焦也腎上連肺故將兩藏蓋腎為水藏主司出納肺氣下降於腎腎納肺氣蒸動水之真陽而為火出溫三焦而三焦承領槖鑰分布於上中下隨行變化此三焦所以為相火而兩腎實相火之原也兩腎中間名命門是督脈穴名兩腎之火藏於水如坎卦一陽陷二陰之中如火之蓄於爐如蟲之藏於蟄故曰兩腎者蟄藏水火者也胃者五藏六府之海也胃與肺同途異在心肺居胸中心主居膻中肝膽居脅中胃歷胸脅而居腹中胃之上口名曰上脘下即賁音焚門胃之下口名曰下脘下即幽門胃之中曰中脘三焦之氣皆出於胃不亦重乎經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通則胃氣熱熱氣薰胸中故內熱肺處上焦主氣以下布者也土虛不能生金則肺薄而濁氣不能達於下脘地氣不升天氣不降清氣陷下濁氣逆上故內熱此言氣虛之勞也經曰足陽明之脈病畏人與火聞木音則惕然而驚病甚則棄衣而走登高而呼逾垣上屋妄言罵詈不避親疏或至不食數口或肉食倍常此胃熱內郁可下而已也不得臥而息有音者是陽明之逆也胃不和則臥不安和胃可已也經曰九竅者五藏主之五藏皆得胃氣乃能通利頭痛耳鳴九竅不利腸胃之所生也凡竅於上者猶天之有日月星辰也遲留伏逆則為病竅於下者猶地之有江河湖海也氾濫壅塞則為病胃氣一傷則上下諸病以生按素靈凡論各經必兼胃府貴重之也五藏六府惟胃易於受邪故胃病居多經曰安穀則昌絕谷則亡飲食自倍腸胃乃傷人身賴以生者莫貴於谷胃居中州官司倉廩胃氣一敗百藥難施而藏府皆無所稟故曰胃者五藏六府之海也脾者為胃行其津液者也脾與胃以膜相連同居腹中繫於脊之十一椎其系從膻中之右透膈而下其屬土其色黃其惡濕其喜文采音樂聞聲則動動則磨胃飲食乃化運行水穀之精氣上歸於肺通調水道下輸膀胱經曰脾為之使此之謂也脾者土也火乃土之母火虧不進食者法當補火如鼎釜之下無火終不熟也經曰諸濕腫滿皆屬於脾濕之為病有出於天氣者雨露是也有出於地氣者泥水是也有出於飲食者酒漿生冷是也有出於人事者汗衣臥地澡浴不幹是也所因雖異悉由脾氣之虛清之利之所以治濕熱也燥之溫之所以治寒濕也升之散之所以治濕氣之流注也夫脾與胃為表裡其病不同蓋賊風虛邪六府受之飲食不節居處不時五藏受之陽邪入六府則身熱不時臥上為喘呼陰邪入五藏則膜音嗔脹也滿閉塞下為飧泄久為腸澼傷於風者上先受之上行極而下陽病也傷於濕者下先受之下行極而上陰病也脾病不能為胃行其津液四肢不得稟水穀氣則筋骨肌肉皆無氣以生四肢不用也故曰脾者為胃行其津液者也小腸者心氣下降之道路也後附於脊之左前附於臍上回運環十六曲居於小腹胃之下口乃小腸之上口於此受盛糟粕而傳入大腸也東垣曰手陽明大腸手太陽小腸皆屬足陽明胃大腸主津小腸主液大腸小腸受胃之陽氣乃能行津液於上焦溉灌皮毛充實腠理若飲食不節胃氣不充大腸小腸無所稟氣故津液涸竭而病生焉小腸液竭則耳聾目黃頰腫頸頷肩臑肘臂諸痛作矣調理胃府所以治小腸也經曰心為牝藏小腸為之使故病心疝者少腹當有形也小腸為丙火心為丁火心熱瀉小腸釜底抽薪之義也故曰小腸者心氣下降之道路也大腸者肺氣下降之道路也大腸亦名迴腸小腸後附脊左大腸前當臍左小腸回運環十六曲大腸回運環反十六曲小腸之下口乃大腸之上口名曰闌門於此泌別清濁水液滲入膀胱滓穢流入大腸大腸末名廣腸附脊直受大腸其盡處為肛門又名魄門滓穢之所由出也夫飲食之物有入必有出肺傷於上胃病於中腸枯於下出入之樞機不行則齒痛頸腫目黃口乾鼽衄喉痹耳鳴諸證作矣調理肺胃亦所以治大腸也人身上下七門唇為飛門齒為戶門會厭為吸門胃為賁門太倉下口為幽門大小腸會為闌門下極為魄門難經謂之七衝門其氣皆從下而衝上天地之氣能升然後能降清陽不升則濁氣不降經所謂地氣上為云天氣下為雨故曰大腸者肺氣下降之道路也三焦者一氣之流行者也與足少陽均司相火經曰少陽屬腎三焦也蓋三焦屬於兩腎之中命門穴之下脊骨之三椎故名三焦椎亦名焦也其位正與膀胱相對其氣生於腎陰從下而上通會於周身之腠理腠者三焦通會元真之處為氣血所注理者是皮膚藏府之紋理也其氣歸於有形之部署乃分而為三上焦出胃上口主宣五穀味熏膚充身澤毛若霧露之溉故曰上焦如霧中焦亦並胃中出上焦之後主蒸精液化其精微上注於肺本心神化赤而為血經曰以奉生身莫貴於此故曰中焦如漚下焦在胃下口別走於迴腸注於膀胱而滲入焉主濟泌別汁以行決瀆故曰下焦如瀆經曰諸腹脹大皆屬於熱諸病胕腫皆屬於火傳而為水蓋少陽相火為遊部上佐天施下佐地生通行於諸經腎者胃之關也關門不利則聚水而從其類故腎經受邪則下焦之火氣鬱矣火鬱之久必發於是相火氾濫其水水從火溢上積於肺而為喘呼不得臥散於陰絡而為胕腫隨五藏之虛者入而聚之而為五藏之脹故曰上焦不治水溢高原中焦不治水停中脘下焦不治水蓄膀胱平脈篇曰三焦不歸其部上焦不歸者噫而醋吞噫氣吞酸中焦不歸者不能消穀引食下焦不歸者則遺泄上焦司降心肺主之下焦司升肝腎主之中焦司升降脾胃主之上焦也中焦也下焦也一氣也出於腎由於胃後先殊途上中下同歸故曰三焦者一氣之流行者也膀胱者上應肺金下應三焦外應腠理毫毛者也居於小腹之下與小腸脂膜相連外主膚表內主小便有下口而無上口其滲入之竅與周身之毛竅同開閉三焦熱盛則竅塞當瀉熱以補水經曰無陰則陽無以化膀胱虛則便數當補陽以生陰經曰無陽則陰無以生開發肺竅清瀉肺熱皆所以治膀胱也治上者清其源也治下者決其流也肺氣不治則三焦之氣不行不得決瀆而出膀胱之氣無由而化譬如滴水之器上竅閉則下竅自塞上竅開則下竅自通其滲入之義從此可想故曰膀胱者上應肺金下應三焦外應腠理毫毛者也經曰肺合大腸大腸者皮其應心合小腸小腸者脈其應肝合膽膽者筋其應脾合胃胃者肉其應腎合三焦膀胱三焦膀胱者腠理毫毛其應此五藏內合於六府六府外應於形身陰內而陽外也夫五藏之部位象乎天地心部於前象朱雀肺部於右象白虎肝部於左象青龍腎部於後象螣蛇脾居中央象在太虛之中大氣舉之也營衛要論內經曰營氣之道內谷為寶谷入於胃乃傳之肺流溢於中散布於外精專者行於經隧常榮無已終而復始是謂天地之紀故氣從太陰出注手陽明上行注足陽明下行至跗上注大指間與太陰合上行抵髀從髀注心中循手少陰出腋下臂注小指合手太陽上行乘腋出䪼內注目內眥上巔下項合足太陽循脊下尻下行注小指之端循足心注足少陰上行注腎從腎注心外散於胸中循心注脈出腋下臂出兩筋之間入掌中出中指之端還注小指次指之端合手少陽上行至膻中散於三焦從三焦注膽出脅注足少陽下行至跗上復從跗注大指間合足厥陰上行至肝從肝上注肺上循喉嚨入頏顙之竅究於畜門其支別者上額循巔下項中循脊入骶是督脈也絡陰器上過毛中入臍中上循腹裡入缺盆下注肺中復出太陰此營氣之所行也逆順之常也內經曰歲有十二月日有十二辰子午為經卯酉為緯天周二十八宿而一面七星四七二十八星房昴為緯虛張為經是故房至畢為陽昴至心為陰陽主晝陰主夜故衛氣之行一日一夜五十周於身晝日行於陽二十五周夜行於陰二十五周周於五藏是故平旦陰盡陽氣出於目目張則氣上行於頭循項下足太陽循背下至小指之端其散者別於目銳眥下手太陽下至手小指之間外側其散者別於目銳眥下足少陽注小指次指之間以上循手少陽之分側下至小指之間別者以上至耳前合於頷脈注足陽明以下行至跗上入五指之間其散者從耳下下手陽明入大指之間入掌中其至於足也入足心出內踝下行陰分復合於目故為一周其始入於陰常從足少陰注於腎腎注於心心注於肺肺注於肝肝注於脾脾復注於腎為一周衛氣之留於腹中蓄積不行菀蘊不得常所使人胸膈胃中滿喘呼逆息其氣積於胸中者瀉大迎天突喉中積於胸中者瀉三里與氣街上下皆滿者上下取之與季肋之下一寸重者雞足取之雞足者以足緩伸緩縮如雞足之踐地蓋以疏陽明之經脈以通衛氣之所出也內經曰五藏者所以藏精神魂魄者也六府者所以受水穀而化行物者也其氣內營於五藏而外絡於支節其浮氣之不循經者為衛氣其精氣之行於經者為營氣故曰清者為營濁者為衛營在脈中衛在脈外營周不休五十而復大會陰陽相貫如環無端衛氣行於陰二十五度行於陽二十五度分為晝夜故氣至陽而起至陰而止故曰日中而陽隆為重陽夜半而陰隆為重陰故太陰主內太陽主外各行二十五度分為晝夜夜半為陰隆夜半後而為陰衰平旦陰盡而陽氣受矣日中而陽隆日西而陽衰日入陽盡而陰受氣矣夜半而大會平旦陰盡而陽受氣如是無已與天地同紀夫衛陽氣也營陰氣也營衛二氣皆胃中之穀氣所生也陽氣長其色鮮其顏光其聲商毛髮長陰氣盛骨髓生血脈滿肌肉緊二氣得其和平皆由脾胃盈餘之所致也膀胱太陽之氣總六經而統攝營衛為營衛之外藩主一身之表表氣強壯衛固營守邪氣無由而入也風陽邪也寒陰邪也邪之中人各從其類中風則衛受之傷寒則營受之營衛者乃風寒始入之兩途也仲景曰陽浮而陰弱營衛之脈也用桂枝湯者解肌固表調和營衛也此營衛之一節也若平脈篇曰衛氣盛名曰高高者長盛也脈隨指有力上來衛氣盛也營氣盛名曰章章者分明也脈隨指有力下去營氣盛也章高相搏名曰綱綱者營衛俱有餘撬繫有㼐攪之意也衛氣弱名曰惵音垤惵者恍惚也脈隨指無力上來衛氣弱也營氣弱名曰卑卑者縮下也脈隨指無力下去營氣弱也惵卑相搏名曰損損者營衛俱不足有消縮之意也衛氣和名曰緩營氣和名曰遲遲緩相搏名曰強遲以候胃緩以候脾遲緩相搏言合一也緩則陽氣長遲則陰氣盛陰陽相抱營衛俱行剛柔相得名曰強也陽氣長者胃氣有餘也陰氣盛者脾氣充足也陰陽相抱言和洽也營衛俱行言周流也剛柔相得言二氣和平也此皆由脾胃盈餘之所致也如此則其人之強健可知也故曰強也陽脈浮而無力濡脈也陰脈沉而無力弱脈也其脈弱者營氣微也營微則血虛證則發熱筋急其脈濡者衛氣衰也衛衰則氣虛證則惡寒汗出此以浮沉濡弱為候營衛不足之診法也夫營即血中之精粹者也衛即氣中之慓悍者也以其定位之體而言則曰氣血以其流行之用而言則曰營衛營衛不明何以診人之脈治人之病也三焦要論內經曰營行脈中衛行脈外三焦必仰賴營衛之氣乃能行於腠理故言三焦必兼營衛而其脈亦與營衛同辨六脈浮沉俱緊則邪中上下二焦霧露之邪中於上焦則脈浮緊其證發熱頭痛項強頸攣腰痛脛酸寒邪中於下焦則脈沉緊其證陰氣為慓足脛逆冷便溺妄出三焦相混內外不通上焦不治口爛蝕齦中焦不治血凝自下狀如豚肝下焦不闔裡急墜痛圊便數窘命將難全也六脈弱而遲則中焦病矣弱則陽微遲則脾中寒其證心內飢飢而虛滿不能食中焦者脾胃主之胃主納穀脾主化谷陽微中寒脾胃俱病故心內雖飢飢而虛滿不能食也六脈弱而緩緩以候胃緩為胃氣有餘之象其證噫而吞酸食卒不下氣填於膈上胃強脾弱故能食不能消化胃有宿食則鬱而生熱故吞酸而噫食卒不下則熱氣脹悶於膈上也六脈微而緩則三焦絕經其證名曰血崩微則衛氣疏緩則胃氣實衛疏則表空虛胃實則營氣盛營愈盛而衛愈疏血愈多而氣愈少氣不能制血血不能歸經故血妄行而崩也六脈微而澀則三焦無所仰賴不得歸其部微則衛氣不行澀則營氣不逮營衛不能相將而行則三焦無所仰賴其證身體痹不仁衛不足則惡寒數欠營不足則身煩疼痛口難言語濁氣不降則噫氣而吞酸上焦不歸也升降失職則不能消穀引食中焦不歸也清氣不升則不能約束而遺弱下焦不歸也衛氣衰面色黃營氣衰面色青三焦不足之色也十二經脈內經曰經脈者所以處百病調虛實不可不通人身經脈十二手三陰三陽足三陰三陽陰脈止於手者故心曰手少陰肺曰手太陰包絡曰手厥陰此手之三陰從藏走手陰脈起於足者腎曰足少陰脾曰足太陰肝曰足厥陰此足之三陰從足走腹少陰者初陰也太陰者至陰也兩陰交盡曰厥陰陽脈起於手者三焦曰手少陽小腸曰手太陽大腸曰手陽明此手之三陽從手走頭陽脈止於足者膽曰足少陽膀胱曰足太陽胃曰足陽明此足之三陽從頭走足少陽者初陽也太陽者盛陽也兩陽合前曰陽明夫心肝肺腎包絡膽胃大腸小腸膀胱三焦蓋以名有形之藏府也手足三陰三陽蓋以名無形之六氣也十二經脈曰是動者是六氣所生之病也六氣動於藏府之外而藏府囚於六氣之中此病在軀殼其經證見於外者外因也曰是主者是藏府所主之病也在藏曰主肺主脾主心主脈主腎主肝在府曰主津主液主氣主血主骨主筋此病在藏府而各有所主其經證見於內者內因也曰寸口人迎者所以候藏府之盛虛也曰以經取之者治之以本經之藥也形氣病於內諸證見於外盛虛應於脈於是聖人立形定氣為經脈十二篇視人各有所候也善診者察證按脈先別陰陽而陰陽之氣晝夜流行與天同度故氣始於寅時由胃之中脘上注於肺卯注大腸辰注胃巳注脾午注心未注小腸申注膀胱酉注腎戌注包絡亥注三焦子注膽醜注肝寅復注肺所謂肺朝百脈者也蓋肺脈起於胃之中脘其支者出食指之端交於大腸脈而大腸脈起於食指之端其支者挾鼻孔交於胃脈而胃脈起於鼻其支者出足大指之端交於脾脈而脾脈起於足大指之端其支者注心中交於心脈而心脈起於心中其支者出小指之端交於小腸脈而小腸脈起於小指之端其支者至目內眥交於膀胱脈則膀胱脈起於目內眥其支者至足小指交於腎脈而腎脈起於足小指其支者注胸中交於包絡脈而包絡脈起於胸中其支者出無名指之端交於三焦脈而三焦脈起於無名指之端其支者至目銳眥交於膽脈而膽脈起於目銳眥其支者循足大指出三毛交於肝脈而肝脈起於大指叢毛之際其支者貫膈注肺以交於肺脈此經脈十二篇次之大法也凡交經授受俱屬支脈別絡十五皆因其原經曰經絡之相貫如環無端此之謂也古之治病者必通十二經脈不通經脈而能已人之疾者蓋寡矣肺之經脈主病肺手太陰之脈起干中焦下絡大腸還循胃口上膈屬肺從肺系橫出腋下下循臑內行少陰心主之前下肘中循臂內上骨下廉入寸口上魚循魚際出大指之端其支者從腕後直出次指內廉出其端是動則病肺脹滿膨膨腹脹而喘咳缺盆中痛缺盆胃穴也肺之陽氣不能通布故痛甚則交兩手而瞀音茂兩手相交低目俯首此為臂厥皆肺之陽氣不能通布也是主肺所生病者咳上氣喘肺氣病也渴全不能生水也煩心心脈上於肺也胸滿臑臂內前廉痛脈循此厥掌中熱臂冷厥掌中熱手中心主包絡脈之部分肺脈行少陰心主脈之前故掌中熱也氣盛有餘則肩背痛肺俞在肩背因氣而動於俞所謂氣傷痛也風寒汗出中風小便數不時為數而欠短少為欠氣虛則肩背痛寒氣虛則畏寒不能通布則痛少氣不足以息溺色變氣虛不能化也大腸經脈主病大腸手陽明之脈起於大指次指之端循指上廉出合谷兩骨之間上入兩筋之間循臂上廉入肘外廉上臑外前廉上肩出髃骨之前廉上出於柱骨之會上下入缺盆絡肺下膈屬大腸其支者從缺盆上頸貫頰入下齒中還出挾口交人中左之右右之左上挾鼻孔是動則病齒痛頸腫是主津液所生病者目黃口乾火熱盛鼽音裘衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒慄不復盛則人迎大三倍於寸口虛者人迎反小於寸口也此可以驗大腸之虛實也胃之經脈主病陽明者午也胃足陽明之脈起於鼻之交頞中旁約太陽之脈下循鼻外上入齒中還出挾口環唇下交承漿卻循頤後下廉出大迎循頰車上耳前過客主人循髮際至額顱其支者從大迎前下人迎循喉嚨入缺盆下膈屬腎絡脾其直者從缺盆下乳內廉下挾臍入氣街中其支者起於胃口下循腹裡下至氣街中而合以下髀關抵伏兔下膝臏中下循脛外廉下足跗入中指內間按經文內中指內間中指外間中指不用皆是足大指之次指不是中指其支者下廉三寸而別下入中指外間其支者別跗上入大指間出其端是動則病洒洒振寒陽明者午也陽盛而陰氣加之故也善呻陽氣鬱而欲伸出之數欠陽欲引而上也顏黑陰氣加於上此病在陽明之氣病至則惡人與火聞木聲則惕然而驚陽明之脈病也心欲動胃絡上通於心故也獨閉戶塞牖而處陰陽相薄故也甚則欲上高而歌棄衣而走陽盛則四肢實而熱盛於身故也賁響腹脹陽明之脈循腹裡水火相激故賁門中有聲及脹此陽明之氣厥逆於經而為此諸證是為骭厥是主血所生病者狂瘧溫淫有病氣而不及於經者有病在氣而見經證有經氣之兼病者有病氣而不及於經者故也汗出胃氣熱而蒸發水液之汁也鼽音裘衄胃經之熱上行也口喎唇胗唇瘍也胃脈挾口環唇頸腫喉痹大腹水腫膝髕腫痛循膺乳氣街股伏兔骭外廉足跗上皆痛皆陽明經脈之為病也中指不用氣盛於外則身以前皆熱其有餘於胃於內則消穀善飢溺色黃胃熱下入膀胱也氣不足則身以前皆寒慄胃中寒則脹滿盛則人迎大三倍於寸口虛則人迎反小於寸口也脾之經脈主病脾足太陰之脈起於大指之端循指內側白肉際過核骨後上內踝前廉上腨內循脛骨後交出厥陰之前上膝股內前廉入腹屬脾絡胃上膈挾咽連舌本散舌下其支者復從胃別上膈注心中是動則病舌本強太陰氣病也食則嘔胃脘痛脾脈絡胃故也腹脹善噫寒氣客於胃也得後與氣得大便與屁則快然如衰病衰也身體皆重太陰之濕氣也是主脾所生病者舌本痛脾病濕熱體不能動搖即上體重而甚也食不下脾氣不行也煩心脾脈注心中也心下急痛即胃脘痛也溏便溏瘕瘕積泄泄瀉水閉黃疸皆濕熱為病也不能臥胃不和則臥不安也強立股膝內腫厥脾主四肢脈行股膝足大指不用盛則寸口大三倍於人迎虛則寸口反小於人迎也心之經脈主病心手少陰之脈起於心中出屬心系下膈絡小腸其支者從心系上挾咽系目系其直者復從心系卻上肺下出腋下循臑內後廉行手太陰心主之後下肘內循臂內後廉抵掌後銳骨之端入掌內後廉循小指之內出其端是動則病咽乾心痛心主手厥陰包絡之脈行手太陰肺脈手少陰心脈之中間肺脈行心主之前心脈行心主之後少陰之上君火主之故動則病此渴而欲飲少陰之氣盛也是為臂厥是主心所生病者目黃心系上繫於目心火盛故黃脅痛臑臂內後廉痛掌中熱痛心脈所循之部分也盛則寸口大再倍於人迎虛則反小於人迎也小腸經脈主病小腸手太陽之脈起於小指之端循手外側上腕上髁中直上循臂骨下廉出肘內側兩筋之間上循臑外後廉出肩解繞肩胛交肩上入缺盆絡心循咽下膈抵胃屬小腸其支者從缺盆循頸上頰至目銳眥卻入耳中其支者別頰上䪼抵鼻至目內眥斜絡於顴是動則病咽痛頷不可以顧肩似拔臑似折皆手太陽之氣逆為病也是主液所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛小腸主液耳聾等證皆小腸之液枯而為病也盛則人迎大再倍於寸口虛則反小於寸口也膀胱經脈主病膀胱足太陽之脈起於目內眥上額交巔其支者從巔至耳上角其直者從巔入絡腦還出別下項循肩膊內挾脊抵腰中入循膂絡腎屬膀胱其支者從腰中下挾脊貫臀入膕中其支者從膊內左右別下貫胛挾脊內過髀樞循髀外從後廉下合膕中以下貫腨內出外踝之後循京骨至小指外側是動則頭痛病沖目似銳項如拔脊痛腰似折髀不可以曲膕如結腨如裂是為踝厥病在太陽之氣也是主筋所生病者痔太陽之氣生於膀胱水中而為諸陽主氣陽氣者柔則養筋故是主筋所生病為痔經云筋脈橫解腸澼為痔蓋太陽所生之筋膀胱所生之脈橫逆而為痔也瘧經絡沉以內薄則為瘧狂癲疾厥逆於下則為癲為狂頭囟項痛目黃淚出鼽衄項背腰尻膕腨腳皆痛小指不用皆經脈所循之部分而為病也盛則人迎大再倍於寸口虛則反小於寸口也腎之經脈主病腎足少陰之脈起於小指之下趨於足心出於然谷之下循內踝之後別入跟中以上腨內出膕內廉上股內後廉貫脊絡腎屬膀胱其直者從腎上貫肝膈入肺中循喉嚨挾舌本其支者從肺出絡心注胸中是動則病飢不欲食少陰之上君火主之少陰是動為病則上下之氣不交故為飢不欲食等證面如漆柴少陽屬腎而腎為生氣之原面如漆柴少陽之氣不升也咳唾則有血渴渴而喘少陰之生氣不上交於肺而肺氣上逆也坐而欲起躁動之象目䀮䀮如無所見精氣不升也心如懸若飢狀即氣不交之故氣不足於下則善恐心惕惕如人將捕之氣不足於上也是為骨厥是主腎所生病者口熱舌乾咽腫腎主藏精少陰腎藏主氣厥於下上氣嗌乾及痛煩心心痛腎主藏精精液不能上滋故有諸證黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛水不上濟則火盛於上故有口熱煩心等證腎之生氣厥逆於下故為骨厥痿厥諸證矣盛則寸口大再倍於人迎虛則反小於人迎也包絡經脈主病心主手厥陰心包絡之脈起於胸中出屬心包絡下膈歷絡三焦其支者循胸中出脅下腋三寸上抵腋下循臑內行太陰少陰之間入肘中下臂行兩筋之間入掌中循中指出其端其支者別掌中循小指次指出其端是動則病心中熱臂肘攣急肢腫經氣病於外也甚則胸脅支滿心中憺憺大動面赤目黃喜笑不休有餘於內也是主脈所生病者煩心心痛掌中熱心主血而包絡代君行令故主脈心煩之證蓋自內而外也盛則寸口大一倍於人迎虛則反小於人迎也三焦經脈主病三焦手少陽之脈起於小指次指之端上出兩指之間循手表腕出臂外兩骨之間上貫肘循臑外上肩而交出足少陽之後入缺盆布膻中散絡心包下膈循屬三焦其支者從膻中上出缺盆上項系耳後直上出耳上角以屈下頰至䪼其支者從耳後入耳中出走耳前過客主人前交頰至目銳眥是動則病耳聾少陽之上相火主之是故動則病此渾渾焞焞耳中之聲如水之流如雷之行嗌腫喉痹與上諸證皆相火之有餘於上也是主氣所生病者汗出陽加於陰故也目銳眥痛頰腫耳前肩臑肘臂外皆痛小指次指不用皆經脈所循之部分而為病也盛則人迎大一倍於寸口虛則反小於寸口也膽之經脈主病膽足少陽之脈起於目銳眥上抵頭角下耳後循頸行手少陽之前至肩上卻交出手少陽之後入缺盆其支者從耳後入耳中出走耳前下目銳眥後其支者別銳眥下大迎合手少陽抵於䪼下加頰車下頸合缺盆以下胸中貫膈絡肝屬膽循脅裡出氣街繞毛際橫入髀厭中其直者從缺盆下腋循胸過季脅下合髀厭中以下循髀陽出膝外廉下外輔骨之前直下抵絕骨之端下出外踝之前循足跗上入小指次指之間其支者別跗上入大指之間循大指歧骨內出其端還貫爪甲出三毛是動則病口苦善太息心脅痛不能轉側少陽之氣不升也甚則面微有塵體無膏澤少陽主初陽之生氣故膽氣升十一藏之氣皆升經云精明五色者氣之華也平脈篇云陽氣長則其色鮮其顏光毛髮長少陽之動氣為病則厥逆不升故甚則如此也足外反熱火逆於下也是為陽厥皆為陽氣厥逆之所致也是主骨所生病者頭痛項痛目銳眥痛缺盆中腫痛脅下痛馬刀俠癭汗出自頭痛至膝踝痛者乃足少陽經脈所循之部分為病也血脈留滯為馬刀俠癭也陽加於陰為汗出也少陽行身側故本篇多用外字振寒慄陽逆於下也胸脅肋髀膝外至脛絕骨外踝前及諸節皆痛小指次指不用肝主筋筋會於骨是少陽經氣所榮故諸節皆痛也實則人迎大一倍於寸口虛則反小也肝之經脈主病肝足厥陰之脈起於大指叢毛之際上循足跗上廉去內踝一寸上踝八寸交出太陰之後上膕內廉循陰股入毛中過陰器抵小腹挾胃屬肝絡膽上貫膈布脅肋循喉嚨之後上入頏顙連目系上出額與督脈會於巔其支者從目系下頰裡環唇口其支者復從肝別貫膈上注肺是動則腰痛不可以俯仰此與下嗌乾面脫色皆為厥陰從少陽中氣之化厥陰之化氣病也丈夫㿉疝婦人少腹腫此厥陰之木氣病也甚則嗌乾面塵脫色是主肝所生病者胸滿嘔逆食氣入胃散精於肝行氣於經肝氣厥逆不能行散穀精故為此病飧泄肝主疏泄肝氣虛故為飧泄遺溺也狐疝隨經脈晝夜出入之疝也閉癃肝氣實也盛則寸口大一倍於人迎虛則反小於人迎也此十二經為此諸病盛則瀉之虛則補之熱則疾之寒則留之陷下則灸之不盛不虛以經取之十六絡脈內經曰經脈十二者伏行分肉之間深不可見其常見者足太陰過於外踝之上無所隱故也諸脈之浮而常見者皆絡脈也六經絡手陽明少陽之大絡起於五指間上合肘中脈之卒然盛者皆邪氣居之不與眾同是以知其何脈之動也凡診視絡脈脈色青則寒且痛赤則有熱胃中寒手魚之絡多青矣胃中有熱魚際絡赤其暴黑者久痹也其有赤有黑有青者寒熱氣也其青短者少氣者也肺之絡脈主病手太陰之別別者謂十二經脈之外別有絡脈名曰列缺起於腕上分間手太陰之絡起於手腕之列缺穴分間者謂與經脈於此間而相分也並太陰之經謂與經脈而並行也直入掌中散於魚際謂入魚際而散於皮膚也其病實則手銳掌熱氣盛於外也虛則欠㰦與呿同張口也小便遺數氣虛於內也取之取其穴而灸之去腕寸半即列缺穴也別走陽明也謂太陰之絡從此而別走於陽明也列缺穴在腕後側上一寸五分兩手交叉當食指末筋骨罅中主治偏頭風痛遍身風痹麻木痰壅氣堵口噤不開等證實則以火瀉之虛則以火補之以火補者毋吹其火須其火自滅也以火瀉者疾吹其火也灸三壯針二分留三呼心之絡脈主病手少陰之別名通里去腕一寸半別而上行循經入於心中系舌本屬目系經別並經而行也其實則支膈膈間若有所支而不暢也虛則不能言心主言所言必用舌心氣虛則舌本不用故不能言也取之掌後一寸別走太陽也通里穴在腕側後一寸陷中主治聲啞心煩極甚怔忡不寧四肢腫痛頭腮面頰紅腫倦言數欠咽喉疼痛氣息不通虛損不思食暴喑面無潤澤支膈瀉之不能言補之炙三壯針三分包絡絡脈主病手心主之別名曰內關去腕二寸出於兩筋之間循經以上繫於心包絡心系實包絡與心系相通則心痛虛則頭強包絡主行血脈脈氣虛故病此也取之兩筋間也按十二經別皆陰走陽陽走陰此不曰別走少陽或脫簡也內關穴在掌後去腕二寸兩筋間與手少陽外關穴相抵蓋手心主之絡別走手少陽也主手中風熱失志心痛目赤支滿肘攣心暴痛瀉之頭強補之灸三壯針五分小腸絡脈主病手太陽之別名曰支正上腕五寸內注少陰注少陰之別絡其別者別行者上走肘絡肩髃實則節弛肘廢小腸主液實則津液留滯而不能潤澤於骨虛則生肬氣虛不行故也小者如指痂疥即皶痤之類氣鬱所生也取之所別也支正穴在腕後五寸主風虛驚恐悲愁癲狂五勞四肢虛弱肘臂攣急難以屈伸手掌不握十指盡痛熱病腰頸痛項強節弛肘廢瀉之生疣小如指痂疥補之灸三壯針三分大腸絡脈主病手陽明之別名曰偏歷去腕三寸別入太陰入太陰之別經其別者上循臂乘肩髃上曲頰偏歷偏歷於齒其別者入耳耳中合於宗脈實則齲齒痛聾虛則齒寒痹隔氣寒所致痹閉阻隔也蓋手陽明主行氣血於皮膚以溫肌肉虛則寒氣不能行於外也取之所別也偏歷穴在腕三寸主肩膊肘腕痠疼大指次指不用皮膚麻木不仁面頰腮腫耳鳴耳聾齒痛鼻衄癲疾多言齒痛耳聾瀉之齒寒痹膈補之灸三壯針三分留七呼三焦絡脈主病手少陽之別名曰外關去腕二寸外繞臂注胸中合心主合心主之大絡病實則肘攣虛則不收手少陽厥陰之主筋也取之所別也外關穴在腕後一寸兩骨間與內關相對主治耳聾渾渾焞焞無聞五指盡痛不能握物手臂不能屈伸實則肘攣瀉之虛則不收補之灸三壯針三分留七呼膀胱絡脈主病足太陽之別名曰飛揚去踝七寸別走少陽足少陰之絡實則鼽窒頭背痛別走足少陰之絡並經脈而循行於頭背虛則鼽衄取之所別也飛揚穴在外踝骨上七寸主治痔腫痛體重起坐不能步履不收腳腨痠腫戰慄不能久立久坐足指不能屈伸目眩痛歷節風逆氣癲疾寒瘧實則鼽窒頭背痛瀉之虛則鼽衄補之灸三壯針三分膽之絡脈主病足少陽之別名曰光明去踝五寸別走厥陰絡之下絡足跗實則厥少陽膽為甲木主初陽之氣實則不能上升而逆於下也虛則痿躄坐不能起膽氣虛則不能運行周布故如此取之所別也光明穴在外踝上五寸主治筋痠胻疼不能久立熱病汗不出卒狂實則足胻熱身體不仁善齧頰瀉之虛則痿躄坐不能起補之灸五壯針六分留七呼胃之絡脈主病足陽明之別名曰豐隆去踝八寸別走太陰足陽明之絡起於足外踝上脛骨外廉之豐隆穴並經脈而循行脛骨外廉上絡頭項合諸經之氣夫十五絡之氣血皆本於胃府水穀之氣所生是以胃絡與諸經之氣相合其別者循脛骨外廉上絡頭項合諸經之氣下絡喉嗌其病氣逆則喉痹卒痛實則狂顛氣厥於下虛則足不收脛枯血氣虛也取之所別也豐隆穴在外踝上八寸下胻外廉陷中主治厥逆大小便難身體怠情腿膝痠屈伸難胸痛如針刺腹痛如刀切風痰頭痛風逆四肢腫足青身寒喉痹不能言高登而歌棄衣而走見鬼好笑氣逆則痹卒痛實則狂癲瀉之虛則足不收脛枯補之灸三壯針三分脾之絡脈主病足太陰之別名曰公孫去本節之後一寸別走陽明之絡其別者入絡腸胃厥氣上逆則霍亂實則腸中切痛氣實有餘虛則鼓脹氣虛不足取之所別也虛實證則腸胃所生之病也公孫穴在足大指本節後一寸內踝前主治寒瘧不嗜食癇氣好太息寒熱汗出病至則喜嘔嘔已乃衰頭面腫起煩心狂言多飲膽虛厥氣上逆則霍亂實則腸中切痛瀉之虛則鼓脹補之灸三壯針四分腎之絡脈主病足少陰之別名曰大鐘當踝後繞跟別走太陽之絡其別者上行者並經脈上走於心包絡下外貫腰脊氣逆則煩悶手少陽三焦手厥陰包絡之氣皆本於腎藏之所生也水氣上乘於心則煩悶實則閉癃膀胱之氣不化故也虛則腰痛腰為腎之府也取之所別也大鐘穴在足跟後踵中大骨上兩筋間主治嘔吐胸脹喘息腹滿便難腰脊痛少氣淋瀝灑淅腰脊強嗜臥口中熱多寒欲閉戶而處少氣不足舌乾咽中食噎不得下善驚恐不樂喉中鳴咳唾氣逆煩悶實則閉癃瀉之虛則腰痛補之灸三壯針三分肝之絡脈主病足厥陰之別名曰蠡溝去內踝五寸別走少陽之絡其別者經脛足脛上睪睪丸結於莖其病氣逆則睪腫卒疝實則挺長虛則暴癢取之所別也蠡溝穴在內踝上五寸主治疝痛小腹脹滿暴痛如癃閉數噫恐悸少氣不足悒悒不樂咽中悶如有息肉背拘急不可俯仰小便不利臍下積氣如石足脛寒痠屈伸難女子赤白帶下月水不調氣逆則睪丸卒病實則挺長瀉之虛則暴癢補之灸三壯針三分留三呼任脈之絡主病任脈之別名曰尾翳下鳩尾散於腹實則腹皮痛虛則癢搔取所別也任脈別絡出於下極並經而上復下於鳩尾穴以散於腹督脈之絡主病督脈之別名曰長強挾脊上項散於上下當肩胛左右別走太陽之絡入貫膂實則脊強虛則頭重高搖之挾脊之有過者取之所別也脊強頭痛皆經脈之為病也虛實者本氣之虛實有過者有過之脈邪氣之所客也尚御公曰以有過之脈總結於督脈之後蓋申明虛實者乃本氣之虛實非邪實也夫絡脈與經脈交相順逆而行也當知十二絡脈雖循經並行亦皆往來順逆者也長強穴在脊骶骨端計三分伏地取之主治腸風下血久痔瘻腰脊痛狂病大小便難頭重洞泄五淋下部疳蝕小兒囟陷驚癎瘛瘲嘔血驚恐失精瞻視不正慎冷食房勞灸十三壯針三分脾之大絡主病脾之大絡名曰大包出淵下三寸布胸脅脾之大絡起於腋下六寸許出九肋間季脅端之大包穴前曰足太陰之別蓋言經也此曰脾之大絡蓋言藏也十二經脈曰足太陰之別脈合脾藏經氣而言也故其病證兼是動所生而言之也脾之大絡循脾經之大包而四布於胸脅故病如下所云然實則身盡痛虛則百節盡皆縱此脈若羅絡之血者皆取之脾之大絡脈也若羅絡之血者謂大絡之血氣散於周身之孫絡支而橫者為絡絡之別者為孫皮膚若羅紋之縱橫而絡於身也夫脾之有大絡者脾主為胃行其津液灌溉於五藏四旁從大絡而布於周身是以病則一身盡痛百骨皆縱而血絡如羅紋絡於周身也足太陰脾藏有二絡其病證不同有如此大包穴在淵液下三寸布胸脅中出九肋間主治胸脅中痛喘氣實則身盡痛瀉之虛則百節盡皆縱補之灸三壯針三分胃之大絡主病胃之大絡名曰虛里貫膈絡肺出於左乳下其動應衣脈宗氣也盛喘數絕者則病在中結而橫有積矣虛里者左乳之下動脈也此脈乃胃府之所出所以候宗氣者也五藏之脈資生於胃而胃氣之通於五藏者乃宗氣也宗氣者胃府五穀所生之氣積於胸中上出喉嚨以司呼吸行於十二經隧之中為藏府經脈之宗故曰宗氣其動應衣脈宗氣者謂乳下之應衣而動者此宗氣所出之脈也如喘盛而虛里之脈數絕者宗氣病於膻中也如虛里之脈結而有止者虛里之橫絡有積聚也如虛里之脈絕不至者胃府之生氣絕於內也乳之下其動甚而應衣者宗氣欲泄於外也十二經別絡脈之所謂別者謂從經脈而別也經別之所謂正者謂經脈之外別有正經非支絡也夫人之一身經絡多歧而病證因以各別則治法不可混同也經正未言病證學者於經脈絡脈經別中察其異同證之形身庶受病之原可知也經別曰人之所以生病之所以成人之所以治病之所以起此之謂也然其出入交合循行上下頭緒紛紜不易疏也茲乃遵靈樞編次分為二篇可以與經脈絡脈互相證其病之所以起焉知所以起則知所以治矣足之經別足太陽之正別入於膕中其一道下尻五寸別入於肛屬於膀胱散之腎循膂當心入散直者從膂上出於項復屬於太陽此為一經也足少陽之正至膕中別走太陽而合上至腎當十四椎出屬帶脈直者系舌本復出於項合於太陽此為一合成以諸陰之別皆為正也足少陽之正繞髀入毛際合於厥陰別者入季脅之間循胸裡屬膽散之上肝貫心以上挾咽出頤頷中散於面系目系合少陽於目外眥足厥陰之正別跗上上至毛際合於少陽與別俱行此為二合也足陽明之正上至髀入於腹裡屬胃散之脾上通於心上循咽出於口上額顱還系目系合於陽明也足太陰之正上至髀合於陽明與別俱行上結於咽貫舌中此為三合也陰陽離合論曰陽予之正陰之為主少陰之上名曰太陽太陰之前名曰陽明厥陰之表名曰少陽蓋三陽之經正合於三陰故曰成以諸陰之別是以三陽之別外合於三陰之經而內合於五藏三陰之別止合三陽之經而不合於六府也夫陰陽六合始於足太陽而終於手太陰復散之太陽蓋亦周而復始也手之經別手太陰之正指地別於肩解入腋走心系小腸也手少陰之正別入於淵液兩筋之間屬於心上走喉嚨出於面合於目眥此為四合也手少陽之正指天別於巔入缺盆下走三焦散於胸中也手心主之正別下淵液三寸入胸中別屬三焦出循喉嚨出耳後合少陽完骨之下此為五合也手陽明之正從手循膺乳別於肩髃入柱骨下走大腸屬於肺上循喉嚨入缺盆合於陽明也手太陰之正別入淵液少陰之前入走肺散之太陽上出缺盆循喉嚨復合陽明此六合也足太陽之脈循膂絡腎膀胱之經別則別入於肛屬膀胱散之腎足少陰腎脈貫脊屬腎絡膀胱其經別至膕中別走太陽而上至腎又出屬帶脈而復出於項手少陰心脈起於心中出絡心系下膈絡小腸其經別入於淵液兩筋之間屬於心手厥陰心包絡之脈起於胸中出屬心包下膈歷絡三焦而經別下淵液三寸入胸中別屬三焦手太陰肺脈起於中焦下絡大腸還循胃口上膈屬肺其經別入淵液少陰之前入走肺散之太陽此經脈與經別出入不同交相逆順而行者也十二經筋內經曰諸筋者皆屬於節人身三百六十五節腰脊者身之大關節也肢脛者人之管以趨翔也膝者筋之府也莖垂者身中之機陰精之候津液之道也故飲食不節喜怒不時津液內溢乃下留於睪血道不通日大不休俯仰不便趨翔不能也夫陽明主潤宗筋宗筋主束骨而利機關者也然而治筋骨之病當以陽明為本故曰治痿獨取陽明以諸筋皆藉胃府之津液以濡養也周禮以辛養筋辛能散能潤能橫行者也內經曰筋病毋多食酸辛勝酸多食辛則筋急而爪枯蓋手足陰陽之筋秉三陰三陽之氣而生應天之四時歲之十二月其為病亦應時而生非由外感也故十二經筋皆言痹病而分四時孟仲季膀胱經筋主病足太陽之筋起於足小指上結於踝斜上結於膝其下循足外側結於踵上循跟結於膕其別者結於腨外上膕中內廉與膕中並上結於臀上挾脊上項其支者別入結於舌本其直者結於枕骨上頭下頷結於鼻其支者為目上綱下結於頄音仇其支者從腋後外廉結於肩髃音偶其支者入腋下上出缺盆上結於完骨其支者斜上出於頄其病小指肢跟腫痛骨膕攣脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖治在燔針劫刺以知為數以痛為輸名曰仲春痹也輸與腧同十二經筋亦如經脈之起於手足而經絡於形身之上下足太陽之筋起於至陰穴間循脈而上經於頭其支者亦如經脈之支別從經筋而旁絡也小指腫痛膕攣脊反折項筋急此經筋之為病也肩不舉腋支缺盆中紐痛不可左右搖筋骨為陰病在陰者名曰痹痹者血氣留閉而為痛也膽之經筋主病足少陽之筋起於小指次指上結外踝上循脛外廉結於膝外廉其支者別起外輔骨上走髀前者結於伏兔之上後者結於尻其直者上乘䏚季脅上走脅前廉繫於膺乳結於缺盆直者上出腋貫缺盆出太陽之前循耳後上額角交巔上下走頷上結於頄支者結於目眥為外維其病小指次指支轉筋引膝外轉筋膝不可屈伸膕筋急前引髀後引尻即上乘䏚季脅痛上引缺盆膺乳頸維筋急從左之右右目不開上過右角並蹺脈而行左絡於右故傷左角右足不用命曰維筋相交治在燔針劫刺以知為數以痛為輸名曰孟春痹也足少陽之筋起於竅陰穴間而上循於頭目皆並脈而經於骨也維筋者陽維之筋也維者為一身之綱維從左之右右之左下而上上而下左右上下交維故命曰維筋相交此足少陽之筋交於陽維之經筋而為病也胃之經筋主病足陽明之筋起於中三指結於跗上斜外上加於輔骨上結於膝外廉直上結於髀樞上循脅脊其直者上循骭結於髀其支者結於外輔骨合少陽其直者上循伏兔上結於髀聚於陰器上腹而布至缺盆而結上頸上挾口合於頄下結於鼻上合於太陽太陽為目上綱陽明為目下綱其支者從頰結於耳前其病足中指肢脛轉筋腳跗堅伏兔轉筋髀前腫㿉疝腹筋急引缺盆及頰卒口僻急者目不合熱則筋縱目不開頰筋有寒則急引頰移口有熱則筋弛縱緩不勝收故僻治之以馬膏膏其急者以白酒和桂以塗其緩者以桑鉤鉤之即以生桑炭置之坎中高下以坐等以膏熨急頰且飲美酒啖美炙食不飲酒者自強也為之三拊而已治在燔針劫刺以知為數以痛為輸名曰季春痹也足陽明之筋起於厲兌穴之外間循髀股而上經於頭結於口鼻耳目之間目不開合者太陽寒水主氣而為開故寒則筋急而目不合陽明燥熱主氣而為合故熱則筋緩而目不開凡口移口僻諸證皆當辨寒熱也脾之經筋主病足太陰之筋起於大指之端內側上結於內踝其直者絡於膝內輔骨上循陰股結於髀聚於陰器上腹結於臍循腹裡結於肋散於胸中其內者著於脊其病足大指支內踝痛輔筋痛膝內輔骨痛陰股引髀而痛陰器紐痛下引臍兩脅痛引膺中脊內痛治在燔針劫刺以知為數以痛為輸名曰孟秋痹也孟當作仲足太陰之筋起於隱白穴間循股膝而上於胸腹其內者著於脊其病在經筋之部分而為痛也腎之經筋主病足少陰之筋起於小指之下並足太陰之筋斜走內踝之下結於踵與太陽之筋合而上結於內輔之下並太陰之筋而上循陰股結於陰器循脊內挾膂上至項結於枕骨與足太陽之筋合其病足下轉筋及所過而結者皆痛及轉筋病在此者主癎瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰治在燔針劫刺以知為數以痛為輸在內者熨引飲藥此筋折紐紐發數甚者不治名曰仲秋痹也仲當作孟足少陰之筋起於足小指之下斜趨湧泉穴上循陰股結於陰器內挾膂至項結於枕骨與足太陽之經相合余伯榮曰足少陰之筋與足太陽之經上合於頸項此藏府陰陽之氣交也病在外在陽者病太陽之氣故腰反折不能俯在內在陰者病少陰之氣故不能仰如傷寒病在太陽則有反折之痙強在少陰則有蜷臥矣肝之經筋主病足厥陰之筋起於大指之上上結於內踝之前上循脛上結內輔之下上循陰股結於陰器絡諸筋其病足大指支內踝之前痛內輔痛陰股痛轉筋陰氣不用傷於內則不起傷於寒則縮入傷於熱則縱挺不收治在行水清陰氣其病轉筋者治在燔針劫刺以知為數以痛為輸命曰季秋痹也足厥陰之筋起於大敦穴循脛股而結於陰器絡諸筋陰器乃宗筋之會厥陰主筋故連絡於三陰三陽之筋也厥陰風氣從火化故有寒熱之分厥陰木氣本於水故有行水之法厥陰之氣清而諸證悉愈矣小腸經筋主病手太陽之筋起於小指之上結於腕上循臂內廉結於時肘銳骨之後彈之應小指之上入結於腋下其支者後走腋後廉上繞肩胛循頸出走太陽之前結於耳後完骨其支者入耳中直者出耳上下結於頷上屬目外眥其病小指支肋內銳骨後廉痛循臂陰入腋下腋下痛腋後兼痛繞肩胛引頸而痛應耳中鳴痛引頷目瞑良久乃得視頸筋急則為筋瘻頸腫寒熱在頸者治在燔針劫刺以知為數以痛為輸其為腫者復而銳之本支者上曲牙循耳前屬目外眥上頷結於角其病當所過者支轉筋治在燔針劫刺以知為數以痛為輸名曰仲夏痹也手太陽之筋起於少澤穴循臂肘肩項而上結於耳頷目眥之間本支者本於直者而支行也本筋與支筋皆屬於目外眥筋之分行而復連絡也三焦經筋主病手少陽之筋起於小指次指之端結於腕上循臂結於肘上繞臑外廉上肩走頸合手太陽其支者當曲頰入系舌本其支者上曲牙循耳前屬目外眥上乘頷結於角其病當所過者即支轉筋舌卷治在燔針劫刺以知為數以痛為輸名曰季夏痹也手少陽之筋起於關衝穴循腕臂肘臑而上肩頸其支者當曲頰處入系耳本又其支者上曲牙循耳前屬於目外眥復上乘頷結於額角大腸經筋主病手陽明之筋起於大指次指之端結於腕上循臂上結於肘外上臑結於髃其支者繞肩胛挾脊直者從肩髃上頸其支者上頰結於頄直者上出手太陽之前上左角絡頭下右頷其病當所過者支痛及轉筋肩不舉頸不可左右視治則燔針劫刺以知為數以痛為輸名曰孟夏痹也手陽明之筋起於商陽穴循腕臂肘臑結髃繞肩挾脊上頸結於頄絡於頷肺之經筋主病手太陰之筋起於大指之上循指上行結於魚後行寸口外側上循臂結肘中上臑內廉入腋下出缺盆結肩前髃上結缺盆下結胸裡散貫賁合賁下抵季脅其病當所過者支轉筋痛甚成息賁脅急吐血治在燔針劫刺以知為數以痛為輸名曰仲冬痹也手太陰之筋起於少商穴循臂肘上臑入腋出缺盆結於肩之前髃上結於缺盆下結於胸裡散貫於胃脘之賁門間合於賁門而下抵季脅十二經筋合陰陽六氣氣逆則為喘急息奔血隨氣奔則為吐血也包絡經筋主病手心主之筋起於中指與太陰之筋並行結於肘內廉上臂陰結腋下下散前後挾脅其支者入腋散胸中結於賁其病當所過者支轉筋前及胸痛息賁治在燔針劫刺以知為數以痛為輸名曰孟冬痹也手心主之筋起於中衝穴與手太陽之筋並行循腋脅散胸中而結於胃脘之賁門間故成息賁也心之經筋主病手少陰之筋起於小指之內側結於銳骨上結肘內廉上入腋交大陰挾乳里結於胸中循胸下繫於臍其病內急心承伏梁下為肘綱其病當所過者支轉筋筋痛治在燔針劫刺以知為數以痛為輸其承伏梁唾膿血者不治經筋之病寒則反折筋急熱則筋縱挺不收陰痿不用陽急則反折陰急則俯不伸焠刺者刺寒急也熱則筋縱不收無用燔針名曰季冬痹也手少陰之筋起於少衝穴間循肘腋交於手太陰之筋挾乳里結於胸中循胸下繫於臍心承伏梁者如梁之伏於心下而上承於心也其承伏梁而唾膿者病在心藏故不治筋急筋縱寒熱可以辨矣反折不伸陰陽可以辨矣蓋少陰本陰而標陽故有寒熱陰陽之證也經脈絡脈經別經筋中百病具備病固有微而實顯知其微者間不容髮古稱良醫者莫不先明經絡不明經絡而徒求治法是不尋根本而求枝葉何以救急而扶危故曰治病必求於本李士材曰古人藝精而試今人藝試而精古人法治病今人病合法君子以仁壽為己任非熟通經絡無由也手三陰三陽歌訣手太陰肺少陰心心之包絡為厥陰太陽小腸三焦少陽明乃是大腸經足三陰三陽歌訣足太陰脾少陰腎厥陰原以肝經定太陽膀胱少陽膽胃為陽明各相應
