body:
  text: 幼科扼要總論幼科之病難而易幼科之疾易而難夫易者何蓋乳臭之子無所憂鬱無所虧損不過外感風寒內傷飲食而已又難者何痛癢不知寒熱不曉不過晝夜啼哭而已矧肌膚之柔脆腸胃之嬌嫩重寒不能投大暖重熱難以用清涼務要細觀其顏色詳察其證候其庶幾乎若欲盡憑關斷吾恐失之遠矣何也風氣命三關曰病在風關易治氣關亦要躊躇若通於命十難救濟子嘗見幼稚其無病而衝上命關者不知凡幾業今子復生子何竟無害也故雖有紫紅赤熱青驚白寒黃屬脾積黑中惡氣之斷而務要辨其外感內傷審其寒熱虛實察眼目黑白之分明聽聲音輕重之嘹亮再睹顏色之黑白黃紫肌膚之肥瘦強弱尤審大便之緊松小便之赤白啼哭則辨其有淚無淚睡臥則看其眼閉眼開頭髮則喜密黑肌肉最忌肥重不可綿衣過暖肥甘恣食蓋幼稚陽氣既足陰血未全若過暖必損真陰恣食必傷脾胃此丹溪先生之大戒也故能辨內傷外感以察其寒熱虛實則治療之法無餘蘊矣蓋外感必流涕而咳嗽發熱翕翕不已手背熱大手心熱微外而畏風內而思食小便長而大便利者此外感也紫黑之體用荊防敗毒散或參蘇飲去木香或藿香正氣散熱大者或柴葛桂枝湯加白苓淨風肥白色者小青龍湯內除北味加白苓或金沸草散或半夏溫肺湯或麻黃附子細辛湯汗多補中益氣湯黃耆建中湯熱久不退者四神湯或十味人參湯或柴芍六君湯加粉葛四肢發厥而泄者名曰寒厥理中湯加附子白苓或七味白朮散內傷飲食者肚腹脹大不思飲食小便混濁大便溏泄熱來乍大乍小手心熱大面色黃滯常有瀉泄不時嘔吐此內傷也通用藿香正氣散去腹毛加砂仁或不換金正氣散作嘔者藿香養胃湯去甘草嘔兼泄者亦用養胃湯除川朴或附子理中湯加白苓或七味白朮散有寒均加桂枝健脾退熱者用參苓白朮散或四神湯四君子湯或柴芍六君子湯加淮藥或黃耆六君湯蛔蟲出者椒梅理中湯紫黑之體熱不退者荊防敗毒散加麥芽楂肉或連翹敗毒散有汗而元氣虛者補中益氣湯加神麯白苓酒芍肥白之體悉是痰象一概寒涼勿用初起桂苓甘術湯或真武湯加桂枝重寒加北辛有熱略加粉葛有濕防風除濕湯此乃辨內傷外感之大略耳至若實證虛證自形於外一望而知為實證者小便赤大便緊口弦紅眼眵多口渴甚飲水不休眼目純紅熱大如爐不欲言語皆實證也虛證者大便常溏小便帶白口弦不紅眼無眵淚口不渴即渴飲水亦少睡則眼開熱來乍大乍小面色㿠白兩眼無神此虛證也啼哭無淚者必有痛發黃面白者盡為痰皆診治之切要也而運用之妙惟存乎一心耳幼科用方荊防敗毒散桔梗荊芥淨風白苓川芎枳殼羌活獨活柴胡前胡薄葉姜引參蘇飲人參白朮半夏陳皮前胡枳殼桔梗粉葛木香甘草除木香藿香正氣散藿香蒼朮白苓川朴半夏陳皮桔梗蘇葉腹毛白芷神麯甘草柴胡桂枝湯桂枝白芍柴胡粉葛甘草小青龍湯麻黃桂枝白芍半夏五味乾薑北辛甘草除五味加白苓半夏溫肺湯半夏陳皮白芍杏仁五味北辛肉桂乾薑甘草金沸草散麻黃白芍半夏前胡荊芥旋覆花甘草姜引麻黃附子細辛湯補中益氣湯人參黃耆白朮陳皮升麻柴胡甘草當歸黃耆建中湯白芍肉桂黃耆甘草姜棗引四神湯當歸川芎白芍乾薑十味人參湯人參白朮白苓半夏陳皮柴胡黃芩粉葛甘草姜棗引柴芍六君子湯人參白朮白苓半夏陳皮柴胡白芍甘草加粉葛理中湯白朮人參乾薑甘草加熟附白苓七味白朮散人參白朮白苓藿香木香粉葛甘草如無氣滯吐瀉則減去木香藿香正氣散去腹毛加砂仁不換金正氣散蒼朮白苓川朴半夏陳皮藿香甘草藿香養胃湯藿香蒼朮川朴白苓陳皮草果半夏炙草烏梅人參又名人參養胃湯參苓白朮散人參白苓白朮淮藥米仁蓮肉砂仁桔根扁豆甘草姜棗引四君子湯柴芍六君子湯加淮藥六君子湯黃耆六君子湯椒梅理中湯人參白朮乾薑川椒烏梅甘草荊防敗毒散加麥芽山楂連翹敗毒散補中益氣湯加神麯白苓白藥酒炒桂苓甘術湯肉桂白朮白苓甘草真武湯白芍白朮白苓熟附甘草姜引加桂枝重寒加細辛有熱略加粉葛防風除濕湯白苓防風白朮藿香陳皮川朴半夏蒼朮甘草
